de:
  title: Pollo al Ajillo – Hähnchen in Knoblauch-Weißwein-Sauce
  summary: Kastilianisches Knoblauch-Hähnchen in einer duftenden Sauce aus reichlich
    Knoblauch, trockenem Sherry, Pimentón ahumado und Olivenöl.
en:
  title: Pollo al Ajillo – Chicken in Garlic and White Wine Sauce
  summary: Castilian garlic chicken in a fragrant sauce of abundant garlic, dry sherry,
    smoked pimentón and olive oil.
ingredients:
