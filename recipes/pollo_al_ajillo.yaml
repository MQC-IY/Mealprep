de_steps:
- Hähnchenstücke trocken tupfen, kräftig mit Salz, Pfeffer und 1 TL Pimentón würzen.
- Olivenöl in einer großen, tiefen Pfanne bei hoher Hitze erhitzen. Hähnchenstücke
  portionsweise rundherum 5–6 Minuten goldbraun und knusprig anbraten. Herausnehmen.
- Knoblauchzehen (6 davon ganz gelassen, 4 fein gehackt) im selben Öl bei mittlerer
  Hitze 2–3 Minuten goldgelb anbraten.
- Lorbeerblätter und restlichen Pimentón sowie Cayennepfeffer einrühren. Mit Sherry
  ablöschen, kräftig aufkochen und 2 Minuten einkochen.
- Brühe dazugießen. Hähnchenstücke zurücklegen, Deckel auflegen und bei niedriger
  bis mittlerer Hitze 35 Minuten schmoren.
- Deckel abnehmen, weitere 10 Minuten offen köcheln, bis die Sauce konzentriert und
  leicht sämig ist. Lorbeer entfernen.
- Mit reichlich gehackter Petersilie bestreuen.
- Dazu frisches Weißbrot reichen, um die Sauce aufzutunken.
en_steps:
- Pat the chicken pieces dry and season generously with salt, pepper and 1 tsp pimentón.
- Heat the olive oil in a large, deep frying pan over high heat. Brown the chicken
  pieces in batches on all sides for 5–6 minutes until golden and crispy. Remove and
  set aside.
- In the same oil, fry the garlic cloves (6 left whole, 4 finely chopped) over medium
  heat for 2–3 minutes until golden.
- Stir in the bay leaves, remaining pimentón and cayenne pepper. Deglaze with the
  sherry, bring to a vigorous boil and reduce for 2 minutes.
- Add the stock. Return the chicken pieces, cover and braise over low to medium heat
  for 35 minutes.
- Remove the lid and simmer uncovered for a further 10 minutes until the sauce is
  concentrated and slightly syrupy. Remove the bay leaves.
- Scatter generously with chopped fresh parsley.
- Serve with crusty white bread to soak up the sauce.
