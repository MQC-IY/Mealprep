de:
  title: Tomaten-Polenta mit weißen Bohnen
  summary: Sehr schnelles, mildes Komfortgericht mit cremiger Polenta, Bohnen und
    Tomatensauce.
en:
  title: Tomato Polenta with White Beans
  summary: A very quick, mellow comfort dish of creamy polenta with white beans and
    tomato sauce.
ingredients:
- de_name: Polenta
  en_name: polenta
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Weiße Bohnen
  en_name: white beans
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Passierte Tomaten
  en_name: strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Blattspinat
  en_name: leaf spinach
  qty: 120
  unit: g
  category: Gemüse und Salat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Basilikum
  en_name: basil
  qty: 1
  unit: TL
