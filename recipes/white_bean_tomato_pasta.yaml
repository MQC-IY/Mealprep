  en_name: Onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Basilikum
  en_name: Basil
  qty: 1
  unit: TL
