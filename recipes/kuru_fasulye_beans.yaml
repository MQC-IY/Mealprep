de:
  title: Türkischer Kuru Fasulye – Weißbohneneintopf
  summary: Herzhafter türkischer Nationaleintopf aus Cannellini-Bohnen, die stundenlang
    in einer würzigen Tomatenbasis mit Lammfleisch geschmort werden.
en:
  title: Turkish Kuru Fasulye – White Bean Stew
  summary: Hearty Turkish national stew of cannellini beans braised in a spiced tomato
    base with lamb.
