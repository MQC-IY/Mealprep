de_steps:
- Zwiebeln würfeln, Paprika in Streifen schneiden, Knoblauch pressen. Olivenöl in
  einem schweren Topf erhitzen und Lammfleisch portionsweise scharf anbraten, bis
  es von allen Seiten braun ist. Herausnehmen.
- Zwiebeln und Paprika im gleichen Topf 6 Minuten weich dünsten. Knoblauch, Tomatenmark,
  Pul Biber und Paprikapulver hinzufügen und 2 Minuten mitrösten.
- Gehackte Tomaten und Lammfond einrühren. Angebratenes Fleisch zurück in den Topf
  geben. Lorbeerblätter einlegen, salzen und pfeffern.
- Abgetropfte Cannellini-Bohnen hinzufügen. Alles zum Kochen bringen, dann Hitze reduzieren
  und den Eintopf zugedeckt 45 Minuten sanft köcheln lassen, bis das Fleisch zart
  ist.
- Lorbeerblätter entfernen. Abschmecken und mit frischem Brot oder Reis servieren.
en_steps:
- Dice onions; cut bell pepper into strips; press garlic. Heat olive oil in a heavy
  pot and brown lamb in batches until seared on all sides. Remove.
- Sweat onions and bell pepper in the same pot for 6 minutes. Add garlic, tomato paste,
  pul biber, and paprika; toast for 2 minutes.
- Stir in chopped tomatoes and lamb stock. Return browned meat to the pot. Add bay
  leaves, season with salt and pepper.
- Add drained cannellini beans. Bring everything to a boil, then reduce heat and simmer
  covered for 45 minutes until the meat is tender.
- Remove bay leaves. Adjust seasoning and serve with fresh bread or rice.
