de_steps:
- Zwiebeln würfeln, Karotten in Scheiben schneiden, Sellerie schräg schneiden. 4 EL
  Olivenöl in einem großen Topf erhitzen und Zwiebeln 5 Minuten weich dünsten.
- Karotten, Sellerie und Knoblauch hinzufügen. Weitere 5 Minuten unter Rühren anschwitzen.
  Tomatenmark und Chiliflocken einrühren und 2 Minuten mitrösten.
- Gehackte Tomaten, Gemüsebrühe und abgetropfte Bohnen hinzufügen. Oregano, Salz und
  Pfeffer einrühren.
- Zum Kochen bringen, dann Hitze reduzieren und zugedeckt 30 Minuten köcheln lassen,
  bis Karotten und Sellerie weich sind.
- Restliches Olivenöl (2 EL) und Zitronensaft einrühren. Großzügig Petersilie einrühren.
  Abschmecken.
- Mit crustigem Brot und Kalamata-Oliven servieren.
en_steps:
- Dice the onions, slice the carrots, and cut the celery on the diagonal. Heat 4 tbsp
  olive oil in a large pot and sweat the onions for 5 minutes until soft.
- Add the carrots, celery, and garlic. Stir and sweat for a further 5 minutes. Stir
  in the tomato purée and chilli flakes and fry for 2 minutes.
- Add the chopped tomatoes, vegetable stock, and drained beans. Stir in the oregano,
  salt, and pepper.
- Bring to a boil, then reduce the heat and simmer covered for 30 minutes until the
  carrots and celery are tender.
- Stir in the remaining olive oil (2 tbsp) and the lemon juice. Stir in plenty of
  parsley. Season to taste.
- Serve with crusty bread and Kalamata olives.
