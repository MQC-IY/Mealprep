de_steps:
- |-
  Zwiebeln würfeln, Karotten in Scheiben schneiden, Sellerie schräg schneiden. 4 EL Olivenöl in einem großen Topf erhitzen und Zwiebeln 5 Minuten weich dünsten.
- |-
  Karotten, Sellerie und Knoblauch hinzufügen. Weitere 5 Minuten unter Rühren anschwitzen. Tomatenmark und Chiliflocken einrühren und 2 Minuten mitrösten.
- |-
  Gehackte Tomaten, Gemüsebrühe und abgetropfte Bohnen hinzufügen. Oregano, Salz und Pfeffer einrühren.
- |-
  Zum Kochen bringen, dann Hitze reduzieren und zugedeckt 30 Minuten köcheln lassen, bis Karotten und Sellerie weich sind.
- |-
  Restliches Olivenöl (2 EL) und Zitronensaft einrühren. Großzügig Petersilie einrühren. Abschmecken.
- Mit crustigem Brot und Kalamata-Oliven servieren.
