de:
  title: Griechischer Fassolada – Weißbohneneintopf
  summary: 'Griechenlands Nationalsuppe: Cannellini-Bohnen in reichhaltigem Olivenöl
    mit Sellerie, Karotten und Oregano – einfach, sättigend und voller Charakter.'
en:
  title: Fassolada – Greek White Bean Soup
  summary: 'Greece''s national soup: cannellini beans in generous olive oil with celery,
    carrots, and oregano — simple, satisfying, and full of character.'
