de_steps:
- Reis waschen und nach dem Absorption-Verfahren mit 700 ml Wasser garen.
- Zwiebeln in halbe Ringe schneiden. Ingwer in feine Julienne schneiden.
- In einem breiten Topf Dashi-Brühe, Sojasoße, Mirin, Sake und Zucker aufkochen. Zwiebeln
  und Ingwer dazugeben und 8 Minuten köcheln.
- Rindfleischstreifen einzeln in die köchelnde Brühe legen und 2–3 Minuten garen,
  dabei Schaum abschöpfen.
- Sesamöl einrühren, Topf vom Herd nehmen.
- Reis in Schalen geben, Rindfleisch mit Zwiebeln und reichlich Brühe darüber schöpfen.
  Mit Frühlingszwiebelringen, roten Chiliflocken und Beni-Shoga garnieren.
en_steps:
- Wash the rice and cook by the absorption method with 700 ml water.
- Slice the onions into half-rings. Cut the ginger into fine julienne.
- In a wide pot, bring the dashi stock, soy sauce, mirin, sake, and sugar to a boil.
  Add the onions and ginger and simmer for 8 minutes.
- Add the beef slices one by one to the simmering broth and cook for 2–3 minutes,
  skimming off any foam.
- Stir in the sesame oil and remove the pot from the heat.
- Divide the rice into bowls. Ladle the beef with onions and plenty of broth on top.
  Garnish with spring onion rings, red chilli flakes, and beni shoga.
