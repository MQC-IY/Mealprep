de:
  title: Gyudon – Japanische Rindfleisch-Reisschale
  summary: Zarte Rindfleischstreifen mit Zwiebeln in süß-salziger Dashi-Soße auf Reis
    – der Klassiker der japanischen Schnellküche.
en:
  title: Gyudon – Japanese Beef Rice Bowl
  summary: Tender strips of beef with onions in a sweet-savoury dashi broth over rice
    — the classic of Japanese fast cooking.
