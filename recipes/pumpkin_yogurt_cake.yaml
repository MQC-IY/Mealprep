de_steps:
- Kürbisfleisch in Würfel schneiden, im Ofen bei 200 °C 25 Minuten weich garen oder
  im Topf mit etwas Wasser weichkochen. Abtropfen lassen und zu einem glatten Püree
  stampfen.
- Ofen auf 175 °C Ober-/Unterhitze vorheizen. Eine Springform (26 cm) mit Backpapier
  auslegen.
- Vollkorndinkelmehl, Backpulver, Natron, Zimt, Ingwer, Muskat und Salz in einer Schüssel
  vermengen.
- In einer anderen Schüssel Eier, Joghurt, geschmolzenes Kokosöl, Honig, Vanilleextrakt
  und abgekühltes Kürbispüree cremig verrühren.
- Feuchte Zutaten zu den trockenen geben und zu einem glatten Teig verrühren.
- Teig in die Form füllen, glattstreichen und mit gehackten Walnüssen bestreuen.
- Im vorgeheizten Ofen 45–50 Minuten backen, bis ein Zahnstocher sauber herauskommt.
  In der Form 15 Minuten abkühlen lassen, dann auf einem Gitter vollständig auskühlen.
  Kühl und luftdicht gelagert bis zu 5 Tage haltbar.
en_steps:
- Cut the pumpkin into cubes and roast in the oven at 200 °C (400 °F) for 25 minutes
  until soft, or cook in a pot with a little water. Drain and mash into a smooth puree.
- Preheat the oven to 175 °C (350 °F). Line a 26 cm springform pan with parchment
  paper.
- Combine the spelt flour, baking powder, baking soda, cinnamon, ginger, nutmeg, and
  salt in a bowl.
- In a separate bowl, whisk together the eggs, yogurt, melted coconut oil, honey,
  vanilla extract, and cooled pumpkin puree until smooth.
- Add the wet ingredients to the dry ingredients and stir into a smooth batter.
- Pour the batter into the prepared pan, smooth the surface, and scatter the chopped
  walnuts on top.
- Bake in the preheated oven for 45–50 minutes until a skewer comes out clean. Cool
  in the pan for 15 minutes, then transfer to a wire rack to cool completely. Keeps
  well wrapped in the fridge for up to 5 days.
