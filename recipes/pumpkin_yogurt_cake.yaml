id: pumpkin_yogurt_cake
pool: dessert
healthy: true
meals: 8
de:
  title: Kürbis-Joghurt-Kuchen mit Walnüssen
  summary: Saftiger Herbstkuchen mit Kürbispüree, Joghurt und wärmenden Gewürzen,
    getoppt mit knackigen Walnüssen — ohne Weißmehl und mit natürlicher Süße.
en:
  title: Pumpkin Yogurt Cake with Walnuts
  summary: A moist autumn cake made with pumpkin puree, yogurt, and warming spices,
    topped with crunchy walnuts — no white flour and naturally sweetened.
