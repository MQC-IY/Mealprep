de:
  title: Quinoa-Auflauf mit Hähnchen und Gemüse
  summary: Meal-Prep-tauglicher Auflauf mit Quinoa, Hähnchen, Brokkoli und Paprika.
en:
  title: Quinoa and Vegetable Bake with Chicken
  summary: A meal-prep-friendly bake of quinoa, chicken, broccoli, and bell peppers,
    bound with a yogurt-egg custard.
