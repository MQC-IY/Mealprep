de_steps:
- Quinoa vorgaren.
- Hähnchen und Gemüse klein schneiden und kurz anbraten oder vorgaren.
- Alles in eine Form geben, Eier mit Joghurt verrühren und darübergeben.
en_steps:
- Pre-cook the quinoa.
- Cut the chicken and vegetables into small pieces and briefly sauté or par-cook.
- Transfer everything to a baking dish, whisk the eggs with the yogurt, and pour over
  the top.
