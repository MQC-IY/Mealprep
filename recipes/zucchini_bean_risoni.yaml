de:
  title: Risoni mit Zucchini und Bohnen
  summary: Schnelle, milde Risoni-Pfanne mit Zucchini, weißen Bohnen und Tomate.
en:
  title: Risoni with Zucchini and White Beans
  summary: A quick, mild risoni pan with zucchini, white beans, and tomato sauce.
ingredients:
- de_name: Orzo oder Kritharaki
  en_name: Orzo or kritharaki
  qty: 300
  unit: g
