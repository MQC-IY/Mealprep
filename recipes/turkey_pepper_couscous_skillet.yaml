de:
  title: Puten-Couscous-Pfanne mit Paprika
  summary: Schnelle Pfanne mit Putenhack, Couscous, Paprika und Möhren.
en:
  title: Turkey Couscous Skillet with Bell Pepper
  summary: A quick skillet of ground turkey, couscous, bell pepper, and carrots.
