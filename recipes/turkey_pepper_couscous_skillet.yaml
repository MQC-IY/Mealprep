de_steps:
- Couscous quellen lassen.
- Putenhack mit Zwiebel scharf anbraten.
- Paprika und Möhren weich garen.
en_steps:
- Soak the couscous in boiling water until fluffy.
- Brown the ground turkey with the onion over high heat.
- Cook the bell pepper and carrots until tender.
