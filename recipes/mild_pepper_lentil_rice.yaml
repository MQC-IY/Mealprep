de:
  title: Paprika-Linsen-Reis-Topf
  summary: Milder Topf mit Reis, roten Linsen und Paprika.
en:
  title: Mild Pepper, Lentil, and Rice Pot
  summary: A mild one-pot of rice, red lentils, and bell pepper.
ingredients:
- de_name: Reis
  en_name: Rice
  qty: 220
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Rote Linsen
  en_name: Red lentils
  qty: 200
  unit: g
  category: Konserven und Vorrat
- de_name: Paprika
  en_name: Bell pepper
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Passierte Tomaten
  en_name: Strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Zwiebel
  en_name: Onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Paprika edelsüß
  en_name: Sweet paprika
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: Chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Zwiebel und Paprika anschwitzen.
- Linsen, Reis und Tomaten zugeben.
- Mit Wasser weich köcheln lassen.
en_steps:
- Sauté the onion and bell pepper until soft.
- Add the lentils, rice, and tomatoes.
- Simmer with water until everything is tender.
