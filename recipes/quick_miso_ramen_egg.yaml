de:
  title: Schneller Ramen mit Miso und Ei
  summary: Umami-reiche Miso-Brühe mit Ramen-Nudeln, weichem Ei, Frühlingszwiebeln
    und Sesam.
en:
  title: Quick Miso Ramen with Soft-Boiled Egg
  summary: Umami-rich miso broth with ramen noodles, soft-boiled eggs, spring onions,
    and sesame — ready in 25 minutes.
