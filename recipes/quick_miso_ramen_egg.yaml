de_steps:
- Eier in kochendem Wasser 7 Minuten kochen, dann in Eiswasser abschrecken. Schälen
  und halbieren.
- Knoblauch und Ingwer reiben. In Sesamöl 1 Minute anbraten.
- Brühe hinzufügen und aufkochen. Miso und Sojasauce in etwas heißer Brühe auflösen
  und in den Topf einrühren (nicht mehr kochen lassen).
- Ramen-Nudeln direkt in der Brühe laut Packungsanweisung (ca. 3 Minuten) garen.
- In Schüsseln verteilen, Eier halbiert obenauf legen. Mit Frühlingszwiebelringen,
  Sesam und Chiliflocken garnieren.
en_steps:
- Boil the eggs for 7 minutes in simmering water, then transfer to ice water to stop
  cooking. Peel and halve.
- Grate the garlic and ginger. Sauté in sesame oil for 1 minute.
- Add the broth and bring to a boil. Dissolve the miso and soy sauce in a ladle of
  hot broth, then stir into the pot (do not boil again).
- Cook the ramen noodles directly in the broth according to package instructions (about
  3 minutes).
- Ladle into bowls and top with the halved eggs. Garnish with sliced spring onions,
  sesame seeds, and chili flakes.
