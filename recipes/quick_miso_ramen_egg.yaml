  en_name: White miso
  qty: 4
  unit: EL
  category: Konserven und Vorrat
- de_name: Sesamöl
  en_name: Sesame oil
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Sojasauce
  en_name: Soy sauce
  qty: 3
  unit: EL
  category: Konserven und Vorrat
- de_name: Hühnerbrühe
  en_name: Chicken broth
  qty: 1.2
  unit: Liter
