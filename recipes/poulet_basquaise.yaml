de_steps:
- Hähnchenstücke würzen. Olivenöl in einem Schmortopf stark erhitzen, Hähnchen von
  beiden Seiten 5 Minuten anbraten. Herausnehmen.
- Chorizo in Scheiben schneiden und im gleichen Topf 2–3 Minuten bei mittlerer Hitze
  anbraten. Herausnehmen.
- Paprika in Streifen schneiden, Zwiebel in Ringe, Knoblauch hacken. Im Bratfett 8
  Minuten sanft anschwitzen.
- Piment d'Espelette, Paprikapulver, Thymian und Lorbeer einrühren, 1 Minute rösten.
- Mit Weißwein ablöschen, 2 Minuten einkochen. Tomaten zerdrückt dazugeben.
- Hähnchen und Chorizo zurücklegen. Zugedeckt bei niedriger Hitze 40 Minuten schmoren.
- Deckel abnehmen und 10 Minuten offen köcheln, bis die Sauce eindickt. Lorbeer entfernen.
- Mit frischer Petersilie bestreuen. Mit Basmatireis oder frischem Brot servieren.
en_steps:
- Season the chicken pieces. Heat the olive oil in a braising pot until very hot,
  then brown the chicken on both sides for 5 minutes. Remove and set aside.
- Slice the chorizo and fry in the same pot over medium heat for 2–3 minutes. Remove
  and set aside.
- Slice the peppers into strips, cut the onion into rings and chop the garlic. Sweat
  gently in the cooking fat for 8 minutes.
- Stir in the piment d'Espelette, smoked paprika, thyme and bay leaves; toast for
  1 minute.
- Deglaze with the white wine and reduce for 2 minutes. Add the crushed tomatoes.
- Return the chicken and chorizo. Cover and braise over low heat for 40 minutes.
- Remove the lid and simmer uncovered for a further 10 minutes until the sauce thickens.
  Remove the bay leaves.
- Scatter with fresh parsley. Serve with basmati rice or fresh bread.
