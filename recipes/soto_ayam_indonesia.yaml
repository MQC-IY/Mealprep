de_steps:
- Zwiebeln, Knoblauch und Ingwer fein hacken. Öl in einem großen Topf erhitzen, Zwiebeln
  4 Minuten anbraten.
- Knoblauch, Ingwer, Kurkuma, gemahlenen Koriander und weißen Pfeffer zugeben, 2 Minuten
  rösten.
- Hähnchenstücke zugeben und von allen Seiten 3–4 Minuten anbraten.
- Hühnerbrühe angießen. Angequetschte Zitronengrasstangen, Galgant und Fischsauce
  zugeben. Aufkochen, dann 30 Minuten bei mittlerer Hitze köcheln.
- Hähnchen herausnehmen, abkühlen lassen und in Fasern zupfen. Brühe durch ein Sieb
  gießen und bei Bedarf abschmecken.
- Eier hartkochen und halbieren. Glasnudeln in heißem Wasser 3–4 Minuten einweichen.
- 'In Schüsseln: Glasnudeln, gezupftes Hähnchen und Brühe anrichten. Mit halbierten
  Eiern, Frühlingszwiebelringen, Limettenspalten und Chiliflocken garnieren.'
en_steps:
- Finely chop the onions, garlic, and ginger. Heat the oil in a large pot and sauté
  the onions for 4 minutes.
- Add the garlic, ginger, turmeric, ground coriander, and white pepper; toast for
  2 minutes.
- Add the chicken pieces and brown on all sides for 3–4 minutes.
- Pour in the chicken broth. Add the bruised lemongrass stalks, galangal, and fish
  sauce. Bring to a boil, then simmer over medium heat for 30 minutes.
- Remove the chicken, let cool, and shred into pieces. Strain the broth through a
  sieve and season to taste.
- Hard-boil the eggs and halve them. Soak the glass noodles in hot water for 3–4 minutes.
- 'Assemble in bowls: glass noodles, shredded chicken, and broth. Garnish with halved
  eggs, spring onion rings, lime wedges, and chili flakes.'
