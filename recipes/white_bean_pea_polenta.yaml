de:
  title: Polenta mit Bohnen und Erbsen
  summary: Sehr schnelles, mildes Gericht mit cremiger Polenta, weißen Bohnen und
    Erbsen.
en:
  title: Polenta with White Beans and Peas
  summary: A very quick, mild dish of creamy polenta served with white beans and peas
    in tomato sauce.
