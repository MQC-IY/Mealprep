de_steps:
- Polenta weich rühren.
- Bohnen und Erbsen in Tomatensauce kurz erwärmen.
- Erwachsenenportion danach mit der Polenta servieren und abschmecken.
en_steps:
- Cook the polenta until creamy.
- Warm the beans and peas briefly in the tomato sauce.
- Serve the bean and pea mixture alongside the polenta and season to taste for the
  adult portion.
