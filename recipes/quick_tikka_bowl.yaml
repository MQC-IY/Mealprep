de:
  title: Hähnchen-Tikka-Masala-Bowl (schnell)
  summary: 'Schnelle Variante des Klassikers: Hähnchen in cremiger Tomaten-Kokos-Tikka-Sauce
    mit intensiven Gewürzen, fertig in unter 30 Minuten – kein langes Marinieren nötig.'
en:
  title: Quick Chicken Tikka Masala Bowl
  summary: 'A speedy take on the classic: chicken in a creamy tomato-coconut Tikka
    sauce with bold spices — ready in under 30 minutes, no long marinating needed.'
