de_steps:
- Hähnchen in Würfel schneiden. Mit Garam Masala, Kurkuma und Salz direkt in der Pfanne
  würzen – kein Vormarinieren.
- Reis gleichzeitig aufsetzen.
- Hähnchen in heißem Öl scharf anbraten, herausnehmen.
- Im gleichen Topf Zwiebel 5 Minuten braten. Knoblauch, Ingwer, Paprika, Kreuzkümmel
  und Chiliflocken zugeben, 1 Minute rösten. Tomatenmark einrühren.
- Passierte Tomaten und Kokosmilch zugießen. 10 Minuten köcheln lassen.
- Hähnchen zurück in die Sauce geben, 5 Minuten mitgaren. Mit Salz und ggf. mehr Chiliflocken
  abschmecken. Mit Koriander bestreuen.
en_steps:
- Cut the chicken into cubes. Season directly in the pan with garam masala, turmeric,
  and salt — no pre-marinating needed.
- Start the rice at the same time.
- Sear the chicken in hot oil until cooked through, then remove.
- In the same pot, fry the onion for 5 minutes. Add the garlic, ginger, paprika, cumin,
  and chili flakes, toast for 1 minute, then stir in the tomato paste.
- Pour in the strained tomatoes and coconut milk. Simmer for 10 minutes.
- Return the chicken to the sauce and cook for 5 more minutes. Season with salt and
  additional chili flakes to taste. Scatter fresh cilantro over the top.
