de:
  title: Sambal-Hähnchen mit Kokos-Reis
  summary: Würziges indonesisches Hähnchen in einer intensiven Sambal-Oelek-Kokosmilch-Sauce,
    serviert mit duftendem Kokos-Jasminreis.
en:
  title: Sambal Chicken with Coconut Rice
  summary: Spicy Indonesian chicken in an intense sambal oelek–coconut milk sauce,
    served with fragrant coconut jasmine rice.
