de_steps:
- 'Kokos-Reis zubereiten: Jasminreis mit einer Dose Kokosmilch und der gleichen Menge
  Wasser in einem Topf aufkochen. Hitze auf minimal, Deckel drauf, 15 Minuten köcheln
  bis der Reis gar ist.'
- Zwiebeln, Knoblauch und Ingwer fein hacken. Öl in einer großen Pfanne bei mittlerer-hoher
  Hitze erhitzen. Zwiebeln 5 Minuten glasig anbraten.
- Knoblauch und Ingwer 1 Minute mitrösten. Sambal Oelek, Kurkuma, gemahlenen Koriander
  und Chiliflocken zugeben, 2 Minuten unter Rühren rösten.
- Hähnchenstücke zugeben und von allen Seiten 5 Minuten anbraten.
- Zweite Dose Kokosmilch, Fischsauce, angequetschte Zitronengrasstangen und Kaffirlimettenblätter
  zugeben. Aufkochen, Hitze reduzieren.
- 30 Minuten bei mittlerer-niedriger Hitze köcheln bis das Hähnchen sehr zart und
  die Sauce eingedickt ist.
- Zitronengras und Limettenblätter entfernen. Mit Limettensaft abschmecken. Mit Kokos-Reis
  servieren.
en_steps:
- 'Make the coconut rice: bring the jasmine rice with one can of coconut milk and
  an equal amount of water to a boil. Reduce to the lowest heat, cover, and simmer
  for 15 minutes until cooked.'
- Finely chop the onions, garlic, and ginger. Heat the oil in a large pan over medium-high
  heat. Sauté the onions for 5 minutes until translucent.
- Add the garlic and ginger and toast for 1 minute. Add the sambal oelek, turmeric,
  ground coriander, and chili flakes; stir-fry for 2 minutes.
- Add the chicken pieces and brown on all sides for 5 minutes.
- Pour in the second can of coconut milk, fish sauce, bruised lemongrass stalks, and
  kaffir lime leaves. Bring to a boil, then reduce the heat.
- Simmer over medium-low heat for 30 minutes until the chicken is very tender and
  the sauce has thickened.
- Remove the lemongrass and lime leaves. Season with lime juice. Serve with the coconut
  rice.
