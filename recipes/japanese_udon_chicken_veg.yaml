de_steps:
- Udon-Nudeln nach Packungsangabe garen.
- Hähnchen in Streifen schneiden. Knoblauch und Ingwer fein hacken, Frühlingszwiebeln
  in Ringe schneiden.
- Brokkoli, Möhren und Paprika bissfest garen, dann Hähnchen in Rapsöl anbraten und
  Knoblauch sowie Ingwer kurz mitziehen lassen.
- Udon und Gemüse zufügen und mit Sojasauce, Sesamöl und etwas Reisessig schwenken.
en_steps:
- Cook udon noodles according to package instructions.
- Cut chicken into strips. Finely chop garlic and ginger; slice spring onions into
  rings.
- Cook broccoli, carrots, and bell pepper until just tender; fry chicken in rapeseed
  oil and let garlic and ginger briefly infuse.
- Add udon and vegetables; toss with soy sauce, sesame oil, and a splash of rice vinegar.
