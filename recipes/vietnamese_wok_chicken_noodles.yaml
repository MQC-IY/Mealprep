de_steps:
- Glasnudeln in heißem Wasser 5 Minuten einweichen, abgießen und in handliche Stücke
  schneiden.
- Hähnchen in dünne Streifen schneiden. Möhren schälen und schräg in dünne Scheiben
  schneiden. Kohl fein schneiden. Paprika in Streifen.
- Knoblauch und Ingwer fein hacken. Zitronengras fein hacken.
- Öl im Wok bei starker Hitze erhitzen. Knoblauch, Ingwer und Zitronengras 30 Sekunden
  anbraten.
- Hähnchen zugeben und 4 Minuten scharf braten.
- Möhren und Kohl zugeben und 2 Minuten mitbraten. Paprika zugeben.
- Fischsauce, Austernsauce, Sojasauce und Geflügelfond angießen. Glasnudeln einrühren.
- Alles 2–3 Minuten bei starker Hitze unter Rühren braten, bis die Flüssigkeit fast
  eingekocht ist.
- Frühlingszwiebeln und Chili unterheben. Mit Pfeffer und Limettensaft abschmecken.
en_steps:
- Soak the glass noodles in hot water for 5 minutes, drain, and cut into manageable
  pieces.
- Slice the chicken into thin strips. Peel the carrots and cut them diagonally into
  thin slices. Finely shred the cabbage. Cut the bell peppers into strips.
- Finely chop the garlic, ginger, and lemongrass.
- Heat the oil in a wok over high heat. Stir-fry the garlic, ginger, and lemongrass
  for 30 seconds.
- Add the chicken and stir-fry over high heat for 4 minutes.
- Add the carrots and cabbage and stir-fry for 2 minutes. Add the bell peppers.
- Pour in the fish sauce, oyster sauce, soy sauce, and chicken stock. Stir in the
  glass noodles.
- Stir-fry everything over high heat for 2–3 minutes, tossing constantly, until the
  liquid has almost evaporated.
- Fold in the spring onions and chili. Season to taste with pepper and lime juice.
