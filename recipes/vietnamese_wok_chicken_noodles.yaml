de:
  title: Vietnamesische Wokgemüse mit Hähnchen und Glasnudeln
  summary: Buntes Wokgericht mit zartem Hähnchen, knackigem Gemüse, Glasnudeln und
    einer würzigen Fischsauce-Austernsauce-Glasur.
en:
  title: Vietnamese Wok Chicken with Glass Noodles
  summary: A vibrant wok dish with tender chicken, crisp vegetables, glass noodles,
    and a savory fish sauce–oyster sauce glaze.
