id: frozen_berry_yogurt
pool: dessert
healthy: true
meals: 8
de:
  title: Gefrorener Beeren-Joghurt
  summary: Erfrischende Eiscreme-Alternative aus gefrorenem Joghurt und Beeren ohne
    Eismaschine — natürlich gesüßt mit Honig und perfekt für heiße Tage.
en:
  title: Frozen Berry Yogurt
  summary: A refreshing ice-cream alternative made from frozen yoghurt and berries
    without an ice-cream machine — naturally sweetened with honey and perfect for
    hot days.
ingredients:
- de_name: Griechischer Joghurt (10 % Fett)
  en_name: Greek yoghurt (10 % fat)
  qty: 1200
  unit: g
  category: Protein und Milchprodukte
- de_name: gefrorene gemischte Beeren
  en_name: Frozen mixed berries
  qty: 600
  unit: g
  category: Obst
- de_name: Honig
  en_name: Honey
  qty: 5
  unit: EL
  category: Konserven und Vorrat
- de_name: Vanilleextrakt
  en_name: Vanilla extract
  qty: 2
  unit: TL
  category: Gewürze
- de_name: Zitronensaft
  en_name: Lemon juice
  qty: 2
  unit: EL
  category: Obst
- de_name: frische Minze zum Garnieren
  en_name: Fresh mint for garnish
  qty: 1
  unit: Stk
  category: Gewürze
de_steps:
- Gefrorene Beeren im Mixer kurz grob zerkleinern.
- Griechischen Joghurt, Honig, Vanilleextrakt und Zitronensaft hinzugeben und alles
  cremig mixen.
- Die Masse in eine flache, gefriergeeignete Form (ca. 30×20 cm) gießen und glattstreichen.
- Mit Frischhaltefolie abdecken und mindestens 4 Stunden einfrieren.
- 20 Minuten vor dem Servieren aus dem Gefrierfach nehmen, damit die Masse etwas antaut.
- Mit einem Löffel oder Eisportionierer Kugeln abstechen und in Schälchen anrichten.
- Mit frischer Minze garnieren. Im Gefrierfach hält sich der Joghurt bis zu 2 Wochen.
en_steps:
- Briefly blitz the frozen berries in a blender until coarsely crushed.
- Add the Greek yoghurt, honey, vanilla extract, and lemon juice, then blend until
  creamy.
- Pour the mixture into a shallow, freezer-safe container (approx. 30×20 cm) and smooth
  the surface.
- Cover with cling film and freeze for at least 4 hours.
- Remove from the freezer 20 minutes before serving so the mixture can soften slightly.
- Scoop into bowls with a spoon or ice-cream scoop.
- Garnish with fresh mint. Keeps in the freezer for up to 2 weeks.
