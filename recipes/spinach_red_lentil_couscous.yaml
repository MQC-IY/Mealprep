de:
  title: Couscous mit roten Linsen und Spinat
  summary: Schnelles Couscousgericht mit roten Linsen, Spinat und milder Tomatennote.
en:
  title: Couscous with Red Lentils and Spinach
  summary: A quick couscous dish with red lentils, spinach and a mild tomato note.
