de_steps:
- Linsen weich kochen und Couscous quellen lassen.
- Tomaten kurz mit den Linsen köcheln, Spinat unterheben.
- Couscous untermischen.
en_steps:
- Cook lentils until soft and soak couscous in hot water.
- Briefly simmer tomatoes with the lentils and fold in spinach.
- Stir in couscous and combine.
