de_steps:
- Quinoa in der Gemüsebrühe aufkochen, Hitze reduzieren und 15 Minuten köcheln, bis
  die Brühe absorbiert ist. Mit Deckel 5 Minuten quellen lassen.
- 'Miso-Glasur anrühren: Aka-Miso, Mirin, Sake, Sojasoße, Honig und gepressten Knoblauch
  glatt rühren.'
- Backofen auf 200 °C (Ober-/Unterhitze) vorheizen. Hähnchenbrust auf ein Backblech
  legen, großzügig mit der Miso-Glasur bestreichen.
- 20–22 Minuten im Ofen garen, nach der Hälfte der Zeit erneut mit Glasur einstreichen.
- Karotten in dünne Scheiben, Brokkoli in kleine Röschen schneiden. In Sesamöl mit
  Pflanzenöl 5 Minuten scharf anbraten. Zuckerschoten die letzten 2 Minuten dazugeben.
- Hähnchen 5 Minuten ruhen lassen, dann in Scheiben schneiden.
- Quinoa mit dem Gemüse mischen. Hähnchen darauflegen, mit Frühlingszwiebeln und Sesamkörnern
  garnieren.
en_steps:
- Bring the quinoa to a boil in the vegetable broth, reduce heat, and simmer for 15
  minutes until absorbed. Let steam covered for 5 minutes.
- 'Make the miso glaze: whisk together the aka miso, mirin, sake, soy sauce, honey,
  and pressed garlic until smooth.'
- Preheat the oven to 200 °C (conventional). Place the chicken breasts on a baking
  sheet and coat generously with the miso glaze.
- Roast for 20–22 minutes, brushing with glaze again halfway through.
- Slice the carrots thinly and cut the broccoli into small florets. Sear in sesame
  oil with vegetable oil for 5 minutes. Add the sugar snap peas for the last 2 minutes.
- Let the chicken rest for 5 minutes, then slice.
- Toss the quinoa with the vegetables. Top with the chicken and garnish with spring
  onions and sesame seeds.
