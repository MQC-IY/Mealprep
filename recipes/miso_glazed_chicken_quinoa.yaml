de:
  title: Miso-glasiertes Hähnchen mit Gemüse-Quinoa
  summary: Hähnchenbrust mit kräftiger Aka-Miso-Glasur, ofengegart und auf nährstoffreichem
    Quinoa mit Gemüse serviert.
en:
  title: Miso-Glazed Chicken with Vegetable Quinoa
  summary: Oven-roasted chicken breast with a bold aka miso glaze, served on nutrient-rich
    quinoa tossed with seasonal vegetables.
