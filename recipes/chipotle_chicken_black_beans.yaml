de_steps:
- Chipotle-Chilis mit etwas Adobo-Sauce, der Hälfte des Knoblauchs, Kreuzkümmel, Paprika
  edelsüß, Oregano, 1 EL Öl und Limettensaft zu einer Marinade pürieren. Hähnchenbrust
  einlegen, mindestens 30 Minuten marinieren.
- Reis nach Packungsangabe kochen. Mit Limettensaft und gehacktem Koriander mischen.
- Mariniertes Hähnchen in einer Grillpfanne oder Pfanne bei hoher Hitze 5–6 Minuten
  pro Seite garen. Kurz ruhen lassen, dann in Scheiben oder Fasern schneiden.
- Zwiebeln fein würfeln, restlichen Knoblauch hacken. In 1 EL Öl 4 Minuten anschwitzen.
- Abgespülte schwarze Bohnen zugeben, Hühnerbrühe angießen. Chiliflocken, Kreuzkümmel
  und Salz zugeben und 8 Minuten bei mittlerer Hitze köcheln lassen.
- Bohnen grob mit einem Löffel anstampfen für cremigere Konsistenz. Mit Reis, Hähnchen,
  frischem Koriander und Limettenspalten servieren.
en_steps:
- Blend the chipotle chillies with some adobo sauce, half the garlic, cumin, sweet
  paprika, oregano, 1 tbsp oil, and lime juice into a marinade. Coat the chicken breasts
  and marinate for at least 30 minutes.
- Cook the rice according to packet instructions. Mix with lime juice and chopped
  coriander.
- Cook the marinated chicken in a grill pan or skillet over high heat for 5–6 minutes
  per side. Let it rest briefly, then slice or shred.
- Finely dice the onions and chop the remaining garlic. Sauté in 1 tbsp oil for 4
  minutes.
- Add the rinsed black beans and pour in the chicken stock. Add the chili flakes,
  cumin, and salt; simmer over medium heat for 8 minutes.
- Roughly mash some of the beans with a spoon for a creamier texture. Serve with rice,
  chicken, fresh coriander, and lime wedges.
