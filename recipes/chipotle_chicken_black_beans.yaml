de:
  title: Chipotle-Hähnchen mit schwarzen Bohnen und Reis
  summary: Rauchig mariniertes Chipotle-Hähnchen mit würzigen schwarzen Bohnen und
    lockerem Limetten-Koriander-Reis.
en:
  title: Chipotle Chicken with Black Beans and Rice
  summary: Smokily marinated chipotle chicken served with spiced black beans and fluffy
    lime-coriander rice.
