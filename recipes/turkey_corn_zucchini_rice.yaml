de_steps:
- Reis garen.
- Putenhack mit Zwiebel scharf anbraten.
- Zucchini, Möhren und Mais zugeben und weich garen.
en_steps:
- Cook the rice.
- Brown the ground turkey with the onion over high heat.
- Add the zucchini, carrots, and corn and cook until tender.
