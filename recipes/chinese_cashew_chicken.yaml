de_steps:
- Jasminreis waschen und kochen.
- Hähnchen in 2-cm-Würfel schneiden. Mit Stärke (1 EL), 1 EL Sojasauce, Shaoxing-Wein
  und Pfeffer 15 Minuten marinieren.
- 'Sauce: restliche Sojasauce, Austernsauce, Hühnerbrühe und restliche Stärke (1 EL,
  in Wasser aufgelöst) verrühren.'
- 'Falls rohe Cashews: in trockenem Wok goldbraun rösten und beiseite stellen.'
- Öl im Wok erhitzen. Getrocknete Chilis 30 Sek. anbraten. Hähnchen portionsweise
  scharf braten (3–4 Min.).
- Knoblauch, Ingwer und Paprika zugeben. 2 Minuten mitbraten.
- Sauce angießen, aufkochen und eindicken lassen. Cashews und Frühlingszwiebeln unterrühren.
- Sesamöl beträufeln und mit Reis servieren.
en_steps:
- Rinse and cook the jasmine rice.
- Cut the chicken into 2 cm cubes. Marinate with 1 tbsp cornstarch, 1 tbsp soy sauce,
  Shaoxing wine, and pepper for 15 minutes.
- 'Sauce: stir together the remaining soy sauce, oyster sauce, chicken stock, and
  remaining cornstarch (1 tbsp dissolved in water).'
- 'If using raw cashews: toast in a dry wok until golden, then set aside.'
- Heat the oil in a wok. Stir-fry the dried chillies for 30 seconds. Fry the chicken
  in batches for 3–4 minutes.
- Add the garlic, ginger, and bell peppers. Stir-fry for 2 minutes.
- Pour in the sauce, bring to a boil, and let it thicken. Stir in the cashews and
  spring onions.
- Drizzle with sesame oil and serve with rice.
