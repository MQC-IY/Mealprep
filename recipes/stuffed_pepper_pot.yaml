meals: 3
de:
  title: Gefüllte Paprika aus dem Topf
  summary: Vereinfachte gefüllte Paprika mit Hack, Reis, Tomatensauce, Paprika und
    Kräutern.
en:
  title: Stuffed Bell Peppers from the Pot
  summary: Simplified stuffed bell peppers with minced meat, rice, tomato sauce and
    herbs – all cooked together in one pot.
ingredients:
- de_name: Putenhack
  en_name: turkey mince
  qty: 600
  unit: g
  category: Protein und Milchprodukte
- de_name: Reis
  en_name: rice
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Paprika
  en_name: bell peppers
  qty: 4
  unit: Stk
  category: Gemüse und Salat
- de_name: Passierte Tomaten
  en_name: strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Knoblauch
  en_name: garlic
  qty: 2
  unit: Zehen
  category: Gemüse und Salat
- de_name: Paprika edelsüß
  en_name: sweet paprika
  qty: 2
  unit: TL
  category: Gewürze
- de_name: Oregano
  en_name: oregano
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chilli flakes
  qty: 0.5
  unit: TL
