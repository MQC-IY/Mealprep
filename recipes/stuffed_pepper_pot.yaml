de_steps:
- Reis vorkochen.
- Hack mit Zwiebel, Knoblauch, Reis, Paprika edelsüß und Oregano mischen und in halbierte
  Paprika füllen.
- Passierte Tomaten angießen und alles im Topf oder Ofen weich garen.
- Erwachsene zum Schluss mit Salz und Pfeffer abschmecken.
en_steps:
- Pre-cook the rice.
- Mix minced meat with onion, garlic, rice, sweet paprika and oregano and fill into
  halved bell peppers.
- Pour over passata and cook everything in the pot or oven until tender.
- Season to taste with salt and pepper before serving.
