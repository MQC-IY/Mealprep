de:
  title: Spanisches Hähnchen-Chorizo-Eintopf
  summary: Robuster spanischer Eintopf mit Hähnchen, Chorizo, Paprika, Tomaten und
    Pimentón ahumado – pikant, tiefgründig und perfekt für den nächsten Tag.
en:
  title: Spanish Chicken and Chorizo Stew
  summary: A robust Spanish stew with chicken, chorizo, bell peppers, tomatoes and
    smoked Pimentón – bold, deep-flavoured and even better the next day.
