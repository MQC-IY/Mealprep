de_steps:
- Hähnchenschenkel würzen. Chorizo in Scheiben schneiden.
- Olivenöl im Schmortopf erhitzen. Hähnchen rundherum 5–6 Minuten stark anbraten.
  Herausnehmen.
- Chorizo im gleichen Topf bei mittlerer Hitze 3 Minuten anbraten, bis das Fett austritt.
  Herausnehmen.
- Zwiebel und Knoblauch (beides fein gewürfelt) im Chorizofett 5 Minuten anschwitzen.
  Paprika in Streifen dazugeben, weitere 5 Minuten mitschmoren.
- Pimentón, Kreuzkümmel, Cayenne und Lorbeer einrühren, 1 Minute rösten. Mit Weißwein/Sherry
  ablöschen, 2 Minuten einkochen.
- Dosentomaten (zerdrückt) und Brühe dazugeben. Hähnchen und Chorizo zurücklegen.
- Zugedeckt bei niedriger Hitze 40 Minuten schmoren. Deckel abnehmen, 10 Minuten offen
  köcheln.
- Lorbeer entfernen. Mit Petersilie bestreuen und mit Brot oder Reis servieren.
en_steps:
- Season chicken thighs. Slice chorizo.
- Heat olive oil in a braising pot. Sear chicken on all sides for 5–6 minutes. Remove
  and set aside.
- Fry chorizo in the same pot over medium heat for 3 minutes until the fat renders.
  Remove.
- Finely dice onion and garlic. Sauté in the chorizo fat for 5 minutes. Add bell pepper
  strips and cook for a further 5 minutes.
- Stir in Pimentón, cumin, cayenne and bay leaves; toast for 1 minute. Deglaze with
  white wine/sherry and reduce for 2 minutes.
- Add crushed canned tomatoes and stock. Return chicken and chorizo to the pot.
- Cover and braise over low heat for 40 minutes. Remove lid and simmer uncovered for
  10 minutes.
- Remove bay leaves. Sprinkle with parsley and serve with bread or rice.
