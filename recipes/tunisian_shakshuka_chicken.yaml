de_steps:
- Hähnchen in kleine Stücke schneiden. Mit Salz, Pfeffer und der Hälfte des Kreuzkümmels
  würzen.
- Olivenöl in einer großen, tiefen Pfanne erhitzen. Hähnchen 5–6 Minuten anbraten,
  bis goldbraun. Herausnehmen.
- Fein gewürfelte Zwiebeln und Paprika im selben Öl 8 Minuten weich dünsten. Knoblauch
  einrühren und 2 Minuten mitbraten.
- Harissa-Paste einrühren und 1 Minute rösten. Kreuzkümmel, Koriander, geräuchertes
  Paprika und Chili hinzufügen.
- Gehackte Tomaten hinzufügen, Hähnchen zurück in die Pfanne geben. 10 Minuten köcheln
  lassen, bis die Sauce eindickt.
- Vier Mulden in die Sauce drücken. Je ein Ei hineingleiten lassen. Pfanne abdecken
  und 5–7 Minuten pochieren, bis das Eiweiß gestockt, das Eigelb noch weich ist. Mit
  Koriander und Brot servieren.
en_steps:
- Cut the chicken into small pieces. Season with salt, pepper, and half the cumin.
- Heat the olive oil in a large, deep skillet. Sear the chicken for 5–6 minutes until
  golden brown. Remove and set aside.
- Sauté the finely diced onions and bell pepper in the same oil for 8 minutes until
  soft. Stir in the garlic and cook for 2 minutes.
- Stir in the harissa paste and toast for 1 minute. Add the cumin, coriander, smoked
  paprika, and chili.
- Add the chopped tomatoes and return the chicken to the pan. Simmer for 10 minutes
  until the sauce thickens.
- Press four wells into the sauce. Slide one egg into each well. Cover the pan and
  poach for 5–7 minutes until the whites are set but the yolks are still soft. Serve
  with cilantro and bread.
