de:
  title: Tunesisches Shakshuka mit Hähnchen
  summary: Würzige, Harissa-befeuerte Tomatensauce mit saftigem Hähnchen und pochierten
    Eiern – Nordafrika trifft mediterrane Intensität.
en:
  title: Tunisian Shakshuka with Chicken
  summary: A spiced harissa-fired tomato sauce with tender chicken and poached eggs
    – North Africa meets Mediterranean intensity.
