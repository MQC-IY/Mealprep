de:
  title: Hähnchen-Tinga – Chipotle-Hähnchen für Tacos
  summary: Saftiges, zerrupftes Hähnchen in rauchig-scharfer Chipotle-Tomatensauce
    – klassische mexikanische Taco-Füllung.
en:
  title: Chicken Tinga – Chipotle Chicken for Tacos
  summary: Juicy shredded chicken in a smoky, spicy chipotle-tomato sauce — the classic
    Mexican Tinga taco filling.
