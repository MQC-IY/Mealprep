de_steps:
- Hähnchenbrust in Salzwasser 20 Minuten gar köcheln, herausnehmen, abkühlen lassen
  und mit zwei Gabeln grob zupfen.
- Zwiebeln in halbe Ringe schneiden, Knoblauch fein hacken. Öl in einer großen Pfanne
  bei mittlerer-hoher Hitze erhitzen.
- Zwiebeln 6–8 Minuten anbraten bis sie weich und leicht karamellisiert sind. Knoblauch
  1 Minute mitrösten.
- Kreuzkümmel, Oregano und Paprika edelsüß einrühren und 30 Sekunden rösten.
- Chipotle-Chilis mit etwas Adobo-Sauce, gehackte Tomaten und Hühnerbrühe zugeben.
  Aufkochen, dann 10 Minuten bei mittlerer Hitze einköcheln lassen.
- Sauce mit einem Stabmixer oder Kartoffelstampfer grob zerkleinern. Gezupftes Hähnchen
  unterrühren.
- Weitere 5–8 Minuten köcheln bis die Sauce am Hähnchen haftet. Mit Limettensaft,
  Salz und ggf. mehr Chipotle abschmecken. Mit frischem Koriander garniert auf Tacos
  oder Tostadas servieren.
en_steps:
- Simmer the chicken breast in salted water for 20 minutes, remove, let cool, then
  shred roughly with two forks.
- Cut the onions into half-rings and finely chop the garlic. Heat the oil in a large
  pan over medium-high heat.
- Fry the onions for 6–8 minutes until soft and lightly caramelised. Add the garlic
  and toast for 1 minute.
- Stir in the cumin, oregano, and sweet paprika and toast for 30 seconds.
- Add the chipotle chillies with some adobo sauce, the chopped tomatoes, and chicken
  stock. Bring to a boil, then simmer for 10 minutes over medium heat.
- Roughly crush the sauce with an immersion blender or potato masher. Stir in the
  shredded chicken.
- Simmer for a further 5–8 minutes until the sauce clings to the chicken. Season with
  lime juice, salt, and more chipotle if desired. Serve garnished with fresh coriander
  on tacos or tostadas.
