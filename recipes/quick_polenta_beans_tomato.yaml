  title: Schnelle Polenta mit Bohnen und Tomate
  summary: Sehr schnelles mildes Gericht mit Polenta, weißen Bohnen und Tomatensauce.
en:
  title: Quick Polenta with Beans and Tomato
  summary: A very quick, mild dish of creamy polenta, white beans, and tomato sauce
    — simple and satisfying.
