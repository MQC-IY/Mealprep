de_steps:
- Birne schälen und fein reiben – das macht das Fleisch zart. Knoblauch und Ingwer
  fein reiben.
- 'Bulgogi-Marinade: Sojasoße, Sesamöl, Zucker, Reisessig, geriebene Birne, Knoblauch,
  Ingwer und schwarzen Pfeffer verrühren.'
- Rindfleischscheiben in die Marinade einlegen und mindestens 30 Minuten im Kühlschrank
  marinieren.
- Reis garen. Karotten in feine Julienne schneiden.
- Eine schwere Pfanne oder Grillpfanne auf hoher Stufe erhitzen. Pflanzenöl hinzufügen.
  Rindfleisch portionsweise scharf 1–2 Minuten pro Seite anbraten. Zwiebeln und Karotten
  die letzten 3 Minuten mitbraten.
- Gochugaru über das Fleisch streuen, kurz umrühren.
- Reis in Schalen geben, Bulgogi daraufschöpfen, mit reichlich Sesamkörnern und Frühlingszwiebeln
  garnieren.
en_steps:
- Peel and finely grate the pear – this tenderises the meat. Finely grate the garlic
  and ginger.
- 'Bulgogi marinade: whisk together the soy sauce, sesame oil, sugar, rice vinegar,
  grated pear, garlic, ginger, and black pepper.'
- Submerge the beef slices in the marinade and refrigerate for at least 30 minutes.
- Cook the rice. Cut the carrots into fine julienne strips.
- Heat a heavy frying pan or grill pan over high heat. Add the vegetable oil. Sear
  the beef in batches for 1–2 minutes per side. Add the onions and carrots for the
  last 3 minutes.
- Sprinkle the gochugaru over the meat and stir briefly.
- Serve the rice in bowls, spoon the Bulgogi on top, and garnish generously with sesame
  seeds and spring onions.
