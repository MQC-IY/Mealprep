de:
  title: Koreanischer Bulgogi-Reistopf
  summary: Klassisches koreanisches Bulgogi – zarte Rindfleischstreifen in würzig-süßer
    Sesam-Sojasoßen-Marinade mit Birne, auf Reis mit frischem Gemüse.
en:
  title: Korean Bulgogi Rice Bowl
  summary: Classic Korean Bulgogi – tender beef strips in a sweet-savory sesame soy
    marinade with pear, served over rice with fresh vegetables.
