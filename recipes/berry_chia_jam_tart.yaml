  qty: 80
  unit: g
  category: Konserven und Vorrat
- de_name: Kokosöl (kalt, fest)
  en_name: coconut oil (cold, solid)
  qty: 100
  unit: g
  category: Konserven und Vorrat
- de_name: Honig
  en_name: honey
  qty: 3
  unit: EL
  category: Konserven und Vorrat
- de_name: Ei
