id: berry_chia_jam_tart
pool: dessert
healthy: true
meals: 8
de:
  title: Beeren-Chia-Tarte mit Dinkelboden
  summary: Knusprige Dinkelmehl-Tarte mit cremiger Quarkfüllung und fruchtigem Beeren-Chia-Konfitüre-Topping
    — ohne raffinierten Zucker und perfekt für besondere Anlässe.
en:
  title: Berry Chia Jam Tart with Spelt Crust
  summary: Crisp spelt flour tart with a creamy quark filling and a fruity berry chia
    jam topping — free of refined sugar and perfect for special occasions.
