de_steps:
- Für den Teig Vollkorndinkelmehl, Mandelmehl und Salz mischen. Festes Kokosöl in
  Würfeln, Honig und Ei hinzufügen und rasch zu einem glatten Mürbeteig kneten. In
  Frischhaltefolie wickeln und 30 Minuten kalt stellen.
- Ofen auf 180 °C Ober-/Unterhitze vorheizen. Teig auf einer bemehlten Fläche auf
  ca. 3 mm ausrollen und in eine Tarteform (28 cm) legen, Rand andrücken. Mit einer
  Gabel mehrfach einstechen.
- Tarteboden 15–18 Minuten blind backen (mit Backpapier und Hülsenfrüchten beschwert),
  bis er goldbraun ist. Vollständig auskühlen lassen.
- Für die Chia-Konfitüre Beeren mit Agavendicksaft und Zitronensaft in einem Topf
  5 Minuten köcheln, leicht zerdrücken. Chiasamen einrühren und 20 Minuten quellen
  lassen, bis eine gelartige Konfitüre entstanden ist. Auskühlen lassen.
- Magerquark, Joghurt, Honig und Vanilleextrakt zu einer glatten Creme verrühren und
  gleichmäßig auf dem abgekühlten Tarteboden verteilen.
- Beeren-Chia-Konfitüre auf der Quarkcreme verteilen.
- Tarte mindestens 1 Stunde kalt stellen, dann in 8 Stücke schneiden und servieren.
  Im Kühlschrank bis zu 2 Tage haltbar.
en_steps:
- 'For the pastry: mix wholemeal spelt flour, almond flour, and salt. Add cubed solid
  coconut oil, honey, and egg; quickly knead into a smooth shortcrust pastry. Wrap
  in cling film and refrigerate for 30 minutes.'
- Preheat oven to 180 °C (350 °F) top/bottom heat. Roll dough out on a lightly floured
  surface to about 3 mm thick and press into a tart tin (28 cm); press the edges up.
  Prick the base all over with a fork.
- Blind-bake the tart shell for 15–18 minutes (lined with baking paper and weighted
  with pulses) until golden brown. Leave to cool completely.
- 'For the chia jam: simmer berries with agave syrup and lemon juice in a saucepan
  for 5 minutes, lightly mashing them. Stir in chia seeds and leave to swell for 20
  minutes until a gel-like jam forms. Allow to cool.'
- Stir quark, yogurt, honey, and vanilla extract together into a smooth cream; spread
  evenly over the cooled tart shell.
- Spoon the berry chia jam over the quark cream.
- Refrigerate the tart for at least 1 hour, then cut into 8 slices and serve. Keeps
  in the fridge for up to 2 days.
