de:
  title: Levantinisches Mujaddara – Linsen-Reis mit karamellisierten Zwiebeln
  summary: Uraltes levantinisches Gericht aus Linsen, Reis und tief karamellisierten
    Zwiebeln – schlicht in den Zutaten, komplex im Geschmack.
en:
  title: Levantine Mujaddara – Lentils and Rice with Caramelised Onions
  summary: An ancient Levantine dish of lentils, rice, and deeply caramelised onions
    — simple ingredients, complex flavour.
