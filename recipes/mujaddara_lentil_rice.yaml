de_steps:
- Linsen waschen und in Gemüsebrühe 15 Minuten vorkochen – noch leicht bissfest lassen.
  Abgießen, Kochflüssigkeit aufbewahren.
- Zwiebeln in dünne Halbringe schneiden. Olivenöl in einer großen Pfanne bei mittlerer
  bis hoher Hitze erhitzen. Zwiebeln 25–30 Minuten unter gelegentlichem Rühren karamellisieren,
  bis sie tief braun und süßlich sind. Zwei Drittel herausnehmen.
- Mit den verbleibenden Zwiebeln Knoblauch, Kreuzkümmel, Koriander, Zimt und Piment
  1 Minute anrösten.
- Reis hinzufügen und 2 Minuten unter Rühren glasig braten. Vorgekochte Linsen und
  500 ml der aufbewahrten Brühe dazugeben. Aufkochen, dann bei niedrigster Hitze 18
  Minuten garen.
- Topf vom Herd nehmen, 5 Minuten ruhen lassen. Mit Salz und Pfeffer abschmecken.
- Mit den karamellisierten Zwiebeln bedecken. Mit Petersilie und einem Spritzer Zitronensaft
  bestreuen. Mit Joghurt servieren.
en_steps:
- Rinse the lentils and par-cook in vegetable broth for 15 minutes — leave slightly
  al dente. Drain and reserve the cooking liquid.
- Slice the onions into thin half-rings. Heat olive oil in a large pan over medium-high
  heat. Caramelise the onions for 25–30 minutes, stirring occasionally, until deeply
  brown and sweet. Remove two-thirds.
- In the remaining onions, toast the garlic, cumin, coriander, cinnamon, and allspice
  for 1 minute.
- Add the rice and stir for 2 minutes until translucent. Add the par-cooked lentils
  and 500 ml of the reserved broth. Bring to a boil, then cook over the lowest heat
  for 18 minutes.
- Remove from the heat and let rest for 5 minutes. Season with salt and pepper.
- Top with the caramelised onions. Scatter over the parsley and a squeeze of lemon
  juice. Serve with yogurt.
