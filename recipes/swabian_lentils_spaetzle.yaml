de:
  title: Schwäbische Linsen mit Spätzle und Speck
  summary: 'Schwäbisches Leibgericht: braune Belugalinsen in süß-saurer Essigbrühe
    mit gebratenem Speck und selbst gemachten Spätzle.'
en:
  title: Swabian Lentils with Spätzle and Bacon
  summary: 'A Swabian soul-food classic: brown beluga lentils in a sweet-sour vinegar
    broth with crispy fried bacon and homemade Spätzle.'
