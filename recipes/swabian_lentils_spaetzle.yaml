de_steps:
- Linsen abspülen. Zwiebeln und Karotten würfeln, Sellerie schräg schneiden. Schmalz
  in einem Topf erhitzen, Zwiebeln und Karotten 5 Minuten anschwitzen.
- Linsen, Gemüsebrühe, Sellerie, Lorbeer und Majoran einrühren. Zum Kochen bringen,
  dann Hitze reduzieren und 25 Minuten köcheln, bis Linsen weich, aber noch bissfest
  sind.
- 'Für die Spätzle: Mehl, Eier, 1 TL Salz und 80–100 ml Wasser zu einem zähen, blasenwerfenden
  Teig schlagen. Gesalzenes Wasser zum Kochen bringen. Teig durch ein Spätzlesieb
  oder -brett ins Wasser streichen. Wenn die Spätzle aufsteigen (ca. 2–3 Min.), abschöpfen
  und kurz in eiskaltem Wasser abschrecken.'
- Speckwürfel in einer Pfanne kross ausbraten. Spätzle hinzufügen und 3 Minuten mitbraten.
- Lorbeer aus den Linsen entfernen. Rotweinessig, Zucker, Salz und Pfeffer einrühren
  – die Linsen sollen angenehm süß-sauer schmecken. Nochmals abschmecken.
- Linsen auf Teller verteilen, Speck-Spätzle darauf häufen.
en_steps:
- Rinse lentils. Dice onions and carrots; cut celery on the diagonal. Heat lard or
  butter in a pot, sauté onions and carrots for 5 minutes.
- Stir in lentils, vegetable stock, celery, bay leaves and marjoram. Bring to a boil,
  then reduce heat and simmer for 25 minutes until lentils are tender but still have
  some bite.
- 'For the Spätzle: beat flour, eggs, 1 tsp salt and 80–100 ml water into a thick,
  bubbly batter. Bring salted water to a boil. Press batter through a Spätzle sieve
  or board into the water. Once the Spätzle float to the surface (approx. 2–3 min.),
  skim off and briefly rinse in ice-cold water.'
- Fry bacon cubes in a pan until crispy. Add Spätzle and fry together for 3 minutes.
- Remove bay leaves from lentils. Stir in red wine vinegar, sugar, salt and pepper
  – the lentils should taste pleasantly sweet-sour. Adjust seasoning.
- Spoon lentils onto plates and heap the bacon-Spätzle on top.
