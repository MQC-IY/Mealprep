de:
  title: Ribollita – Toskanische Brot-Bohnen-Suppe
  summary: Sättigende toskanische Brotsuppe mit weißen Bohnen, Grünkohl, Cannellini
    und altem Brot – am zweiten Tag noch besser.
en:
  title: Ribollita – Tuscan Bread and Bean Soup
  summary: Hearty Tuscan bread soup with white beans, kale (cavolo nero), cannellini
    beans, and stale bread — even better the next day.
