de_steps:
- Zwiebel, Karotten und Sellerie fein würfeln. Knoblauch hacken. Grünkohl von den
  dicken Stielen befreien und in Streifen schneiden.
- Olivenöl in einem großen Topf erhitzen. Zwiebel, Karotte und Sellerie darin 8 Minuten
  bei mittlerer Hitze anbraten.
- Knoblauch, Peperoncino und Tomatenmark einrühren, 2 Minuten weiterbraten.
- Die Hälfte der Cannellini-Bohnen mit einer Gabel grob zerdrücken und in den Topf
  geben.
- Restliche ganze Bohnen und Gemüsebrühe dazugeben. Rosmarin und Thymian einlegen.
  20 Minuten köcheln lassen.
- Grünkohl einrühren, weitere 15 Minuten köcheln.
- Kräuterzweige entfernen. Brot in grobe Stücke reißen und direkt in die Suppe geben.
  Gut umrühren, bis das Brot aufgeweicht und die Suppe dicklich ist.
- Mit Salz und Pfeffer abschmecken. Mit einem großzügigen Schuss gutem Olivenöl und
  geriebenem Parmesan servieren.
en_steps:
- Finely dice the onion, carrots, and celery. Mince the garlic. Strip the kale from
  the thick stems and slice into ribbons.
- Heat the olive oil in a large pot. Sauté the onion, carrot, and celery over medium
  heat for 8 minutes.
- Stir in the garlic, peperoncino, and tomato paste and cook for 2 minutes.
- Roughly mash half the cannellini beans with a fork and add to the pot.
- Add the remaining whole beans and vegetable broth. Add the rosemary and thyme sprigs.
  Simmer for 20 minutes.
- Stir in the kale and simmer for a further 15 minutes.
- Remove the herb sprigs. Tear the bread into rough chunks and add directly to the
  soup. Stir well until the bread has softened and the soup is thick.
- Season with salt and pepper. Serve with a generous drizzle of good olive oil and
  grated Parmesan.
