de_steps:
- Auberginen direkt auf der Gasflamme oder unter dem Ofengrill bei maximaler Hitze
  rundum schwarz verbrennen lassen – das dauert 15–20 Minuten. In einem Sieb abkühlen,
  Schale abziehen, Fruchtfleisch fein hacken und abtropfen lassen.
- Hähnchen in große Würfel schneiden. Olivenöl in einem Topf erhitzen, Hähnchen scharf
  anbraten. Zwiebeln und Paprika würfeln, hinzufügen und 5 Minuten mitdünsten.
- Knoblauch pressen, mit Pul Biber und Paprikapulver einrühren. Gehackte Tomaten und
  frische Tomaten-Würfel dazugeben. Lorbeerblätter einlegen, Salz und Pfeffer hinzufügen.
  25 Minuten zugedeckt schmoren.
- 'Für das Püree: 40 g Butter in einem Topf schmelzen, Mehl einrühren und 2 Minuten
  helles Mehlschwitze rühren. Milch nach und nach einrühren, 5 Minuten zu einer dicken
  Sauce kochen.'
- Auberginenfleisch unterheben, restliche Butter und geriebenen Käse einschmelzen.
  Mit Salz, Pfeffer und einem Hauch Pul Biber abschmecken.
- Auberginen-Püree auf Teller streichen, Hähnchensauce in der Mitte anrichten. Sofort
  servieren.
en_steps:
- Char the aubergines directly over a gas flame or under the oven grill at maximum
  heat, turning all over until completely blackened — this takes 15–20 minutes. Cool
  in a colander, peel off the skin, finely chop the flesh, and let drain.
- Cut the chicken into large chunks. Heat the olive oil in a pot and sear the chicken.
  Dice the onions and pepper, add, and sweat for 5 minutes.
- Press the garlic and stir in with the pul biber and smoked paprika. Add the canned
  chopped tomatoes and fresh diced tomatoes. Add the bay leaves, salt, and pepper.
  Braise covered for 25 minutes.
- 'For the purée: melt 40 g butter in a pot, stir in the flour, and cook a pale roux
  for 2 minutes. Gradually whisk in the milk and cook to a thick sauce over 5 minutes.'
- Fold in the aubergine flesh, melt in the remaining butter and grated cheese. Season
  with salt, pepper, and a touch of pul biber.
- Spread the aubergine purée on plates and spoon the chicken sauce into the centre.
  Serve immediately.
