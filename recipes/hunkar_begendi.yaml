de:
  title: Türkisches Hünkar Beğendi – Hähnchen auf Auberginen-Püree
  summary: 'Das osmanische ''Sultansgericht'': geschmortes Hähnchen in kräftiger Tomatensauce
    auf samtigem, geräuchertem Auberginen-Käse-Püree.'
en:
  title: Hünkar Beğendi – Chicken on Smoked Aubergine Purée
  summary: 'The Ottoman ''Sultan''s Delight'': braised chicken in a robust tomato
    sauce on a velvety smoked aubergine and cheese purée.'
