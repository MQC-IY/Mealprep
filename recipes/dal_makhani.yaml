de_steps:
- Schwarze Linsen über Nacht einweichen. Am nächsten Tag abspülen und in einem Schnellkochtopf
  oder normalen Topf 45–60 Minuten weich garen.
- Butter und Öl in einem schweren Topf erhitzen. Kreuzkümmelsamen knistern lassen.
  Fein gewürfelte Zwiebeln 12 Minuten dunkelgoldbraun anbraten.
- Geriebenen Knoblauch und Ingwer hinzufügen, 2 Minuten braten. Tomatenmark einrühren
  und 3 Minuten rösten.
- Gehackte Tomaten und alle gemahlenen Gewürze dazugeben. Bei mittlerer Hitze 15 Minuten
  köcheln, bis die Sauce eindickt und sich das Fett absetzt.
- Gegarte Linsen und abgetropfte Kidneybohnen in die Sauce geben. 250 ml Wasser dazugeben
  und alles 30 Minuten bei niedriger Hitze langsam köcheln lassen.
- Sahne einrühren, zerriebene Bockshornklee-Blätter hinzufügen. Mit Salz und Garam
  Masala abschmecken. Mit Basmatireis servieren.
en_steps:
- Soak the black lentils overnight. The next day, rinse and cook in a pressure cooker
  or regular pot for 45–60 minutes until tender.
- Heat the butter and oil in a heavy pan. Let the cumin seeds splutter. Fry finely
  diced onions for 12 minutes until deep golden brown.
- Add the grated garlic and ginger; cook for 2 minutes. Stir in the tomato paste and
  fry for 3 minutes.
- Add the chopped tomatoes and all the ground spices. Simmer over medium heat for
  15 minutes until the sauce thickens and the fat separates.
- Add the cooked lentils and drained kidney beans to the sauce. Add 250 ml water and
  simmer over low heat for 30 minutes.
- Stir in the cream and crumbled fenugreek leaves. Season with salt and garam masala.
  Serve with basmati rice.
