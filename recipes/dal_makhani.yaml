de:
  title: Dal Makhani – Schwarze-Linsen-Curry
  summary: Cremige schwarze Beluga-Linsen mit roten Kidneybohnen, langsam geschmort
    in einer buttrigen Tomatensauce – ein üppiges nordindisches Gericht.
en:
  title: Dal Makhani
  summary: Creamy black beluga lentils with red kidney beans, slow-braised in a buttery
    tomato sauce — a rich North Indian classic.
