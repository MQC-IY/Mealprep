id: mild_chickpea_rice_bake
pool: lunch
healthy: true
quick: true
next_day: true
quick_minutes: 30
meals: 3
de:
  title: Kichererbsen-Reis-Auflauf
  summary: Auflauf mit Reis, Kichererbsen, Zucchini und leichter Joghurt-Ei-Masse.
en:
  title: Mild Chickpea Rice Bake
  summary: A baked dish of rice, chickpeas, zucchini, and carrots topped with a light
    yogurt and egg custard.
ingredients:
- de_name: Reis
  en_name: Rice
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Kichererbsen
  en_name: Chickpeas
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Zucchini
  en_name: Zucchini
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Möhren
  en_name: Carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Eier
  en_name: Eggs
  qty: 3
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Naturjoghurt
  en_name: Plain yogurt
  qty: 180
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
