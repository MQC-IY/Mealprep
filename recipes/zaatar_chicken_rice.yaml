de:
  title: Libanesisches Za'atar-Hähnchen mit Fladenbrot-Reis
  summary: Saftige Hähnchenstücke mit Za'atar-Olivenöl-Kruste, serviert auf gewürztem
    Reis mit gerösteten Pinienkernen und Rosinen.
en:
  title: Lebanese Za'atar Chicken with Spiced Rice
  summary: Juicy chicken thighs with a za'atar-olive oil crust, served on spiced rice
    with toasted pine nuts and raisins.
