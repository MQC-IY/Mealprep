de_steps:
- Za'atar mit 3 EL Olivenöl, Zitronensaft und -schale, gemahlenem Knoblauch, Salz
  und Pfeffer zu einer Paste vermengen. Hähnchenschenkel damit einreiben, 1 Stunde
  marinieren.
- Backofen auf 200°C vorheizen. Hähnchen auf einem Blech 35–40 Minuten rösten, bis
  die Haut knusprig und goldbraun ist.
- Pinienkerne in trockenem Öl goldbraun rösten. Beiseitestellen. Rosinen in warmem
  Wasser 10 Minuten einweichen.
- Zwiebeln fein würfeln. 2 EL Olivenöl erhitzen, Zwiebeln 8 Minuten goldbraun anbraten.
  Allgewürz, Zimt und Sumach einrühren.
- Reis hinzufügen, 2 Minuten glasig braten. Hühnerbrühe angießen, aufkochen, Deckel
  auflegen, 18 Minuten bei niedriger Hitze garen.
- Reis mit einer Gabel auflockern. Rosinen und die Hälfte der Pinienkerne unterheben.
  Hähnchen auf dem Reis anrichten, mit restlichen Pinienkernen und Petersilie garnieren.
  Sumach darüberstreuen.
en_steps:
- Mix the za'atar with 3 tbsp olive oil, lemon juice and zest, ground garlic, salt,
  and pepper into a paste. Rub over the chicken thighs and marinate for 1 hour.
- Preheat the oven to 200 °C. Roast the chicken on a baking sheet for 35–40 minutes
  until the skin is crispy and golden brown.
- Toast the pine nuts in a dry pan until golden. Set aside. Soak the raisins in warm
  water for 10 minutes.
- Finely dice the onions. Heat 2 tbsp olive oil and fry the onions for 8 minutes until
  golden. Stir in the allspice, cinnamon, and sumac.
- Add the rice and fry for 2 minutes until translucent. Pour in the chicken stock,
  bring to a boil, cover, and cook over low heat for 18 minutes.
- Fluff the rice with a fork. Fold in the raisins and half the pine nuts. Arrange
  the chicken on the rice, garnish with the remaining pine nuts and parsley, and sprinkle
  over the sumac.
