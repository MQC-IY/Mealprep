id: turkey_zucchini_rice_bake
pool: lunch
healthy: true
quick: true
next_day: true
quick_minutes: 30
meals: 3
de:
  title: Puten-Reis-Auflauf mit Zucchini
  summary: Auflauf mit Putenhack, Reis, Zucchini und Joghurt-Ei-Guss.
en:
  title: Turkey Rice Bake with Zucchini
  summary: A baked casserole of ground turkey, rice, zucchini, and a yogurt-egg topping.
ingredients:
- de_name: Putenhack
  en_name: ground turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Reis
  en_name: rice
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Zucchini
  en_name: zucchini
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Eier
  en_name: eggs
  qty: 3
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 180
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Reis vorgaren.
- Putenhack scharf anbraten, Gemüse klein schneiden und kurz vorgaren.
- Alles in eine Form geben, Eier mit Joghurt verrühren und darübergeben.
en_steps:
- Par-cook the rice.
- Brown the ground turkey over high heat, chop the vegetables into small pieces and
  par-cook briefly.
- Transfer everything to a baking dish, whisk together the eggs and yogurt, and pour
  over the top.
