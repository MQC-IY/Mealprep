de_steps:
- Polenta weich rühren.
- Hähnchen scharf anbraten.
- Linsen in Tomatensauce weich kochen und Hähnchen unterheben.
en_steps:
- Cook the polenta until soft and creamy.
- Sear the chicken over high heat.
- Simmer the lentils in the tomato sauce until tender, then fold in the chicken.
