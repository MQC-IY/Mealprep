de:
  title: Polenta mit Tomaten-Linsen-Hähnchen
  summary: Schnelles Gericht mit weicher Polenta, Hähnchen und milder Linsen-Tomatensauce.
en:
  title: Polenta with Tomato-Lentil Chicken
  summary: A quick dish of soft polenta topped with chicken and a mild red lentil
    tomato sauce.
ingredients:
- de_name: Polenta
  en_name: polenta
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 700
  unit: g
  category: Protein und Milchprodukte
- de_name: Rote Linsen
  en_name: red lentils
  qty: 180
  unit: g
  category: Konserven und Vorrat
- de_name: Passierte Tomaten
  en_name: strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Paprika edelsüß
  en_name: sweet paprika
  qty: 1
  unit: TL
  category: Gewürze
