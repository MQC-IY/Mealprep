de_steps:
- Orzo weich garen.
- Putenhack scharf anbraten.
- Bohnen und Möhren klein schneiden und weich garen.
en_steps:
- Cook the orzo until tender.
- Brown the minced turkey over high heat.
- Finely chop the green beans and carrots and cook until tender.
