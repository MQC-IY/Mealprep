de:
  title: Puten-Orzo mit grünen Bohnen
  summary: Schnelle Orzo-Pfanne mit Putenhack, grünen Bohnen und Möhren.
en:
  title: Turkey Orzo with Green Beans
  summary: Quick orzo pan with minced turkey, green beans, and carrots.
ingredients:
- de_name: Putenhack
  en_name: Minced turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Orzo oder Kritharaki
  en_name: Orzo or kritharaki
  qty: 300
  unit: g
