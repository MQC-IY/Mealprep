de_steps:
- Zwiebel fein würfeln, Knoblauch und Ingwer reiben. Im Kokosnussöl bei mittlerer
  Hitze 3 Minuten dünsten.
- Kurkuma, Kreuzkümmel und Chiliflocken einrühren und 30 Sekunden rösten.
- Linsen, Kokosmilch und Brühe hinzufügen, umrühren und aufkochen.
- Auf mittlere Hitze reduzieren und 15 Minuten köcheln lassen, bis die Linsen zerfallen
  und die Suppe cremig ist. Mit Salz abschmecken.
en_steps:
- Finely dice the onion, and grate the garlic and ginger. Sauté in coconut oil over
  medium heat for 3 minutes.
- Stir in the turmeric, cumin, and chili flakes, and toast for 30 seconds.
- Add the lentils, coconut milk, and broth, stir to combine, and bring to a boil.
- Reduce to medium heat and simmer for 15 minutes until the lentils have dissolved
  and the soup is creamy. Season with salt.
