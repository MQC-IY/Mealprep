de:
  title: Schnelle Kokos-Linsen-Suppe
  summary: Cremige rote Linsensuppe mit Kokosmilch, frischem Ingwer und Kurkuma in
    22 Minuten.
en:
  title: Quick Coconut Lentil Soup
  summary: Creamy red lentil soup with coconut milk, fresh ginger, and turmeric —
    ready in 22 minutes.
