de:
  title: Bún Bò Nam Bộ – Vietnamesischer Nudelsalat mit Rindfleisch
  summary: Erfrischender südvietnamesischer Nudelsalat mit marinierten Rindfleischstreifen,
    Kräutern, Erdnüssen und würzigem Nuoc-Cham-Dressing.
en:
  title: Bún Bò Nam Bộ – Vietnamese Beef Noodle Salad
  summary: A refreshing southern Vietnamese noodle salad with marinated beef strips,
    fresh herbs, peanuts, and a tangy nuoc cham dressing.
