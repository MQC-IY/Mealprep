de_steps:
- Rinderfleisch in dünne Scheiben gegen die Faser schneiden. Zitronengras fein hacken.
  Knoblauch und Schalotten fein hacken.
- Fleisch mit Zitronengras, der Hälfte des Knoblauchs, Fischsauce (1 EL), Zucker (1
  TL) und Pfeffer 20 Minuten marinieren.
- 'Nuoc Cham: Restliche Fischsauce, Limettensaft, Reisessig, restlichen Zucker, restlichen
  Knoblauch und Chili verrühren, bis Zucker aufgelöst ist.'
- Reisnudeln nach Packungsanweisung garen, abgießen und kalt abschrecken.
- Gurke in feine Stifte schneiden. Möhren mit dem Sparschäler in Streifen ziehen.
- Öl im Wok bei höchster Hitze erhitzen. Marinierten Rindfleischstreifen portionsweise
  scharf 2–3 Minuten braten.
- Nudeln in Schalen verteilen. Sojasprossen, Gurke, Möhren, Kräuter und Rindfleisch
  darauf anrichten.
- Nuoc Cham darübergießen und mit gehackten Erdnüssen bestreuen.
en_steps:
- Cut the beef into thin slices against the grain. Finely chop the lemongrass. Finely
  chop the garlic and shallots.
- Marinate the beef with the lemongrass, half the garlic, 1 tbsp fish sauce, 1 tsp
  sugar, and pepper for 20 minutes.
- 'Nuoc Cham: stir together the remaining fish sauce, lime juice, rice vinegar, remaining
  sugar, remaining garlic, and chili until the sugar dissolves.'
- Cook the rice vermicelli according to the packet instructions, drain, and rinse
  under cold water.
- Cut the cucumber into fine matchsticks. Use a vegetable peeler to pull the carrots
  into strips.
- Heat the oil in a wok over the highest heat. Sear the marinated beef strips in batches
  for 2–3 minutes.
- Divide the noodles into bowls. Arrange the bean sprouts, cucumber, carrots, herbs,
  and beef on top.
- Pour over the nuoc cham and scatter with chopped peanuts.
