de:
  title: Vietnamesisches Zitronengras-Hähnchen mit Reis
  summary: Würziges Hähnchen mit aromatischem Zitronengras, Chili und Fischsauce,
    in der Pfanne karamellisiert und über Jasminreis serviert.
en:
  title: Vietnamese Lemongrass Chicken with Rice
  summary: Aromatic chicken caramelised in a pan with lemongrass, chili, and fish
    sauce, served over jasmine rice.
