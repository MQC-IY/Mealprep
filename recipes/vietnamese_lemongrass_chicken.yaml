de_steps:
- Jasminreis waschen und kochen.
- Zitronengras (nur das untere Drittel) fein hacken. Knoblauch und Schalotten fein
  hacken. Chili in Ringe schneiden.
- Hähnchenoberschenkel in mundgerechte Stücke schneiden.
- Hähnchen mit Fischsauce, Kurkuma, Pfeffer, Zitronengras (2/3) und Zucker vermischen.
  15 Minuten marinieren.
- Öl im Wok oder einer schweren Pfanne bei starker Hitze erhitzen. Schalotten und
  Knoblauch 1 Minute anbraten.
- Hähnchen zugeben und von allen Seiten 6–8 Minuten scharf braten, bis es durchgegart
  und leicht karamellisiert ist.
- Restliches Zitronengras und Chili zugeben, 1 Minute mitbraten.
- Mit Limettensaft abschmecken. Mit Chiliflocken bestreuen. Über Reis anrichten und
  mit Koriander garnieren.
en_steps:
- Rinse the jasmine rice and cook.
- Finely chop the lemongrass (lower third only). Finely chop the garlic and shallots.
  Slice the chili into rings.
- Cut the chicken thighs into bite-sized pieces.
- Toss the chicken with the fish sauce, turmeric, pepper, two-thirds of the lemongrass,
  and sugar. Marinate for 15 minutes.
- Heat the oil in a wok or heavy skillet over high heat. Fry the shallots and garlic
  for 1 minute.
- Add the chicken and fry on all sides for 6–8 minutes until cooked through and lightly
  caramelised.
- Add the remaining lemongrass and the chili and fry for 1 more minute.
- Season with lime juice. Scatter with chili flakes. Serve over the rice and garnish
  with cilantro.
