de:
  title: Singapurisches Hainanese Chicken Rice
  summary: 'Singapurischer Nationalklassiker: pochiertes Hähnchen mit zartem, in Hühnerbrühe
    gekochtem Jasminreis, Ingwer-Chili-Sauce und Soßen zum Dippen.'
en:
  title: Hainanese Chicken Rice
  summary: 'Singapore''s national classic: poached chicken with delicate jasmine rice
    cooked in chicken stock, ginger-chilli sauce, and dipping condiments.'
