de_steps:
- Hähnchen innen und außen salzen. Einen großen Topf mit Wasser aufkochen. Hähnchen
  einlegen, 5 Knoblauchzehen, die Hälfte des Ingwers (in Scheiben), Frühlingszwiebelgrün
  und weißen Pfeffer zugeben.
- Auf niedrige Hitze reduzieren – das Wasser soll kaum simmern. Hähnchen 40–45 Minuten
  pochieren bis komplett gar. Herausnehmen, sofort in eiskaltes Wasser tauchen für
  5 Minuten, dann herausheben.
- Brühe durch ein Sieb gießen und aufbewahren. Reis abspülen.
- Rapsöl in einem Topf erhitzen. Restlichen Knoblauch und restlichen Ingwer (fein
  gehackt) 2 Minuten anbraten. Reis zugeben, 2 Minuten anrösten. 600 ml Hühnerbrühe
  zugeben, aufkochen, Hitze minimal, 15 Minuten köcheln.
- 'Chili-Ingwer-Sauce: rote Chilis, restlichen Ingwer, 2 Knoblauchzehen, Limettensaft
  und eine Prise Salz im Mixer pürieren.'
- Hähnchen in Stücke schneiden oder zupfen. Mit warmem Reis, Gurkenscheiben, heller
  Sojasauce, Sesamöl, etwas Brühe zum Trinken und der Chili-Sauce servieren.
en_steps:
- Salt the chicken inside and out. Bring a large pot of water to a boil. Add the chicken,
  5 garlic cloves, half the ginger (sliced), spring onion greens, and white pepper.
- Reduce to low heat — the water should barely simmer. Poach the chicken for 40–45
  minutes until fully cooked through. Remove and immediately plunge into ice-cold
  water for 5 minutes, then lift out.
- Strain the broth through a sieve and set aside. Rinse the rice.
- Heat rapeseed oil in a pot. Fry the remaining garlic and ginger (finely chopped)
  for 2 minutes. Add the rice and toast for 2 minutes. Add 600 ml of the chicken stock,
  bring to a boil, then cook on the lowest heat for 15 minutes.
- 'Chilli-ginger sauce: blend red chillies, remaining ginger, 2 garlic cloves, lime
  juice, and a pinch of salt in a blender.'
- Cut or shred the chicken. Serve with warm rice, cucumber slices, light soy sauce,
  sesame oil, a small bowl of broth for drinking, and the chilli sauce.
