de_steps:
- Hähnchenbrustfilet in mundgerechte Würfel schneiden. Mit Salz, Pfeffer und Pimentón
  würzen.
- 2 EL Olivenöl in einer großen, tiefen Pfanne erhitzen. Hähnchen bei starker Hitze
  5–6 Minuten anbraten. Herausnehmen.
- Restliches Olivenöl in die Pfanne geben. Zwiebel und Knoblauch fein gewürfelt, 5
  Minuten anschwitzen. Paprikastreifen dazugeben, weitere 6 Minuten mitschmoren.
- Zucchini in Halbmonde schneiden und einrühren. Kreuzkümmel, Cayenne und restlichen
  Pimentón dazugeben, 1 Minute rösten.
- Tomaten zerdrückt dazugeben. Bei mittlerer Hitze 15 Minuten köcheln, bis das Gemüse
  weich und die Sauce eingedickt ist.
- Hähnchen zurücklegen und einrühren. Mit Salz abschmecken.
- Mit einem Löffel vier Mulden in die Sauce drücken. Ein Ei pro Mulde hineinschlagen.
  Deckel auflegen und 4–6 Minuten garen, bis das Eiweiß fest, das Eigelb aber noch
  weich ist.
- Mit gehackter Petersilie bestreuen und direkt in der Pfanne mit Brot servieren.
en_steps:
- Cut the chicken breast fillet into bite-sized cubes. Season with salt, pepper and
  pimentón.
- Heat 2 tbsp olive oil in a large, deep frying pan over high heat. Fry the chicken
  for 5–6 minutes. Remove and set aside.
- Add the remaining olive oil to the pan. Finely dice the onion and garlic and sweat
  for 5 minutes. Add the pepper strips and braise for a further 6 minutes.
- Cut the zucchini into half-moons and stir in. Add the cumin, cayenne and remaining
  pimentón and toast for 1 minute.
- Add the crushed tomatoes. Simmer over medium heat for 15 minutes until the vegetables
  are soft and the sauce has thickened.
- Return the chicken and stir in. Season with salt.
- Press four wells into the sauce with a spoon. Crack one egg into each well. Cover
  and cook for 4–6 minutes until the whites are set but the yolks are still runny.
- Scatter with chopped parsley and serve straight from the pan with bread.
