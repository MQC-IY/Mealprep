de:
  title: Pisto Manchego mit Ei und Hähnchen
  summary: 'Spanisches Schmorgericht nach Art der La Mancha: Hähnchen mit Zucchini,
    Paprika, Tomaten und Pimentón – mit pochierten Eiern direkt in der Sauce.'
en:
  title: Pisto Manchego with Egg and Chicken
  summary: 'Spanish braised dish from La Mancha: chicken with zucchini, peppers, tomatoes
    and pimentón – with eggs poached right in the sauce.'
