id: dark_chocolate_oat_muffins
pool: dessert
healthy: true
meals: 8
de:
  title: Dunkle-Schokoladen-Hafermuffins
  summary: Saftige Muffins mit Vollkornhafer, reifer Banane und dunkler Schokolade
    — natürlich gesüßt, ohne Weißmehl und trotzdem herrlich schokoladig.
en:
  title: Dark Chocolate Oat Muffins
  summary: Moist muffins made with whole rolled oats, ripe banana, and dark chocolate
    — naturally sweetened, flour-free, and wonderfully chocolatey.
