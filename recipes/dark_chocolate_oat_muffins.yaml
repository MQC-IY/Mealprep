de_steps:
- Ofen auf 180 °C Ober-/Unterhitze vorheizen. Ein Muffinblech (12er) mit Papierförmchen
  auslegen oder mit Kokosöl einfetten.
- Haferflocken im Mixer zu einem feinen Mehl mahlen.
- Bananen in einer großen Schüssel zerdrücken, Eier, Joghurt, Agavendicksaft und Vanilleextrakt
  einrühren.
- Hafermehl, Kakaopulver, Backpulver, Natron und Salz in die feuchte Masse sieben
  und alles zügig verrühren.
- Gehackte Schokolade unterheben.
- Teig gleichmäßig auf die 16 Muffinförmchen verteilen (je ca. ¾ voll).
- Im vorgeheizten Ofen 18–22 Minuten backen, bis ein Zahnstocher sauber herauskommt.
- 10 Minuten im Blech abkühlen lassen, dann auf einem Gitter vollständig auskühlen.
  Luftdicht verpackt 4 Tage haltbar, eingefroren bis zu 3 Monate.
en_steps:
- Preheat the oven to 180 °C (fan 160 °C). Line a 12-hole muffin tin with paper cases
  or grease with coconut oil.
- Blitz the rolled oats in a blender to a fine flour.
- Mash the bananas in a large bowl, then stir in the eggs, yogurt, agave syrup, and
  vanilla extract.
- Sift the oat flour, cocoa powder, baking powder, bicarbonate of soda, and salt into
  the wet mixture and stir quickly to combine.
- Fold in the chopped chocolate.
- Divide the batter evenly among 16 muffin cases (each about ¾ full).
- Bake in the preheated oven for 18–22 minutes until a toothpick comes out clean.
- Cool in the tin for 10 minutes, then transfer to a wire rack to cool completely.
  Keeps for 4 days in an airtight container, or up to 3 months frozen.
