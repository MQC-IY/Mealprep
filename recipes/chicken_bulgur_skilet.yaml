de_steps:
- Bulgur garen.
- Hähnchen in Streifen schneiden und mit Paprika edelsüß, geräuchertem Paprika, Kreuzkümmel
  und Salz würzen. Bei hoher Hitze in Olivenöl scharf anbraten.
en_steps:
- Cook the bulgur.
- Cut the chicken into strips and season with sweet paprika, smoked paprika, cumin,
  and salt. Sear over high heat in olive oil.
