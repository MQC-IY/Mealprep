de_steps:
- Reis nach Packungsangabe kochen. Fertig gegarten Reis mit Limettensaft und gehacktem
  Koriander vermengen – Cilantro-Limetten-Reis.
- Hähnchenbrust in 2 cm große Würfel schneiden. Mit Kreuzkümmel, Chipotle-Chilipulver,
  Paprika edelsüß, Oregano, Chiliflocken, Salz und 1 EL Öl vermengen.
- Öl in einer großen Pfanne bei hoher Hitze erhitzen. Hähnchen in einer Schicht anbraten,
  3–4 Minuten pro Seite goldbraun garen. Herausnehmen.
- Zwiebel und Knoblauch in derselben Pfanne anschwitzen. Schwarze Bohnen und Mais
  abspülen, zugeben und 3 Minuten erwärmen.
- Passierte Tomaten zugeben, kurz aufkochen. Mit Salz und etwas Chipotle abschmecken.
- 'Bowls aufbauen: Cilantro-Reis, Bohnen-Mais-Mischung, Hähnchenwürfel, gewürfelte
  Avocado, Sauerrahm, Salsa und frischer Koriander.'
en_steps:
- Cook the rice according to the packet instructions. Toss the cooked rice with lime
  juice and chopped cilantro to make cilantro-lime rice.
- Cut the chicken breast into 2 cm cubes. Toss with cumin, chipotle chili powder,
  sweet paprika, oregano, chili flakes, salt, and 1 tbsp oil.
- Heat oil in a large pan over high heat. Sear the chicken in a single layer for 3–4
  minutes per side until golden. Remove.
- Sauté the onion and garlic in the same pan. Rinse the black beans and corn, add
  them, and heat for 3 minutes.
- Add the strained tomatoes, bring to a brief boil. Season with salt and a little
  chipotle.
- 'Build the bowls: cilantro rice, black bean and corn mixture, chicken cubes, diced
  avocado, sour cream, salsa, and fresh cilantro.'
