de_steps:
- Hähnchenstücke salzen und mit Paprika edelsüß einreiben. Öl in einem schweren Schmortopf
  oder Gusseisentopf bei hoher Hitze erhitzen. Hähnchen portionsweise scharf anbraten,
  herausnehmen.
- Zwiebeln würfeln, Knoblauch und Ingwer hacken. Im Bratfett 5 Minuten weich garen.
- Ras el Hanout, Zimt und Chiliflocken zugeben, 1 Minute rösten.
- Tomaten, Hühnerbrühe und Aprikosenmarmelade einrühren, aufkochen.
- Hähnchenstücke, gewürfelte Süßkartoffeln und Paprikastreifen in den Topf geben.
- Deckel drauf, Hitze auf minimal reduzieren und 50–60 Minuten schmoren bis das Hähnchen
  vom Knochen fällt und die Süßkartoffeln weich sind.
- Mit Salz und Chiliflocken abschmecken. Reis kochen und dazu servieren.
en_steps:
- Season chicken pieces with salt and rub with sweet paprika. Heat oil in a heavy
  braising pot or Dutch oven over high heat. Sear chicken in batches until browned,
  then set aside.
- Dice onions; mince garlic and ginger. Sauté in the drippings for 5 minutes until
  soft.
- Add Ras el Hanout, cinnamon and chilli flakes; toast for 1 minute.
- Stir in tomatoes, chicken stock and apricot jam; bring to a boil.
- Return chicken pieces to the pot together with diced sweet potato and sliced bell
  pepper.
- Cover, reduce heat to minimum and braise for 50–60 minutes until the chicken falls
  off the bone and the sweet potato is tender.
- Season with salt and chilli flakes. Cook rice and serve alongside.
