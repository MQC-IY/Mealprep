de:
  title: Südafrikanischer Hähnchen-Potjie
  summary: 'Südafrikanischer Schmortopf aus dem Gusseisenpott: Hähnchen mit Süßkartoffeln,
    Tomaten, Bier, Aprikosenmarmelade und Ras-el-Hanout langsam geschmort.'
en:
  title: South African Chicken Potjie
  summary: A slow-braised South African cast-iron pot stew with chicken, sweet potato,
    tomatoes, beer, apricot jam and Ras el Hanout.
