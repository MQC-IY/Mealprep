id: soba_chicken_dashi
pool: lunch
healthy: true
quick: false
next_day: false
meals: 2
de:
  title: Japanische Buchweizennudeln (Soba) mit Hähnchen und Dashi-Sauce
  summary: Kräftige Dashi-Tsuyu-Brühe über elastischen Soba-Nudeln mit zartem Hähnchen,
    Frühlingszwiebeln und Nori.
en:
  title: Japanese Soba Noodles with Chicken and Dashi Broth
  summary: Rich dashi-tsuyu broth poured over springy soba noodles with tender chicken,
    spring onions, and nori.
