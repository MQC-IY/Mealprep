de_steps:
- 'Dashi-Tsuyu-Soße: Dashi-Brühe, Sojasoße, Mirin und Sake aufkochen, 5 Minuten köcheln.
  Beiseite stellen.'
- Ingwer in Scheiben schneiden. Hähnchenbrust mit Ingwer, etwas Sojasoße und Sake
  in Wasser 15 Minuten bei niedriger Hitze pochieren. Herausnehmen, abkühlen lassen
  und in dünne Scheiben schneiden.
- Soba-Nudeln in reichlich kochendem Wasser nach Packungsanweisung (ca. 4–6 Minuten)
  garen. In einem Sieb kalt abspülen.
- Nori in feine Streifen schneiden. Frühlingszwiebeln in Ringe schneiden.
- Dashi-Brühe erhitzen und Sesamöl einrühren.
- Soba-Nudeln in Schüsseln anrichten, heiße Brühe darübergießen. Hähnchenscheiben,
  Frühlingszwiebeln, Nori und Sesamkörner darauflegen. Mit Shichimi-Togarashi großzügig
  würzen.
en_steps:
- 'Dashi-tsuyu sauce: bring the dashi broth, soy sauce, mirin, and sake to a boil
  and simmer for 5 minutes. Set aside.'
- Slice the ginger. Poach the chicken breast with the ginger, a splash of soy sauce,
  and sake in water over low heat for 15 minutes. Remove, let cool, and slice thinly.
- Cook the soba noodles in plenty of boiling water according to package directions
  (about 4–6 minutes). Rinse under cold water in a colander.
- Cut the nori into thin strips. Slice the spring onions into rings.
- Heat the dashi broth and stir in the sesame oil.
- Arrange the soba noodles in bowls, pour the hot broth over them. Top with the chicken
  slices, spring onions, nori, and sesame seeds. Season generously with shichimi togarashi.
