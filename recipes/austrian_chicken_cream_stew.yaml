de:
  title: Österreichisches Hähnchen-Rahm-Eintopf
  summary: 'Wiener Gemütlichkeit im Topf: Hähnchen und Wurzelgemüse in Weißwein-Rahmsoße
    mit Estragón und Zitrone – hell, elegant und reichhaltig.'
en:
  title: Austrian Chicken Cream Stew
  summary: 'Viennese comfort in a pot: chicken and root vegetables in a white-wine
    cream sauce with tarragon and lemon — pale, elegant, and richly satisfying.'
