de_steps:
- Hähnchenbrust in 3 cm Würfel schneiden, salzen und pfeffern. Butter in einem Topf
  erhitzen und Hähnchen sanft 5 Minuten anbraten – es soll weiß bleiben, nicht braun
  werden. Herausnehmen.
- Zwiebeln, Karotten, Pastinaken und Sellerie in 1 cm Würfel schneiden. Im gleichen
  Topf 8 Minuten anschwitzen. Knoblauch pressen, Mehl einstreuen und 2 Minuten umrühren.
- Mit Weißwein ablöschen, einkochen. Hühnerbrühe einrühren, Lorbeer, Estragon und
  Zitronenschale einlegen. Hähnchen zurücklegen.
- Zugedeckt bei niedriger Hitze 20 Minuten sanft köcheln.
- Eigelb mit Sahne verquirlen. Topf vom Herd nehmen, Eigelb-Sahne-Mischung einrühren
  – die Sauce darf nicht mehr kochen, sonst gerinnt das Eigelb. Bei sehr niedriger
  Hitze noch 5 Minuten unter Rühren binden lassen.
- Lorbeer entfernen. Zitronensaft, Muskatnuss, Salz und Pfeffer abschmecken. Mit Semmelknödeln
  oder Salzerdäpfeln servieren.
en_steps:
- Cut chicken breast into 3 cm cubes, season with salt and pepper. Heat butter in
  a pot and gently fry chicken for 5 minutes — it should stay white, not brown. Remove.
- Cut onions, carrots, parsnips, and celery into 1 cm cubes. Sweat in the same pot
  for 8 minutes. Press garlic, sprinkle in flour, and stir for 2 minutes.
- Deglaze with white wine and reduce. Stir in chicken stock, add bay leaves, tarragon,
  and lemon zest. Return chicken.
- Cover and simmer gently on low heat for 20 minutes.
- Whisk egg yolks with cream. Remove pot from the heat and stir in the egg-yolk cream
  mixture — the sauce must not boil again or the yolks will curdle. Stir over very
  low heat for a further 5 minutes to thicken.
- Remove bay leaves. Season with lemon juice, nutmeg, salt, and pepper. Serve with
  bread dumplings or boiled potatoes.
