id: chicken_pepper_bulgur_bowl
pool: lunch
healthy: true
quick: true
next_day: false
quick_minutes: 25
meals: 3
de:
  title: Hähnchen-Bulgur-Bowl mit Paprika
  summary: Schnelle Bowl mit Hähnchen, Bulgur, Paprika und Gurke.
en:
  title: Chicken Bulgur Bowl with Bell Pepper
  summary: A quick and colourful bowl with seared chicken, nutty bulgur, roasted bell
    pepper, carrots, and fresh cucumber.
ingredients:
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 750
  unit: g
  category: Protein und Milchprodukte
- de_name: Bulgur
  en_name: bulgur
  qty: 300
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Paprika
  en_name: bell pepper
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Gurke
  en_name: cucumber
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Oregano
  en_name: oregano
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Bulgur garen.
- Hähnchen scharf anbraten.
- Paprika und Möhren weich garen, Gurke klein würfeln.
en_steps:
- Cook the bulgur.
- Sear the chicken over high heat.
- Cook the bell pepper and carrots until tender, then dice the cucumber.
