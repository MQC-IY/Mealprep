de:
  title: Thai Basil Fried Rice
  summary: Schneller, würziger gebratener Reis mit Hähnchen, Thai-Basilikum, Chili
    und Knoblauch – ein klassisches Thai-Streetfood.
en:
  title: Thai Basil Fried Rice
  summary: A quick, flavour-packed fried rice with chicken, Thai basil, chilli and
    garlic – a classic Thai street food.
