de_steps:
- Zwiebeln fein würfeln, Tomaten würfeln, Knoblauch und Ingwer reiben, Chilischoten
  hacken.
- Öl und Butter in einem schweren Topf erhitzen. Kreuzkümmelsamen knistern lassen.
  Zwiebeln hineingeben und 12 Minuten dunkelgoldbraun braten.
- Knoblauch-Ingwer-Paste einrühren, 2 Minuten braten. Tomatenmark dazugeben und 2
  Minuten rösten.
- Frische und gehackte Dosentomaten, Kurkuma, Kreuzkümmel, Koriander und Kashmiri-Chili
  einrühren. 10 Minuten köcheln lassen.
- Abgetropfte Kidneybohnen hinzufügen, 200 ml Wasser dazugeben. Alles 20 Minuten bei
  mittlerer Hitze köcheln. Einige Bohnen mit einem Löffel zerdrücken, um die Sauce
  zu binden.
- Garam Masala und Amchur einrühren, mit Salz abschmecken. Mit frischem Koriander
  bestreuen und mit Basmatireis servieren.
en_steps:
- Finely dice the onions and tomatoes, grate the garlic and ginger, and chop the green
  chilies.
- Heat the oil and butter in a heavy pot. Let the cumin seeds splutter. Add the onions
  and fry for 12 minutes until deep golden brown.
- Stir in the garlic-ginger paste and fry for 2 minutes. Add the tomato paste and
  cook for a further 2 minutes.
- Stir in the fresh tomatoes, canned chopped tomatoes, turmeric, cumin, coriander,
  and Kashmiri chili. Simmer for 10 minutes.
- Add the drained kidney beans and 200 ml water. Simmer everything over medium heat
  for 20 minutes. Crush a few beans with a spoon to thicken the sauce.
- Stir in the garam masala and amchur, season with salt. Garnish with fresh cilantro
  and serve with basmati rice.
