de:
  title: Rajma – Kidneybohnen-Curry mit Reis
  summary: Cremiges Kidneybohnen-Curry in einer tiefen Tomaten-Zwiebel-Sauce – das
    nordindische Seelenfutter par excellence.
en:
  title: Rajma – Kidney Bean Curry with Rice
  summary: Creamy kidney bean curry in a rich tomato-onion sauce — the ultimate North
    Indian comfort food.
