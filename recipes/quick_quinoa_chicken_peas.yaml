de:
  title: Schnelle Quinoa-Bowl mit Hähnchen und Erbsen
  summary: Leichte Bowl mit Hähnchen, Quinoa, Erbsen und Gurke.
en:
  title: Quick Quinoa Bowl with Chicken and Peas
  summary: A light bowl with chicken, quinoa, peas, and cucumber — fresh and nutritious.
