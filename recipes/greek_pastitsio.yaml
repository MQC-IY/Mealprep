de:
  title: Griechisches Pastitsio – Nudelauflauf mit Hackfleisch
  summary: Schichtauflauf aus Röhrennudeln, gewürzter Rinderhack-Zimtsauce und goldener
    Béchamel – Griechenlands Antwort auf die Lasagne.
en:
  title: Pastitsio – Greek Pasta Bake with Minced Beef
  summary: Layered bake of tubular pasta, spiced beef-and-cinnamon sauce, and golden
    béchamel — Greece's answer to lasagne.
