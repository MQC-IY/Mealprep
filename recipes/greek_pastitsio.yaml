de_steps:
- Nudeln al dente kochen, abgießen, mit etwas Öl vermengen und beiseitestellen.
- Olivenöl erhitzen, Zwiebeln würfeln und 5 Minuten dünsten. Hackfleisch hinzufügen,
  krümelig anbraten. Knoblauch, Zimt und Piment einrühren. Mit Rotwein ablöschen und
  einkochen.
- Tomatenmark und Gehackte Tomaten hinzufügen. Oregano, Salz und Pfeffer einrühren.
  20 Minuten einkochen, bis eine dicke Sauce entsteht.
- 'Für die Béchamel: Butter schmelzen, Mehl einrühren, 2 Minuten helle Mehlschwitze
  rühren. Heiße Milch nach und nach einrühren, 8 Minuten glatt kochen. Muskatnuss,
  Salz, Pfeffer und Hälfte des Parmesans einrühren. Vom Herd nehmen, leicht abkühlen,
  Eier einrühren.'
- Ofen auf 180 °C vorheizen. Auflaufform fetten. Hälfte der Nudeln einlegen, gesamte
  Fleischsauce darüber verteilen, restliche Nudeln obenauf. Béchamel gleichmäßig darüber
  gießen. Restlichen Parmesan darüberstreuen.
- 45 Minuten backen, bis die Oberfläche goldbraun ist. 15 Minuten ruhen lassen, dann
  in Stücke schneiden.
en_steps:
- Cook the pasta al dente, drain, toss with a little oil, and set aside.
- Heat olive oil, dice the onions, and sweat for 5 minutes. Add the minced beef and
  fry until crumbly. Stir in garlic, cinnamon, and allspice. Deglaze with red wine
  and reduce.
- Add the tomato purée and chopped tomatoes. Stir in oregano, salt, and pepper. Simmer
  for 20 minutes until a thick sauce forms.
- 'For the béchamel: melt the butter, stir in the flour, and cook the roux for 2 minutes.
  Gradually whisk in hot milk and cook smooth for 8 minutes. Stir in nutmeg, salt,
  pepper, and half the Parmesan. Remove from the heat, let cool slightly, then stir
  in the eggs.'
- Preheat the oven to 180 °C. Grease a baking dish. Layer half the pasta in the dish,
  spread all the meat sauce on top, then add the remaining pasta. Pour the béchamel
  evenly over everything. Scatter the remaining Parmesan on top.
- Bake for 45 minutes until the surface is golden brown. Rest for 15 minutes, then
  cut into portions.
