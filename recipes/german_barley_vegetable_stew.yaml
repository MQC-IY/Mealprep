de_steps:
- Karotten, Kartoffeln, Sellerie und Pastinake in 2 cm große Würfel schneiden. Zwiebeln
  würfeln.
- Öl in einem großen Topf erhitzen. Zwiebeln 5 Minuten anschwitzen. Knoblauch und
  Kümmel hinzufügen, 1 Minute rösten.
- Perlgraupen einrühren, kurz mit anschwitzen. Gemüsebrühe aufgießen, Lorbeerblätter
  einlegen. Zum Kochen bringen.
- Karotten, Kartoffeln, Sellerie und Pastinake einrühren. Majoran, Salz und Pfeffer
  hinzufügen. Hitze reduzieren und 35 Minuten zugedeckt köcheln, bis Graupen und Gemüse
  weich sind.
- Lorbeerblätter entfernen. Kräftig abschmecken. Gehackte Petersilie einrühren. Mit
  Vollkornbrot servieren.
en_steps:
- Cut the carrots, potatoes, celeriac, and parsnip into 2 cm cubes. Dice the onions.
- Heat the oil in a large pot. Sweat the onions for 5 minutes. Add garlic and caraway
  seeds and toast for 1 minute.
- Stir in the pearl barley and briefly sauté. Pour in the vegetable stock and add
  the bay leaves. Bring to a boil.
- Stir in the carrots, potatoes, celeriac, and parsnip. Add marjoram, salt, and pepper.
  Reduce the heat and simmer covered for 35 minutes until the barley and vegetables
  are tender.
- Remove the bay leaves. Season generously. Stir in the chopped parsley. Serve with
  wholegrain bread.
