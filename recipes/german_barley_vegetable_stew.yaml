meals: 2
de:
  title: Eintopf mit Graupen und Gemüse
  summary: Rustikaler, bekömmlicher Eintopf mit Perlgraupen, Wurzelgemüse und Kümmel
    – der unterschätzte Klassiker der deutschen Hausküche.
en:
  title: German Barley & Vegetable Stew
  summary: Rustic, nourishing stew with pearl barley, root vegetables, and caraway
    — the underrated classic of the German home kitchen.
