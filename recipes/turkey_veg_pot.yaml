de:
  title: Puten-Gemüse-Topf mit Reis
  summary: Tomatiger Eintopf mit Putenhack, Bohnen, Paprika und Möhren.
en:
  title: Turkey Vegetable Pot with Rice
  summary: A tomatoey stew of ground turkey, kidney beans, bell pepper, and carrots
    served over rice.
