de:
  title: Griechisches Hähnchen-Souvlaki mit Pitabrot
  summary: Zitronig-oregano-mariniertes Hähnchen auf dem Spieß, serviert im aufgewärmten
    Pitabrot mit Tzatziki, Tomaten und roten Zwiebeln.
en:
  title: Chicken Souvlaki with Pita Bread
  summary: Lemon-and-oregano-marinated chicken on skewers, served in warm pita bread
    with tzatziki, tomatoes, and red onions.
