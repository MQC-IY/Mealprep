de_steps:
- Hähnchenbrust in 3 cm Würfel schneiden. Marinade aus Olivenöl, Zitronensaft, Zitronenschale,
  Oregano, Paprikapulver, Chiliflocken, 2 Knoblauchzehen (gepresst), Salz und Pfeffer
  anrühren. Hähnchenwürfel mindestens 30 Minuten darin marinieren.
- 'Für das Tzatziki: Gurke grob reiben, fest ausdrücken. Mit Joghurt, 2 gepressten
  Knoblauchzehen, gehackter Minze, Salz und 1 EL Olivenöl vermengen. Kalt stellen.'
- Hähnchen auf Holzspieße (zuvor eingeweicht) oder Metallspieße stecken. Auf einer
  heißen Grillpfanne oder unter dem Ofengrill 10–12 Minuten wenden, bis sie goldbraun
  und gar sind.
- Pitabrot kurz in einer trockenen Pfanne aufwärmen. Tomaten in Scheiben schneiden,
  rote Zwiebel in feine Ringe schneiden.
- Pitabrot mit Tzatziki bestreichen, Hähnchen vom Spieß schieben, Tomaten und Zwiebeln
  darauflegen und einrollen.
en_steps:
- Cut the chicken breast into 3 cm cubes. Mix the marinade from olive oil, lemon juice,
  lemon zest, oregano, smoked paprika, chilli flakes, 2 pressed garlic cloves, salt,
  and pepper. Marinate the chicken for at least 30 minutes.
- 'For the tzatziki: coarsely grate the cucumber and squeeze firmly. Combine with
  the yoghurt, 2 pressed garlic cloves, chopped mint, salt, and 1 tbsp olive oil.
  Refrigerate.'
- Thread the chicken onto wooden skewers (previously soaked) or metal skewers. Cook
  on a hot griddle pan or under the grill for 10–12 minutes, turning, until golden
  and cooked through.
- Briefly warm the pita bread in a dry pan. Slice the tomatoes and cut the red onion
  into thin rings.
- Spread the pita with tzatziki, slide the chicken off the skewers, add tomatoes and
  onions, and roll up.
