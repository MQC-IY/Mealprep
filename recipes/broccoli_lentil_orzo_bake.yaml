de:
  title: Brokkoli-Linsen-Orzo-Auflauf
  summary: Auflauf mit roten Linsen, Orzo und Brokkoli.
en:
  title: Broccoli, Lentil and Orzo Bake
  summary: Baked dish with red lentils, orzo pasta, and broccoli.
ingredients:
- de_name: Rote Linsen
  en_name: red lentils
  qty: 200
  unit: g
  category: Konserven und Vorrat
- de_name: Orzo oder Kritharaki
  en_name: orzo (kritharaki)
  qty: 220
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Brokkoli
  en_name: broccoli
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Eier
  en_name: eggs
  qty: 3
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 180
  unit: g
  category: Protein und Milchprodukte
- de_name: Gouda gerieben
  en_name: Gouda, grated
  qty: 70
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
