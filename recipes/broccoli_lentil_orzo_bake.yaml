de_steps:
- Linsen und Orzo getrennt vorgaren.
- Brokkoli klein schneiden und weich vorgaren.
- Alles in eine Form geben, Eier mit Joghurt verrühren und darübergeben.
en_steps:
- Parboil lentils and orzo separately.
- Cut broccoli into small florets and parboil until just tender.
- Transfer everything to a baking dish; whisk eggs with yogurt and pour over the top.
