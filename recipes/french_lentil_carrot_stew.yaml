de_steps:
- Linsen abspülen.
- Kartoffeln, Möhren, Lauch, Zwiebel und Knoblauch klein schneiden.
- Gemüse in Olivenöl anschwitzen, Kräuter kurz mitziehen lassen und Linsen sowie Wasser
  zugeben.
- Alles weich und aromatisch köcheln lassen.
en_steps:
- Rinse the lentils.
- Dice the potatoes, carrots, leek, onion, and garlic.
- Sweat the vegetables in olive oil, briefly let the herbs bloom, then add the lentils
  and water.
- Simmer everything until soft and fragrant.
