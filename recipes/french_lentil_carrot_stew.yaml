de:
  title: Französischer Linsen-Möhren-Eintopf
  summary: Französisch inspirierter Linsentopf mit Möhren, Kartoffeln, Lauch, Knoblauch
    und Kräutern der Provence.
en:
  title: French Lentil & Carrot Stew
  summary: French-inspired lentil pot with carrots, potatoes, leek, garlic, and herbes
    de Provence.
