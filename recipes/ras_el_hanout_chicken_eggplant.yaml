de:
  title: Hähnchen mit Ras-el-Hanout und Auberginenpüree
  summary: Zartes, mit Ras el Hanout gewürztes Hähnchen auf samtigem geräuchertem
    Auberginenpüree – ein Traumgericht der modernen nordafrikanisch-levantinischen
    Küche.
en:
  title: Ras el Hanout Chicken with Eggplant Purée
  summary: Tender chicken spiced with Ras el Hanout served on silky smoked eggplant
    purée — a stunning dish from the modern North African-Levantine kitchen.
