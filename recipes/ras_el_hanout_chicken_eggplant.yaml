de_steps:
- Auberginen direkt über einer Gasflamme oder unter dem Backofengrill bei höchster
  Stufe rundum verkohlen lassen, ca. 20–25 Minuten, bis sie innen weich sind. Abkühlen
  lassen, Haut abziehen.
- Auberginenfleisch mit 2 Knoblauchzehen, Tahini, Zitronensaft, 2 EL Olivenöl und
  Salz pürieren. Mit Kreuzkümmel abschmecken.
- Hähnchen mit Ras el Hanout, Chiliflocken, 3 Knoblauchzehen, 2 EL Olivenöl und Salz
  marinieren. Mind. 20 Minuten ruhen lassen.
- Hähnchen in einer heißen Pfanne 6–7 Minuten je Seite braten. Mit Brühe ablöschen
  und 2 Minuten einglasieren.
- Fladenbrote aufwärmen.
- Auberginenpüree als Basis, Hähnchen oben drauf. Mit Granatapfelkernen, Petersilie,
  Sumach und Olivenöl anrichten.
en_steps:
- Char the eggplants directly over a gas flame or under the broiler on highest setting,
  turning until blackened all over, about 20–25 minutes, until soft inside. Let cool,
  then peel off the skin.
- Blend the eggplant flesh with 2 garlic cloves, tahini, lemon juice, 2 tbsp olive
  oil, and salt. Season with cumin.
- Marinate the chicken with Ras el Hanout, chili flakes, 3 garlic cloves, 2 tbsp olive
  oil, and salt. Let rest at least 20 minutes.
- Cook the chicken in a hot pan for 6–7 minutes per side. Deglaze with broth and reduce
  for 2 minutes until glazed.
- Warm the flatbreads.
- Spread the eggplant purée as a base, top with the chicken. Garnish with pomegranate
  seeds, parsley, sumac, and olive oil.
