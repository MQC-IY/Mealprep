id: date_nut_energy_balls
pool: dessert
healthy: true
meals: 8
de:
  title: Dattel-Nuss-Energiekugeln
  summary: Kleine, sättigende Energiebällchen aus Datteln, Nüssen und Haferflocken
    — ohne Backen, ganz ohne Zucker und ideal als süßer Snack für die ganze Familie.
en:
  title: Date and Nut Energy Balls
  summary: Small, satisfying energy bites made from dates, nuts, and oats — no baking,
    no added sugar, and perfect as a sweet snack for the whole family.
ingredients:
- de_name: Medjool-Datteln entsteint
  en_name: Medjool dates, pitted
  qty: 400
  unit: g
  category: Obst
- de_name: Mandeln
  en_name: almonds
  qty: 200
  unit: g
  category: Konserven und Vorrat
- de_name: Walnüsse
  en_name: walnuts
  qty: 150
  unit: g
  category: Konserven und Vorrat
- de_name: Haferflocken (zart)
  en_name: rolled oats (fine)
  qty: 150
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Kakaopulver ungesüßt
  en_name: unsweetened cocoa powder
  qty: 3
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiasamen
  en_name: chia seeds
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Zimt gemahlen
  en_name: cinnamon, ground
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Vanilleextrakt
  en_name: vanilla extract
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Salz
  en_name: salt
  qty: 1
  unit: Prise
  category: Gewürze
- de_name: Kokosraspeln zum Wälzen
  en_name: desiccated coconut for rolling
  qty: 60
  unit: g
  category: Konserven und Vorrat
de_steps:
- Datteln 10 Minuten in warmem Wasser einweichen, dann gut abtropfen lassen.
- Mandeln und Walnüsse in einem Mixer grob zerkleinern.
- Datteln, Haferflocken, Kakaopulver, Chiasamen, Zimt, Vanilleextrakt und Salz zu
  den Nüssen geben und alles zu einer klebrigen, formbaren Masse verarbeiten. Falls
  die Masse zu trocken ist, 1–2 EL Wasser hinzufügen.
- Hände leicht befeuchten und aus der Masse 24–30 Kugeln (je ca. 3 cm Durchmesser)
  formen.
- Kokosraspeln auf einem Teller ausbreiten und die Kugeln darin wälzen.
- Kugeln auf einem Tablett verteilen und mindestens 30 Minuten im Kühlschrank fest
  werden lassen.
- In einem luftdichten Behälter im Kühlschrank bis zu 2 Wochen haltbar.
en_steps:
- Soak the dates in warm water for 10 minutes, then drain well.
- Roughly chop the almonds and walnuts in a food processor.
- Add the dates, oats, cocoa powder, chia seeds, cinnamon, vanilla extract, and salt
  to the nuts and process into a sticky, shapeable dough. If the mixture is too dry,
  add 1–2 tbsp water.
- Dampen your hands lightly and roll the mixture into 24–30 balls (about 3 cm in diameter
  each).
- Spread the desiccated coconut on a plate and roll the balls in it to coat.
- Arrange the balls on a tray and refrigerate for at least 30 minutes to firm up.
- Store in an airtight container in the fridge for up to 2 weeks.
