de_steps:
- Safranfäden in 3 EL heißem Wasser einweichen. Hähnchenstücke kräftig mit Salz, Pfeffer
  und 1 TL Pimentón würzen.
- Olivenöl in einer großen Paella-Pfanne oder breiten Pfanne bei starker Hitze erhitzen.
  Hähnchenstücke rundherum 6–8 Minuten kräftig anbraten. Herausnehmen.
- Paprika in Streifen, Zwiebel und Knoblauch fein würfeln. Im Bratfett bei mittlerer
  Hitze 5 Minuten anschwitzen.
- Tomaten reiben oder fein würfeln und dazugeben. Restlichen Pimentón und Safranwasser
  einrühren. Den Sofrito 5–7 Minuten bei niedriger Hitze einköcheln.
- Reis einrühren und 1–2 Minuten im Sofrito rösten. Heiße Brühe angießen und gut umrühren.
- Hähnchenstücke zurücklegen. Aufkochen, dann Hitze auf niedrig reduzieren. Ab jetzt
  NICHT mehr rühren. 15–18 Minuten köcheln.
- Erbsen einstreuen. Hitze für die letzten 2 Minuten kurz hochdrehen, um die Socarrat-Kruste
  am Boden zu bilden.
- Mit einem Tuch abgedeckt 5 Minuten ruhen lassen. Mit Zitronenspalten und Petersilie
  servieren.
en_steps:
- Soak saffron threads in 3 tbsp hot water. Season chicken pieces generously with
  salt, pepper and 1 tsp Pimentón.
- Heat olive oil in a large paella pan or wide skillet over high heat. Sear chicken
  pieces on all sides for 6–8 minutes. Remove.
- Cut bell pepper into strips; finely dice onion and garlic. Sauté in the drippings
  over medium heat for 5 minutes.
- Grate or finely dice tomatoes and add. Stir in remaining Pimentón and saffron water.
  Simmer the sofrito over low heat for 5–7 minutes.
- Add rice and toast in the sofrito for 1–2 minutes. Pour in hot stock and stir well.
- Return chicken pieces. Bring to a boil, then reduce heat to low. Do NOT stir from
  this point on. Simmer for 15–18 minutes.
- Scatter peas on top. Briefly raise heat for the last 2 minutes to form the socarrat
  crust on the bottom.
- Cover with a cloth and rest for 5 minutes. Serve with lemon wedges and parsley.
