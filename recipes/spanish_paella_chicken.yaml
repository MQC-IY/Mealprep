de:
  title: Spanische Hähnchen-Paella-Pfanne
  summary: Klassische Paella Valenciana mit Hähnchen, Safran, Pimentón, Paprika und
    Bomba-Reis – die goldene Socarrat-Kruste ist das Herzstück.
en:
  title: Spanish Chicken Paella
  summary: Classic Paella Valenciana with chicken, saffron, Pimentón, bell pepper
    and Bomba rice – the golden socarrat crust on the bottom is the crowning glory.
