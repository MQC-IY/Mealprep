de:
  title: Hähnchen-Zosui (Japanischer Reisbrei)
  summary: Sanfter japanischer Reisbrei mit zartem Hähnchen, Ei, Pilzen und Miso in
    kräftiger Dashi-Brühe.
en:
  title: Chicken Zosui (Japanese Rice Porridge)
  summary: A gentle Japanese rice porridge with tender chicken, egg, mushrooms, and
    miso in a rich dashi broth.
