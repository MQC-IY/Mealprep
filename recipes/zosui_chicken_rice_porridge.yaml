de_steps:
- Hähnchenbrust mit Ingwerscheiben, Knoblauch und Sake in der Dashi-Brühe bei mittlerer
  Hitze 15 Minuten pochieren. Hähnchen herausnehmen und zerzupfen. Brühe aufbewahren.
- Brühe erneut aufkochen. Shiitake-Pilze in Scheiben dazugeben und 5 Minuten köcheln.
- Gekochten Reis dazugeben und verrühren. 10 Minuten bei niedriger Hitze köcheln,
  bis der Reis aufweicht.
- Miso-Paste in einer kleinen Schüssel mit etwas heißer Brühe glatt rühren und einrühren.
  Sojasoße und Mirin hinzufügen. Nicht mehr aufkochen.
- Zerzupftes Hähnchen zurückgeben.
- Eier verquirlen und in kreisenden Bewegungen in den leicht köchelnden Brei gießen.
  Sofort vom Herd nehmen und Eier 1 Minute sanft stocken lassen.
- Sesamöl einträufeln. In tiefe Schalen füllen, mit Frühlingszwiebeln und Shichimi-Togarashi
  bestreuen.
en_steps:
- Poach the chicken breast with slices of ginger, garlic, and sake in the dashi broth
  over medium heat for 15 minutes. Remove the chicken and shred it. Reserve the broth.
- Bring the broth back to a boil. Add the sliced shiitake mushrooms and simmer for
  5 minutes.
- Stir in the cooked rice. Simmer over low heat for 10 minutes until the rice softens.
- Dissolve the miso paste in a small bowl with a little hot broth, then stir into
  the pot. Add the soy sauce and mirin. Do not boil again.
- Return the shredded chicken.
- Beat the eggs and pour them in a thin, circular stream into the gently simmering
  porridge. Remove from the heat immediately and let the eggs set gently for 1 minute.
- Drizzle with sesame oil. Ladle into deep bowls and scatter over spring onions and
  shichimi togarashi.
