de:
  title: Puten-Bulgur-Auflauf mit Spinat
  summary: Auflauf mit Putenhack, Bulgur, Spinat und Joghurt-Ei-Guss.
en:
  title: Turkey Bulgur Bake with Spinach
  summary: A baked casserole of ground turkey, bulgur, spinach, and a yogurt-egg topping.
