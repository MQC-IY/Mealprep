id: turkey_bulgur_spinach_bake
pool: lunch
healthy: true
quick: false
next_day: false
meals: 3
de:
  title: Puten-Bulgur-Auflauf mit Spinat
  summary: Auflauf mit Putenhack, Bulgur, Spinat und Joghurt-Ei-Guss.
en:
  title: Turkey Bulgur Bake with Spinach
  summary: A baked casserole of ground turkey, bulgur, spinach, and a yogurt-egg topping.
ingredients:
- de_name: Putenhack
  en_name: ground turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Bulgur
  en_name: bulgur
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Blattspinat
  en_name: leaf spinach
  qty: 180
  unit: g
  category: Gemüse und Salat
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 180
  unit: g
  category: Protein und Milchprodukte
- de_name: Eier
  en_name: eggs
  qty: 3
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Bulgur vorgaren.
- Putenhack mit Zwiebel scharf anbraten, Spinat unterheben.
- Alles in eine Form geben, Joghurt mit Eiern verrühren und darübergeben.
en_steps:
- Par-cook the bulgur.
- Brown the ground turkey with the onion over high heat, then fold in the spinach.
- Transfer everything to a baking dish, whisk together the yogurt and eggs, and pour
  over the top.
