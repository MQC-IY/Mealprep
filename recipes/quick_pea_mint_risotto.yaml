de_steps:
- Brühe in einem separaten Topf heiß halten. Schalotten und Knoblauch fein würfeln.
- Olivenöl und die Hälfte der Butter in einem breiten Topf erhitzen. Schalotten und
  Knoblauch 2 Minuten dünsten. Reis hinzufügen und 2 Minuten glasig rühren.
- Mit Weißwein ablöschen und unter Rühren einkochen lassen.
- Kellenschöpfweise heiße Brühe hinzufügen und jeweils unter ständigem Rühren einarbeiten.
  Diesen Vorgang ca. 18 Minuten wiederholen, bis der Reis al dente ist.
- TK-Erbsen in den letzten 3 Minuten unterheben. Vom Herd nehmen, restliche Butter
  und Parmesan einrühren. Gehackte Minze untermengen und sofort servieren.
en_steps:
- Keep the broth warm in a separate saucepan. Finely dice the shallots and garlic.
- Heat the olive oil and half the butter in a wide pot. Sauté the shallots and garlic
  for 2 minutes. Add the rice and stir for 2 minutes until translucent.
- Deglaze with the white wine and stir until absorbed.
- Add the hot broth one ladle at a time, stirring constantly after each addition.
  Repeat for about 18 minutes until the rice is al dente.
- Stir in the frozen peas during the last 3 minutes. Remove from the heat and stir
  in the remaining butter and Parmesan. Fold in the chopped mint and serve immediately.
