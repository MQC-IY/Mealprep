  en_name: Fresh mint
  qty: 0.5
  unit: Bund
  category: Gemüse und Salat
- de_name: Schalotten
  en_name: Shallots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Knoblauchzehen
  en_name: Garlic cloves
  qty: 2
  unit: Zehen
  category: Gemüse und Salat
