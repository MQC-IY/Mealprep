id: quick_pea_mint_risotto
pool: lunch
healthy: false
quick: true
next_day: true
quick_minutes: 25
meals: 2
de:
  title: Schneller Erbsen-Minze-Risotto
  summary: Frischer Frühlings-Risotto mit TK-Erbsen, Minze und Parmesan — cremig in
    25 Minuten.
en:
  title: Quick Pea and Mint Risotto
  summary: A fresh, spring-inspired Risotto with frozen peas, mint, and Parmesan —
    creamy and ready in 25 minutes.
ingredients:
