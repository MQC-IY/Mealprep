de:
  title: Quinoa-Gemüse-Pfanne mit Hähnchen
  summary: Lockere Pfanne mit Quinoa, Hähnchen, Paprika, Möhren und Erbsen.
en:
  title: Quinoa and Vegetable Skillet with Chicken
  summary: A light skillet of quinoa, chicken, bell peppers, carrots, and peas.
