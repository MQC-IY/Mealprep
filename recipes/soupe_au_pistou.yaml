de:
  title: Soupe au Pistou – Provenzalische Gemüsesuppe
  summary: Provenzalische Sommergemüsesuppe mit Bohnen, Zucchini, Kartoffeln und frischer
    Pistou – dem französischen Cousin des Pestos.
en:
  title: Soupe au Pistou – Provençal Vegetable Soup
  summary: A Provençal summer vegetable soup with beans, zucchini, potatoes, and fresh
    pistou — the French cousin of pesto.
