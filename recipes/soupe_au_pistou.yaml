de_steps:
- Kartoffeln und Karotten würfeln, Zucchini in Halbmonde schneiden, Sellerie und Zwiebel
  fein würfeln, grüne Bohnen in 2 cm lange Stücke schneiden.
- Olivenöl (2 EL) in einem großen Topf erhitzen. Zwiebel und Sellerie 5 Minuten anschwitzen.
- Kartoffeln und Karotten dazugeben, Brühe angießen. Aufkochen und 10 Minuten köcheln.
- Grüne Bohnen, Zucchini und Cannellini-Bohnen einrühren. Weitere 10 Minuten köcheln.
- Pasta in die Suppe geben und al dente garen.
- 'Währenddessen die Pistou zubereiten: Basilikumblätter, Knoblauch, Parmesan und
  2 EL Olivenöl mit einem Stabmixer oder Mörser zu einer groben Paste verarbeiten.
  Mit Salz abschmecken.'
- Suppe vom Herd nehmen, mit Salz und Pfeffer abschmecken.
- Suppe in Teller schöpfen und einen großzügigen Klecks Pistou direkt darauf setzen
  – erst beim Essen unterrühren.
en_steps:
- Dice the potatoes and carrots, cut the zucchini into half-moons, finely dice the
  celery and onion, and cut the green beans into 2 cm pieces.
- Heat 2 tbsp olive oil in a large pot. Sweat the onion and celery for 5 minutes.
- Add the potatoes and carrots, pour in the broth. Bring to a boil and simmer for
  10 minutes.
- Stir in the green beans, zucchini, and cannellini beans. Simmer for a further 10
  minutes.
- Add the pasta to the soup and cook until al dente.
- 'Meanwhile, make the pistou: blend the basil leaves, garlic, Parmesan, and 2 tbsp
  olive oil with an immersion blender or in a mortar to a rough paste. Season with
  salt.'
- Remove the soup from the heat and season with salt and pepper.
- Ladle the soup into bowls and place a generous dollop of pistou directly on top
  — stir it in as you eat.
