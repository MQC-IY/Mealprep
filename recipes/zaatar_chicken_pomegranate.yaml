de:
  title: Za'atar-Hähnchen mit Granatapfel und Couscous
  summary: Ofengeröstetes Za'atar-Hähnchen auf levantem Couscous mit frischen Granatapfelkernen,
    Minze und einem Hauch Granatapfelsirup.
en:
  title: Za'atar Chicken with Pomegranate and Couscous
  summary: Oven-roasted za'atar chicken on Levantine couscous with fresh pomegranate
    seeds, mint, and a drizzle of pomegranate molasses.
