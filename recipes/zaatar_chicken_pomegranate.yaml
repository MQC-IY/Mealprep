de_steps:
- Hähnchenbrust mit Za'atar, 3 EL Olivenöl, Zitronensaft, gepresstem Knoblauch, Chili,
  Salz und Pfeffer einreiben. 1 Stunde marinieren.
- Backofen auf 200°C vorheizen. Hähnchen 20–25 Minuten rösten, bis durchgegart. 5
  Minuten ruhen lassen, dann in Scheiben schneiden.
- Couscous in eine Schüssel geben. Heiße Gemüsebrühe mit 1 EL Olivenöl und einer Prise
  Salz darübergießen. 5 Minuten quellen lassen, dann auflockern.
- Zwiebelringe in 1 EL Olivenöl glasig dünsten. Mit Sumach bestreuen.
- Couscous mit Granatapfelsirup, der Hälfte der Granatapfelkerne, Minze und Petersilie
  vermengen. Mit Salz und Zitronensaft abschmecken.
- Couscous auf Teller verteilen, Hähnchenscheiben darauflegen. Restliche Granatapfelkerne,
  Zwiebeln und einen weiteren Spritzer Granatapfelsirup darüber geben.
en_steps:
- Rub the chicken breast with za'atar, 3 tbsp olive oil, lemon juice, pressed garlic,
  chili, salt, and pepper. Marinate for 1 hour.
- Preheat the oven to 200 °C. Roast the chicken for 20–25 minutes until cooked through.
  Rest for 5 minutes, then slice.
- Place the couscous in a bowl. Pour hot vegetable stock with 1 tbsp olive oil and
  a pinch of salt over it. Leave to steep for 5 minutes, then fluff with a fork.
- Sauté the onion rings in 1 tbsp olive oil until soft. Sprinkle with sumac.
- Mix the couscous with the pomegranate molasses, half the pomegranate seeds, mint,
  and parsley. Season with salt and lemon juice.
- Spoon the couscous onto plates and arrange the chicken slices on top. Scatter over
  the remaining pomegranate seeds and onion rings, and add another drizzle of pomegranate
  molasses.
