de_steps:
- Merguez in Scheiben schneiden und in einem großen Topf mit Olivenöl bei mittlerer
  bis hoher Hitze 3–4 Minuten rundum anbraten. Herausnehmen und beiseitestellen.
- Zwiebel fein würfeln, Knoblauch hacken, Sellerie in dünne Scheiben schneiden. Im
  gleichen Topf 3 Minuten anschwitzen.
- Kreuzkümmel, Koriander und Chiliflocken einrühren und 30 Sekunden rösten.
- Linsen, gehackte Tomaten und Brühe hinzufügen. Aufkochen, dann auf mittlere Hitze
  reduzieren und 15 Minuten köcheln lassen, bis die Linsen weich sind.
- Gebratene Wurst zurück in den Topf geben. Mit Salz und Pfeffer abschmecken und servieren.
en_steps:
- Slice the merguez and brown in a large pot with olive oil over medium-high heat
  for 3–4 minutes. Remove and set aside.
- Finely dice the onion, chop the garlic, and thinly slice the celery. Sauté in the
  same pot for 3 minutes.
- Stir in the cumin, coriander, and chili flakes and toast for 30 seconds.
- Add the lentils, chopped tomatoes, and broth. Bring to a boil, then reduce to medium
  heat and simmer for 15 minutes until the lentils are soft.
- Return the sausage to the pot, season with salt and pepper, and serve.
