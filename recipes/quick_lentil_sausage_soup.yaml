de:
  title: Schnelle Linsen-Wurst-Suppe
  summary: Rote Linsen mit würziger Merguez und Tomaten — ein herzhafter Eintopf in
    25 Minuten.
en:
  title: Quick Lentil Sausage Soup
  summary: Red lentils with spicy merguez sausage and tomatoes — a hearty stew in
    25 minutes.
