de:
  title: Israelisches Shakshuka-Hähnchen mit Feta
  summary: Klassische Shakshuka erweitert mit würzigem Hähnchen und zerbröseltem Feta
    – herzhaft, bunt und vollgepackt mit Aromen.
en:
  title: Israeli Shakshuka Chicken with Feta
  summary: Classic Shakshuka elevated with spiced chicken and crumbled feta — bold,
    colourful, and packed with flavour.
