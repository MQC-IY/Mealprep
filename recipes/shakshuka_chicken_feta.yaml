de_steps:
- Hähnchen in kleine Würfel schneiden, mit Salz, Pfeffer und Kreuzkümmel würzen. In
  Olivenöl scharf anbraten (5 Minuten), herausnehmen.
- In derselben Pfanne Zwiebeln und Paprika 8 Minuten weich dünsten. Knoblauch einrühren,
  2 Minuten mitbraten.
- Tomatenmark einrühren und kurz rösten. Koriander, geräuchertes Paprika, restlichen
  Kreuzkümmel und Chili hinzufügen.
- Gehackte Tomaten und angebratenes Hähnchen in die Pfanne geben. 10 Minuten köcheln
  lassen. Mit Salz abschmecken.
- Vier Vertiefungen in die Sauce drücken, je ein Ei hineingleiten lassen. Feta über
  die gesamte Oberfläche bröckeln. Pfanne abdecken, 5–7 Minuten bei mittlerer Hitze
  garen.
- Mit Petersilie und Minze bestreuen. Direkt aus der Pfanne mit warmem Pita-Brot servieren.
en_steps:
- Cut the chicken into small cubes, season with salt, pepper, and cumin. Sear in olive
  oil for 5 minutes, then remove.
- In the same pan, soften the onions and bell peppers for 8 minutes. Stir in the garlic
  and cook for 2 minutes.
- Stir in the tomato paste and briefly fry. Add the coriander, smoked paprika, remaining
  cumin, and chili.
- Add the canned tomatoes and the seared chicken to the pan. Simmer for 10 minutes.
  Season with salt.
- Press four wells into the sauce and slide one egg into each. Crumble the feta over
  the whole surface. Cover the pan and cook over medium heat for 5–7 minutes.
- Scatter with parsley and mint. Serve straight from the pan with warm pita bread.
