de:
  title: Pasta alle Vongole mit Weißwein
  summary: |-
    Venusmuscheln, die sich in Knoblauch-Weißwein-Brühe öffnen, mit Spaghetti und Olivenöl zu einem Gericht verbunden – muss sofort gegessen werden, da die Muscheln schnell gummig werden.
