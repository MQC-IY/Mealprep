de:
  title: Pasta alle Vongole mit Weißwein
  summary: Venusmuscheln, die sich in Knoblauch-Weißwein-Brühe öffnen, mit Spaghetti
    und Olivenöl zu einem Gericht verbunden – muss sofort gegessen werden, da die
    Muscheln schnell gummig werden.
en:
  title: Pasta alle Vongole with White Wine
  summary: Clams opening in a garlic-white wine broth, tossed with spaghetti and olive
    oil into an irresistible dish – serve immediately, as the clams turn rubbery if
    left to sit.
