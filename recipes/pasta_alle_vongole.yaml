de_steps:
- Muscheln in kaltem Salzwasser (1 EL Salz pro Liter) mindestens 30 Minuten wässern,
  damit Sand austritt. Mehrfach durchrühren, Wasser wechseln. Alle Muscheln, die sich
  nach Klopfen nicht schließen, wegwerfen.
- Einen großen Topf Salzwasser für die Pasta aufsetzen und zum Kochen bringen. Spaghetti
  2 Minuten kürzer als die Packungsangabe kochen (al dente+ für die Pfanne). Vor dem
  Abgießen 300 ml Nudelwasser auffangen.
- Knoblauch in hauchdünne Scheiben schneiden. Petersilienblätter grob hacken, Stiele
  fein hacken. Peperoncini zerkrümeln.
- 4 EL Olivenöl in einer sehr großen, hohen Pfanne oder einem weiten Topf bei mittlerer
  Hitze erwärmen. Knoblauch und Petersilienstiele 1 Minute anschwitzen – NICHT bräunen.
  Peperoncini zugeben, 30 Sekunden mitrösten.
- Muscheln in die Pfanne geben, mit Weißwein ablöschen, Deckel drauf. Bei hoher Hitze
  3–5 Minuten dämpfen und zwischendurch schwenken, bis alle Muscheln offen sind. Muscheln,
  die geschlossen bleiben, entfernen und wegwerfen.
- Abgegossene Spaghetti direkt in die Pfanne zu den Muscheln geben. Bei mittlerer
  Hitze 1–2 Minuten schwenken, dabei nach Bedarf Nudelwasser einarbeiten, bis eine
  sämige, emulgierte Sauce entsteht.
- Restliches Olivenöl (4 EL) einrühren, Petersilienblätter und Zitronensaft zugeben.
  Mit Salz und Pfeffer abschmecken. Sofort in vorgewärmten tiefen Tellern servieren
  – kein Warten, kein Aufwärmen.
en_steps:
- Soak the clams in cold salted water (1 tbsp salt per litre) for at least 30 minutes
  to purge any sand. Stir several times and change the water. Discard any clams that
  do not close when tapped.
- Bring a large pot of salted water to the boil. Cook the spaghetti 2 minutes less
  than the packet instructions (al dente-plus for the pan). Before draining, reserve
  300 ml of pasta water.
- Cut the garlic into paper-thin slices. Roughly chop the parsley leaves; finely chop
  the stalks. Crumble the peperoncini.
- Warm 4 tbsp olive oil in a very large, deep frying pan or wide pot over medium heat.
  Sweat the garlic and parsley stalks for 1 minute – do NOT let them brown. Add the
  peperoncini and toast for 30 seconds.
- Add the clams to the pan, deglaze with white wine, put the lid on. Steam over high
  heat for 3–5 minutes, shaking occasionally, until all the clams are open. Remove
  and discard any that remain closed.
- Add the drained spaghetti directly to the pan with the clams. Toss over medium heat
  for 1–2 minutes, working in pasta water as needed until a silky, emulsified sauce
  forms.
- Stir in the remaining olive oil (4 tbsp), add the parsley leaves and lemon juice.
  Season with salt and pepper. Serve immediately in warmed deep bowls – no waiting,
  no reheating.
