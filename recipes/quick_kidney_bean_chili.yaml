de_steps:
- Hähnchenbrust in kleine Würfel schneiden und in Olivenöl bei hoher Hitze 4–5 Minuten
  kräftig anbraten. Herausnehmen.
- Zwiebel, Knoblauch und Paprika fein würfeln. Im gleichen Topf 3 Minuten anschwitzen.
- Chipotle-Paste, Kreuzkümmel, Chilipulver und Oregano einrühren und 1 Minute rösten.
- Tomaten, Brühe und Kidneybohnen hinzufügen. Aufkochen.
- Hähnchen zurück in den Topf geben und 12–15 Minuten bei mittlerer Hitze köcheln
  lassen, bis die Sauce eindickt. Abschmecken.
en_steps:
- Cut the chicken breast into small cubes and sear in olive oil over high heat for
  4–5 minutes. Remove and set aside.
- Finely dice the onion, garlic, and bell pepper. Sauté in the same pot for 3 minutes.
- Stir in the chipotle paste, cumin, chili powder, and oregano, and toast for 1 minute.
- Add the tomatoes, broth, and kidney beans. Bring to a boil.
- Return the chicken to the pot and simmer over medium heat for 12–15 minutes until
  the sauce thickens. Season to taste.
