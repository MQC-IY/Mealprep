de:
  title: Schneller Kidney-Chili mit Hähnchen
  summary: Rauchig-scharfes Hähnchenchili mit Kidneybohnen und Chipotle — 30 Minuten
    Schnellküche.
en:
  title: Quick Kidney Bean Chili with Chicken
  summary: Smoky, spicy chicken chili with kidney beans and chipotle — 30-minute fast
    food done right.
