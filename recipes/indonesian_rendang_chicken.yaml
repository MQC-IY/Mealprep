de_steps:
- 'Rendang-Paste herstellen: Zwiebeln, Knoblauch, Ingwer, Galgant, rote Chilis und
  Kurkuma im Mixer zu einer feinen Paste pürieren.'
- Zitronengrasstangen mit dem Messerrücken anquetschen.
- Öl in einem schweren Topf bei mittlerer Hitze erhitzen. Rendang-Paste 5–7 Minuten
  anbraten, unter ständigem Rühren, bis sie sehr duftend und etwas dunkler ist.
- Gemahlenen Koriander, Kreuzkümmel, Zimt und Chiliflocken zugeben, 1 Minute mitrösten.
- Hähnchenstücke zugeben und rundherum mit der Paste überziehen. Angedrückte Zitronengrasstangen
  zugeben.
- Kokosmilch angießen, aufkochen. Hitze stark reduzieren, Deckel halb drauf und 45–60
  Minuten köcheln lassen, gelegentlich rühren.
- In den letzten 15 Minuten Deckel ganz abnehmen und bei mittlerer Hitze einköcheln,
  bis die Sauce eindickt und das Hähnchen karamellisiert. Mit Jasminreis servieren.
en_steps:
- 'Make the rendang paste: blend onions, garlic, ginger, galangal, red chilies, and
  turmeric in a blender to a smooth paste.'
- Bruise the lemongrass stalks with the back of a knife.
- Heat oil in a heavy pot over medium heat. Fry the rendang paste for 5–7 minutes,
  stirring constantly, until very fragrant and slightly darker.
- Add ground coriander, cumin, cinnamon, and chili flakes; toast for 1 minute.
- Add chicken pieces and coat all over with the paste. Add the bruised lemongrass
  stalks.
- Pour in the coconut milk and bring to a boil. Reduce heat significantly, place lid
  half on and simmer for 45–60 minutes, stirring occasionally.
- In the last 15 minutes remove the lid completely and cook over medium heat until
  the sauce thickens and the chicken caramelises. Serve with jasmine rice.
