de:
  title: Indonesisches Rendang-Hähnchen
  summary: Langsam geschmortes Hähnchen in einer aromatischen Paste aus Zitronengras,
    Galgant, Kokosmilch, Kurkuma und Chili – eines der aromatischsten Gerichte Südostasiens.
en:
  title: Indonesian Rendang Chicken
  summary: Slowly braised chicken in an aromatic paste of lemongrass, galangal, coconut
    milk, turmeric, and chili – one of the most flavourful dishes in Southeast Asia.
