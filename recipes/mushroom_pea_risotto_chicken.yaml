  title: Hähnchen-Risotto mit Champignons und Erbsen
  summary: Mildes Risotto mit Hähnchen, Champignons und Erbsen.
en:
  title: Chicken Risotto with Mushrooms and Peas
  summary: A mild and creamy risotto with chicken, mushrooms, and peas.
