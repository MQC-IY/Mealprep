de_steps:
- Couscous quellen lassen.
- Putenhack mit Zwiebel scharf anbraten.
- Bohnen und Möhren weich garen.
en_steps:
- Soak the couscous in hot water or stock until absorbed.
- Brown the minced turkey with the onion over high heat.
- Cook the green beans and carrots until tender.
