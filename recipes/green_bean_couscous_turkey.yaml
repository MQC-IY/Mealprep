de:
  title: Puten-Couscous mit grünen Bohnen
  summary: Schnelles Couscousgericht mit Putenhack, grünen Bohnen und Möhren.
en:
  title: Turkey Couscous with Green Beans
  summary: Quick couscous dish with minced turkey, green beans, and carrots.
ingredients:
- de_name: Putenhack
  en_name: Minced turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Couscous
  en_name: Couscous
  qty: 280
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Grüne Bohnen
  en_name: Green beans
  qty: 350
  unit: g
  category: Gemüse und Salat
- de_name: Möhren
  en_name: Carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Zwiebel
  en_name: Onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
