de_steps:
- Hähnchen in Würfel schneiden. Mit Olivenöl, Zitronensaft, Oregano, Paprika, Thymian,
  Chiliflocken und 3 gepressten Knoblauchzehen marinieren. Mindestens 30 Minuten ruhen
  lassen.
- 'Tzatziki: Gurke grob reiben, salzen und gut ausdrücken. Mit Joghurt, 2 gepressten
  Knoblauchzehen, Minze, etwas Olivenöl und Zitronensaft verrühren.'
- 'Choriatiki-Salat: Tomaten, rote Zwiebel und restliche Gurke würfeln. Feta darüber
  bröseln. Mit Olivenöl, Oregano und Salz abschmecken.'
- Hähnchen auf Holzspieße stecken (vorher wässern) und in einer heißen Grillpfanne
  von allen Seiten 8–10 Minuten garen.
- Pita-Brote kurz in der Pfanne oder im Ofen aufwärmen.
- Bowls mit Salat, Hähnchen-Souvlaki und Pita anrichten. Tzatziki großzügig dazu geben.
en_steps:
- Cut chicken into cubes. Marinate with olive oil, lemon juice, oregano, paprika,
  thyme, chilli flakes and 3 pressed garlic cloves. Rest for at least 30 minutes.
- 'Tzatziki: coarsely grate cucumber, salt it and squeeze out well. Mix with yoghurt,
  2 pressed garlic cloves, mint, a little olive oil and lemon juice.'
- 'Choriatiki salad: dice tomatoes, red onion and the remaining cucumber. Crumble
  feta on top. Season with olive oil, oregano and salt.'
- Thread chicken onto wooden skewers (soaked beforehand) and cook in a hot grill pan
  on all sides for 8–10 minutes.
- Warm pita breads briefly in the pan or oven.
- Assemble bowls with salad, chicken Souvlaki and pita. Add tzatziki generously.
