de:
  title: Hähnchen-Souvlaki-Bowl mit Tzatziki
  summary: Griechische Souvlaki-Spieße mit Oregano, Zitrone und Knoblauch, dazu selbst
    gemachter Tzatziki, Choriatiki-Salat und Pitta-Brot.
en:
  title: Chicken Souvlaki Bowl with Tzatziki
  summary: Greek Souvlaki skewers marinated with oregano, lemon and garlic, served
    with homemade tzatziki, a Choriatiki salad and pita bread.
