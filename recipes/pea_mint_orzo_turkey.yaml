de:
  title: Puten-Orzo mit Erbsen und Minze
  summary: Schnelle Orzo-Pfanne mit Putenhack, Erbsen und einer milden Joghurt-Note.
en:
  title: Turkey Orzo with Peas and Mint
  summary: Quick orzo pan with minced turkey, peas and a gentle hint of yogurt.
ingredients:
- de_name: Putenhack
  en_name: minced turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Orzo oder Kritharaki
  en_name: orzo or kritharaki
  qty: 300
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 250
  unit: g
  category: Gemüse und Salat
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 120
  unit: g
  category: Protein und Milchprodukte
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Minze, getrocknet
  en_name: dried mint
  qty: 0.5
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Orzo weich garen.
- Putenhack mit Zwiebel scharf anbraten.
- Erbsen zugeben und kurz mitgaren, etwas Joghurt unterrühren.
en_steps:
- Cook the orzo until tender.
- Sear the minced turkey with the onion until browned.
- Add the peas and cook briefly, then stir in a little yogurt.
