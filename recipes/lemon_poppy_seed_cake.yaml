de_steps:
- Ofen auf 175 °C Ober-/Unterhitze vorheizen. Eine Springform (26 cm) mit Backpapier
  auslegen und die Ränder einfetten.
- Vollkorndinkelmehl, Mohn, Backpulver, Natron und Salz in einer großen Schüssel vermengen.
- Bananen in einer separaten Schüssel zerdrücken. Eier, Joghurt, Honig, geschmolzenes
  Kokosöl, Zitronenschale, Zitronensaft und Vanilleextrakt hinzugeben und cremig verrühren.
- Die feuchten Zutaten zu den trockenen geben und zügig zu einem glatten Teig rühren
  — nicht zu lange rühren, sonst wird der Kuchen zäh.
- Teig in die vorbereitete Form füllen und glattstreichen.
- Im vorgeheizten Ofen 40–45 Minuten backen, bis ein Zahnstocher sauber herauskommt.
- In der Form 15 Minuten abkühlen lassen, dann auf einem Gitter vollständig auskühlen.
  In Stücke schneiden und luftdicht verpackt bis zu 4 Tage aufbewahren.
en_steps:
- Preheat oven to 175 °C top/bottom heat. Line a 26 cm springform tin with baking
  paper and grease the sides.
- Combine whole-wheat spelt flour, poppy seeds, baking powder, baking soda, and salt
  in a large bowl.
- Mash bananas in a separate bowl. Add eggs, yogurt, honey, melted coconut oil, lemon
  zest, lemon juice, and vanilla extract; stir until creamy.
- Add the wet ingredients to the dry and stir quickly into a smooth batter – do not
  over-mix or the cake will be tough.
- Pour batter into the prepared tin and smooth the surface.
- Bake in the preheated oven for 40–45 minutes until a toothpick comes out clean.
- Cool in the tin for 15 minutes, then turn out onto a rack to cool completely. Cut
  into slices and store airtight for up to 4 days.
