id: lemon_poppy_seed_cake
pool: dessert
healthy: true
meals: 8
de:
  title: Zitronen-Mohn-Kuchen mit Vollkornmehl
  summary: Saftiger Zitronen-Mohn-Kuchen aus Vollkorndinkelmehl, gesüßt mit Honig
    und Bananen — ein luftiger Blechkuchen für die ganze Woche.
en:
  title: Lemon Poppy Seed Cake with Wholemeal Flour
  summary: Moist lemon poppy seed cake made with whole-wheat spelt flour, sweetened
    with honey and bananas – a light sheet cake for the whole week.
