de:
  title: Salsiccia-Pasta mit Fenchel und Sahne
  summary: Herzhafte italienische Bratwurst mit karamellisiertem Fenchel, Weißwein
    und Sahne – sämige Pasta, die wirklich satt macht.
en:
  title: Salsiccia Pasta with Fennel and Cream
  summary: Hearty Italian sausage with caramelized fennel, white wine, and cream —
    a rich, satisfying pasta dish.
