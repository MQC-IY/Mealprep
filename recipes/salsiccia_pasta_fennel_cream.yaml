de_steps:
- Salzwasser für die Pasta aufsetzen. Fenchelknollen vierteln, Strunk keilförmig herausschneiden,
  dann in ca. 5 mm dünne Streifen schneiden. Fenchelgrün für die Garnitur aufheben.
  Schalotten fein würfeln, Knoblauch hacken.
- Olivenöl in einer tiefen, breiten Pfanne bei mittelhoher Hitze erhitzen. Salsicciamasse
  hineingeben und mit einem Holzlöffel in grobe Stücke brechen. Kräftig braten, bis
  die Ränder karamellisiert und knusprig sind, ca. 8 Min. Herausnehmen und beiseitestellen.
- Im gleichen Fett Schalotten und Fenchel zufügen. Fenchelsamen und Chiliflocken einrühren.
  Bei mittlerer Hitze 10–12 Min. braten, bis der Fenchel weich und leicht goldbraun
  ist. Knoblauch und Thymian zufügen, 1 Min. mitbraten.
- Weißwein angießen, Röststoffe lösen, auf die Hälfte einkochen lassen, ca. 3 Min.
  Salsiccia zurück in die Pfanne geben. Sahne einrühren, aufkochen, dann bei kleiner
  Hitze 5 Min. sämig einköcheln lassen.
- Rigatoni nach Packungsangabe al dente kochen. 150 ml Nudelkochwasser abschöpfen,
  dann abtropfen. Pasta direkt in die Sauce geben, gut durchschwenken. Bei Bedarf
  Nudelwasser zufügen, damit die Sauce an den Nudeln haftet.
- Vom Herd nehmen, Parmigiano unterrühren. Kräftig mit Salz, Pfeffer und Chiliflocken
  abschmecken. Mit gehacktem Fenchelgrün bestreut sofort servieren.
en_steps:
- Set a large pot of salted water to boil for the pasta. Quarter the fennel bulbs,
  remove the core in a wedge, then slice into thin strips about 5 mm wide. Set aside
  the fennel fronds for garnish. Finely dice the shallots and mince the garlic.
- Heat the olive oil in a wide, deep pan over medium-high heat. Add the Salsiccia
  and break it into rough chunks with a wooden spoon. Fry until the edges are caramelized
  and crispy, about 8 minutes. Remove and set aside.
- Add the shallots and fennel to the same fat. Stir in the fennel seeds and chili
  flakes. Cook over medium heat for 10–12 minutes until the fennel is soft and lightly
  golden. Add the garlic and thyme and cook for 1 minute.
- Pour in the white wine, scrape up any browned bits, and reduce by half, about 3
  minutes. Return the Salsiccia to the pan. Stir in the cream, bring to a boil, then
  simmer over low heat for 5 minutes until the sauce is coating and rich.
- Cook the rigatoni al dente according to package directions. Reserve 150 ml pasta
  cooking water, then drain. Add the pasta directly to the sauce and toss well. Add
  pasta water as needed so the sauce clings to the pasta.
- Remove from the heat and stir in the Parmigiano. Season generously with salt, pepper,
  and chili flakes. Serve immediately, scattered with chopped fennel fronds.
