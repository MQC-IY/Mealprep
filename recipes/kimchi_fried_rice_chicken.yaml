de:
  title: Kimchi-Fried-Rice mit Hähnchen
  summary: Würziger gebratener Reis mit fermentiertem Kimchi, Hähnchen und Gochujang
    – knackig, säuerlich, tief umami und unverwechselbar koreanisch.
en:
  title: Kimchi Fried Rice with Chicken
  summary: Spicy fried rice with fermented kimchi, chicken, and gochujang – crunchy,
    tangy, deeply umami, and unmistakably Korean.
