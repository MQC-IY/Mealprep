de_steps:
- Hähnchen in kleine Würfel (1 cm) schneiden, mit Sojasoße und Pfeffer würzen. Kimchi
  grob hacken.
- Knoblauch fein hacken, Zwiebel fein würfeln.
- Butter und Pflanzenöl in einem Wok bei hoher Hitze erhitzen. Hähnchen 3–4 Minuten
  scharf anbraten. Herausnehmen.
- Zwiebel und Knoblauch im Bratfett 2 Minuten anschwitzen. Kimchi dazugeben und 3
  Minuten anbraten, bis es karamellisiert.
- Gochujang und Kimchi-Flüssigkeit einrühren, 1 Minute braten.
- Kalten Reis dazugeben und bei maximaler Hitze 3–4 Minuten braten. Gochugaru und
  Sesamöl einrühren. Hähnchen zurückgeben.
- Eier als Spiegeleier braten oder separat. Auf dem Kimchi-Reis anrichten, mit Frühlingszwiebeln
  und Sesamkörnern bestreuen.
en_steps:
- Cut chicken into small cubes (1 cm); season with soy sauce and pepper. Roughly chop
  the kimchi.
- Finely chop garlic; finely dice onion.
- Heat butter and vegetable oil in a wok over high heat. Sear chicken for 3–4 minutes.
  Remove.
- Sweat onion and garlic in the cooking fat for 2 minutes. Add kimchi and fry for
  3 minutes until caramelised.
- Stir in gochujang and kimchi liquid; fry for 1 minute.
- Add cold rice and stir-fry over maximum heat for 3–4 minutes. Stir in gochugaru
  and sesame oil. Return chicken.
- Fry eggs sunny-side up or separately. Plate on the kimchi rice and top with spring
  onions and sesame seeds.
