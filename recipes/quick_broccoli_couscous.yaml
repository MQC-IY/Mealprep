de:
  title: Schneller Couscous mit Brokkoli
  summary: Sehr schnelles Couscousgericht mit Brokkoli, Bohnen und Joghurt.
en:
  title: Quick Broccoli Couscous
  summary: A very quick couscous dish with broccoli, white beans, and yogurt — fresh
    and satisfying.
