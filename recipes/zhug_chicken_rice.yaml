de:
  title: Hähnchen mit Grünem Zhug und Basmati
  summary: Jemenitische feurige grüne Chilisauce Zhug – blitzschnell aus Koriander,
    Jalapeño, Kardamom und Kreuzkümmel gemacht – als Marinade und Sauce für saftiges
    Hähnchen auf Basmati.
en:
  title: Chicken with Green Zhug and Basmati
  summary: Yemeni fiery green chili sauce zhug — blitzed from coriander, jalapeño,
    cardamom, and cumin — used as both marinade and sauce for juicy chicken on basmati
    rice.
