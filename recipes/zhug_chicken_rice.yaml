de_steps:
- 'Zhug: Koriander, Petersilie, Jalapeño (ohne Kerne für mittlere Schärfe), Knoblauch,
  Zitronensaft, Olivenöl, Kreuzkümmel, Kardamom, Koriander gemahlen und Salz im Mixer
  pulsierend zu einer groben Sauce verarbeiten.'
- Hähnchen einschneiden und mit 3 EL des Zhugs einreiben. Mind. 20 Minuten marinieren.
- Reis nach Packungsanweisung garen.
- Hähnchen in einer heißen Grillpfanne von jeder Seite 6–7 Minuten garen, bis es schöne
  Röstaromen hat.
- Tomaten würfeln und mit Chiliflocken und etwas Zitronensaft abschmecken.
- Reis in Bowls geben, Hähnchen in Scheiben schneiden, anrichten. Restlichen Zhug
  großzügig darüber geben, Tomaten daneben.
en_steps:
- 'Zhug: pulse the coriander, parsley, jalapeño (seeds removed for medium heat), garlic,
  lemon juice, olive oil, ground cumin, cardamom, ground coriander, and salt in a
  blender to a coarse sauce.'
- Score the chicken and rub with 3 tbsp of the zhug. Marinate for at least 20 minutes.
- Cook the rice according to package instructions.
- Grill the chicken in a hot griddle pan for 6–7 minutes per side until nicely charred
  and cooked through.
- Dice the tomatoes and season with chili flakes and a little lemon juice.
- Spoon rice into bowls, slice the chicken and arrange on top. Drizzle generously
  with the remaining zhug and add the tomatoes alongside.
