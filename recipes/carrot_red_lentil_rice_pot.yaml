id: carrot_red_lentil_rice_pot
pool: lunch
healthy: true
quick: true
next_day: true
quick_minutes: 30
meals: 3
de:
  title: Möhren-Linsen-Reis-Topf
  summary: Milder Topf mit roten Linsen, Reis, Möhren und leichter Tomatenbasis.
en:
  title: Carrot, Red Lentil and Rice Pot
  summary: A mild one-pot with red lentils, rice, carrots, and a light tomato base.
ingredients:
- de_name: Rote Linsen
  en_name: red lentils
  qty: 220
  unit: g
  category: Konserven und Vorrat
- de_name: Reis
  en_name: rice
  qty: 220
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Möhren
  en_name: carrots
  qty: 4
  unit: Stk
  category: Gemüse und Salat
- de_name: Passierte Tomaten
  en_name: strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Currypulver
  en_name: curry powder
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Zwiebel und Möhren in Olivenöl anschwitzen.
- Linsen, Reis und Tomaten zugeben und mit Wasser weich köcheln.
- Bei Bedarf etwas Wasser nachgießen.
en_steps:
- Sauté the onion and carrots in olive oil until softened.
- Add the lentils, rice, and tomatoes and simmer with water until tender.
- Add a little more water if needed.
