de_steps:
- Jasminreis waschen.
- Rindfleisch in 4-cm-Stücke schneiden. In kochendem Wasser 5 Minuten blanchieren,
  abgießen und abspülen.
- Daikon schälen und in 3-cm-Stücke schneiden. Ingwer in Scheiben, Knoblauch andrücken.
- Öl im Schmortopf erhitzen. Rindfleisch 4–5 Minuten von allen Seiten bräunen.
- Knoblauch, Ingwer, Sternanis, Zimtstange und Szechuanpfeffer zugeben und 1 Minute
  mitrösten.
- Shaoxing-Wein angießen und kurz aufkochen. Sojasauce, dunkle Sojasauce, braunen
  Zucker und Brühe zugeben.
- Aufkochen, dann 60 Minuten bei kleiner Hitze zugedeckt schmoren.
- Daikon zugeben und weitere 30 Minuten köcheln, bis er weich und durchdrungen ist.
- Chiliflocken einrühren und kräftig abschmecken. Mit Jasminreis und Frühlingszwiebeln
  servieren.
en_steps:
- Wash the jasmine rice.
- Cut the beef into 4-cm pieces. Blanch in boiling water for 5 minutes, drain and
  rinse.
- Peel the daikon and cut into 3-cm pieces. Slice the ginger and crush the garlic.
- Heat the oil in a braising pot. Brown the beef on all sides for 4–5 minutes.
- Add the garlic, ginger, star anise, cinnamon stick, and Sichuan pepper and toast
  for 1 minute.
- Pour in the Shaoxing wine and bring to a boil. Add the soy sauce, dark soy sauce,
  brown sugar, and stock.
- Bring to a boil, then braise covered over low heat for 60 minutes.
- Add the daikon and simmer for a further 30 minutes until it is soft and has absorbed
  the flavours.
- Stir in the chili flakes and season boldly. Serve with jasmine rice and spring onions.
