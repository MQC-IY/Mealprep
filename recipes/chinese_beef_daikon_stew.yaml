de:
  title: Chinesischer Rindfleischeintopf mit Daikon
  summary: Langsam geschmortes Rindfleisch mit Daikon-Rettich, Sternanis und Shaoxing-Wein
    – ein tief würziger, wärmender chinesischer Eintopf.
en:
  title: Chinese Beef and Daikon Stew
  summary: Slowly braised beef with daikon radish, star anise, and Shaoxing wine —
    a deeply savoury, warming Chinese stew.
