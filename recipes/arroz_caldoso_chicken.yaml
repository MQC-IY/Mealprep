de_steps:
- Safranfäden in 4 EL heißer Brühe einweichen. Hähnchenstücke mit Salz, Pfeffer und
  1 TL Pimentón würzen.
- Olivenöl in einem großen Topf bei starker Hitze erhitzen. Hähnchenstücke rundherum
  5–6 Minuten kräftig anbraten. Herausnehmen.
- Zwiebel, Knoblauch und Karotte fein würfeln. Im Bratfett bei mittlerer Hitze 6 Minuten
  anschwitzen. Paprika in kleine Stücke schneiden und 4 Minuten mitschmoren.
- Tomaten fein würfeln (oder gerieben) einrühren. Restlichen Pimentón, Kreuzkümmel
  und Lorbeer dazugeben. Den Sofrito 5 Minuten einköcheln.
- Reis einrühren, 2 Minuten im Sofrito rösten.
- Heiße Brühe und Safranwasser angießen. Hähnchenstücke zurücklegen. Aufkochen, dann
  bei mittlerer bis niedriger Hitze 18–20 Minuten köcheln.
- 'Lorbeer entfernen. Konsistenz prüfen: Bei Bedarf mehr Brühe nachgießen. Cremig-suppig
  ist das Ziel.'
- Mit Salz abschmecken. Mit frischer Petersilie und Zitronenspalten servieren – sofort
  essen, da der Reis sonst weiterquillt.
en_steps:
- Steep saffron threads in 4 tbsp hot stock. Season chicken pieces with salt, pepper,
  and 1 tsp pimentón.
- Heat olive oil in a large pot over high heat. Brown chicken pieces all over for
  5–6 minutes. Remove.
- Finely dice onion, garlic, and carrot. Sweat in the cooking fat over medium heat
  for 6 minutes. Cut bell pepper into small pieces and cook for a further 4 minutes.
- Stir in finely diced (or grated) tomatoes. Add remaining pimentón, cumin, and bay
  leaves. Simmer the sofrito for 5 minutes.
- Stir in rice and toast in the sofrito for 2 minutes.
- Pour in hot stock and saffron water. Return chicken pieces. Bring to the boil, then
  simmer on medium-low heat for 18–20 minutes.
- 'Remove bay leaves. Check consistency: add more stock if needed. The goal is creamy
  and soupy.'
- Season with salt. Serve immediately with fresh parsley and lemon wedges — the rice
  will continue to absorb liquid if left to sit.
