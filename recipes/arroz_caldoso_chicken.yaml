de:
  title: Spanischer Arroz Caldoso mit Hähnchen
  summary: Spanischer 'nasser Reis' – supiger Reiseintopf mit Hähnchen, Pimentón ahumado,
    Safran und Gemüse – nicht Paella, nicht Suppe, sondern etwas Eigenes.
en:
  title: Spanish Arroz Caldoso with Chicken
  summary: Spanish 'wet rice' — a soupy rice stew with chicken, smoked pimentón, saffron,
    and vegetables. Not quite paella, not quite soup, but something beautifully its
    own.
