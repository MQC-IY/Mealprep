de_steps:
- Fladenbrote in Stücke reißen, mit Olivenöl beträufeln und bei 200 °C ca. 8 Minuten
  goldbraun und knusprig backen.
- Hähnchen würfeln. Mit Kreuzkümmel, Koriander, Paprika, Zimt, Chiliflocken und 2
  Knoblauchzehen würzen. In Olivenöl scharf anbraten.
- Kichererbsen abgießen, kurz in der Pfanne mit etwas Öl und Kreuzkümmel durchschwenken.
- 'Joghurt-Sauce: Joghurt mit Tahini, Saft einer Zitrone, 2 Knoblauchzehen (gepresst),
  Salz und 2 EL Wasser cremig verrühren.'
- Pinienkerne in einer trockenen Pfanne goldbraun rösten.
- 'Bowls aufbauen: Fladenbrot-Chips als Basis, Kichererbsen darüber, Hähnchen obenauf,
  Joghurt-Tahini-Sauce großzügig verteilen. Mit Petersilie, Pinienkernen, Sumach und
  Chiliflocken bestreuen.'
en_steps:
- Tear the flatbreads into pieces, drizzle with olive oil, and bake at 200 °C for
  about 8 minutes until golden and crispy.
- Cut the chicken into cubes. Season with cumin, coriander, paprika, cinnamon, chili
  flakes, and 2 garlic cloves. Sear in olive oil over high heat.
- Drain the chickpeas and toss briefly in a pan with a little oil and cumin.
- 'Yogurt sauce: whisk the yogurt with tahini, the juice of one lemon, 2 pressed garlic
  cloves, salt, and 2 tbsp water until creamy.'
- Toast the pine nuts in a dry pan until golden.
- 'Build the bowls: flatbread chips as the base, chickpeas on top, chicken over that,
  then spoon over the yogurt-tahini sauce generously. Finish with parsley, pine nuts,
  sumac, and chili flakes.'
