de:
  title: Libanesische Fatteh-Bowl mit Kichererbsen
  summary: 'Klassische libanesische Fatteh: Knuspriges Fladenbrot, Kichererbsen, würziges
    Hähnchen, Joghurt-Tahini-Sauce und geröstete Pinienkerne.'
en:
  title: Lebanese Fatteh Bowl with Chickpeas
  summary: 'Classic Lebanese Fatteh: crispy toasted flatbread, chickpeas, spiced chicken,
    a yogurt-tahini sauce, and toasted pine nuts.'
