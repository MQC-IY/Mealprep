de:
  title: Pozole Rojo – Mexikanischer Hähncheneintopf mit Hominy
  summary: Kräftiger mexikanischer Eintopf mit gegarten Maiskörnern (Hominy), zartem
    Hähnchen und einer tiefen Ancho-Guajillo-Chili-Brühe.
en:
  title: Pozole Rojo – Mexican Chicken Stew with Hominy
  summary: A robust Mexican stew with hominy, tender shredded chicken, and a deep
    ancho-guajillo chili broth — rich, warming, and deeply satisfying.
