de_steps:
- Hähnchen zusammen mit 1 halbierten Zwiebel, 3 Knoblauchzehen und etwas Salz in der
  Hühnerbrühe 25 Minuten gar köcheln. Hähnchen herausnehmen, abkühlen lassen und in
  Fasern zupfen. Brühe durch ein Sieb gießen und aufbewahren.
- Restliche Zwiebel fein würfeln, restlichen Knoblauch hacken. Öl in einem großen
  Topf erhitzen und Zwiebeln 5 Minuten anbraten.
- Knoblauch, Ancho-Chilipulver, Guajillo-Chilipulver, Kreuzkümmel und Oregano zugeben
  und 1 Minute rösten.
- Gehackte Tomaten einrühren, kurz aufkochen lassen, dann die gefilterte Brühe zugießen.
- Abgetropfte Hominy-Körner zugeben und alles 20 Minuten bei mittlerer Hitze köcheln
  lassen.
- Gezupftes Hähnchen zurück in den Topf geben, 5 Minuten erwärmen. Mit Salz, Limettensaft
  und Chili abschmecken.
- In tiefen Schüsseln servieren, garniert mit frischem Koriander und Limettenspalten.
en_steps:
- Simmer the chicken with 1 halved onion, 3 garlic cloves, and a pinch of salt in
  the chicken broth for 25 minutes until cooked through. Remove the chicken, let it
  cool, then shred into pieces. Strain the broth and set aside.
- Finely dice the remaining onion and chop the remaining garlic. Heat oil in a large
  pot and sauté the onion for 5 minutes.
- Add the garlic, ancho chili powder, guajillo chili powder, cumin, and oregano, and
  toast for 1 minute.
- Stir in the chopped tomatoes, bring to a brief boil, then pour in the strained broth.
- Add the drained hominy and simmer everything over medium heat for 20 minutes.
- Return the shredded chicken to the pot and heat through for 5 minutes. Season with
  salt, lime juice, and chili to taste.
- Serve in deep bowls, garnished with fresh cilantro and lime wedges.
