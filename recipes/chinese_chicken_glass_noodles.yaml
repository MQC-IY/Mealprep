de:
  title: Chinesisches Hähnchen mit Glasnudeln
  summary: Zarte Hähnchenstücke mit Glasnudeln, Pilzen und Gemüse in einer würzigen
    Soja-Ingwer-Sauce – schnell und sättigend.
en:
  title: Chinese Chicken with Glass Noodles
  summary: Tender chicken strips with glass noodles, mushrooms, and vegetables in
    a savory soy-ginger sauce – quick, filling, and full of flavour.
