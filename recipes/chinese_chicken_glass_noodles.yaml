de_steps:
- Getrocknete Shiitake-Pilze in 200 ml warmem Wasser 20 Minuten einweichen. Einweichwasser
  aufbewahren. Pilze in Scheiben schneiden.
- Glasnudeln in heißem Wasser 5 Minuten einweichen, abgießen.
- Hähnchen in dünne Streifen schneiden. Mit 1 EL Sojasauce, Stärke und Shaoxing-Wein
  (1 EL) 15 Minuten marinieren.
- Möhren in feine Stifte, Knoblauch und Ingwer fein hacken.
- Öl im Wok erhitzen. Hähnchen 3–4 Minuten scharf braten. Knoblauch und Ingwer zugeben.
- Pilze und Möhren zugeben, 2 Minuten mitbraten.
- Restlichen Shaoxing-Wein, Sojasauce, dunkle Sojasauce, Austernsauce, Hühnerbrühe
  und Pilzeinweichwasser (gefiltert) zugeben.
- Glasnudeln einrühren und 3–4 Minuten bei mittlerer Hitze köcheln, bis sie die Sauce
  aufgesogen haben.
- Mit Pfeffer abschmecken. Sesamöl, Frühlingszwiebeln und Chili unterheben.
en_steps:
- Soak the dried shiitake mushrooms in 200 ml warm water for 20 minutes. Reserve the
  soaking liquid. Slice the mushrooms.
- Soak the glass noodles in hot water for 5 minutes, then drain.
- Cut the chicken into thin strips. Marinate with 1 tbsp soy sauce, cornstarch, and
  1 tbsp Shaoxing wine for 15 minutes.
- Cut the carrots into fine matchsticks. Finely chop the garlic and ginger.
- Heat the oil in a wok. Stir-fry the chicken for 3–4 minutes. Add the garlic and
  ginger.
- Add the mushrooms and carrots and stir-fry for 2 minutes.
- Add the remaining Shaoxing wine, soy sauce, dark soy sauce, oyster sauce, chicken
  stock, and filtered mushroom soaking liquid.
- Stir in the glass noodles and simmer over medium heat for 3–4 minutes until they
  have absorbed the sauce.
- Season with pepper. Fold in the sesame oil, spring onions, and chilli.
