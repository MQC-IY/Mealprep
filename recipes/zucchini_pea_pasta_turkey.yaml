de:
  title: Puten-Pasta mit Zucchini und Erbsen
  summary: Schnelles Nudelgericht mit Putenhack, Zucchini, Erbsen und milder Sauce.
en:
  title: Turkey Pasta with Zucchini and Peas
  summary: A quick pasta dish with ground turkey, zucchini, peas, and a mild cream
    cheese sauce.
