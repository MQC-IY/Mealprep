quick_minutes: 25
meals: 3
de:
  title: Puten-Pasta mit Zucchini und Erbsen
  summary: Schnelles Nudelgericht mit Putenhack, Zucchini, Erbsen und milder Sauce.
en:
  title: Turkey Pasta with Zucchini and Peas
  summary: A quick pasta dish with ground turkey, zucchini, peas, and a mild cream
    cheese sauce.
ingredients:
- de_name: Vollkornnudeln
  en_name: Whole-wheat pasta
  qty: 320
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Putenhack
  en_name: Ground turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Zucchini
  en_name: Zucchini
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Erbsen, TK
  en_name: Peas, frozen
  qty: 200
  unit: g
  category: Gemüse und Salat
- de_name: Frischkäse natur
  en_name: Plain cream cheese
  qty: 100
  unit: g
  category: Protein und Milchprodukte
- de_name: Zwiebel
  en_name: Onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: Chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Nudeln weich kochen.
- Putenhack mit Zwiebel scharf anbraten.
- Zucchini und Erbsen weich garen, Frischkäse unterrühren.
en_steps:
- Cook the pasta until tender.
- Brown the ground turkey with the onion over high heat.
- Cook the zucchini and peas until tender, then stir in the cream cheese.
