de_steps:
- Jasminreis waschen und kochen.
- Tofu in 1-cm-Scheiben schneiden, mit Küchenpapier trocken tupfen.
- Schweinefleisch in dünne Streifen schneiden. Mit 1 EL Sojasauce, 1 EL Shaoxing-Wein,
  Stärke (1 EL) und Pfeffer 15 Minuten marinieren.
- 2 EL Öl in einer Pfanne oder Wok erhitzen. Tofu-Scheiben von beiden Seiten je 3
  Minuten goldbraun braten. Herausnehmen.
- Restliches Öl erhitzen. Schweinefleisch 3–4 Minuten scharf anbraten. Knoblauch und
  Ingwer zugeben.
- Paprika zugeben und 2 Minuten mitbraten.
- Austernsauce, restliche Sojasauce, dunkle Sojasauce, restlichen Shaoxing-Wein, Brühe
  und restliche Stärke (in Wasser) zugeben.
- Gebratenen Tofu zurückgeben, vorsichtig unterheben. 2 Minuten köcheln.
- Sesamöl und Frühlingszwiebeln zugeben. Mit Chiliflocken bestreuen und mit Reis servieren.
en_steps:
- Rinse and cook the jasmine rice.
- Cut the tofu into 1 cm slices and pat dry with paper towels.
- Cut the pork into thin strips. Marinate with 1 tbsp soy sauce, 1 tbsp Shaoxing wine,
  1 tbsp cornstarch, and pepper for 15 minutes.
- Heat 2 tbsp oil in a pan or wok. Fry the tofu slices for 3 minutes per side until
  golden. Remove and set aside.
- Heat the remaining oil. Stir-fry the pork for 3–4 minutes over high heat. Add the
  garlic and ginger.
- Add the bell pepper and stir-fry for 2 minutes.
- Add the oyster sauce, remaining soy sauce, dark soy sauce, remaining Shaoxing wine,
  stock, and remaining cornstarch dissolved in water.
- Return the fried tofu and gently fold it in. Simmer for 2 minutes.
- Add the sesame oil and spring onions. Sprinkle with chili flakes and serve with
  rice.
