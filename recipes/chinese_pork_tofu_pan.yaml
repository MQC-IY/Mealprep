de:
  title: Schweinefleisch-Tofu-Pfanne mit Austernsauce
  summary: Kräftiges Wokgericht mit angebratenem festem Tofu, Schweinefleischstreifen,
    Frühlingszwiebeln und reichhaltiger Austernsauce-Glasur.
en:
  title: Pork and Tofu Stir-Fry with Oyster Sauce
  summary: A bold wok dish with crispy-fried firm tofu, pork strips, spring onions,
    and a rich oyster sauce glaze.
