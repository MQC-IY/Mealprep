de_steps:
- Entenbrustfilets aus dem Kühlschrank nehmen und 30 Minuten auf Raumtemperatur bringen.
  Die Haut mit einem scharfen Messer rautenförmig einritzen (nicht durch das Fleisch
  schneiden). Beidseitig großzügig salzen und pfeffern.
- Entenbrüste mit der Hautseite nach unten in eine kalte, trockene Pfanne legen und
  bei mittlerer Hitze aufstellen. Langsam (ca. 12–14 Minuten) das Fett ausbraten,
  bis die Haut tiefgoldbraun und knusprig ist. Überschüssiges Fett zwischendurch abschöpfen
  und aufbewahren.
- Entenbrüste wenden und auf der Fleischseite 3–4 Minuten fertig braten (Kerntemperatur
  58–62 °C für medium). Aus der Pfanne nehmen und 8 Minuten abgedeckt ruhen lassen.
- Kartoffeln schälen, würfeln und in gesalzenem Wasser weich kochen (ca. 20 Minuten).
  Abgießen, ausdämpfen lassen, durch eine Kartoffelpresse drücken. Heiße Milch und
  Butter einarbeiten, mit Salz, Pfeffer und Muskatnuss abschmecken.
- Bratenfett aus der Pfanne abgießen (1 EL zurücklassen). Schalotten fein würfeln
  und 2 Minuten anschwitzen. Zucker zugeben und leicht karamellisieren. Mit Rotwein
  ablöschen und auf die Hälfte einkochen.
- Fond, Kirschen mit Kirschsaft, Thymian und Lorbeer zugeben. Bei mittlerer Hitze
  10–12 Minuten köcheln, bis die Sauce sämig wird. Thymian und Lorbeer entfernen,
  mit Salz und Pfeffer abschmecken.
- Entenbrüste schräg in Scheiben schneiden. Kartoffelpüree auf vorgewärmten Tellern
  anrichten, Entenscheiben darauflegen, Kirschen-Rotweinsauce großzügig angießen und
  sofort servieren.
en_steps:
- Take the duck breasts out of the fridge and bring to room temperature for 30 minutes.
  Score the skin in a crosshatch pattern with a sharp knife (do not cut through to
  the flesh). Season generously on both sides with salt and pepper.
- Place the duck breasts skin-side down in a cold, dry pan and set over medium heat.
  Slowly render the fat for about 12–14 minutes until the skin is deep golden and
  crispy, skimming off excess fat as you go.
- Turn the duck breasts and cook the flesh side for 3–4 minutes (internal temperature
  58–62 °C for medium). Remove from the pan and rest covered for 8 minutes.
- Peel and cube the potatoes; boil in salted water until tender (about 20 minutes).
  Drain and steam dry, then press through a potato ricer. Work in hot milk and butter;
  season with salt, pepper, and nutmeg.
- Pour off the fat from the pan (leaving 1 tbsp). Finely dice the shallots and sweat
  for 2 minutes. Add the sugar and lightly caramelise. Deglaze with the red wine and
  reduce by half.
- Add the stock, cherries with their juice, thyme, and bay leaves. Simmer over medium
  heat for 10–12 minutes until the sauce is syrupy. Remove the thyme and bay leaves;
  season with salt and pepper.
- Slice the duck breasts diagonally. Plate the mashed potato on warmed plates, lay
  the duck slices on top, pour the cherry-red wine sauce generously over, and serve
  immediately.
