de:
  title: Knusprige Ente mit Kirschen-Rotweinsauce und Kartoffelpüree
  summary: Kross gebratene Entenbrust mit einer tiefen Rotweinsauce aus Sauerkirschen,
    dazu samtiges Kartoffelpüree – ein Festessen, das direkt nach dem Ruhen serviert
    werden muss.
en:
  title: Crispy Duck Breast with Cherry-Red Wine Sauce and Mashed Potato
  summary: Beautifully crisp-skinned duck breast with a deep red wine and sour cherry
    sauce, served with velvety mashed potato — a special occasion dish that must be
    served straight after resting.
