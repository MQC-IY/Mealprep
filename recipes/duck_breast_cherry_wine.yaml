de:
  title: Knusprige Ente mit Kirschen-Rotweinsauce und Kartoffelpüree
  summary: |-
    Kross gebratene Entenbrust mit einer tiefen Rotweinsauce aus Sauerkirschen, dazu samtiges Kartoffelpüree – ein Festessen, das direkt nach dem Ruhen serviert werden muss.
