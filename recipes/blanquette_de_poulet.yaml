de:
  title: Hähnchen-Blanquette mit Champignons
  summary: Cremige weiße Hähnchen-Blanquette nach französischer Art mit Champignons,
    Sahne, Estragon und einem Schuss Weißwein.
en:
  title: Blanquette de Poulet with Mushrooms
  summary: Creamy white chicken blanquette in the French style with mushrooms, cream,
    tarragon, and a splash of white wine.
