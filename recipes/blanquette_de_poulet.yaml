de_steps:
- Hähnchenbrustfilet in gleichmäßige Stücke (ca. 4 cm) schneiden. Karotte würfeln,
  Zwiebel halbieren, Knoblauch andrücken.
- Hähnchen, Karotte, Zwiebel, Knoblauch und Lorbeer in die Brühe mit Weißwein geben.
  Sanft aufkochen und bei niedriger Hitze 20 Minuten pochieren. Hähnchen herausnehmen,
  Brühe durch ein Sieb gießen und aufheben.
- Butter in einem Topf bei mittlerer Hitze schmelzen. Champignons in Scheiben schneiden
  und 5 Minuten goldbraun anbraten. Herausnehmen.
- In der gleichen Butter Mehl einrühren und 1–2 Minuten hellgelb anschwitzen (helle
  Mehlschwitze).
- Nach und nach die aufgehobene Pochierbrühe einrühren, bis eine glatte Sauce entsteht.
  Sahne einrühren, aufkochen lassen.
- Dijon-Senf, Zitronensaft und Muskatnuss einrühren. Hähnchenstücke und Champignons
  zurücklegen.
- Fein gehackten Estragon einrühren. Mit Salz und Pfeffer abschmecken. 5 Minuten sanft
  erhitzen.
- Mit Reis, Eiernudeln oder Dampfkartoffeln servieren.
en_steps:
- Cut chicken breast into even pieces (about 4 cm). Dice carrot, halve onion, crush
  garlic.
- Place chicken, carrot, onion, garlic, and bay leaves in the stock with white wine.
  Bring gently to the boil and poach on low heat for 20 minutes. Remove chicken, strain
  broth through a sieve and reserve.
- Melt butter in a pot over medium heat. Slice mushrooms and fry until golden, about
  5 minutes. Remove.
- Stir flour into the same butter and cook for 1–2 minutes to make a pale roux.
- Gradually whisk in the reserved poaching broth until a smooth sauce forms. Stir
  in cream and bring to the boil.
- Stir in Dijon mustard, lemon juice, and nutmeg. Return chicken pieces and mushrooms.
- Stir in finely chopped tarragon. Season with salt and pepper. Heat gently for 5
  minutes.
- Serve with rice, egg noodles, or steamed potatoes.
