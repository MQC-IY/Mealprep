de:
  title: Bœuf Bourguignon-inspirierter Hähncheneintopf
  summary: 'Der Geist des Bourguignon in einem schnelleren Hähnchenschmortopf: Rotwein,
    Champignons, Karotten, Perlzwiebeln und frischer Thymian.'
en:
  title: Boeuf Bourguignon-Inspired Chicken Stew
  summary: 'The soul of a Bourguignon in a quicker chicken braise: red wine, mushrooms,
    carrots, pearl onions, and fresh thyme.'
