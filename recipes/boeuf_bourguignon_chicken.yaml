de_steps:
- Hähnchenschenkel salzen und pfeffern, mit Mehl bestäuben.
- Öl und die Hälfte der Butter in einem Schmortopf erhitzen. Hähnchen von beiden Seiten
  5 Minuten stark anbraten. Herausnehmen.
- Speck im gleichen Topf 3 Minuten auslassen. Perlzwiebeln dazugeben, 5 Minuten braten.
  Karotten in Scheiben und Knoblauch (gehackt) einrühren.
- Tomatenmark einrühren, kurz rösten. Mit Rotwein ablöschen, kräftig aufkochen und
  5 Minuten stark einkochen.
- Brühe, Thymian, Rosmarin und Lorbeer dazugeben. Hähnchen zurücklegen. Zugedeckt
  bei niedriger Hitze 45 Minuten schmoren.
- Champignons in der restlichen Butter bei starker Hitze 5 Minuten goldbraun anbraten.
  Beiseitestellen.
- Hähnchen herausnehmen. Kräuterzweige und Lorbeer entfernen. Sauce ggf. offen einkochen,
  bis sie sämig ist.
- Champignons einrühren, Hähnchen zurücklegen. Mit Kartoffelpüree oder Eiernudeln
  servieren.
en_steps:
- Season chicken thighs with salt and pepper; dust with flour.
- Heat oil and half the butter in a braising pot. Brown chicken on both sides for
  5 minutes over high heat. Remove.
- Render bacon in the same pot for 3 minutes. Add pearl onions and fry for 5 minutes.
  Stir in sliced carrots and chopped garlic.
- Stir in tomato paste and toast briefly. Deglaze with red wine, bring to a vigorous
  boil, and reduce for 5 minutes.
- Add stock, thyme, rosemary, and bay leaves. Return chicken. Cover and braise on
  low heat for 45 minutes.
- In the remaining butter, fry mushrooms over high heat for 5 minutes until golden.
  Set aside.
- Remove chicken. Discard herb sprigs and bay leaves. If needed, reduce sauce uncovered
  until glossy.
- Stir in mushrooms, return chicken. Serve with mashed potatoes or egg noodles.
