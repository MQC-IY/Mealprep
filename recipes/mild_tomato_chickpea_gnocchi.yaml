de_steps:
- Gnocchi weich garen.
- Tomaten und Kichererbsen kurz köcheln lassen.
- Spinat unterheben und Gnocchi untermischen.
en_steps:
- Cook the gnocchi until tender.
- Simmer the tomatoes and chickpeas briefly.
- Fold in the spinach and stir in the gnocchi.
