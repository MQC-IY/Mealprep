de:
  title: Kichererbsen-Gnocchi in Tomatensauce
  summary: Sehr schnelle Gnocchi mit Kichererbsen und milder Tomaten-Basilikum-Sauce.
en:
  title: Chickpea Gnocchi in Tomato Sauce
  summary: Super-quick gnocchi with chickpeas in a mild tomato and basil sauce.
ingredients:
- de_name: Gnocchi
  en_name: Gnocchi
  qty: 800
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Kichererbsen
  en_name: Chickpeas
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Passierte Tomaten
  en_name: Strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Blattspinat
  en_name: Baby spinach
  qty: 120
  unit: g
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Basilikum
  en_name: Basil
  qty: 1
  unit: TL
  category: Gewürze
