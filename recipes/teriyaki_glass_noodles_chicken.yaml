de_steps:
- Glasnudeln nach Packungsanweisung in heißem Wasser einweichen, abgießen.
- 'Teriyaki-Sauce: Sojasauce, Honig, Reisessig und Sesamöl verrühren.'
- Hähnchen in Scheiben schneiden. In heißem Rapsöl im Wok scharf anbraten, herausnehmen.
- Möhren in Julienne, Paprika in Streifen schneiden. Im heißen Wok mit Knoblauch und
  Ingwer 3–4 Minuten anbraten.
- Zuckerschoten zugeben, 2 Minuten mitbraten. Hähnchen und Glasnudeln zurück in den
  Wok geben.
- Teriyaki-Sauce zugießen, alles 2 Minuten gut durchschwenken bis alles glasiert ist.
  Mit Chiliflocken, Sesam und Frühlingszwiebeln bestreuen.
en_steps:
- Soak glass noodles in hot water according to package instructions; drain.
- 'Teriyaki sauce: whisk together soy sauce, honey, rice vinegar and sesame oil.'
- Slice chicken. Sear in hot rapeseed oil in the wok; remove.
- Cut carrots into julienne strips, bell pepper into strips. Stir-fry in the hot wok
  with garlic and ginger for 3–4 minutes.
- Add sugar snap peas and fry for 2 minutes. Return chicken and glass noodles to the
  wok.
- Pour in Teriyaki sauce and toss everything together for 2 minutes until fully glazed.
  Sprinkle with chilli flakes, sesame seeds and spring onions.
