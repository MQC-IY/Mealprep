de:
  title: Hähnchen-Teriyaki mit Glasnudeln
  summary: Schnelles Wok-Gericht mit glasiertem Hähnchen, Glasnudeln, Zuckerschoten,
    Möhren und selbst gemachter Teriyaki-Sauce – asiatischer Wochentag-Klassiker.
en:
  title: Chicken Teriyaki with Glass Noodles
  summary: A quick wok dish with glazed chicken, glass noodles, sugar snap peas, carrots
    and homemade Teriyaki sauce – a weeknight Asian classic.
