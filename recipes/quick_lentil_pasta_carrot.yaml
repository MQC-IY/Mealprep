de:
  title: Schnelle Linsen-Pasta mit Möhren
  summary: Schnelles Nudelgericht mit roten Linsen, Möhren und würziger Tomatensauce.
en:
  title: Quick Lentil Pasta with Carrots
  summary: A quick pasta dish with red lentils, carrots, and a spiced tomato sauce
    — wholesome and satisfying.
ingredients:
- de_name: Vollkornnudeln
  en_name: Whole-wheat pasta
  qty: 320
  unit: g
