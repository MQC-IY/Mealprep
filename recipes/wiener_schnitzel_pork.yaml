de:
  title: Schweineschnitzel Wiener Art mit Gurkensalat
  summary: Hauchdünne, goldbraune panierte Schweineschnitzel nach Wiener Art, schwimmend
    in Butterschmalz gebraten, mit cremigem Gurkensalat in saurer Sahne – klassisch
    und unwiderstehlich.
en:
  title: Wiener Schnitzel (Pork) with Cucumber Salad
  summary: Paper-thin golden-fried Wiener Schnitzel from pork, cooked swimming in
    clarified butter, paired with a creamy sour cream cucumber salad — classic and
    irresistible.
