de:
  title: Schweineschnitzel Wiener Art mit Gurkensalat
  summary: |-
    Hauchdünne, goldbraune panierte Schweineschnitzel nach Wiener Art, schwimmend in Butterschmalz gebraten, mit cremigem Gurkensalat in saurer Sahne – klassisch und unwiderstehlich.
