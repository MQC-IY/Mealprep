de_steps:
- 'Gurkensalat vorbereiten: Gurken hauchdünn hobeln oder aufschneiden. Mit 1 TL Salz
  mischen und 15 Minuten ziehen lassen, dann fest ausdrücken. Zwiebel in feine Ringe
  schneiden. Saure Sahne, Essig, Zucker, Dill (fein gehackt), weißer Pfeffer und etwas
  Salz verrühren. Gurken und Zwiebeln einmengen, kalt stellen.'
- Schweinefleisch quer zur Faser in ca. 1 cm dicke Scheiben schneiden (insgesamt 8
  Schnitzel). Jedes Schnitzel zwischen Frischhaltefolie legen und mit dem Plattierer
  auf 3–4 mm klopfen. Ringsum die Sehnen einschneiden, damit sich die Schnitzel nicht
  wölben.
- 'Drei flache Teller bereitstellen: Teller 1 mit Mehl, Teller 2 mit verquirlten Eiern
  (mit Salz und Pfeffer), Teller 3 mit Semmelbröseln. Jedes Schnitzel zuerst im Mehl
  wenden, dann durch das Ei ziehen, dann locker in den Semmelbröseln wälzen – NICHT
  andrücken, damit die Panade beim Braten souffliert.'
- Butterschmalz in einer großen, tiefen Pfanne auf ca. 170 °C erhitzen (Schnitzel
  soll schwimmend braten). Das Fett ist heiß genug, wenn ein Brotkrümel sofort aufsteigt
  und goldbraun wird.
- Schnitzel einzeln (oder höchstens zwei gleichzeitig) einlegen. Pfanne während des
  Bratens leicht schwenken, damit das heiße Fett über die Schnitzel schwappt. Pro
  Seite 2–3 Minuten braten, bis die Panade tiefsatt goldgelb ist.
- Schnitzel auf Küchenpapier kurz abtropfen lassen. NIEMALS stapeln. Sofort mit einer
  Zitronenspalte und dem Gurkensalat servieren – eine Minute Warten lässt die knusprige
  Panade erweichen.
en_steps:
- 'Prepare the cucumber salad: slice the cucumbers paper-thin. Toss with 1 tsp salt
  and leave for 15 minutes, then squeeze out firmly. Slice the onion into thin rings.
  Stir together the sour cream, vinegar, sugar, finely chopped dill, white pepper,
  and a little salt. Mix in the cucumbers and onion rings, then refrigerate.'
- Cut the pork across the grain into slices about 1 cm thick (8 cutlets total). Place
  each cutlet between sheets of cling film and pound to 3–4 mm with a meat mallet.
  Score around the edges to prevent curling.
- 'Set up three shallow dishes: dish 1 with flour, dish 2 with beaten eggs (seasoned
  with salt and pepper), dish 3 with breadcrumbs. Dredge each cutlet first in flour,
  then pull through the egg, then roll loosely in breadcrumbs — do NOT press down,
  so the coating soufflés while frying.'
- Heat the clarified butter in a large, deep pan to about 170 °C (the schnitzel should
  swim in the fat). The fat is hot enough when a breadcrumb dropped in rises immediately
  and turns golden.
- Fry the cutlets one at a time (or at most two). Gently swirl the pan so the hot
  fat laps over the cutlets. Fry 2–3 minutes per side until the coating is a deep,
  rich golden yellow.
- Drain briefly on kitchen paper. NEVER stack. Serve immediately with a lemon wedge
  and the cucumber salad — even a minute's wait will soften the crispy coating.
