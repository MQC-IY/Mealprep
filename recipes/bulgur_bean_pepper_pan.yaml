de_steps:
- Bulgur garen.
- Zwiebel, Paprika und Zucchini in Olivenöl anschwitzen.
- Bohnen und Tomaten zugeben und kurz köcheln.
en_steps:
- Cook the bulgur.
- Sauté the onion, bell pepper, and zucchini in olive oil until softened.
- Add the beans and tomatoes and simmer briefly.
