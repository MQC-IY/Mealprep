de_steps:
- Eier in kochendes Wasser legen, genau 7 Minuten garen, kalt abschrecken und pellen.
  In 50 ml Sojasoße + 50 ml Wasser + 1 EL Sake mindestens 30 Minuten einlegen.
- Knoblauch und Ingwer fein hacken. In einem großen Topf Pflanzenöl erhitzen, Knoblauch
  und Ingwer 2 Minuten anbraten.
- Sake und Hühnerbrühe angießen, aufkochen. Hähnchenbrust einlegen und bei mittlerer
  Hitze 15 Minuten pochieren. Hähnchen herausnehmen und mit zwei Gabeln zerzupfen.
- Miso-Pasten in einer kleinen Schüssel mit etwas heißer Brühe glatt rühren, dann
  in den Topf geben. Sojasoße und Sesamöl einrühren. Nicht mehr kochen lassen.
- Shiitake-Pilze und Babymais in die Brühe geben und 5 Minuten ziehen lassen. Pak
  Choi-Hälften 2 Minuten mitgaren.
- Ramen-Nudeln nach Packungsanweisung in separatem Wasser garen, abgießen.
- Nudeln in tiefe Schalen verteilen, heiße Miso-Brühe darübergießen. Mit Hähnchen,
  Pak Choi, Pilzen, halbiertem Marinierten Ei und Frühlingszwiebeln anrichten. Mit
  Togarashi und Sesamkörnern bestreuen.
en_steps:
- Place the eggs in boiling water and cook for exactly 7 minutes. Shock in cold water,
  peel, and marinate in 50 ml soy sauce + 50 ml water + 1 tbsp sake for at least 30
  minutes.
- Finely mince the garlic and ginger. Heat the vegetable oil in a large pot and sauté
  the garlic and ginger for 2 minutes.
- Pour in the sake and chicken broth; bring to a boil. Add the chicken breast and
  poach over medium heat for 15 minutes. Remove and shred with two forks.
- Stir the miso pastes smooth with a little hot broth in a small bowl, then add to
  the pot. Stir in the soy sauce and sesame oil. Do not let it boil again.
- Add the shiitake mushrooms and baby corn to the broth and steep for 5 minutes. Add
  the pak choi halves and cook for 2 minutes.
- Cook the ramen noodles separately in boiling water according to the packet instructions;
  drain.
- Divide the noodles into deep bowls and ladle over the hot miso broth. Top with the
  shredded chicken, pak choi, mushrooms, halved marinated eggs, and spring onions.
  Sprinkle with togarashi and sesame seeds.
