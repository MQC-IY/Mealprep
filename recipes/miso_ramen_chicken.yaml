de:
  title: Miso-Ramen mit Hähnchen und Gemüse
  summary: Reichhaltiger Miso-Ramen-Brühentopf mit zartem Hähnchen, Ramen-Nudeln,
    weichem Ei und frischem Gemüse.
en:
  title: Miso Ramen with Chicken and Vegetables
  summary: A rich miso ramen broth with tender chicken, ramen noodles, a soft-boiled
    marinated egg, and fresh vegetables.
