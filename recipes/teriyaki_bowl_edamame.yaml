de:
  title: Japanische Teriyaki-Bowl mit Edamame
  summary: Glasiertes Hähnchen-Teriyaki mit selbst gemachter Sauce, Edamame, Gurke,
    Avocado und Sesam auf Japanischem Rundkornreis.
en:
  title: Japanese Teriyaki Bowl with Edamame
  summary: Glazed chicken Teriyaki with homemade sauce, edamame, cucumber, avocado
    and sesame on Japanese short-grain rice.
