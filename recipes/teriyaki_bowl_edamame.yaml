de_steps:
- Reis nach Packungsanweisung garen.
- 'Teriyaki-Sauce: Sojasauce, Honig, Reisessig, Sesamöl und Ingwer in einer kleinen
  Pfanne 3–4 Minuten einköcheln lassen, bis sie leicht sirupartig ist.'
- Edamame nach Packungsanweisung in kochendem Salzwasser garen, abgießen.
- Hähnchen in mittelgroße Stücke schneiden. In einer heißen Pfanne mit Rapsöl anbraten.
  Teriyaki-Sauce über das Hähnchen gießen und 2–3 Minuten einglasieren, bis es glänzt.
- Gurke schräg in dünne Scheiben schneiden. Avocado halbieren, entkernen und in Scheiben
  schneiden.
- Reis in Schüsseln geben. Hähnchen, Edamame, Gurke und Avocado anrichten. Mit Frühlingszwiebeln
  und Sesam bestreuen. Limettensaft darüber träufeln.
en_steps:
- Cook rice according to package instructions.
- 'Teriyaki sauce: simmer soy sauce, honey, rice vinegar, sesame oil and ginger in
  a small pan for 3–4 minutes until slightly syrupy.'
- Cook edamame in boiling salted water according to package instructions; drain.
- Cut chicken into medium-sized pieces. Fry in a hot pan with rapeseed oil. Pour Teriyaki
  sauce over the chicken and glaze for 2–3 minutes until shiny.
- Slice cucumber diagonally into thin rounds. Halve, pit and slice avocado.
- Spoon rice into bowls. Arrange chicken, edamame, cucumber and avocado on top. Sprinkle
  with spring onions and sesame seeds. Drizzle with lime juice.
