de:
  title: Hähnchen in schwarzer Sesamsauce mit Soba
  summary: 'Elegantes japanisch inspiriertes Gericht: Hähnchen in nussiger schwarzer
    Sesam-Tare-Sauce auf Soba-Nudeln mit Edamame, eingelegtem Ingwer und Frühlingszwiebeln.'
en:
  title: Chicken in Black Sesame Sauce with Soba
  summary: 'An elegant Japanese-inspired dish: chicken glazed in a nutty black sesame
    tare sauce, served on soba noodles with edamame, pickled ginger, and spring onions.'
