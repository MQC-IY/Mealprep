de_steps:
- Schwarze Sesamkörner in einer trockenen Pfanne 2 Minuten rösten bis sie duften.
  Mit dem Mörser oder Mixer zu einer Paste mahlen.
- Sesampaste mit Sojasauce, Mirin und Sesamöl zu einer glatten schwarzen Sauce verrühren.
- Soba nach Packungsanweisung kochen, unter kaltem Wasser abschrecken und abtropfen
  lassen.
- Edamame garen. Hähnchen in dünne Scheiben schneiden. In heißem Rapsöl mit Knoblauch
  und Ingwer scharf anbraten.
- Hähnchen mit der Hälfte der schwarzen Sesamsauce glasieren und durchschwenken.
- Soba in Bowls geben, mit restlicher Sauce mischen. Hähnchen, Edamame und eingelegten
  Ingwer anrichten. Frühlingszwiebeln und Chiliflocken darüber. Limettensaft beträufeln.
en_steps:
- Toast black sesame seeds in a dry pan for 2 minutes until fragrant. Grind into a
  paste using a mortar or blender.
- Stir sesame paste with soy sauce, mirin, and sesame oil into a smooth black sauce.
- Cook soba according to package instructions, rinse under cold water, and drain.
- Cook edamame. Slice chicken thinly. Sear in hot rapeseed oil with garlic and ginger
  over high heat.
- Glaze chicken with half the black sesame sauce and toss to coat.
- Toss soba in bowls with the remaining sauce. Arrange chicken, edamame, and pickled
  ginger on top. Scatter spring onions and chili flakes over. Drizzle with lime juice.
