de_steps:
- Hähnchen in Würfel schneiden, mit Joghurt, Kurkuma, Chilipulver und Salz marinieren.
  30 Minuten ruhen lassen.
- Spinat kurz in kochendem Salzwasser blanchieren, abschrecken und mit grüner Chilischote
  im Mixer zu einem glatten Püree verarbeiten.
- Öl in einem Topf erhitzen, Kreuzkümmelsamen hineingeben und 30 Sekunden knistern
  lassen. Fein gewürfelte Zwiebeln goldbraun anbraten (ca. 8 Minuten).
- Knoblauch und Ingwer (fein gerieben) hinzufügen, 2 Minuten mitbraten. Gewürfelte
  Tomaten und alle gemahlenen Gewürze einrühren. 5 Minuten köcheln, bis die Tomaten
  zerfallen.
- Mariniertes Hähnchen dazugeben und bei mittlerer Hitze 8–10 Minuten anbraten, bis
  es fast gar ist.
- Spinat-Püree unterrühren, 150 ml Wasser hinzufügen. Alles zusammen 10 Minuten köcheln
  lassen. Mit Garam Masala und Salz abschmecken.
- Basmatireis garen und gemeinsam mit dem Palak Hähnchen servieren.
en_steps:
- Cut the chicken into cubes, marinate with yogurt, turmeric, chili powder and salt.
  Leave to rest for 30 minutes.
- Briefly blanch the spinach in boiling salted water, refresh in cold water, then
  blend with the green chili to a smooth purée.
- Heat the oil in a pot, add the cumin seeds and let them crackle for 30 seconds.
  Fry the finely diced onions until golden brown, about 8 minutes.
- Add the garlic and ginger (finely grated) and fry for 2 minutes. Stir in the diced
  tomatoes and all ground spices. Simmer for 5 minutes until the tomatoes break down.
- Add the marinated chicken and cook over medium heat for 8–10 minutes until almost
  cooked through.
- Stir in the spinach purée, add 150 ml water. Simmer everything together for 10 minutes.
  Season with garam masala and salt.
- Cook the basmati rice and serve alongside the Palak Chicken.
