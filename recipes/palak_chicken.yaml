de:
  title: Palak Hähnchen – Hähnchen in Spinat-Curry
  summary: Saftiges Hähnchen geschmort in einer samtigen Spinat-Curry-Sauce mit frischen
    Gewürzen und cremigem Joghurt.
en:
  title: Palak Chicken – Chicken in Spinach Curry
  summary: Tender chicken braised in a velvety spinach-curry sauce with fresh spices
    and creamy yogurt.
