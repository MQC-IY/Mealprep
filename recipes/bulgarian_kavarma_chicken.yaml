de_steps:
- Hähnchenstücke mit Salz, Pfeffer und edelsüßem Paprikapulver würzen. Öl in einem
  Bräter oder Keramiktopf erhitzen und Hähnchen von allen Seiten 8 Minuten goldbraun
  anbraten. Herausnehmen.
- Zwiebeln in Ringe schneiden und im gleichen Fett 8 Minuten golden dünsten. Paprikaschoten
  in breite Streifen schneiden, hinzufügen und weitere 5 Minuten mitdünsten.
- Knoblauch pressen, scharfes Paprikapulver einrühren, 1 Minute rösten. Mit Weißwein
  ablöschen und einkochen lassen.
- Gehackte Tomaten, frische Tomaten (geviertelt), Thymianzweige und Lorbeerblätter
  hinzufügen. Hähnchen zurücklegen.
- Alles zugedeckt bei niedriger Hitze 45 Minuten schmoren, bis das Hähnchen sehr weich
  ist. Lorbeer und Thymian entfernen.
- Mit gehackter Petersilie bestreuen. Mit Reis oder frischem Brot servieren.
en_steps:
- Season the chicken pieces with salt, pepper, and sweet paprika. Heat oil in a casserole
  or ceramic pot and brown the chicken on all sides for 8 minutes. Remove and set
  aside.
- Cut the onions into rings and sauté in the same fat for 8 minutes until golden.
  Cut the bell peppers into wide strips, add them, and cook for another 5 minutes.
- Press the garlic and stir in the hot paprika, toast for 1 minute. Deglaze with the
  white wine and let it reduce.
- Add the chopped tomatoes, fresh tomatoes (quartered), thyme sprigs, and bay leaves.
  Return the chicken to the pot.
- Cover and braise over low heat for 45 minutes until the chicken is very tender.
  Remove the bay leaves and thyme.
- Scatter with chopped parsley. Serve with rice or fresh bread.
