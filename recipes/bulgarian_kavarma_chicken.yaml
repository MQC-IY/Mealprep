de:
  title: Bulgarisches Hähnchen-Kavarma
  summary: Schmorfleisch aus dem bulgarischen Lehmofen – Hähnchen, Paprika, Tomaten
    und Zwiebeln werden langsam mit Weißwein und frischem Thymian gegart.
en:
  title: Bulgarian Chicken Kavarma
  summary: A slow-braised Bulgarian clay-pot dish – chicken, bell peppers, tomatoes,
    and onions gently cooked with white wine and fresh thyme.
