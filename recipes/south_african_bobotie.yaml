de:
  title: Südafrikanisches Bobotie
  summary: 'Südafrikanisches Nationalgericht: gewürztes Hackfleisch mit Aprikosen,
    Mandeln und Curry, überbacken mit würziger Eiersahne-Kruste.'
en:
  title: South African Bobotie
  summary: 'South Africa''s national dish: spiced ground meat with apricots, almonds
    and curry, baked under a savory egg custard crust.'
