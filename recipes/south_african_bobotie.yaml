de_steps:
- Ofen auf 180 °C Ober-/Unterhitze vorheizen.
- Zwiebeln fein würfeln, Knoblauch hacken. In Öl 5 Minuten anschwitzen. Currypulver,
  Kurkuma, Kreuzkümmel, Zimt und Chiliflocken zugeben, 1 Minute rösten.
- Hackfleisch zugeben und 8 Minuten anbraten bis es krümelig braun ist. Mit Salz abschmecken.
- Aprikosen in kleine Stücke schneiden, mit gehobelten Mandeln unter das Hack heben.
  In eine Auflaufform füllen und glatt streichen. Lorbeerblätter obenauf legen.
- Eier mit Milch verquirlen, salzen. Gleichmäßig über die Hackfleischmasse gießen.
- Im vorgeheizten Ofen 35–40 Minuten backen bis die Eiersahne gestockt und leicht
  goldgelb ist.
- Reis kochen, mit Kurkuma gelb färben. Bobotie mit Reis, Chutney und Sauerrahm servieren.
en_steps:
- Preheat oven to 180 °C (top/bottom heat).
- Finely dice onions, mince garlic. Sauté in oil for 5 minutes. Add curry powder,
  turmeric, cumin, cinnamon and chilli flakes; toast for 1 minute.
- Add minced meat and fry for 8 minutes until crumbly and browned. Season with salt.
- Chop dried apricots into small pieces and fold in together with the flaked almonds.
  Transfer to a baking dish, smooth the surface and lay bay leaves on top.
- Whisk eggs with milk and season with salt. Pour evenly over the meat mixture.
- Bake in the preheated oven for 35–40 minutes until the egg custard is set and lightly
  golden.
- Cook rice and tint yellow with turmeric. Serve Bobotie with rice, chutney and sour
  cream.
