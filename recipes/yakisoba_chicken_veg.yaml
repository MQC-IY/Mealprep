de:
  title: Hähnchen-Yakisoba mit Wokgemüse
  summary: Gebratene japanische Weizennudeln mit Hähnchen, Wokgemüse und würziger
    Yakisoba-Soße – schnell und geschmacksstark.
en:
  title: Chicken Yakisoba with Wok Vegetables
  summary: Stir-fried Japanese wheat noodles with chicken, wok vegetables, and a bold
    yakisoba sauce — quick and full of flavour.
