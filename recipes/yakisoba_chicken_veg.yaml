de_steps:
- Hähnchenbrust in dünne Streifen schneiden, mit Sake, Pfeffer und 1 EL Sojasoße 10
  Minuten marinieren.
- 'Yakisoba-Soße anrühren: Worcestersoße, restliche Sojasoße, Austernsauce und Zucker
  verrühren.'
- 'Gemüse vorbereiten: Weißkohl in grobe Stücke, Karotten in dünne Stifte, Zwiebeln
  in Streifen, Paprika in dünne Ringe schneiden. Knoblauch und Ingwer fein hacken.'
- Wok oder große Pfanne stark erhitzen. Pflanzenöl hineingeben. Hähnchen portionsweise
  scharf anbraten (3–4 Minuten), herausnehmen.
- Im selben Wok Knoblauch und Ingwer 30 Sekunden anbraten. Karotten und Zwiebeln 2
  Minuten braten, dann Kohl und Paprika dazugeben und weitere 3 Minuten unter Rühren
  garen.
- Yakisoba-Nudeln dazugeben und Soße darübergießen. Alles kräftig 2 Minuten unter
  Rühren braten.
- Hähnchen zurückgeben, Sesamöl einrühren. Sofort auf Teller verteilen, mit Frühlingszwiebeln,
  Aonori, Togarashi und Benishoga garnieren.
en_steps:
- Slice the chicken breast into thin strips and marinate with sake, pepper, and 1
  tbsp soy sauce for 10 minutes.
- 'Mix the yakisoba sauce: combine the Worcestershire sauce, remaining soy sauce,
  oyster sauce, and sugar.'
- 'Prepare the vegetables: cut the cabbage into rough pieces, cut the carrots into
  thin matchsticks, slice the onions into strips, and cut the bell peppers into thin
  rings. Finely chop the garlic and ginger.'
- Heat a wok or large frying pan until very hot. Add the vegetable oil. Fry the chicken
  in batches over high heat (3–4 minutes), then set aside.
- In the same wok, stir-fry the garlic and ginger for 30 seconds. Fry the carrots
  and onions for 2 minutes, then add the cabbage and bell peppers and cook for a further
  3 minutes, stirring.
- Add the yakisoba noodles and pour the sauce over everything. Stir-fry vigorously
  for 2 minutes.
- Return the chicken, drizzle with sesame oil. Serve immediately, garnished with spring
  onions, aonori, togarashi, and benishoga.
