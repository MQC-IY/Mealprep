de_steps:
- Gnocchi in einer beschichteten Pfanne mit 2 EL Pflanzenöl ohne Wasser bei mittlerer
  bis hoher Hitze 4–5 Minuten goldbraun anbraten. Herausnehmen.
- Hähnchen in mundgerechte Stücke schneiden. Im restlichen Öl 4 Minuten scharf anbraten.
  Herausnehmen.
- Knoblauch (fein gehackt) und Zwiebeln (Streifen) im Bratfett 2 Minuten anbraten.
  Gochujang, Gochugaru und Sojasoße einrühren und 1 Minute rösten.
- Brühe angießen und mit Zucker aufkochen. Weißkohl (grobe Stücke) dazugeben und 3
  Minuten köcheln.
- Gnocchi und Hähnchen zurückgeben. Alles 3 Minuten köcheln.
- Eier in separatem Topf 7 Minuten weich kochen, pellen und halbieren.
- Sesamöl einrühren. In Schüsseln anrichten, Eier dazulegen, mit Frühlingszwiebeln
  und Sesamkörnern garnieren.
en_steps:
- Fry the gnocchi in a non-stick pan with 2 tbsp vegetable oil (no water) over medium-high
  heat for 4–5 minutes until golden brown. Remove and set aside.
- Cut the chicken into bite-sized pieces. Sear in the remaining oil for 4 minutes
  over high heat. Remove and set aside.
- Fry the finely chopped garlic and sliced onions in the remaining fat for 2 minutes.
  Stir in the gochujang, gochugaru, and soy sauce and toast for 1 minute.
- Pour in the broth and bring to a boil with the sugar. Add the white cabbage (roughly
  chopped) and simmer for 3 minutes.
- Return the gnocchi and chicken to the pan. Simmer everything together for 3 minutes.
- Soft-boil the eggs in a separate pot for 7 minutes, peel, and halve.
- Stir in the sesame oil. Plate in bowls, add the eggs, and garnish with spring onions
  and sesame seeds.
