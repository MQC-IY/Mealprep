de:
  title: Tteokbokki-inspirierte Gnocchi-Pfanne
  summary: Knusprige Gnocchi als Ersatz für Reiskuchen in feuriger Gochujang-Anchovy-Soße
    mit Hähnchen, Ei und Frühlingszwiebeln.
en:
  title: Tteokbokki-Inspired Gnocchi Pan
  summary: Crispy gnocchi standing in for rice cakes in a fiery gochujang-anchovy
    sauce with chicken, soft-boiled eggs, and spring onions.
