de:
  title: Türkischer Hähnchen-Gemüse-Eintopf
  summary: Türkischer Tavuk-Gemüse-Topf mit Kartoffeln, Möhren, Erbsen, Tomate und
    warmer Paprika-Kreuzkümmel-Würzung.
en:
  title: Turkish Chicken and Vegetable Stew
  summary: A Turkish-style chicken and vegetable pot with potatoes, carrots, peas,
    tomatoes, and a warm paprika-cumin seasoning.
