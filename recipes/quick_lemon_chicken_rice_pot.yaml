de_steps:
- Hähnchen in Würfel schneiden, mit Salz, Pfeffer und Oregano würzen. In Olivenöl
  bei hoher Hitze 4 Minuten goldbraun anbraten. Herausnehmen.
- Zwiebel würfeln und Knoblauch in Scheiben schneiden. Im gleichen Topf 2 Minuten
  anschwitzen.
- Reis einrühren und 1 Minute glasig rühren. Thymian, Zitronensaft und -schale hinzufügen.
- Brühe angießen und aufkochen. Hitze auf niedrig reduzieren, Deckel aufsetzen und
  15 Minuten köcheln lassen.
- Hähnchen zurück auf den Reis legen, weitere 3 Minuten mit Deckel ziehen lassen.
  Abschmecken.
en_steps:
- Cut the chicken into cubes and season with salt, pepper, and oregano. Sear in olive
  oil over high heat for 4 minutes until golden. Remove and set aside.
- Dice the onion and slice the garlic. Sauté in the same pot for 2 minutes.
- Stir in the rice and cook for 1 minute until translucent. Add the thyme, lemon juice,
  and zest.
- Pour in the broth and bring to a boil. Reduce to low heat, cover, and simmer for
  15 minutes.
- Place the chicken back on top of the rice, cover, and rest for 3 minutes. Season
  to taste.
