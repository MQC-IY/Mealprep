de:
  title: Schneller Hähnchen-Zitrone-Reis-Topf
  summary: Hähnchen und Reis in einer zitronig-knoblauchigen Hühnerbrühe — vollständige
    Mahlzeit aus einem Topf.
en:
  title: Quick Lemon Chicken Rice Pot
  summary: Chicken and rice simmered in a lemony, garlicky chicken broth — a complete
    one-pot meal.
