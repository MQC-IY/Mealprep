de_steps:
- Hähnchen in Würfel schneiden. Süßkartoffel schälen und würfeln. Zitronengras anquetschen.
- Öl erhitzen. Knoblauch, Ingwer und frischen Chili 2 Minuten anbraten. Zitronengras
  zugeben.
- Hähnchen anbraten bis außen weiß. Kurkuma, Koriander, Galgant und Chiliflocken einrühren
  und 1 Minute rösten.
- Brühe, Kokosmilch, Erdnussmus und Sojasauce zugießen. Süßkartoffel und Paprika hinzufügen.
- Auf mittlerer Hitze 20–25 Minuten köcheln lassen, bis Süßkartoffel weich und Sauce
  eingedickt ist.
- Reis kochen. Mit Limettensaft abschmecken. Mit Frühlingszwiebeln und frischem Chili
  garnieren.
en_steps:
- Cut chicken into cubes. Peel and dice sweet potato. Bruise the lemongrass stalk.
- Heat oil. Fry garlic, ginger and fresh chilli for 2 minutes. Add lemongrass.
- Fry chicken until white on the outside. Stir in turmeric, coriander, galangal and
  chilli flakes; toast for 1 minute.
- Pour in stock, coconut milk, peanut butter and soy sauce. Add sweet potato and bell
  pepper.
- Simmer over medium heat for 20–25 minutes until the sweet potato is tender and the
  sauce has thickened.
- Cook rice. Adjust seasoning with lime juice. Garnish with spring onions and fresh
  chilli.
