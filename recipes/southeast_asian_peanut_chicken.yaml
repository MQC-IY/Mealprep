de:
  title: Südostasiatischer Hähnchen-Erdnuss-Eintopf
  summary: Cremiger Erdnuss-Kokos-Eintopf mit Hähnchen, Paprika und Süßkartoffel –
    inspiriert von indonesisch-malaiischer Küche mit Galgant, Zitronengras und Chili.
en:
  title: Southeast Asian Peanut Chicken Stew
  summary: A creamy peanut-coconut stew with chicken, bell pepper and sweet potato
    – inspired by Indonesian-Malay cuisine with galangal, lemongrass and chilli.
