id: turkey_quinoa_tomato_bake
pool: lunch
healthy: true
quick: false
next_day: true
meals: 3
de:
  title: Puten-Quinoa-Auflauf mit Tomate
  summary: Auflauf mit Putenhack, Quinoa, Tomate und Zucchini.
en:
  title: Turkey Quinoa Bake with Tomato
  summary: A baked casserole of ground turkey, quinoa, tomato, and zucchini.
ingredients:
- de_name: Putenhack
  en_name: ground turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Quinoa
  en_name: quinoa
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Passierte Tomaten
  en_name: strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Zucchini
  en_name: zucchini
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Eier
  en_name: eggs
  qty: 3
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 180
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Quinoa vorgaren.
- Putenhack scharf anbraten, Zucchini klein schneiden.
- Alles in eine Form geben, Joghurt mit Eiern verrühren und darübergeben.
en_steps:
- Par-cook the quinoa.
- Brown the ground turkey over high heat and chop the zucchini into small pieces.
- Transfer everything to a baking dish, whisk together the yogurt and eggs, and pour
  over the top.
