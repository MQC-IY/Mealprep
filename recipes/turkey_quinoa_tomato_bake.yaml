  title: Puten-Quinoa-Auflauf mit Tomate
  summary: Auflauf mit Putenhack, Quinoa, Tomate und Zucchini.
en:
  title: Turkey Quinoa Bake with Tomato
  summary: A baked casserole of ground turkey, quinoa, tomato, and zucchini.
