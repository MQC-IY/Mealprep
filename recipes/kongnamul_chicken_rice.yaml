de_steps:
- Reis waschen. In einem schweren Topf Pflanzenöl erhitzen, Reis kurz 1 Minute anrösten.
- Hühnerbrühe und Doenjang einrühren, aufkochen. Hähnchenbrust ganz einlegen. Abdecken
  und bei niedriger Hitze 15 Minuten garen.
- Sojasprossen waschen und auf dem Reis verteilen. Deckel schließen und weitere 10
  Minuten dämpfen.
- Hähnchen herausnehmen, in Streifen zerzupfen.
- 'Würzsoße: Sojasoße, Sesamöl, Knoblauch (fein gehackt), Gochugaru, Frühlingszwiebeln
  und Chilistücke verrühren.'
- Hähnchen zurück auf den Sprossen-Reis geben. Alles mit der Würzsoße übergießen.
- Mit einem großen Löffel durchmischen. Mit Sesamkörnern bestreuen und sofort servieren.
en_steps:
- Wash the rice. Heat vegetable oil in a heavy pot; briefly toast the rice for 1 minute.
- Stir in chicken stock and doenjang; bring to a boil. Place whole chicken breast
  in. Cover and cook over low heat for 15 minutes.
- Wash bean sprouts and spread over the rice. Close the lid and steam for a further
  10 minutes.
- Remove chicken and shred into strips.
- 'Seasoning sauce: whisk together soy sauce, sesame oil, finely chopped garlic, gochugaru,
  spring onions, and chili pieces.'
- Return chicken to the sprout rice. Pour the seasoning sauce over everything.
- Mix thoroughly with a large spoon. Sprinkle with sesame seeds and serve immediately.
