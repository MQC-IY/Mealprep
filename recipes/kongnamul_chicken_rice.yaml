de:
  title: Koreanisches Kongnamul-Resgericht mit Hähnchen
  summary: Gedämpfter Reis mit Sojasprossen, Hähnchen und kräftiger Sesam-Sojasoßen-Würze
    – einfach, nährstoffreich und tief aromatisch.
en:
  title: Korean Kongnamul Rice Bowl with Chicken
  summary: Steamed rice with bean sprouts, chicken, and a bold sesame-soy seasoning
    – simple, nutritious, and deeply flavourful.
