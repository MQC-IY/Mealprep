de:
  title: Harissa-Hähnchen mit Linsen und Joghurt
  summary: Feurig-würzige Harissa-Hähnchenstücke auf einem Bett aus herzhaften Linsen,
    gekrönt von kühlem Joghurt und frischen Kräutern.
en:
  title: Harissa Chicken with Lentils and Yoghurt
  summary: Fiery harissa chicken pieces on a bed of hearty lentils, crowned with cool
    yoghurt and fresh herbs.
