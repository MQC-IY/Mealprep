de_steps:
- Hähnchen mit 2 EL Harissa, Olivenöl, Salz und Pfeffer einreiben. 30 Minuten marinieren.
- Ofen auf 200°C vorheizen. Hähnchen auf einem Backblech 30–35 Minuten rösten, bis
  die Haut knusprig ist. Alternativ in einer Grillpfanne grillen.
- Zwiebeln und Sellerie fein würfeln. In 2 EL Olivenöl 8 Minuten weich dünsten. Knoblauch
  einrühren.
- Kreuzkümmel, Koriander, Kurkuma, Paprika und restliche Harissa einrühren, 1 Minute
  rösten. Linsen hinzufügen.
- Hühnerbrühe angießen, aufkochen, bei niedriger Hitze 25 Minuten köcheln, bis die
  Linsen weich sind. Mit Salz und Zitronensaft abschmecken.
- Linsen auf Teller verteilen. Hähnchenstücke darauflegen. Joghurt darüberklecksen,
  mit Petersilie und Zitronenspalten servieren.
en_steps:
- Rub the chicken with 2 tbsp harissa, olive oil, salt, and pepper. Marinate for 30
  minutes.
- Preheat the oven to 200 °C. Roast the chicken on a baking tray for 30–35 minutes
  until the skin is crispy. Alternatively, grill in a griddle pan.
- Finely dice the onions and celery. Sweat in 2 tbsp olive oil for 8 minutes until
  soft. Stir in the garlic.
- Stir in the cumin, coriander, turmeric, paprika, and remaining harissa; toast for
  1 minute. Add the lentils.
- Pour in the chicken stock, bring to a boil, then simmer over low heat for 25 minutes
  until the lentils are tender. Season with salt and lemon juice.
- Spoon the lentils onto plates. Place the chicken pieces on top. Dollop with yoghurt
  and serve with parsley and lemon wedges.
