quick_minutes: 25
meals: 3
de:
  title: Puten-Reis-Pfanne mit Erbsen
  summary: Alltagstaugliche Pfanne mit Putenhack, Reis, Erbsen und Möhren.
en:
  title: Turkey Rice Pan with Peas
  summary: An everyday skillet of ground turkey, rice, peas, and carrots.
ingredients:
- de_name: Putenhack
  en_name: ground turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Reis
  en_name: rice
  qty: 300
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 250
  unit: g
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 3
  unit: Stk
  category: Gemüse und Salat
- de_name: Zucchini
  en_name: zucchini
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Rapsöl
  en_name: rapeseed oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Paprika edelsüß
  en_name: sweet paprika
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Reis garen.
- Putenhack mit Zwiebel in etwas Öl scharf anbraten.
- Möhren, Zucchini und Erbsen zugeben und weich garen.
en_steps:
- Cook the rice.
- Brown the ground turkey with the onion in a little oil over high heat.
- Add the carrots, zucchini, and peas and cook until tender.
