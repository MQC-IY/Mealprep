de:
  title: Rote Linsen-Kokos-Curry mit Reis
  summary: Vollmundiges indisch inspiriertes Curry mit roten Linsen, Spinat und Kokosmilch
    – mit Garam Masala, Kurkuma, Chili und frischem Ingwer.
en:
  title: Red Lentil Coconut Curry with Rice
  summary: Full-bodied Indian-inspired curry with red lentils, spinach, and coconut
    milk – spiced with garam masala, turmeric, chili, and fresh ginger.
