de_steps:
- Reis garen.
- Zwiebel fein würfeln. Knoblauch und Ingwer fein hacken oder reiben.
- Öl in einem großen Topf bei mittlerer bis hoher Hitze erhitzen. Zwiebel 5 bis 7
  Minuten anbraten, bis sie goldbraun ist.
- Knoblauch und Ingwer zugeben und 1 Minute unter Rühren rösten. Kurkuma, Kreuzkümmel,
  Koriander, Garam Masala und Chiliflocken einrühren und 1 Minute trocken rösten,
  bis es aromatisch duftet.
- Tomatenmark einrühren und kurz mitrösten. Gehackte Tomaten, Linsen und Kokosmilch
  zugeben. Mit 300 ml Wasser auffüllen.
- Bei mittlerer Hitze 18 bis 20 Minuten köcheln lassen, bis die Linsen weich und die
  Sauce sämig ist.
- Spinat unterheben und 2 Minuten mitziehen lassen. Mit Limettensaft, Salz und ggf.
  mehr Chiliflocken abschmecken. Mit Reis servieren.
en_steps:
- Cook the rice.
- Finely dice onion. Finely chop or grate garlic and ginger.
- Heat oil in a large pot over medium-high heat. Fry onion for 5 to 7 minutes until
  golden brown.
- Add garlic and ginger and toast for 1 minute, stirring. Stir in turmeric, cumin,
  coriander, garam masala, and chili flakes; dry-toast for 1 minute until fragrant.
- Stir in tomato paste and toast briefly. Add chopped tomatoes, lentils, and coconut
  milk. Top up with 300 ml water.
- Simmer over medium heat for 18 to 20 minutes until lentils are soft and the sauce
  is creamy.
- Fold in spinach and let it wilt for 2 minutes. Season with lime juice, salt, and
  more chili flakes if desired. Serve with rice.
