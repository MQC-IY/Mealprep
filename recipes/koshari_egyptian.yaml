de_steps:
- Linsen in Salzwasser 20 Minuten kochen, bis weich. Abgießen. Reis nach Packungsanweisung
  garen. Nudeln in Salzwasser al dente kochen. Abgießen.
- Zwiebeln in dünne Ringe schneiden. In reichlich Olivenöl bei hoher Hitze 20–25 Minuten
  frittieren bis tiefbraun und knusprig. Auf Küchenpapier abtropfen.
- Im verbliebenen Öl Knoblauch 1 Minute anbraten. Tomatenmark einrühren, 2 Minuten
  rösten. Chilipulver, Kreuzkümmel, Koriander, Zimt, Paprika einstreuen.
- Gehackte Tomaten und Essig hinzufügen. 15 Minuten köcheln lassen, bis eine dicke,
  würzige Sauce entsteht. Mit Salz abschmecken.
- Linsen, Reis und Nudeln vorsichtig in einem Topf vermengen. Kichererbsen einrühren,
  alles kurz erhitzen.
- Koshari in tiefe Schüsseln portionieren. Großzügig Tomatensauce darüber löffeln
  und mit den knusprigen Zwiebeln bedecken. Sofort servieren.
en_steps:
- Cook lentils in salted water for 20 minutes until soft. Drain. Cook rice according
  to package instructions. Cook pasta in salted water until al dente. Drain.
- Slice onions into thin rings. Deep-fry in plenty of olive oil over high heat for
  20–25 minutes until deep brown and crispy. Drain on paper towels.
- In the remaining oil, fry garlic for 1 minute. Stir in tomato paste; toast for 2
  minutes. Add chili powder, cumin, coriander, cinnamon, and paprika.
- Add chopped tomatoes and vinegar. Simmer for 15 minutes until a thick, spiced sauce
  forms. Season with salt.
- Gently combine lentils, rice, and pasta in a pot. Stir in chickpeas; heat everything
  briefly.
- Portion Koshari into deep bowls. Spoon tomato sauce generously over the top and
  cover with the crispy onions. Serve immediately.
