de:
  title: Türkisches Tavuk Şiş mit Bulgur und Tzatziki
  summary: Saftige türkische Hähnchen-Spieße in einer Joghurt-Gewürzmarinade, gegrillt
    und auf fluffigem Bulgur mit hausgemachtem Tzatziki serviert.
en:
  title: Turkish Tavuk Şiş with Bulgur and Tzatziki
  summary: Juicy Turkish chicken skewers marinated in a spiced yogurt blend, grilled
    and served on fluffy bulgur with homemade tzatziki.
