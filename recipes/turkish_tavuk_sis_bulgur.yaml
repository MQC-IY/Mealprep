de_steps:
- 'Hähnchen in gleichmäßige Würfel schneiden. Marinade herstellen: 100 g Joghurt,
  2 EL Olivenöl, Paprika, Kreuzkümmel, Oregano, Chili, Salz, Pfeffer und Zitronensaft
  vermischen. Hähnchen mindestens 2 Stunden marinieren.'
- 'Für den Tzatziki: Gurke reiben, ausdrücken. Mit 50 g Joghurt, geriebenem Knoblauch,
  Minze, einem Spritzer Zitronensaft und Salz vermengen. Kühl stellen.'
- Bulgur mit Gemüsebrühe aufkochen, Hitze reduzieren, 10 Minuten quellen lassen. Mit
  Gabel auflockern, Sumach und Petersilie unterrühren.
- Hähnchen auf Spieße stecken. Auf einem heißen Grill oder in einer Grillpfanne 10–12
  Minuten grillen, dabei mehrmals wenden, bis leicht angebrannt und durchgegart.
- Zwiebeln und Tomaten in Scheiben schneiden, mit Sumach und Olivenöl marinieren.
- Bulgur auf Teller verteilen. Spieße darauflegen. Mit Tomaten-Zwiebel-Salat und Tzatziki
  servieren.
en_steps:
- 'Cut the chicken into even cubes. Make the marinade: combine 100 g yogurt, 2 tbsp
  olive oil, paprika, cumin, oregano, chili, salt, pepper, and lemon juice. Marinate
  the chicken for at least 2 hours.'
- 'For the tzatziki: grate the cucumber and squeeze out the moisture. Mix with 50
  g yogurt, grated garlic, mint, a squeeze of lemon juice, and salt. Refrigerate until
  needed.'
- Bring the bulgur to a boil with the vegetable broth, reduce the heat, and let soak
  for 10 minutes. Fluff with a fork and stir in the sumac and parsley.
- Thread the chicken onto skewers. Grill on a hot grill or in a grill pan for 10–12
  minutes, turning several times, until slightly charred and cooked through.
- Slice the onions and tomatoes, then toss with sumac and olive oil.
- Plate the bulgur, lay the skewers on top, and serve with the tomato-onion salad
  and tzatziki.
