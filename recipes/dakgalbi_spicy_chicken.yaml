de_steps:
- Hähnchen in mundgerechte Stücke schneiden. Knoblauch und Ingwer fein reiben.
- 'Marinade: Gochujang, Sojasoße, Gochugaru, Zucker, Reisessig, Knoblauch, Ingwer
  und Sesamöl verrühren. Hähnchen darin mindestens 30 Minuten marinieren.'
- Süßkartoffeln schälen und in 1 cm dicke Scheiben schneiden. Weißkohl in grobe Stücke
  teilen.
- Reis garen.
- Pflanzenöl in einer großen Pfanne erhitzen. Hähnchen mit Marinade hineingeben und
  5 Minuten unter Rühren braten.
- Süßkartoffeln dazugeben, 200 ml Wasser einrühren. Abdecken und 10 Minuten garen.
- Weißkohl einrühren und offen 5 Minuten braten, bis die Soße karamellisiert ist.
  Frühlingszwiebeln und Perilla-Blätter unterheben. Mit Sesamkörnern bestreuen.
en_steps:
- Cut the chicken into bite-sized pieces. Finely grate the garlic and ginger.
- 'Marinade: stir together gochujang, soy sauce, gochugaru, sugar, rice vinegar, garlic,
  ginger, and sesame oil. Marinate the chicken for at least 30 minutes.'
- Peel the sweet potatoes and cut into 1 cm thick slices. Tear the cabbage into rough
  chunks.
- Cook the rice.
- Heat the vegetable oil in a large pan. Add the chicken with its marinade and stir-fry
  for 5 minutes.
- Add the sweet potatoes and stir in 200 ml water. Cover and cook for 10 minutes.
- Stir in the cabbage and cook uncovered for 5 minutes until the sauce caramelises.
  Fold in the spring onions and perilla leaves. Scatter with sesame seeds.
