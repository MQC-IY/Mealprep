de_steps:
- Guanciale in ca. 1 cm dicke Streifen schneiden. Zwiebel fein würfeln, Knoblauch
  hacken.
- Olivenöl in einer tiefen Pfanne oder einem Schmortopf bei mittlerer Hitze erwärmen.
  Guanciale darin 4–5 Minuten auslassen, bis er leicht knusprig und das Fett ausgetreten
  ist.
- Zwiebel und Peperoncino (zerbröselt) dazugeben, 4 Minuten mitbraten. Knoblauch einrühren,
  1 Minute weiterbraten.
- Mit Weißwein ablöschen, 2 Minuten einkochen. Tomaten dazugeben und mit einem Löffel
  zerdrücken. Sauce 20 Minuten bei niedriger Hitze köcheln lassen.
- Salzwasser aufkochen. Gnocchi darin nach Packungsangabe garen. Sobald sie obenauf
  schwimmen, mit einer Schaumkelle herausnehmen – etwas Kochwasser aufheben.
- Gnocchi in die Sauce geben, gut schwenken. Bei Bedarf etwas Kochwasser einrühren.
- Großzügig mit Pecorino und frisch gemahlenem Pfeffer servieren.
en_steps:
- Cut the guanciale into strips about 1 cm wide. Finely dice the onion and chop the
  garlic.
- Warm the olive oil in a deep frying pan or casserole over medium heat. Render the
  guanciale for 4–5 minutes until lightly crispy and the fat has run out.
- Add the onion and crumbled peperoncino and fry for 4 minutes. Stir in the garlic
  and cook for a further 1 minute.
- Deglaze with the white wine and reduce for 2 minutes. Add the tomatoes and crush
  them with a spoon. Simmer the sauce over low heat for 20 minutes.
- Bring a large pot of salted water to a boil. Cook the gnocchi according to the packet
  instructions. As soon as they float, remove with a slotted spoon — reserve some
  pasta water.
- Add the gnocchi to the sauce and toss well. Stir in a little pasta water if needed.
- Serve generously topped with Pecorino and freshly ground pepper.
