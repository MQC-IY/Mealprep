de:
  title: Gnocchi all'Amatriciana mit Guanciale
  summary: Saftige Gnocchi in der klassischen Amatriciana-Sauce aus Guanciale, San-Marzano-Tomaten,
    Peperoncino und Pecorino.
en:
  title: Gnocchi all'Amatriciana with Guanciale
  summary: Pillowy gnocchi in the classic Amatriciana sauce of guanciale, San Marzano
    tomatoes, peperoncino, and Pecorino.
