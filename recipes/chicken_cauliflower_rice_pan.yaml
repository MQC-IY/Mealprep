de:
  title: Hähnchen-Reis-Pfanne mit Blumenkohl
  summary: Milde Pfanne mit Hähnchen, Reis, Blumenkohl und Erbsen.
en:
  title: Chicken Rice Pan with Cauliflower
  summary: A mild and wholesome pan with chicken, fluffy rice, cauliflower, peas,
    and carrots — a simple weeknight favourite.
ingredients:
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 750
  unit: g
