de:
  title: Pad Thai mit Hähnchen
  summary: Klassische Thai-Reisnudelpfanne mit Hähnchen, Ei, Erdnüssen und würziger
    Tamarindensauce.
en:
  title: Pad Thai with Chicken
  summary: Classic Thai rice noodle stir-fry with chicken, egg, peanuts and a tangy
    tamarind sauce.
