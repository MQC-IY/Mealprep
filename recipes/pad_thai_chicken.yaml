de_steps:
- Reisnudeln nach Packungsanweisung in lauwarmem Wasser ca. 20 Minuten einweichen,
  dann abgießen.
- Hähnchenbrustfilet in dünne Streifen schneiden. Knoblauch fein hacken. Frühlingszwiebeln
  schräg in Ringe schneiden.
- Tamarindenpaste, Fischsauce und Palmzucker in einer kleinen Schüssel verrühren,
  bis sich der Zucker auflöst.
- Erdnussöl im Wok bei starker Hitze erhitzen. Hähnchen portionsweise scharf anbraten
  (3–4 Min.), herausnehmen.
- Knoblauch im verbleibenden Öl 30 Sekunden anbraten. Nudeln dazugeben und 1–2 Minuten
  unter Rühren anbraten.
- Nudeln an den Rand schieben. Eier in die Mitte aufschlagen, kurz rühren und mit
  den Nudeln vermengen.
- Hähnchen zurückgeben. Tamarindensauce angießen. Alles kräftig vermengen und 2 Minuten
  auf hoher Hitze schwenken.
- Sojasprossen und Frühlingszwiebeln unterheben. Mit weißem Pfeffer und Chiliflocken
  abschmecken.
- Auf Teller anrichten. Erdnüsse grob hacken und darüber streuen. Mit Limettenvierteln
  servieren.
en_steps:
- Soak the rice noodles in lukewarm water for about 20 minutes according to the packet
  instructions, then drain.
- Cut the chicken breast fillet into thin strips. Finely chop the garlic. Cut the
  spring onions diagonally into rings.
- Whisk together the tamarind paste, fish sauce and palm sugar in a small bowl until
  the sugar dissolves.
- Heat the peanut oil in a wok over high heat. Sear the chicken in batches for 3–4
  minutes, then remove.
- Fry the garlic in the remaining oil for 30 seconds. Add the noodles and stir-fry
  for 1–2 minutes.
- Push the noodles to the side. Crack the eggs into the centre, stir briefly, then
  mix with the noodles.
- Return the chicken. Pour in the tamarind sauce. Toss everything vigorously and stir-fry
  over high heat for 2 minutes.
- Fold in the bean sprouts and spring onions. Season with white pepper and chili flakes.
- Plate up. Roughly chop the peanuts and scatter over the top. Serve with lime wedges.
