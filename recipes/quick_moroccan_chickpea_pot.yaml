de:
  title: Schneller Marokkanischer Kichererbsen-Topf
  summary: Würzig-aromatischer Kichererbsen-Eintopf mit Harissa, Ras el Hanout und
    Zitrone in 22 Minuten.
en:
  title: Quick Moroccan Chickpea Pot
  summary: A fragrant, spiced chickpea stew with harissa, ras el hanout, and lemon
    — done in 22 minutes.
