de_steps:
- Zwiebel fein würfeln und in Olivenöl 3 Minuten glasig dünsten. Knoblauch hacken
  und 1 Minute mitdünsten.
- Ras el Hanout, Kreuzkümmel, Zimt und Harissa-Paste einrühren und 1 Minute rösten.
- Kichererbsen, Tomaten und Brühe hinzufügen. Aufkochen und 14 Minuten kräftig köcheln
  lassen.
- Zitronensaft und -schale einrühren, mit Salz abschmecken. Heiß servieren.
en_steps:
- Finely dice the onion and sauté in olive oil for 3 minutes until translucent. Chop
  the garlic and cook for 1 more minute.
- Stir in the ras el hanout, cumin, cinnamon, and harissa paste and toast for 1 minute.
- Add the chickpeas, tomatoes, and broth. Bring to a boil and simmer vigorously for
  14 minutes.
- Stir in the lemon juice and zest, season with salt, and serve hot.
