de_steps:
- Reis garen.
- Hähnchen in dünne Streifen schneiden. Knoblauch fein hacken. Zwiebel in grobe Stücke.
  Chili in Ringe.
- In einem Topf Pflanzenöl und Sesamöl erhitzen. Knoblauch und Gochugaru 1 Minute
  anbraten.
- Hähnchen dazugeben und 3 Minuten anbraten. Gochujang einrühren und 1 Minute mitbraten.
- Brühe, Zwiebeln und Sojasoße angießen. Aufkochen und 8 Minuten köcheln.
- Seidentofu in den Topf löffeln. Garnelen und Chili dazugeben. 5 Minuten köcheln.
- Jeweils ein rohes Ei direkt aufschlagen, kurz stocken lassen. Mit Frühlingszwiebeln
  garnieren und sofort mit Reis servieren.
en_steps:
- Cook the rice.
- Cut chicken into thin strips. Finely mince garlic. Cut onion into large chunks.
  Slice chilli into rings.
- Heat vegetable oil and sesame oil in a pot. Fry garlic and gochugaru for 1 minute.
- Add chicken and fry for 3 minutes. Stir in gochujang and cook for a further 1 minute.
- Pour in stock, onions and soy sauce. Bring to a boil and simmer for 8 minutes.
- Spoon silken tofu into the pot. Add prawns and chilli. Simmer for 5 minutes.
- Crack a raw egg directly into the stew, let it set briefly. Garnish with spring
  onions and serve immediately with rice.
