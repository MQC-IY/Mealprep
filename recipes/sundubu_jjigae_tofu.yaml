de:
  title: Sundubu Jjigae – Scharfer Tofu-Eintopf
  summary: Feuriger koreanischer Eintopf mit weichem Seidentofu, Hähnchen, Meeresfrüchten
    und viel Gochugaru in würziger Anchovy-Brühe.
en:
  title: Sundubu Jjigae – Spicy Soft Tofu Stew
  summary: A fiery Korean stew with silken tofu, chicken, prawns and plenty of gochugaru
    in a savory anchovy broth.
