de_steps:
- Hähnchenbrustfilet in mundgerechte Würfel schneiden, mit Salz und Pfeffer würzen.
- Knoblauch fein hacken, Peperoncino zerbröseln.
- 2 EL Olivenöl in einer großen Pfanne bei mittlerer bis hoher Hitze erhitzen. Hähnchenwürfel
  darin 5–6 Minuten goldbraun anbraten, dann herausnehmen.
- Weitere 2 EL Olivenöl in die Pfanne geben. Knoblauch und Peperoncino darin 1–2 Minuten
  bei mittlerer Hitze anrösten, bis es duftet.
- Geschälte Tomaten dazugeben, mit einem Holzlöffel zerdrücken. Oregano einrühren
  und die Sauce 15 Minuten köcheln lassen.
- Gleichzeitig Penne in reichlich Salzwasser nach Packungsangabe al dente kochen.
  100 ml Kochwasser aufheben, dann abgießen.
- Hähnchen zurück in die Tomatensauce geben, weitere 5 Minuten köcheln. Bei Bedarf
  etwas Nudelwasser einrühren.
- Penne mit der Sauce vermengen. Mit gehackter Petersilie und Parmesan anrichten.
en_steps:
- Cut the chicken breast fillet into bite-sized cubes and season with salt and pepper.
- Finely chop the garlic and crumble the peperoncino.
- Heat 2 tbsp olive oil in a large pan over medium-high heat. Fry the chicken cubes
  for 5–6 minutes until golden brown, then remove.
- Add another 2 tbsp olive oil to the pan. Toast the garlic and peperoncino over medium
  heat for 1–2 minutes until fragrant.
- Add the peeled tomatoes and crush them with a wooden spoon. Stir in the oregano
  and let the sauce simmer for 15 minutes.
- Meanwhile, cook the penne in plenty of salted water until al dente according to
  the packet instructions. Reserve 100 ml of cooking water, then drain.
- Return the chicken to the tomato sauce and simmer for a further 5 minutes. Stir
  in a little pasta water if needed.
- Toss the penne with the sauce. Serve garnished with chopped parsley and grated Parmesan.
