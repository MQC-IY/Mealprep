de:
  title: Pasta all'Arrabbiata mit Hähnchen
  summary: Scharfe Tomatensauce mit Peperoncino und knusprigem Hähnchen über Penne
    – ein klassisches römisches Gericht mit Biss.
en:
  title: Pasta all'Arrabbiata with Chicken
  summary: Fiery tomato sauce with peperoncino and golden chicken over penne – a classic
    Roman dish with real kick.
