de_steps:
- Hähnchenbrust in der Hühnerbrühe mit 1 Teelöffel Salz 20 Minuten gar köcheln. Hähnchen
  herausnehmen, zupfen und die Brühe aufbewahren.
- Tortillas in dünne Streifen schneiden. In 1 EL heißem Öl portionsweise knusprig
  braten, auf Küchenpapier abtropfen lassen.
- Zwiebel fein würfeln, Knoblauch hacken, Tomaten würfeln, Chilis in Ringe schneiden.
  Im verbliebenen Öl 5 Minuten bei mittlerer Hitze garen.
- Kreuzkümmel und Oregano einrühren, 30 Sekunden rösten, dann die aufbewahrte Hühnerbrühe
  zugießen.
- 15 Minuten leise köcheln lassen. Gezupftes Hähnchen zurückgeben, Chiliflocken und
  Limettensaft zugeben.
- Mit Salz abschmecken. In Schüsseln anrichten, Tortillastreifen und frischen Koriander
  darübergeben.
en_steps:
- Simmer the chicken breast in the chicken broth with 1 tsp salt for 20 minutes until
  cooked through. Remove the chicken, shred it, and reserve the broth.
- Cut the tortillas into thin strips. Fry in 1 tbsp hot oil in batches until crispy;
  drain on paper towels.
- Finely dice the onion, mince the garlic, dice the tomatoes, and slice the chilies
  into rings. Cook in the remaining oil over medium heat for 5 minutes.
- Stir in the cumin and oregano, toast for 30 seconds, then pour in the reserved chicken
  broth.
- Simmer gently for 15 minutes. Return the shredded chicken, add the chili flakes
  and lime juice.
- Season with salt. Ladle into bowls and top with tortilla strips and fresh cilantro.
