id: sopa_de_lima
pool: lunch
healthy: false
quick: true
next_day: false
quick_minutes: 30
meals: 2
de:
  title: Sopa de Lima – Mexikanische Limetten-Hühnersuppe
  summary: Aromatische Suppe aus Yucatán mit zartem Hähnchen, frischem Limettensaft,
    Tomaten, Chili und knusprigen Tortillastreifen.
en:
  title: Sopa de Lima – Mexican Lime Chicken Soup
  summary: Aromatic Yucatán soup with tender chicken, fresh lime juice, tomatoes,
    chili, and crispy tortilla strips.
