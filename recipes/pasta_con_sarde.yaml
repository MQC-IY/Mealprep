de_steps:
- Safranfäden in 3 EL warmem Wasser einweichen. Rosinen in lauwarmem Wasser 10 Minuten
  einweichen, abgießen.
- Fenchelknolle vierteln, Strunk entfernen und in feine Streifen schneiden. Fenchelgrün
  aufheben. Zwiebel und Knoblauch fein hacken.
- Pinienkerne in einer trockenen Pfanne goldbraun rösten. Herausnehmen.
- Olivenöl in einer großen Pfanne erhitzen. Zwiebel 5 Minuten anschwitzen. Knoblauch,
  Sardellenpaste und Peperoncino dazugeben, 1 Minute weiterbraten.
- Fenchelstreifen einrühren, 8 Minuten bei mittlerer Hitze weich schmoren. Safranwasser,
  Rosinen und Pinienkerne dazugeben.
- 'Sardinen (wenn frisch: grob zerteilt; wenn aus der Dose: abgetropft und grob zerbröckelt)
  einlegen. Nur 3–4 Minuten sanft erhitzen.'
- Pasta in Salzwasser al dente kochen. Etwas Kochwasser aufheben, dann abgießen.
- Pasta mit der Sardinensauce vermengen. Mit gerösteten Semmelbröseln und fein gehacktem
  Fenchelgrün bestreuen.
en_steps:
- Soak the saffron threads in 3 tbsp warm water. Soak the raisins in lukewarm water
  for 10 minutes, then drain.
- Quarter the fennel bulb, remove the core and cut into fine strips. Reserve the fennel
  fronds. Finely chop the onion and garlic.
- Toast the pine nuts in a dry pan until golden. Remove and set aside.
- Heat the olive oil in a large pan. Sweat the onion for 5 minutes. Add the garlic,
  anchovy paste and peperoncino and cook for 1 more minute.
- Stir in the fennel strips and braise over medium heat for 8 minutes until soft.
  Add the saffron water, raisins and pine nuts.
- 'Add the sardines (if fresh: roughly broken up; if canned: drained and gently flaked).
  Heat gently for just 3–4 minutes.'
- Cook the pasta in salted water until al dente. Reserve a little cooking water, then
  drain.
- Toss the pasta with the sardine sauce. Scatter with toasted breadcrumbs and finely
  chopped fennel fronds.
