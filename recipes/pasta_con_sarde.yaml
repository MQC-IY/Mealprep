de:
  title: Pasta con le Sarde – Nudeln mit Sardinen und Fenchel
  summary: Sizilianische Pasta mit frischen Sardinen, Fenchel, Pinienkerne, Rosinen
    und Safran – ein einzigartiges Zusammenspiel aus süß, salzig und anisartig.
en:
  title: Pasta con le Sarde – Pasta with Sardines and Fennel
  summary: Sicilian pasta with fresh sardines, fennel, pine nuts, raisins and saffron
    – a unique interplay of sweet, salty and anise flavours.
