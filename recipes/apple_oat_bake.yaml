de_steps:
- Ofen auf 180 °C Ober-/Unterhitze vorheizen. Eine große Auflaufform (ca. 30×22 cm)
  leicht einfetten.
- Äpfel schälen, entkernen und in 1 cm große Würfel schneiden.
- Haferflocken, Backpulver, Zimt und Salz in einer großen Schüssel vermengen.
- Eier, Hafermilch, Joghurt, Honig und Vanilleextrakt in einer separaten Schüssel
  verquirlen.
- Flüssige Mischung zu den Haferflocken geben und gut verrühren. Apfelwürfel, Walnüsse
  und Rosinen unterheben.
- Masse in die vorbereitete Form geben und glattstreichen.
- Im vorgeheizten Ofen 40–45 Minuten backen, bis die Oberfläche goldbraun und die
  Masse in der Mitte gestockt ist.
- 10 Minuten abkühlen lassen, dann in 8 Portionen schneiden. Warm oder kalt servieren.
  Im Kühlschrank bis zu 4 Tage haltbar, in der Mikrowelle aufwärmen.
en_steps:
- Preheat oven to 180 °C (350 °F) top/bottom heat. Lightly grease a large baking dish
  (approx. 30×22 cm).
- Peel, core, and dice apples into 1 cm cubes.
- Combine rolled oats, baking powder, cinnamon, and salt in a large bowl.
- Whisk eggs, oat milk, yogurt, honey, and vanilla extract in a separate bowl.
- Add the wet mixture to the oats and stir well. Fold in apple cubes, walnuts, and
  raisins.
- Pour the mixture into the prepared dish and smooth the surface.
- Bake in the preheated oven for 40–45 minutes until the surface is golden brown and
  the centre has set.
- Leave to cool for 10 minutes, then cut into 8 portions. Serve warm or cold. Keeps
  in the fridge for up to 4 days; reheat in the microwave.
