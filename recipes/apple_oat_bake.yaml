id: apple_oat_bake
pool: dessert
healthy: true
meals: 8
de:
  title: Apfel-Zimt-Ofenporridge für die Familie
  summary: Warmer Haferauflauf mit karamellisierten Äpfeln, Walnüssen und Zimt — gebacken
    und in Portionen aufgeteilt, ideal als gesundes Dessert oder Frühstück für die
    ganze Woche.
en:
  title: Apple Cinnamon Baked Oatmeal for the Family
  summary: Warm baked oatmeal with caramelised apples, walnuts, and cinnamon — portioned
    and ready to go, ideal as a healthy dessert or breakfast for the whole week.
