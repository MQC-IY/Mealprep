de:
  title: Bohnen-Reis-Pfanne mit Mais
  summary: Schnelle Pfanne mit Reis, weißen Bohnen, Mais und Paprika in leichter Tomatenbasis.
en:
  title: Bean and Rice Skillet with Corn
  summary: A quick skillet of rice, white beans, corn, and bell pepper in a light
    tomato base.
