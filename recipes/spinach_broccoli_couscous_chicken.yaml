de_steps:
- Couscous quellen lassen.
- Hähnchen scharf anbraten und Brokkoli weich garen.
- Spinat kurz unterheben.
en_steps:
- Soak couscous in hot stock or water until fully absorbed.
- Sear chicken in a hot pan and cook broccoli until tender.
- Fold in spinach briefly until just wilted.
