de:
  title: Hähnchen-Couscous mit Brokkoli und Spinat
  summary: Schnelle Couscous-Bowl mit Hähnchen, Brokkoli, Spinat und leichter Zitronennote.
en:
  title: Chicken Couscous with Broccoli and Spinach
  summary: A quick couscous bowl with chicken, broccoli, spinach and a light hint
    of lemon.
