de_steps:
- Hähnchenbrust in der Hühnerbrühe mit Salz, Pfeffer und der Hälfte des Knoblauchs
  (zerdrückt) 20 Minuten sanft pochieren, bis sie gar ist.
- Hähnchen herausnehmen, abkühlen lassen und mit zwei Gabeln in grobe Streifen zupfen.
  Brühe aufbewahren.
- Basmati-Reis unter fließendem Wasser waschen. 400 ml der Hühnerbrühe aufkochen,
  Reis hinzufügen, Hitze reduzieren und 15 Minuten zugedeckt garen.
- Restlichen Knoblauch fein hacken. Butter in einem kleinen Topf schmelzen, Knoblauch
  1 Minute anschwitzen, Pul Biber und Minze einrühren. Sofort vom Herd.
- Gekochten Reis in tiefen Tellern anrichten. Zerzupftes Hähnchen darauf verteilen.
  Mit heißer Knoblauch-Butter-Pul Biber-Mischung beträufeln.
- Einen Löffel Joghurt daneben setzen und etwas heiße Brühe über den Teller gießen.
  Mit Kreuzkümmel bestäuben.
en_steps:
- Poach the chicken breast gently in the chicken broth with salt, pepper, and half
  the garlic (crushed) for 20 minutes until cooked through.
- Remove the chicken, let it cool slightly, and pull into rough shreds with two forks.
  Reserve the broth.
- Rinse the basmati rice under cold running water. Bring 400 ml of the chicken broth
  to a boil, add the rice, reduce the heat, and cook covered for 15 minutes.
- Finely chop the remaining garlic. Melt the butter in a small saucepan, sauté the
  garlic for 1 minute, stir in the pul biber and dried mint. Remove from the heat
  immediately.
- Plate the cooked rice in deep bowls. Arrange the pulled chicken on top. Drizzle
  over the hot garlic-butter-pul biber mixture.
- Add a spoonful of yogurt alongside and pour a little hot broth over the plate. Dust
  with cumin.
