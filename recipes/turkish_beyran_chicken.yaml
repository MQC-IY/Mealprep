de:
  title: Türkisches Beyran-inspiriertes Hähnchengericht
  summary: 'Nach dem Gaziantep-Klassiker: zartes Hähnchenfleisch in einer feurigen,
    knoblauchreichen Brühe mit Pul Biber-Butter und Reis.'
en:
  title: Turkish Beyran-Inspired Chicken Dish
  summary: 'Inspired by the Gaziantep classic: tender pulled chicken in a fiery, garlic-rich
    broth finished with pul biber butter, served with rice.'
