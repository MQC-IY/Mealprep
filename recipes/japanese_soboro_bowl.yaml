de_steps:
- Reis garen.
- Sojasauce, Mirin, Sake, Zucker und geriebenen Ingwer verrühren.
- Putenhack in Rapsöl in einem trockenen Topf bei mittlerer Hitze krümelig anbraten
  – dabei mit Stäbchen oder einer Gabel ständig rühren, bis das Hack fein und trocken
  ist.
- Die Würzsauce zum Hack geben und bei mittlerer Hitze einkochen, bis die Flüssigkeit
  fast vollständig aufgesogen ist. Sesamöl unterrühren.
- Eier mit 1 TL Zucker und einer Prise Salz verquirlen. In einer beschichteten Pfanne
  mit wenig Rapsöl bei niedriger Hitze zu weichen, flockigen Rühreiern garen.
- Erbsen kurz blanchieren oder in der Pfanne erwärmen.
- Reis in Schalen verteilen. Hack, Ei und Erbsen nebeneinander daraufgeben. Mit Frühlingszwiebeln
  und Sesam servieren.
en_steps:
- Cook the rice.
- Stir together soy sauce, mirin, sake, sugar, and grated ginger.
- Fry the ground turkey in rapeseed oil in a dry pot over medium heat until crumbly
  – stir constantly with chopsticks or a fork until the meat is fine and dry.
- Add the seasoning sauce to the meat and simmer over medium heat until the liquid
  is almost completely absorbed. Stir in sesame oil.
- Beat eggs with 1 tsp sugar and a pinch of salt. Cook in a non-stick pan with a little
  rapeseed oil over low heat into soft, fluffy scrambled eggs.
- Blanch the peas briefly or warm them in the pan.
- Divide rice into bowls. Place the meat, egg, and peas side by side on top. Serve
  with spring onions and sesame seeds.
