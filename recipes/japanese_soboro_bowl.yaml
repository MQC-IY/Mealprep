de:
  title: Soboro-Don mit Putenhack, Ei und Erbsen
  summary: 'Japanische Dreifarben-Reisschale: würzig-süßes Putenhack, weiche Eierflocken
    und grüne Erbsen auf Sushireis.'
en:
  title: Soboro Don with Ground Turkey, Egg, and Peas
  summary: 'Japanese three-colour rice bowl: savoury-sweet ground turkey, soft scrambled
    egg flakes, and green peas over sushi rice.'
