de_steps:
- Udon weich garen.
- Möhren weich garen und Bohnen kurz erwärmen.
- Spinat unterheben und Udon untermischen.
en_steps:
- Cook udon noodles until tender.
- Cook carrots until soft and briefly warm the beans.
- Fold in spinach and mix in the udon noodles.
