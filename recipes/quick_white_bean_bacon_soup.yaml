id: quick_white_bean_bacon_soup
pool: lunch
healthy: false
quick: true
next_day: true
quick_minutes: 20
meals: 2
de:
  title: Schnelle Weiße-Bohnen-Suppe mit Speck
  summary: Rustikale Suppe aus weißen Bohnen, knusprigem Speck und Salbei — fertig
    in 20 Minuten.
en:
  title: Quick White Bean and Bacon Soup
  summary: Rustic soup with white beans, crispy bacon, and sage — ready in 20 minutes.
ingredients:
- de_name: Weiße Bohnen, abgetropft
  en_name: white beans, drained
  qty: 2
  unit: Dose
  category: Konserven und Vorrat
- de_name: Hühnerbrühe
  en_name: chicken broth
  qty: 900
  unit: ml
  category: Konserven und Vorrat
- de_name: Olivenöl
  en_name: olive oil
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Geräucherter Speck, gewürfelt
  en_name: smoked bacon, diced
  qty: 150
  unit: g
  category: Protein und Milchprodukte
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Knoblauchzehen
  en_name: garlic cloves
  qty: 3
  unit: Zehen
  category: Gemüse und Salat
- de_name: Salbei, getrocknet
  en_name: dried sage
  qty: 1.5
  unit: TL
  category: Gewürze
- de_name: Schwarzer Pfeffer, grob gemahlen
  en_name: black pepper, coarsely ground
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Salz
  en_name: salt
  qty: 1
  unit: Stk
  category: Gewürze
de_steps:
- Speck in einem Topf bei mittlerer Hitze ohne zusätzliches Fett knusprig ausbraten,
  ca. 4 Minuten. Mit einem Schaumlöffel herausnehmen.
- Zwiebel würfeln und Knoblauch hacken. Im Speckfett mit einem Schuss Olivenöl 3 Minuten
  anschwitzen. Salbei einrühren.
- Bohnen und Brühe hinzufügen. Aufkochen und 10 Minuten köcheln lassen. Die Hälfte
  der Suppe mit einem Stabmixer kurz anpürieren, um eine cremige Konsistenz zu erzeugen.
- Speck zurückgeben, mit Pfeffer abschmecken und servieren.
en_steps:
- Render the bacon in a pot over medium heat without added fat until crispy, about
  4 minutes. Remove with a slotted spoon.
- Dice the onion and mince the garlic. Sauté in the bacon fat with a splash of olive
  oil for 3 minutes. Stir in the sage.
- Add the beans and broth. Bring to a boil and simmer for 10 minutes. Briefly blend
  half the soup with an immersion blender to create a creamy texture.
- Return the bacon, season with pepper, and serve.
