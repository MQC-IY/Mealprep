de_steps:
- Safranfäden in 3 EL warmem Wasser 10 Minuten einweichen. Chorizo und Morcilla in
  dicke Scheiben schneiden, Speck in 3–4 Stücke.
- Olivenöl in einem großen Topf bei mittlerer Hitze erwärmen. Zwiebel und Knoblauch
  (beides fein gewürfelt) 5 Minuten anschwitzen.
- Speck dazugeben und 3 Minuten mitbraten. Chorizo-Scheiben einlegen, 2 Minuten weiterbraten.
- Pimentón und Lorbeer einrühren, 1 Minute rösten. Brühe und Safranwasser dazugießen,
  aufkochen.
- Bohnen (abgetropft, aber nicht gespült) einlegen. Morcilla obenauf setzen.
- Herd auf niedrigste Stufe reduzieren. Zugedeckt 40 Minuten sanft köcheln – nicht
  umrühren, damit die Bohnen ganz bleiben.
- 'Für eine sämige Sauce: Einige Bohnen herausheben und mit einer Gabel zerdrücken,
  zurück in den Topf einrühren.'
- Lorbeer entfernen, mit Salz und Pfeffer abschmecken. Traditionell ohne Beilage servieren.
en_steps:
- Soak the saffron threads in 3 tbsp warm water for 10 minutes. Slice the chorizo
  and morcilla thickly; cut the bacon into 3–4 pieces.
- Warm the olive oil in a large pot over medium heat. Sweat the finely diced onion
  and garlic for 5 minutes.
- Add the bacon and fry for 3 minutes. Add the chorizo slices and cook for a further
  2 minutes.
- Stir in the pimentón and bay leaves; toast for 1 minute. Pour in the stock and saffron
  water; bring to a boil.
- Add the drained (but unrinsed) beans. Place the morcilla on top.
- Reduce the heat to the lowest setting. Cover and simmer gently for 40 minutes —
  do not stir, to keep the beans whole.
- 'For a thicker sauce: lift out a few beans, mash with a fork, and stir back into
  the pot.'
- Remove the bay leaves and season with salt and pepper. Traditionally served without
  a side dish.
