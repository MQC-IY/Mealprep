de:
  title: Fabada Asturiana-inspirierter Weißbohneneintopf
  summary: Asturischer Weißbohneneintopf mit Chorizo, Morcilla, Speck und Safran –
    einer der reichhaltigsten und sättigendsten Klassiker der spanischen Küche.
en:
  title: Fabada – Asturian-Inspired White Bean Stew
  summary: Asturian white bean stew with chorizo, morcilla, smoked bacon, and saffron
    — one of the most hearty and satisfying classics of Spanish cuisine.
ingredients:
- de_name: Große weiße Bohnen aus der Dose (Fabes oder Cannellini)
  en_name: large white beans, tinned (fabes or cannellini)
  qty: 2
  unit: Dose
  category: Konserven und Vorrat
- de_name: Chorizo
  en_name: chorizo
  qty: 200
  unit: g
  category: Protein und Milchprodukte
- de_name: Morcilla (Blutwurst) oder Bratwurst
  en_name: morcilla (blood sausage) or bratwurst
  qty: 150
  unit: g
  category: Protein und Milchprodukte
- de_name: Geräucherter Bauchspeck am Stück
  en_name: smoked belly bacon, in one piece
  qty: 150
  unit: g
  category: Protein und Milchprodukte
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
