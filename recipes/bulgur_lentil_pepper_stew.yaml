id: bulgur_lentil_pepper_stew
pool: lunch
healthy: true
quick: true
next_day: true
quick_minutes: 30
meals: 3
de:
  title: Bulgur-Linsen-Paprika-Topf
  summary: Milder Topf mit Bulgur, roten Linsen, Paprika und Tomaten.
en:
  title: Bulgur, Lentil and Bell Pepper Stew
  summary: A mild one-pot stew with bulgur, red lentils, bell pepper, and tomatoes.
ingredients:
- de_name: Bulgur
  en_name: bulgur
  qty: 220
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Rote Linsen
  en_name: red lentils
  qty: 200
  unit: g
  category: Konserven und Vorrat
- de_name: Paprika
  en_name: bell pepper
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Passierte Tomaten
  en_name: strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Paprika edelsüß
  en_name: sweet paprika
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Zwiebel und Paprika in Olivenöl anschwitzen.
- Linsen, Bulgur und Tomaten zugeben.
- Mit Wasser auffüllen und weich köcheln lassen.
en_steps:
- Sauté the onion and bell pepper in olive oil until softened.
- Add the lentils, bulgur, and tomatoes.
- Top up with water and simmer until tender.
