de:
  title: Couscous-Gemüse-Pfanne mit Rinderhack
  summary: Schnelle Pfanne mit Couscous, Hack, Zucchini und Paprika.
en:
  title: Couscous Skillet with Ground Beef and Vegetables
  summary: A quick one-pan dish with couscous, ground beef, courgette, and bell pepper.
ingredients:
- de_name: Rinderhack
  en_name: ground beef
  qty: 600
  unit: g
  category: Protein und Milchprodukte
- de_name: Couscous
  en_name: couscous
  qty: 300
  unit: g
