de_steps:
- Couscous mit heißem Wasser quellen lassen.
- Hack in wenig Öl anbraten, Gemüse klein schneiden und mitgaren.
- Mild würzen und Couscous unterheben.
en_steps:
- Soak the couscous in hot water and let it absorb.
- Brown the ground beef in a little oil. Chop the vegetables finely and cook them
  alongside.
- Season lightly and fold in the couscous.
