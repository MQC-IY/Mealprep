de_steps:
- Kartoffeln schälen, in gleichmäßige Würfel schneiden und in Salzwasser 8 Minuten
  vorkochen. Abgießen und beiseitestellen.
- Spinat waschen und in kochendem Wasser 2 Minuten blanchieren, abgießen, abkühlen
  lassen und grob hacken.
- Öl in einer großen Pfanne erhitzen. Senfkörner und Kreuzkümmelsamen hineingeben,
  bis sie knistern und springen. Asafoetida kurz mitrösten.
- Gewürfelte Zwiebeln dazugeben und 8 Minuten goldbraun anbraten. Geriebenen Knoblauch
  und Ingwer einrühren, 2 Minuten braten. Chilischoten fein hacken und dazugeben.
- Gehackte Tomaten, Kurkuma, Kreuzkümmel, Koriander und Chilipulver einrühren. 5 Minuten
  köcheln, bis die Tomaten weich sind.
- Vorgekochte Kartoffeln in die Pfanne geben, gut vermengen. 5 Minuten braten, bis
  die Kartoffeln leicht anbräunen. Spinat unterrühren und 3 Minuten mitgaren.
- Mit Garam Masala und Salz abschmecken. Mit Naan oder Basmatireis servieren.
en_steps:
- Peel the potatoes, cut into even cubes, and par-boil in salted water for 8 minutes.
  Drain and set aside.
- Wash the spinach and blanch in boiling water for 2 minutes, drain, let cool, and
  roughly chop.
- Heat the oil in a large pan. Add the mustard seeds and cumin seeds and cook until
  they begin to pop and splutter. Briefly toast the asafoetida.
- Add the diced onions and fry for 8 minutes until golden brown. Stir in the grated
  garlic and ginger and cook for 2 minutes. Finely chop the chili peppers and add.
- Stir in the chopped tomatoes, turmeric, cumin, coriander, and chili powder. Simmer
  for 5 minutes until the tomatoes are soft.
- Add the par-cooked potatoes to the pan and mix well. Fry for 5 minutes until the
  potatoes are lightly browned. Stir in the spinach and cook for a further 3 minutes.
- Season with garam masala and salt. Serve with naan or basmati rice.
