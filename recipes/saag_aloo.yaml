de:
  title: Saag Aloo – Spinat-Kartoffel-Curry
  summary: Würzige Kartoffeln und frischer Spinat in einer aromatischen Gewürzpaste
    – ein klassisches veganes nordindisches Curry.
en:
  title: Saag Aloo – Spinach and Potato Curry
  summary: Spiced potatoes and fresh spinach in an aromatic spice paste — a classic
    vegan North Indian curry.
