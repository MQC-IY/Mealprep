de_steps:
- Reis waschen und nach Packungsangabe als Sushireis garen.
- Hähnchen in mundgerechte Stücke schneiden. Zwiebel in Halbringe schneiden. Frühlingszwiebeln
  in Ringe schneiden.
- Brühe, Sojasauce, Mirin, Sake und Zucker in einer flachen Pfanne oder einem breiten
  Topf verrühren und aufkochen.
- Zwiebeln in die Sauce geben und 3 Minuten bei mittlerer Hitze köcheln, bis sie weich
  werden.
- Hähnchenstücke dazugeben und in der Sauce bei mittlerer Hitze 5 bis 7 Minuten garen,
  bis das Fleisch durch ist.
- Eier verquirlen. Zwei Drittel der Eiermasse gleichmäßig über das Hähnchen gießen,
  Deckel drauf und 1 Minute stocken lassen.
- Restliche Eier dazugeben und den Herd ausschalten – die Eier sollen cremig-weich
  bleiben, nicht fest durchgaren.
- Sesamöl einrühren. Mit Frühlingszwiebeln und Sesam auf dem Reis servieren.
en_steps:
- Wash the rice and cook according to package instructions as sushi rice.
- Cut chicken into bite-sized pieces. Slice onion into half-rings. Slice spring onions
  into rings.
- Whisk together chicken stock, soy sauce, mirin, sake, and sugar in a shallow pan
  or wide pot; bring to a boil.
- Add onions to the sauce and simmer over medium heat for 3 minutes until soft.
- Add chicken pieces and cook in the sauce over medium heat for 5 to 7 minutes until
  cooked through.
- Beat the eggs. Pour two-thirds of the egg mixture evenly over the chicken; cover
  and let set for 1 minute.
- Add the remaining eggs and turn off the heat – the eggs should remain creamy and
  soft, not fully set.
- Stir in sesame oil. Serve over rice, topped with spring onions and sesame seeds.
