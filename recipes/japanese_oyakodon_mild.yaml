de:
  title: Oyakodon mit Hähnchen, Ei und Reis
  summary: 'Klassische japanische Reisschale: Hähnchen und Ei sanft in einer Dashi-Soja-Mirin-Sauce
    gegart und auf Sushireis serviert.'
en:
  title: Oyakodon with Chicken, Egg, and Rice
  summary: 'Classic Japanese rice bowl: chicken and egg gently cooked in a dashi-soy-mirin
    sauce and served over sushi rice.'
