de_steps:
- Kartoffeln schälen und in grobe Stücke (ca. 4 cm) schneiden. In kaltem Wasser 10
  Minuten wässern, dann abgießen.
- Karotten schräg in 1 cm dicke Scheiben schneiden. Zwiebeln in Spalten schneiden.
  Knoblauch fein hacken.
- Öl in einem großen Topf erhitzen. Rindfleischstreifen darin 2–3 Minuten anbraten.
  Herausnehmen.
- Zwiebeln und Knoblauch im selben Topf 3 Minuten glasig dünsten. Kartoffeln und Karotten
  dazugeben und kurz mitbraten.
- Dashi-Brühe, Sojasoße, Mirin, Sake und Zucker einrühren. Aufkochen lassen.
- Rindfleisch und Shirataki-Nudeln zurückgeben. Abdecken und bei niedriger Hitze 20
  Minuten köcheln, bis die Kartoffeln weich sind.
- Deckel abnehmen und weitere 5 Minuten einkochen, bis die Brühe leicht sämig wird.
  Mit Frühlingszwiebelringen servieren.
en_steps:
- Peel the potatoes and cut into large chunks (about 4 cm). Soak in cold water for
  10 minutes, then drain.
- Cut the carrots diagonally into 1 cm slices. Cut the onions into wedges. Finely
  chop the garlic.
- Heat the oil in a large pot. Brown the beef strips for 2–3 minutes. Remove and set
  aside.
- In the same pot, sweat the onions and garlic for 3 minutes until translucent. Add
  the potatoes and carrots and briefly sauté.
- Stir in the dashi stock, soy sauce, mirin, sake and sugar. Bring to a boil.
- Return the beef and add the shirataki noodles. Cover and simmer over low heat for
  20 minutes, until the potatoes are tender.
- Remove the lid and continue cooking for a further 5 minutes until the broth thickens
  slightly. Serve garnished with spring onion rings.
