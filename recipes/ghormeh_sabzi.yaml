de:
  title: Persisches Ghormeh Sabzi – Kräuter-Lamm-Eintopf
  summary: 'Persischer Nationalstolz: ein tiefaromatischer Lammeintopf mit Mengen
    an gebratenen Kräutern, getrockneten Limetten und roten Bohnen.'
en:
  title: Ghormeh Sabzi – Persian Herb & Lamb Stew
  summary: 'Iran''s national pride: a deeply aromatic lamb stew with copious fried
    herbs, dried limes, and red kidney beans.'
