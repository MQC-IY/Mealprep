de_steps:
- Petersilie, Koriander, Schnittlauch und Spinat fein hacken. In 2 EL Olivenöl bei
  mittlerer Hitze 20–25 Minuten unter ständigem Rühren braten, bis die Kräuter sehr
  dunkelgrün, fast schwarz, getrocknet und intensiv duften. Beiseitestellen.
- Getrocknete Limetten mehrfach einstechen. Zwiebeln fein würfeln und in 2 EL Olivenöl
  goldbraun braten. Knoblauch einrühren.
- Lammfleisch hinzufügen, mit Kurkuma, Kreuzkümmel, Salz und Pfeffer würzen. Von allen
  Seiten anbraten.
- Brühe angießen, eingestochene Limetten dazulegen. Aufkochen, dann bei niedriger
  Hitze abgedeckt 1 Stunde köcheln.
- Gebratene Kräuter und abgetropfte Kidneybohnen einrühren. Weitere 30–45 Minuten
  köcheln, bis das Fleisch zart ist und die Sauce intensiv schmeckt. Mit Salz und
  Pfeffer abschmecken.
- Basmatireis separat garen. Ghormeh Sabzi mit dem Reis servieren – der Eintopf soll
  tief dunkelgrün und kräftig im Aroma sein.
en_steps:
- Finely chop the parsley, coriander, chives, and spinach. Fry in 2 tbsp olive oil
  over medium heat for 20–25 minutes, stirring constantly, until the herbs are very
  dark green, almost black, dried out, and intensely fragrant. Set aside.
- Pierce the dried limes several times. Finely dice the onions and fry in 2 tbsp olive
  oil until golden. Stir in the garlic.
- Add the lamb, season with turmeric, cumin, salt, and pepper. Brown on all sides.
- Pour in the stock and add the pierced limes. Bring to a boil, then simmer covered
  over low heat for 1 hour.
- Stir in the fried herbs and drained kidney beans. Continue simmering for a further
  30–45 minutes until the meat is tender and the sauce is intensely flavoured. Season
  with salt and pepper.
- Cook the basmati rice separately. Serve Ghormeh Sabzi with the rice — the stew should
  be deep dark green and richly aromatic.
