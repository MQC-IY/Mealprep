de:
  title: Hähnchen-Rendang-Curry mit Jasminreis
  summary: 'Intensives indonesisches Rendang: Hähnchen langsam in Kokosmilch mit Zitronengras,
    Galgant, Chilipaste und Kaffirlimette geschmort bis die Sauce karamellisiert.'
en:
  title: Chicken Rendang with Jasmine Rice
  summary: 'Intense Indonesian Rendang: chicken slowly braised in coconut milk with
    lemongrass, galangal, chili paste, and kaffir lime until the sauce caramelizes.'
