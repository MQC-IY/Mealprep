de_steps:
- 'Rendang-Paste: Chilischoten, Schalotten, Knoblauch und Ingwer im Mixer zu einer
  glatten Paste verarbeiten.'
- Zitronengras anquetschen.
- Öl im großen Topf erhitzen. Paste 5 Minuten kräftig anbraten bis sie duftet und
  etwas Öl oben schwimmt.
- Koriander, Kreuzkümmel, Kurkuma und Galgant einrühren. Hähnchen in große Stücke
  schneiden und rundum anbraten.
- Kokosmilch, Sojasauce, Zitronengras und Kaffirlimettenblätter zugeben. Aufkochen
  lassen.
- Hitze reduzieren und 35–40 Minuten köcheln lassen, bis die Sauce stark eingedickt
  ist und karamellisiert. Reis kochen. Zitronengras und Limettenblätter entfernen
  vor dem Servieren.
en_steps:
- 'Make the Rendang paste: blend the chili peppers, shallots, garlic, and ginger into
  a smooth paste.'
- Bruise the lemongrass stalks.
- Heat the oil in a large pot. Fry the paste vigorously for 5 minutes until fragrant
  and the oil begins to separate.
- Stir in the coriander, cumin, turmeric, and galangal. Cut the chicken into large
  pieces and brown on all sides.
- Add the coconut milk, soy sauce, lemongrass, and kaffir lime leaves. Bring to a
  boil.
- Reduce the heat and simmer for 35–40 minutes until the sauce is very thick and caramelized.
  Cook the rice. Remove the lemongrass and lime leaves before serving.
