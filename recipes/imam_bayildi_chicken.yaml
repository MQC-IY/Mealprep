de:
  title: Türkischer İmam Bayıldı-inspirierter Auberginen-Topf mit Hähnchen
  summary: 'Der Klassiker, der den Imam in Ohnmacht fallen ließ: gefüllte Auberginen
    mit Hähnchen, karamellisierten Zwiebeln, Tomaten und reichlich Olivenöl.'
en:
  title: İmam Bayıldı-Inspired Stuffed Aubergine Pot with Chicken
  summary: 'The classic that made the imam faint: stuffed aubergines with chicken,
    caramelised onions, tomatoes, and generous olive oil.'
