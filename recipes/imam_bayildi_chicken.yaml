de_steps:
- Auberginen halbieren. Fruchtfleisch mit einem Löffel aushöhlen, dabei 1 cm Rand
  lassen. Hälften salzen und 20 Minuten stehen lassen. Abspülen und trocken tupfen.
- Auberginen-Fruchtfleisch grob hacken. Zwiebeln in feine Ringe schneiden, Knoblauch
  pressen. 4 EL Olivenöl in einer Pfanne bei mittlerer Hitze erhitzen, Zwiebeln 15
  Minuten langsam golden karamellisieren.
- Hähnchenbrust in kleine Würfel schneiden. Zum Zwiebeln geben, 5 Minuten anbraten.
  Knoblauch, Auberginen-Fruchtfleisch, Pul Biber, Zimt und Thymian einrühren.
- Gewürfelte Tomaten und Gehackte Tomaten hinzufügen. Zucker einrühren. 15 Minuten
  kochen, bis eine dicke Füllung entsteht. Petersilie einrühren, abschmecken.
- Ofen auf 180 °C vorheizen. Auberginenhälften in einer Auflaufform mit restlichem
  Olivenöl bepinseln. Füllung in die Hälften löffeln. 150 ml Wasser in die Form geben.
- 45 Minuten backen, bis die Auberginen vollständig weich sind. Heiß oder auf Zimmertemperatur
  abgekühlt servieren.
en_steps:
- Halve the aubergines. Scoop out the flesh with a spoon, leaving a 1 cm border. Salt
  the halves and leave for 20 minutes. Rinse and pat dry.
- Roughly chop the aubergine flesh. Slice the onions into thin rings and crush the
  garlic. Heat 4 tbsp olive oil in a pan over medium heat and slowly caramelise the
  onions for 15 minutes until golden.
- Dice the chicken breast. Add to the onions and fry for 5 minutes. Stir in the garlic,
  aubergine flesh, pul biber, cinnamon, and thyme.
- Add the diced tomatoes and canned chopped tomatoes. Stir in the sugar. Cook for
  15 minutes until a thick filling forms. Stir in the parsley and season to taste.
- Preheat the oven to 180 °C. Brush the aubergine halves in a baking dish with the
  remaining olive oil. Spoon the filling into the halves. Add 150 ml water to the
  dish.
- Bake for 45 minutes until the aubergines are completely tender. Serve hot or at
  room temperature.
