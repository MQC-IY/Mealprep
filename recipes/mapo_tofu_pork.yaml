de_steps:
- Jasminreis waschen und kochen.
- Seidentofu in 2-cm-Würfel schneiden. In leicht gesalzenem heißem Wasser 5 Minuten
  ziehen lassen, vorsichtig abgießen.
- Knoblauch und Ingwer fein hacken. Frühlingszwiebeln in Ringe schneiden.
- Öl im Wok erhitzen. Doubanjian 1–2 Minuten bei mittlerer Hitze anbraten, bis das
  Öl rot wird.
- Hackfleisch zugeben und krümelig anbraten. Knoblauch und Ingwer zugeben (1 Min.).
- Shaoxing-Wein, Sojasauce und Fond angießen. Aufkochen.
- Tofuwürfel vorsichtig zugeben. 4–5 Minuten sanft köcheln – nicht rühren, nur den
  Wok leicht schütteln.
- Stärke in 2 EL kaltem Wasser auflösen und einrühren bis die Sauce bindet.
- Szechuanpfeffer, Chiliflocken und Sesamöl unterrühren. Mit Frühlingszwiebeln bestreuen
  und mit Reis servieren.
en_steps:
- Wash and cook the jasmine rice.
- Cut the silken tofu into 2 cm cubes. Gently poach in lightly salted hot water for
  5 minutes, then carefully drain.
- Finely mince the garlic and ginger. Slice the spring onions into rings.
- Heat the oil in a wok. Stir-fry the doubanjiang over medium heat for 1–2 minutes
  until the oil turns red.
- Add the ground pork and cook until crumbly. Stir in the garlic and ginger and cook
  for 1 minute.
- Pour in the Shaoxing wine, soy sauce, and stock. Bring to a boil.
- Carefully add the tofu cubes. Simmer gently for 4–5 minutes — do not stir, just
  gently shake the wok.
- Dissolve the cornstarch in 2 tbsp cold water and stir in until the sauce thickens.
- Stir in the Sichuan pepper, chili flakes, and sesame oil. Garnish with spring onions
  and serve with rice.
