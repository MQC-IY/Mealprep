de:
  title: Mapo Tofu mit Hackfleisch
  summary: Feuriger Sichuan-Klassiker mit seidigem Tofu in einer tiefroten, betäubend-scharfen
    Chili-Bohnen-Sauce mit Schweinehackfleisch.
en:
  title: Mapo Tofu with Ground Pork
  summary: A fiery Sichuan classic of silken tofu in a deep-red, numbing-hot chili
    bean sauce with ground pork.
