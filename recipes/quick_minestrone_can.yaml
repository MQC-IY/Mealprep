id: quick_minestrone_can
pool: lunch
healthy: true
quick: true
next_day: true
quick_minutes: 20
meals: 2
de:
  title: Schnelle Minestrone aus der Dose
  summary: Kräftige Minestrone aus Dosengemüse, Bohnen und Nudeln in 20 Minuten.
en:
  title: Quick Minestrone from the Can
  summary: A robust Minestrone made with canned vegetables, beans, and pasta — on
    the table in 20 minutes.
ingredients:
- de_name: Borlotti- oder Cannellinibohnen, abgetropft
  en_name: Borlotti or cannellini beans, drained
  qty: 1
  unit: Dose
  category: Konserven und Vorrat
- de_name: Gehackte Tomaten
  en_name: Chopped tomatoes
  qty: 1
  unit: Dose
  category: Konserven und Vorrat
- de_name: TK-Suppengemüse
  en_name: Frozen soup vegetables
  qty: 400
  unit: g
  category: Gemüse und Salat
- de_name: Gemüsebrühe
  en_name: Vegetable broth
  qty: 1
  unit: Liter
  category: Konserven und Vorrat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 3
  unit: EL
  category: Konserven und Vorrat
- de_name: Kleine Nudeln (z.B. Ditalini)
  en_name: Small pasta (e.g. ditalini)
  qty: 150
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Knoblauchzehen
  en_name: Garlic cloves
  qty: 3
  unit: Zehen
  category: Gemüse und Salat
- de_name: Parmesan-Rinde (optional)
  en_name: Parmesan rind (optional)
  qty: 1
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Oregano, getrocknet
  en_name: Dried oregano
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Basilikum, getrocknet
  en_name: Dried basil
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Salz und Pfeffer
  en_name: Salt and pepper
  qty: 1
  unit: Stk
  category: Gewürze
de_steps:
- Knoblauch hacken und in Olivenöl 1 Minute anschwitzen.
- TK-Gemüse direkt einrühren, Oregano und Basilikum hinzufügen, 2 Minuten mitbraten.
- Tomaten, Bohnen, Brühe und Parmesan-Rinde einrühren. Aufkochen.
- Nudeln hinzufügen und laut Packungsanweisung al dente kochen (ca. 8 Minuten). Parmesin-Rinde
  entfernen, mit Salz und Pfeffer abschmecken.
en_steps:
- Chop the garlic and sauté in olive oil for 1 minute.
- Stir in the frozen vegetables, oregano, and basil, and cook for 2 minutes.
- Add the tomatoes, beans, broth, and Parmesan rind. Bring to a boil.
- Add the pasta and cook al dente according to package instructions (about 8 minutes).
  Remove the Parmesan rind and season with salt and pepper.
