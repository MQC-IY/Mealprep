de_steps:
- 'Suya-Marinade herstellen: gemahlene Erdnüsse, Erdnussbutter, Paprika edelsüß, gemahlenen
  Ingwer, Cayennepfeffer und Zwiebelpulver mischen. Hähnchen in Streifen schneiden,
  großzügig einreiben und mindestens 1 Stunde marinieren.'
- Für den Jollof-Reis Paprika und Scotch-Bonnet mit der Hälfte der Tomaten und einer
  Zwiebel pürieren.
- Restliche Zwiebeln würfeln. Öl in einem Topf erhitzen. Zwiebeln 5 Minuten anbraten.
  Tomatenmark zugeben, dunkel rösten.
- Tomatenpüree zugeben, 15 Minuten einköcheln bis sehr dick. Thymian und Gewürze einrühren.
  Reis zugeben, 2 Minuten mitrösten. Hühnerbrühe angießen. Deckel drauf, 25 Minuten
  bei niedriger Hitze köcheln.
- Backofen auf 220 °C Grillfunktion vorheizen oder Grillpfanne erhitzen. Hähnchen
  auf Spieße stecken oder auf einem Gitterrost 10–12 Minuten grillen, wenden, bis
  es leicht angebrannt und durch ist.
- Suya-Hähnchen mit Jollof-Reis, in Ringe geschnittener Zwiebel und Chiliflocken servieren.
en_steps:
- 'Make the Suya marinade: mix ground peanuts, peanut butter, sweet paprika, ground
  ginger, cayenne pepper and onion powder. Cut chicken into strips, rub generously
  with the marinade and leave to marinate for at least 1 hour.'
- For the Jollof rice, blend the bell peppers and Scotch bonnet with half the tomatoes
  and one onion until smooth.
- Dice the remaining onions. Heat oil in a pot. Fry the onions for 5 minutes. Add
  tomato paste and cook until darkened.
- Add the tomato-pepper purée and simmer for 15 minutes until very thick. Stir in
  thyme and spices. Add the rice and toast for 2 minutes. Pour in the chicken stock.
  Cover and simmer over low heat for 25 minutes.
- Preheat the oven to 220 °C grill setting, or heat a grill pan. Thread the chicken
  onto skewers or place on a wire rack and grill for 10–12 minutes, turning, until
  slightly charred and cooked through.
- Serve the Suya chicken with Jollof rice, thinly sliced onion rings and chili flakes.
