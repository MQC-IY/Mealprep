de:
  title: Nigerianisches Suya-Hähnchen mit Jollof-Reis
  summary: 'Nigerianischer Straßenimbiss-Klassiker: Hähnchen in einer erdnussreichen
    Suya-Gewürzmischung mariniert und gegrillt, serviert mit würzigem Jollof-Reis.'
en:
  title: Nigerian Suya Chicken with Jollof Rice
  summary: 'A Nigerian street-food classic: chicken marinated in a peanut-rich Suya
    spice blend and grilled, served alongside smoky, spiced Jollof rice.'
