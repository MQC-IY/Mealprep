de:
  title: Tom Kha Gai – Thaikokos-Hühnersuppe
  summary: Reichhaltige Thai-Kokosmilchsuppe mit Hähnchen, Galgant, Zitronengras,
    Kaffirlimettenblättern und frischen Pilzen.
en:
  title: Tom Kha Gai – Thai Coconut Chicken Soup
  summary: A rich Thai coconut milk soup with chicken, galangal, lemongrass, kaffir
    lime leaves, and fresh mushrooms.
