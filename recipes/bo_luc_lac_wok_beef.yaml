de_steps:
- Jasminreis waschen und kochen.
- Rindfleisch in 3-cm-Würfel schneiden. Knoblauch fein hacken. Rote Zwiebel in halbe
  Ringe schneiden.
- 'Marinade: Sojasauce, Fischsauce, Austernsauce, Zucker und die Hälfte des Knoblauchs
  verrühren. Fleisch 20 Minuten darin marinieren.'
- Salat auf Tellern anrichten. Tomaten in Scheiben darauf legen.
- Öl im Wok bei maximaler Hitze erhitzen bis es leicht raucht. Rindfleisch portionsweise
  scharf 2–3 Minuten anbraten, dabei ständig schütteln.
- Restlichen Knoblauch und Zwiebelringe zugeben und 1 Minute mitbraten.
- Fleisch auf den Salat geben. Mit grobem schwarzen Pfeffer und Limettensaft übergießen.
- Mit Frühlingszwiebeln bestreuen und sofort servieren. Reis separat reichen.
en_steps:
- Wash and cook jasmine rice.
- Cut beef into 3 cm cubes. Finely chop garlic. Slice red onion into half-rings.
- 'Marinade: stir together soy sauce, fish sauce, oyster sauce, sugar, and half the
  garlic. Marinate the beef for 20 minutes.'
- Arrange lettuce on plates. Top with tomato slices.
- Heat oil in a wok over maximum heat until lightly smoking. Sear beef in batches
  for 2–3 minutes, shaking the wok constantly.
- Add remaining garlic and onion rings; stir-fry for 1 minute.
- Pile beef onto the salad. Drizzle with coarsely ground black pepper and lime juice.
- Scatter spring onions over and serve immediately. Serve rice on the side.
