de:
  title: Bò Lúc Lắc – Wok-gebratenes Rindfleisch auf Reis
  summary: Vietnamesisches 'Shaking Beef' – zartes Rindfleisch in würziger Marinade,
    scharf im Wok gebraten, auf Reis mit frischem Salat.
en:
  title: Bò Lúc Lắc – Wok-Fried Beef on Rice
  summary: Vietnamese 'shaking beef' — tender beef in a flavourful marinade, seared
    at high heat in a wok, served on rice with fresh salad.
