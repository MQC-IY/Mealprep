de:
  title: Hähnchen Provençale mit Oliven und Kräutern
  summary: Sonniges Schmorhuhn aus der Provence mit Oliven, Kapern, Tomaten, Herbes
    de Provence und einem Schuss Weißwein.
en:
  title: Chicken Provençale with Olives and Herbs
  summary: Sun-drenched braised chicken from Provence with olives, capers, tomatoes,
    herbes de Provence, and a splash of white wine.
