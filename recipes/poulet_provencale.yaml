de_steps:
- Hähnchenstücke mit Salz, Pfeffer und Paprikapulver würzen.
- Olivenöl im Schmortopf erhitzen, Hähnchen von beiden Seiten 5 Minuten goldbraun
  anbraten. Herausnehmen.
- Zwiebel in Ringe und Knoblauch grob hacken. Im Bratfett bei mittlerer Hitze 5 Minuten
  anschwitzen.
- Frische Tomaten grob würfeln und dazugeben, 3 Minuten mitschmoren.
- Herbes de Provence und Lorbeer einrühren. Mit Weißwein ablöschen, 2 Minuten einkochen.
- Dosentomaten zerdrückt und Brühe dazugeben. Hähnchenstücke zurücklegen, zugedeckt
  35 Minuten bei niedriger Hitze schmoren.
- Deckel abnehmen, Oliven und Kapern einrühren. 10 Minuten offen köcheln. Lorbeer
  entfernen.
- Mit frischem Basilikum bestreuen. Mit Couscous, Polenta oder Baguette servieren.
en_steps:
- Season chicken pieces with salt, pepper, and paprika.
- Heat olive oil in a braising pot and brown the chicken on both sides for 5 minutes.
  Remove and set aside.
- Slice the onion into rings and roughly chop the garlic. Sauté in the remaining fat
  over medium heat for 5 minutes.
- Roughly dice the fresh tomatoes and add them, simmering for 3 minutes.
- Stir in the herbes de Provence and bay leaves. Deglaze with white wine and reduce
  for 2 minutes.
- Add the crushed canned tomatoes and broth. Return the chicken, cover, and braise
  over low heat for 35 minutes.
- Remove the lid, stir in the olives and capers, and simmer uncovered for 10 minutes.
  Discard the bay leaves.
- Scatter fresh basil over the top and serve with couscous, polenta, or baguette.
