  summary: Rauchig-scharfer Schwarzbohnen-Eintopf mit Chipotle, Koriander und Limette
    — in 20 Minuten.
en:
  title: Quick Black Bean Stew
  summary: Smoky, spicy black bean stew with chipotle, cilantro, and lime — on the
    table in 20 minutes.
