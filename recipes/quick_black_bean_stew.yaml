de_steps:
- Zwiebel würfeln und Knoblauch hacken. In Olivenöl 3 Minuten anschwitzen.
- Kreuzkümmel, geräuchertes Paprika und Chipotle-Paste einrühren, 1 Minute rösten.
- Bohnen, Tomaten und Brühe hinzufügen. Aufkochen und 12 Minuten köcheln lassen. Ein
  Viertel der Bohnen mit einer Gabel zerdrücken, um die Suppe zu binden.
- Vom Herd nehmen, Limettensaft einrühren, mit Salz abschmecken und mit frisch gehacktem
  Koriander servieren.
en_steps:
- Dice the onion and chop the garlic. Sauté in olive oil for 3 minutes.
- Stir in the cumin, smoked paprika, and chipotle paste, and toast for 1 minute.
- Add the beans, tomatoes, and broth. Bring to a boil and simmer for 12 minutes. Mash
  a quarter of the beans with a fork to thicken the stew.
- Remove from the heat, stir in the lime juice, season with salt, and serve with freshly
  chopped cilantro.
