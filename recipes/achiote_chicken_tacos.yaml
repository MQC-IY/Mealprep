de_steps:
- 'Achiote-Marinade: Achiote-Paste mit Orangensaft, Limettensaft, 2 EL Olivenöl, Knoblauch,
  Kreuzkümmel, Oregano, Koriander gemahlen, Paprika und Chiliflocken glatt verrühren.'
- Hähnchen mit Marinade einreiben, 30–60 Minuten marinieren.
- 'Eingelegte rote Zwiebeln: Zwiebel in dünne Ringe schneiden, mit Reisessig, Salz
  und 1 Prise Zucker übergießen, mindestens 15 Minuten ziehen lassen.'
- Hähnchen in einer heißen Pfanne 6–7 Minuten je Seite garen. Herausnehmen und in
  Streifen zupfen.
- Tortillas trocken in der Pfanne kurz erwärmen.
- 'Tacos belegen: Hähnchen, eingelegte Zwiebeln, Jalapeño-Ringe, frischen Koriander
  und Limettensaft. Mit Salz abschmecken.'
en_steps:
- 'Achiote marinade: whisk together achiote paste, orange juice, lime juice, 2 tbsp
  olive oil, garlic, cumin, oregano, ground coriander, sweet paprika, and chili flakes
  until smooth.'
- Rub chicken with the marinade and leave to marinate for 30–60 minutes.
- 'Pickled red onions: slice onion into thin rings, pour over rice vinegar, salt,
  and a pinch of sugar; let sit for at least 15 minutes.'
- Cook chicken in a hot pan 6–7 minutes per side. Remove and shred into strips.
- Warm tortillas dry in the pan briefly.
- 'Assemble tacos: top with chicken, pickled onions, jalapeño rings, fresh cilantro,
  and a squeeze of lime juice. Season with salt.'
