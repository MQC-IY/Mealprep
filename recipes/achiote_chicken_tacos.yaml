de:
  title: Hähnchen-Tacos mit Achiote-Marinade
  summary: Mexikanisches Cochinita-Pibil-inspiriertes Hähnchen mit Annatto-Paste,
    Orangen- und Limettensaft – serviert in Mais-Tortillas mit Roten Zwiebeln und
    Koriander.
en:
  title: Chicken Tacos with Achiote Marinade
  summary: Mexican Cochinita-Pibil-inspired chicken marinated in annatto paste, orange
    and lime juice — served in corn tortillas with pickled red onions and fresh cilantro.
