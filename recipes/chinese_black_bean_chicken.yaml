de_steps:
- Jasminreis waschen und kochen.
- Hähnchen in dünne Streifen schneiden. Mit 1 EL Sojasauce, 1 EL Shaoxing-Wein, Stärke
  (1 EL) und Pfeffer 15 Minuten marinieren.
- Paprika und Zwiebel in Streifen schneiden. Knoblauch und Ingwer fein hacken.
- 'Sauce: Schwarze-Bohnen-Sauce, restliche Sojasauce, Austernsauce, Brühe, Chiliflocken
  und restliche Stärke (in Wasser) verrühren.'
- Öl im Wok bei starker Hitze erhitzen. Hähnchen 3–4 Minuten scharf braten. Herausnehmen.
- Knoblauch und Ingwer 30 Sek. anbraten. Zwiebel und Paprika 2 Minuten mitbraten.
- Restlichen Shaoxing-Wein zugeben. Hähnchen zurückgeben. Sauce angießen und 2 Min.
  eindicken lassen.
- Sesamöl und Frühlingszwiebeln unterheben. Mit Reis servieren.
en_steps:
- Rinse and cook the jasmine rice.
- Cut the chicken into thin strips. Marinate with 1 tbsp soy sauce, 1 tbsp Shaoxing
  wine, 1 tbsp cornstarch, and pepper for 15 minutes.
- Cut the bell peppers and onion into strips. Finely chop the garlic and ginger.
- 'Sauce: stir together the black bean sauce, remaining soy sauce, oyster sauce, stock,
  chili flakes, and remaining cornstarch dissolved in water.'
- Heat the oil in a wok over high heat. Stir-fry the chicken for 3–4 minutes. Remove
  and set aside.
- Stir-fry the garlic and ginger for 30 seconds. Add the onion and bell peppers and
  cook for 2 minutes.
- Pour in the remaining Shaoxing wine. Return the chicken. Add the sauce and let it
  thicken for 2 minutes.
- Fold in the sesame oil and spring onions. Serve with rice.
