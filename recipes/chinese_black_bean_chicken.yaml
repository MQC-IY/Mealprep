  summary: Herzhaftes chinesisches Hähnchen-Wokgericht mit fermentierter Schwarzer-Bohnen-Sauce,
    Paprika und Ingwer.
en:
  title: Chinese Chicken with Black Bean Sauce
  summary: A hearty Chinese wok dish featuring tender chicken strips in a rich fermented
    black bean sauce with bell peppers and ginger.
