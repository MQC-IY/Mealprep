de_steps:
- Zwiebel, Sellerie und Karotte fein würfeln. Knoblauch hacken.
- Olivenöl in einem schweren Topf erhitzen. Pancetta darin bei mittlerer Hitze 3–4
  Minuten auslassen, bis er leicht knusprig ist.
- Zwiebel, Sellerie und Karotte dazugeben, 6 Minuten anschwitzen. Knoblauch und Peperoncino
  einrühren, 1 Minute weiterbraten.
- Tomatenmark einrühren und kurz rösten. Die Hälfte der Bohnen hinzufügen.
- Mit Gemüsebrühe aufgießen, Rosmarinzweig einlegen. 20 Minuten bei niedriger Hitze
  köcheln.
- Rosmarinzweig entfernen. Einen Teil der Suppe mit dem Stabmixer pürieren, um eine
  cremige Basis zu erhalten. Restliche Bohnen einrühren.
- Pasta direkt in die Suppe geben und nach Packungsangabe gar kochen. Bei Bedarf etwas
  Brühe nachgießen.
- Mit Salz und Pfeffer abschmecken, mit Parmesan und einem Schuss Olivenöl anrichten.
en_steps:
- Finely dice the onion, celery and carrot. Chop the garlic.
- Heat the olive oil in a heavy pot. Render the pancetta over medium heat for 3–4
  minutes until lightly crisp.
- Add the onion, celery and carrot; sweat for 6 minutes. Stir in the garlic and peperoncino
  and cook for 1 more minute.
- Stir in the tomato paste and briefly toast. Add half the beans.
- Pour in the vegetable stock and add the rosemary sprig. Simmer over low heat for
  20 minutes.
- Remove the rosemary sprig. Blend part of the soup with a stick blender to create
  a creamy base. Stir in the remaining beans.
- Add the pasta directly to the soup and cook until done according to the packet instructions.
  Add a little more stock if needed.
- Season with salt and pepper, then serve with a drizzle of olive oil and a sprinkle
  of Parmesan.
