de:
  title: Pasta e Fagioli – Pasta-Bohnen-Eintopf
  summary: Neapolitanischer Pasta-Bohnen-Eintopf – cremig, herzhaft und mit Peperoncino
    und Rosmarin aromatisch gewürzt.
en:
  title: Pasta e Fagioli – Pasta and Bean Soup
  summary: Neapolitan pasta and bean soup – creamy, hearty and beautifully seasoned
    with peperoncino and rosemary.
