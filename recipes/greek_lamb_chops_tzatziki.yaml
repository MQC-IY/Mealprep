de:
  title: Griechische Lammkoteletts mit Tzatziki und Pita
  summary: In Olivenöl, Knoblauch und Oregano marinierte Lammkoteletts, scharf gegrillt
    und mit cremigem Kräutertzatziki und warmem Fladenbrot serviert.
en:
  title: Greek Lamb Chops with Tzatziki and Pita
  summary: Lamb chops marinated in olive oil, garlic, and oregano, seared over high
    heat, and served with creamy herbed tzatziki and warm flatbread.
