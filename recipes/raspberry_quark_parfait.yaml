id: raspberry_quark_parfait
pool: dessert
healthy: true
meals: 8
de:
  title: Himbeer-Quark-Parfait
  summary: Leichtes Schichtdessert aus cremigem Magerquark, frischen Himbeeren und
    knusprigem Hafergranola — eiweißreich, natürlich gesüßt und in Minuten zubereitet.
en:
  title: Raspberry Quark Parfait
  summary: A light layered dessert of creamy low-fat quark, fresh raspberries, and
    crunchy oat granola — protein-rich, naturally sweetened, and ready in minutes.
ingredients:
- de_name: Magerquark
  en_name: low-fat quark
  qty: 1000
  unit: g
  category: Protein und Milchprodukte
- de_name: Naturjoghurt (3,5 %)
  en_name: plain yogurt (3.5%)
  qty: 300
  unit: g
  category: Protein und Milchprodukte
- de_name: Honig
  en_name: honey
  qty: 4
  unit: EL
  category: Konserven und Vorrat
- de_name: Vanilleextrakt
  en_name: vanilla extract
  qty: 2
  unit: TL
  category: Gewürze
- de_name: frische oder TK-Himbeeren
  en_name: fresh or frozen raspberries
  qty: 600
  unit: g
  category: Obst
- de_name: Zitronensaft
  en_name: lemon juice
  qty: 2
  unit: EL
  category: Obst
- de_name: Agavendicksaft
  en_name: agave syrup
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Hafergranola ungesüßt
  en_name: unsweetened oat granola
  qty: 200
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: frische Minze zum Garnieren
  en_name: fresh mint for garnish
  qty: 1
  unit: Stk
  category: Gewürze
de_steps:
- Magerquark, Joghurt, Honig und Vanilleextrakt in einer Schüssel cremig verrühren.
- Himbeeren mit Zitronensaft und Agavendicksaft in einer separaten Schüssel leicht
  zerdrücken, sodass ein dickflüssiges Kompott entsteht. TK-Himbeeren vorher auftauen
  lassen.
- 8 hohe Gläser oder Dessertbecher bereitstellen.
- Zuerst eine Schicht Granola einfüllen, dann Quarkcreme daraufgeben, anschließend
  eine Schicht Himbeerkompott. Vorgang einmal wiederholen.
- Parfaits mit frischer Minze garnieren.
- Sofort servieren oder maximal 2 Stunden im Kühlschrank aufbewahren, damit das Granola
  knusprig bleibt. Für Meal-Prep Komponenten getrennt lagern.
en_steps:
- Stir the quark, yogurt, honey, and vanilla extract together in a bowl until smooth
  and creamy.
- In a separate bowl, lightly crush the raspberries with the lemon juice and agave
  syrup to form a thick compote. If using frozen raspberries, thaw them first.
- Set out 8 tall glasses or dessert cups.
- Add a layer of granola first, then spoon in the quark cream, followed by a layer
  of raspberry compote. Repeat once.
- Garnish the parfaits with fresh mint.
- Serve immediately or refrigerate for up to 2 hours to keep the granola crispy. For
  meal prep, store the components separately.
