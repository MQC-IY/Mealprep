de:
  title: Türkisches İskender-Kebab mit Joghurt und Butter
  summary: Zartes, dünn geschnittenes Lammhackfleisch auf knusprigem Fladenbrot, übergossen
    mit würziger Tomatensauce, heißer Gewürzbutter und cremigem Joghurt.
en:
  title: Turkish İskender Kebab with Yogurt and Butter
  summary: Tender thinly sliced ground lamb on crispy flatbread, drenched in spiced
    tomato sauce, hot spiced butter, and creamy yogurt.
ingredients:
