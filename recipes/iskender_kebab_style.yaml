de:
  title: Türkisches İskender-Kebab mit Joghurt und Butter
  summary: |-
    Zartes, dünn geschnittenes Lammhackfleisch auf knusprigem Fladenbrot, übergossen mit würziger Tomatensauce, heißer Gewürzbutter und cremigem Joghurt.
