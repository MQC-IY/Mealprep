de_steps:
- Zwiebeln fein würfeln, Knoblauch pressen. Olivenöl in einer großen Pfanne bei hoher
  Hitze erhitzen und die Zwiebeln 5 Minuten goldbraun anbraten.
- Lammhackfleisch hinzufügen und unter ständigem Rühren krümelig braun anbraten. Knoblauch,
  Kreuzkümmel, Paprikapulver, 1 TL Pul Biber und Schwarzen Pfeffer einarbeiten und
  2 Minuten mitrösten.
- Tomatenmark einrühren, weitere 1 Minute rösten. Gehackte Tomaten und 100 ml Wasser
  dazugeben, mit Salz abschmecken. Sauce 15 Minuten bei mittlerer Hitze einkochen
  lassen.
- Fladenbrot in mundgerechte Stücke reißen, auf einem Backblech verteilen und im Ofen
  bei 200 °C 5 Minuten anrösten, bis sie leicht knusprig sind.
- Joghurt mit einer Prise Salz und getrockneter Minze verrühren und beiseitestellen.
- Butter in einem kleinen Topf bei mittlerer Hitze schmelzen, bis sie leicht bräunlich
  duftet. Restlichen 1 TL Pul Biber einrühren – die Gewürzbutter sofort vom Herd nehmen.
- 'Zum Servieren: Geröstetes Brot auf Teller legen, großzügig mit Fleischsauce bedecken,
  Joghurt darüber verteilen und die heiße Gewürzbutter über alles träufeln.'
en_steps:
- Finely dice the onions and press the garlic. Heat olive oil in a large pan over
  high heat and fry onions for 5 minutes until golden.
- Add the ground lamb and fry, stirring constantly, until crumbled and browned. Work
  in garlic, cumin, paprika, 1 tsp pul biber and black pepper and toast for 2 minutes.
- Stir in the tomato paste and toast for 1 more minute. Add chopped tomatoes and 100
  ml water; season with salt. Simmer sauce over medium heat for 15 minutes.
- Tear flatbread into bite-sized pieces, spread on a baking tray and toast in the
  oven at 200 °C for 5 minutes until lightly crisp.
- Stir yogurt with a pinch of salt and dried mint; set aside.
- Melt butter in a small saucepan over medium heat until it smells lightly nutty.
  Stir in the remaining 1 tsp pul biber – immediately remove the spiced butter from
  the heat.
- 'To serve: place toasted bread on plates, cover generously with meat sauce, spread
  yogurt on top, and drizzle the hot spiced butter over everything.'
