de_steps:
- Eier hart kochen (10 Minuten), abschrecken, pellen und halbieren.
- Auberginen in 1,5 cm dicke Scheiben schneiden, salzen, 10 Minuten ziehen lassen,
  abtrocknen. In reichlich Olivenöl von beiden Seiten goldbraun braten.
- Hähnchen mit Kurkuma, Paprika, Kreuzkümmel, Chiliflocken, Knoblauch und Olivenöl
  würzen. In der Pfanne scharf anbraten und durchgaren.
- 'Tahini-Sauce: Tahini mit Zitronensaft, 1 Knoblauchzehe und ca. 4 EL Wasser zu einer
  cremigen Sauce verrühren, salzen.'
- Tomaten würfeln. Petersilie grob hacken. Mit Sumach, Zitronensaft und etwas Olivenöl
  abschmecken.
- Fladenbrote erwärmen. Bowls mit Hähnchen, Aubergine, Eiern, Tomaten-Petersilienssalat
  anrichten. Tahini und Mango-Chutney darüber geben.
en_steps:
- Hard-boil the eggs (10 minutes), cool in cold water, peel, and halve.
- Cut the eggplants into 1.5 cm thick slices, salt, let sit for 10 minutes, and pat
  dry. Fry in generous olive oil until golden brown on both sides.
- Season the chicken with turmeric, paprika, cumin, chili flakes, garlic, and olive
  oil. Sear in a hot pan and cook through.
- 'Tahini sauce: whisk the tahini with lemon juice, 1 garlic clove, and about 4 tbsp
  water until smooth and creamy; season with salt.'
- Dice the tomatoes. Roughly chop the parsley. Season with sumac, lemon juice, and
  a little olive oil.
- Warm the flatbreads. Assemble the bowls with chicken, eggplant, eggs, and tomato-parsley
  salad. Drizzle with tahini and mango chutney.
