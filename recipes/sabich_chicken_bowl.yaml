de:
  title: Israelische Sabich-Bowl mit Aubergine und Tahini
  summary: 'Inspiriert vom israelischen Streetfood: gebratene Aubergine, hart gekochte
    Eier, Hähnchen, Tahini-Sauce, Amba-Mango-Chutney und knackiger Salat.'
en:
  title: Israeli Sabich Bowl with Eggplant and Tahini
  summary: 'Inspired by Israeli street food: fried eggplant, hard-boiled eggs, chicken,
    tahini sauce, amba mango chutney, and crisp salad.'
