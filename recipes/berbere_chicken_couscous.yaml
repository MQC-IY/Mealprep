  title: Hähnchen in Berbere-Joghurt-Marinade mit Couscous
  summary: Äthiopische Berbere-Gewürzmischung trifft auf Joghurtmarinade – butterweiches
    Hähnchen mit intensiver Wärme aus Chili, Fenugreek und Nelken auf lockerem Couscous.
en:
  title: Chicken in Berbere Yogurt Marinade with Couscous
  summary: Ethiopian berbere spice blend meets a yogurt marinade — meltingly tender
    chicken with intense warmth from chili, fenugreek, and cloves, served on fluffy
    couscous.
