de_steps:
- Hähnchen in großzügige Stücke schneiden. Joghurt mit Berbere, Paprika, Kreuzkümmel,
  Knoblauch, Ingwer, Chiliflocken und Zitronensaft vermengen. Hähnchen darin 30–60
  Minuten marinieren.
- Hähnchen in einer schweren, heißen Pfanne scharf anbraten, ca. 4–5 Minuten je Seite.
- Zwiebel fein würfeln und im Bratfett glasig dünsten. Gehackte Tomaten und etwas
  Brühe zugeben, 10 Minuten einköcheln lassen. Hähnchen zurück in die Sauce geben.
- Couscous mit heißer Brühe übergießen, 5 Minuten quellen lassen, mit Gabel auflockern.
  Mit Olivenöl und Salz abschmecken.
- Mit frischem Koriander und Zitronenscheiben servieren.
en_steps:
- Cut chicken into generous pieces. Mix yogurt with berbere, sweet paprika, cumin,
  garlic, ginger, chili flakes, and lemon juice. Marinate chicken for 30–60 minutes.
- Sear chicken in a heavy hot pan, about 4–5 minutes per side.
- Finely dice onion and sweat in the cooking fat until translucent. Add chopped tomatoes
  and a little stock; simmer for 10 minutes. Return chicken to the sauce.
- Pour hot stock over couscous, leave to swell for 5 minutes, then fluff with a fork.
  Season with olive oil and salt.
- Serve with fresh cilantro and lemon wedges.
