de_steps:
- Reis garen.
- Brokkoli und Möhren weich garen.
- Bohnen kurz erwärmen und alles mischen.
en_steps:
- Cook the rice.
- Cook broccoli and carrots until tender.
- Warm the beans briefly and mix everything together.
