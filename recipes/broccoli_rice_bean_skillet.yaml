de:
  title: Reispfanne mit Brokkoli und Bohnen
  summary: Schnelle milde Reispfanne mit Brokkoli, weißen Bohnen und Möhren.
en:
  title: Rice Skillet with Broccoli and Beans
  summary: Quick, mild rice skillet with broccoli, white beans, and carrots.
ingredients:
- de_name: Reis
  en_name: rice
  qty: 300
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Weiße Bohnen
  en_name: white beans
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Brokkoli
  en_name: broccoli
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Paprika edelsüß
  en_name: sweet paprika
  qty: 1
  unit: TL
  category: Gewürze
