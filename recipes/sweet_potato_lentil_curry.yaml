de_steps:
- Zwiebel fein würfeln, Knoblauch und Ingwer reiben oder hacken. Süßkartoffeln in
  2 cm große Würfel schneiden.
- Öl in einem großen Topf bei hoher Hitze erhitzen. Zwiebel 5 Minuten kräftig anbraten,
  bis goldbraun.
- Knoblauch, Ingwer und Tomatenmark zugeben und 1 bis 2 Minuten rösten. Kurkuma, Kreuzkümmel,
  Koriander, Garam Masala und Chiliflocken einrühren und 1 Minute trocken rösten.
- Gehackte Tomaten, Süßkartoffeln und Kokosmilch zugeben. 200 ml Wasser dazugeben
  und alles gut verrühren.
- Linsen einrühren und bei mittlerer Hitze 20 bis 25 Minuten köcheln lassen, bis Süßkartoffeln
  und Linsen weich sind.
- Spinat unterheben. Mit Limettensaft, Salz und ggf. mehr Chiliflocken abschmecken.
  Mit Naan, Fladenbrot oder Basmatireis servieren.
en_steps:
- Finely dice onion; grate or mince garlic and ginger. Cut sweet potatoes into 2 cm
  cubes.
- Heat oil in a large pot over high heat. Fry onion vigorously for 5 minutes until
  golden brown.
- Add garlic, ginger and tomato paste; fry for 1–2 minutes. Stir in turmeric, cumin,
  coriander, garam masala and chilli flakes; dry-toast for 1 minute.
- Add chopped tomatoes, sweet potatoes and coconut milk. Pour in 200 ml water and
  stir well.
- Stir in lentils and simmer over medium heat for 20–25 minutes until sweet potatoes
  and lentils are soft.
- Fold in spinach. Season with lime juice, salt and extra chilli flakes if desired.
  Serve with naan, flatbread or basmati rice.
