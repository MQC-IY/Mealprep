de:
  title: Süßkartoffel-Linsen-Curry
  summary: Kräftig gewürztes Curry mit Süßkartoffeln, roten Linsen und Kokosmilch
    – Kreuzkümmel, Koriander, Kurkuma und Chili geben dem Gericht echtes Aroma.
en:
  title: Sweet Potato and Lentil Curry
  summary: A boldly spiced curry with sweet potatoes, red lentils and coconut milk
    – cumin, coriander, turmeric and chilli give this dish real depth of flavour.
