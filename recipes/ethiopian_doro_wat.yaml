de_steps:
- Hähnchenstücke mit etwas Zitronensaft und Salz einreiben und 15 Minuten ziehen lassen.
- Rote Zwiebeln sehr fein würfeln. Niter Kibbeh in einem schweren Topf bei mittlerer
  Hitze schmelzen. Zwiebeln zugeben und unter gelegentlichem Rühren 20–25 Minuten
  karamellisieren, bis sie sehr dunkelbraun und süßlich sind.
- Knoblauch und Ingwer reiben, zugeben und 2 Minuten mitrösten.
- Berbere-Gewürzmischung, Kreuzkümmel, Kardamom und Kurkuma einrühren und 2 Minuten
  bei niedriger Hitze trocken rösten.
- Tomatenmark einrühren, 1 Minute mitrösten. Hühnerbrühe zugeben, aufkochen.
- Hähnchenstücke in die Sauce legen, Deckel drauf und 35–40 Minuten bei niedriger
  Hitze schmoren.
- Eier hartkochen, schälen und rundum mit einer Gabel einstechen damit die Sauce einziehen
  kann. Die letzten 10 Minuten mitköcheln. Mit Injera oder Fladenbrot servieren.
en_steps:
- Rub the chicken pieces with a little lemon juice and salt; leave to stand for 15
  minutes.
- Very finely dice the red onions. Melt the niter kibbeh in a heavy pot over medium
  heat. Add the onions and caramelise, stirring occasionally, for 20–25 minutes until
  very dark brown and sweet.
- Grate the garlic and ginger; add to the pot and stir-fry for 2 minutes.
- Stir in the berbere spice blend, cumin, cardamom, and turmeric; toast over low heat
  for 2 minutes.
- Stir in the tomato paste and cook for 1 minute. Add the chicken stock and bring
  to a boil.
- Nestle the chicken pieces in the sauce, cover, and braise over low heat for 35–40
  minutes.
- Hard-boil the eggs, peel, and prick all over with a fork so the sauce can penetrate.
  Add for the last 10 minutes of simmering. Serve with injera or flatbread.
