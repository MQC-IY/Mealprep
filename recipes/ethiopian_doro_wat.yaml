de:
  title: Äthiopisches Hähnchen-Doro Wat
  summary: 'Äthiopiens Nationalgericht: Hähnchen in einer intensiven, tiefroten Berbere-Chili-Sauce
    mit karamellisierten Zwiebeln, Niter Kibbeh und hartgekochten Eiern.'
en:
  title: Ethiopian Chicken Doro Wat
  summary: 'Ethiopia''s national dish: chicken in an intensely deep-red berbere sauce
    with caramelised onions, niter kibbeh, and hard-boiled eggs.'
