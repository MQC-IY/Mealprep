de_steps:
- Hähnchenbrust in gleichmäßige Würfel schneiden, mit Salz und Pfeffer würzen. In
  Olivenöl bei hoher Hitze 4–5 Minuten goldbraun anbraten. Herausnehmen.
- Zwiebel würfeln und Knoblauch hacken. Im Bratfett 2 Minuten anschwitzen.
- Oregano und Chiliflocken einrühren. Tomaten, Brühe, Oliven und Kapern hinzufügen
  und aufkochen.
- Hähnchen zurückgeben und 12 Minuten bei mittlerer Hitze köcheln lassen. Abschmecken.
en_steps:
- Cut the chicken breast into even cubes and season with salt and pepper. Sear in
  olive oil over high heat for 4–5 minutes until golden. Remove and set aside.
- Dice the onion and chop the garlic. Sauté in the remaining fat for 2 minutes.
- Stir in the oregano and chili flakes. Add the tomatoes, broth, olives, and capers
  and bring to a boil.
- Return the chicken and simmer over medium heat for 12 minutes. Season to taste.
