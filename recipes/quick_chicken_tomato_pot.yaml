de:
  title: Schneller Hähnchen-Tomaten-Topf
  summary: Saftige Hähnchenbrust in mediteraner Tomaten-Oliven-Kapernsauce in knapp
    30 Minuten.
en:
  title: Quick Chicken Tomato Pot
  summary: Juicy chicken breast in a Mediterranean tomato, olive, and caper sauce
    — done in just under 30 minutes.
