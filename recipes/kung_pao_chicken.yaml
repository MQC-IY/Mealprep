de_steps:
- Jasminreis waschen und kochen.
- Hähnchen in 2-cm-Würfel schneiden. Mit 1 EL Sojasauce, 1 EL Shaoxing-Wein und Speisestärke
  (1 EL) vermischen und 15 Minuten marinieren.
- 'Sauce: restliche Sojasauce, dunkle Sojasauce, Reisessig, Zucker und restliche Stärke
  (in 2 EL Wasser aufgelöst) verrühren.'
- Öl im Wok bei starker Hitze erhitzen. Getrocknete Chilis und Szechuanpfeffer 30
  Sekunden anbraten, bis sie duften.
- Hähnchen zugeben und 3–4 Minuten scharf anbraten. Knoblauch und Ingwer zugeben und
  1 Minute mitbraten.
- Sauce angießen und unter Rühren aufkochen, bis sie eindickt.
- Erdnüsse und Frühlingszwiebeln zugeben. Sesamöl unterrühren.
- Mit Jasminreis anrichten.
en_steps:
- Wash and cook jasmine rice.
- Cut chicken into 2 cm cubes. Mix with 1 tbsp soy sauce, 1 tbsp Shaoxing wine, and
  cornstarch (1 tbsp); marinate for 15 minutes.
- 'Sauce: whisk together the remaining soy sauce, dark soy sauce, rice vinegar, sugar,
  and remaining starch (dissolved in 2 tbsp water).'
- Heat oil in a wok over high heat. Fry dried chilies and Sichuan pepper for 30 seconds
  until fragrant.
- Add chicken and sear for 3–4 minutes. Add garlic and ginger and fry for 1 minute.
- Pour in sauce and stir until it thickens.
- Add peanuts and spring onions. Stir in sesame oil.
- Serve with jasmine rice.
