de:
  title: Kung Pao Hähnchen mit Reis
  summary: Klassisches Sichuan-Gericht mit zartem Hähnchen, getrockneten Chilischoten,
    knackigen Erdnüssen und betäubend-scharfer Würze.
en:
  title: Kung Pao Chicken with Rice
  summary: Classic Sichuan dish with tender chicken, dried chilies, crunchy peanuts,
    and numbing-spicy seasoning.
