de:
  title: Hähnchen-Pho mit Reisnudeln
  summary: Duftende vietnamesische Hühnersuppe mit klarer Gewürzbrühe, zarten Reisnudeln
    und frischen Kräutern.
en:
  title: Pho Ga – Chicken Pho with Rice Noodles
  summary: Fragrant Vietnamese chicken soup with a clear, aromatic spice broth, tender
    rice noodles and fresh herbs.
