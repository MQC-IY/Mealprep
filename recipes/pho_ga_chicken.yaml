de_steps:
- Zwiebeln und Ingwer über einer offenen Flamme oder unter dem Backofengrill 5–7 Minuten
  anrösten, bis sie leicht verkohlt sind. Oberfläche abkratzen.
- Hähnchenschenkel in kaltem Wasser kurz aufkochen, abgießen und abspülen (Blanchierschritt
  für klare Brühe).
- Sternanis, Zimtstange, Nelken und Koriandersamen in einer trockenen Pfanne 2 Minuten
  anrösten.
- Hähnchen, Zwiebeln, Ingwer, Gewürze und 1,5 Liter frisches Wasser in einem großen
  Topf aufkochen. Schaum abschöpfen.
- Bei kleiner Hitze 45–60 Minuten ziehen lassen. Hähnchen herausnehmen, Fleisch vom
  Knochen lösen und in Stücke zupfen.
- Brühe durch ein Sieb gießen, mit Fischsauce und Salz kräftig abschmecken.
- Reisnudeln nach Packungsanweisung garen.
- Nudeln in tiefe Schalen verteilen, Hähnchen darüber geben, heiße Brühe angießen.
- Mit Sojasprossen, Frühlingszwiebeln, Koriander, frischer Chili und Limettenspalten
  servieren.
en_steps:
- Char the onions and ginger over an open flame or under the oven grill for 5–7 minutes
  until lightly blackened. Scrape off the outer layer.
- Briefly blanch the chicken thighs in cold water, drain and rinse (blanching step
  for a clear broth).
- Toast the star anise, cinnamon stick, cloves and coriander seeds in a dry pan for
  2 minutes.
- Combine the chicken, onions, ginger, spices and 1.5 litres of fresh water in a large
  pot and bring to a boil. Skim off any foam.
- Simmer over low heat for 45–60 minutes. Remove the chicken, pull the meat off the
  bone and shred into pieces.
- Strain the broth through a fine sieve and season well with fish sauce and salt.
- Cook the rice noodles according to the packet instructions.
- Divide the noodles among deep bowls, top with chicken and ladle over the hot broth.
- Serve with bean sprouts, spring onions, fresh coriander, sliced red chili and lime
  wedges.
