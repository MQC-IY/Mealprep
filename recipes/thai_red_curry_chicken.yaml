de_steps:
- Jasminreis waschen und mit der 1,5-fachen Menge Wasser zum Kochen bringen. 12 Minuten
  bei kleiner Hitze garziehen lassen.
- Hähnchen in mundgerechte Würfel schneiden. Aubergine würfeln und 10 Minuten in Salzwasser
  einweichen, abgießen. Paprika in Streifen schneiden.
- Zitronengras anquetschen. Galgant in Scheiben schneiden. Chilischoten halbieren
  und entkernen.
- Öl im Wok erhitzen. Rote Currypaste 1–2 Minuten scharf anrösten.
- 4 EL dicke Kokosmilch zugeben und einrühren. Hähnchen zugeben und rundherum anbraten
  (3–4 Min.).
- Restliche Kokosmilch, Fond, Kaffirlimettenblätter, Zitronengras und Galgant zugeben.
  Aufkochen lassen.
- Aubergine und Paprika zufügen. Bei mittlerer Hitze 10 Minuten köcheln.
- Mit Fischsauce, Palmzucker und Limettensaft abschmecken. Zitronengras und Galgant
  entfernen.
- Thai-Basilikum einrühren. Mit Reis anrichten und mit frischer Chili und Chiliflocken
  bestreuen.
en_steps:
- Wash jasmine rice and bring to a boil with 1.5 times the amount of water. Cook on
  low heat for 12 minutes.
- Cut chicken into bite-sized cubes. Dice eggplant and soak in salted water for 10
  minutes; drain. Cut bell pepper into strips.
- Bruise lemongrass. Slice galangal. Halve and deseed chillies.
- Heat oil in a wok. Stir-fry red curry paste for 1–2 minutes until fragrant.
- Add 4 tbsp of thick coconut milk and stir in. Add chicken and fry on all sides for
  3–4 minutes.
- Pour in remaining coconut milk, stock, kaffir lime leaves, lemongrass and galangal.
  Bring to a boil.
- Add eggplant and bell pepper. Simmer over medium heat for 10 minutes.
- Season with fish sauce, palm sugar and lime juice. Remove lemongrass and galangal.
- Stir in Thai basil. Plate with rice and sprinkle with fresh chilli and chilli flakes.
