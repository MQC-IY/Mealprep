de_steps:
- Couscous quellen lassen.
- Bohnen mit Spinat kurz erwärmen, bis der Spinat zusammenfällt.
- Joghurt mit etwas Zitrone verrühren.
en_steps:
- Steep the couscous in boiling water until absorbed.
- Warm the beans and spinach together until the spinach wilts.
- Stir the yogurt with a little lemon juice.
