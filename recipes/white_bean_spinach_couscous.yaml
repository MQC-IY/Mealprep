de:
  title: Couscous mit weißen Bohnen und Spinat
  summary: Sehr schnelles Couscousgericht mit Bohnen, Spinat und Zitronenjoghurt.
en:
  title: Couscous with White Beans and Spinach
  summary: A very quick couscous dish with white beans, spinach, and a lemony yogurt
    dressing.
