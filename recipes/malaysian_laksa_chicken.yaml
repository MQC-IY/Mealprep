de:
  title: Malaysisches Laksa mit Hähnchen
  summary: Reichhaltige malaysische Kokos-Curry-Nudelsuppe mit zartem Hähnchen, Reisnudeln,
    Garnelen-Paste, Zitronengras und Kaffirlimette.
en:
  title: Malaysian Laksa with Chicken
  summary: A rich Malaysian coconut-curry noodle soup with tender chicken, rice noodles,
    shrimp paste, lemongrass, and kaffir lime.
