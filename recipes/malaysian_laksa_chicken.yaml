de_steps:
- 'Laksa-Paste herstellen: Zwiebeln, Knoblauch, Ingwer, rote Chilis, Zitronengras
  (weiches inneres) und Kurkuma mit 2 EL Öl im Mixer zu einer feinen Paste pürieren.'
- Hähnchenbrust in Salzwasser 20 Minuten gar köcheln, herausnehmen, abkühlen und in
  Fasern zupfen.
- Reisnudeln nach Packungsangabe in heißem Wasser einweichen bis al dente. Abspülen
  und abtropfen.
- Öl in einem großen Topf bei mittlerer-hoher Hitze erhitzen. Laksa-Paste 5–7 Minuten
  unter Rühren anbraten bis sie sehr aromatisch ist.
- Gemahlenen Koriander, Kreuzkümmel und Chiliflocken zugeben, 1 Minute rösten. Angequetschte
  Zitronengrasstangen und Kaffirlimettenblätter zugeben.
- Kokosmilch und Hühnerbrühe angießen, aufkochen. Fischsauce zugeben und 10 Minuten
  köcheln.
- 'Gezupftes Hähnchen in der Brühe erwärmen. In Schüsseln: Reisnudeln, heiße Laksa-Brühe
  mit Hähnchen, Sojasprossen, Limettenspalten und Chiliflocken anrichten.'
en_steps:
- 'Make the laksa paste: blend the onions, garlic, ginger, red chilies, lemongrass
  (soft inner part), and turmeric with 2 tbsp oil in a blender until smooth.'
- Simmer the chicken breast in salted water for 20 minutes until cooked through. Remove,
  let cool, then shred into strands.
- Soak the rice noodles in hot water according to packet instructions until al dente.
  Rinse and drain.
- Heat oil in a large pot over medium-high heat. Stir-fry the laksa paste for 5–7
  minutes until very fragrant.
- Add the ground coriander, cumin, and chili flakes; toast for 1 minute. Add the bruised
  lemongrass stalks and kaffir lime leaves.
- Pour in the coconut milk and chicken broth; bring to a boil. Add the fish sauce
  and simmer for 10 minutes.
- Warm the shredded chicken in the broth. Assemble bowls with rice noodles, hot laksa
  broth with chicken, bean sprouts, lime wedges, and chili flakes.
