de:
  title: Nudeltopf mit Bohnen und Gemüse
  summary: Schneller, milder Topf mit kleinen Nudeln, Bohnen, Möhren und Zucchini.
en:
  title: Bean and Vegetable Noodle Pot
  summary: Quick, mild pot with small pasta, beans, carrots, and zucchini.
ingredients:
- de_name: Kleine Suppennudeln
  en_name: small soup pasta
  qty: 220
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Weiße Bohnen
  en_name: white beans
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Möhren
  en_name: carrots
  qty: 3
  unit: Stk
  category: Gemüse und Salat
- de_name: Zucchini
  en_name: zucchini
  qty: 1
  unit: Stk
  category: Gemüse und Salat
