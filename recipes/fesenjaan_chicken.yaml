de_steps:
- Walnüsse in einer trockenen Pfanne goldbraun rösten, abkühlen lassen und im Mixer
  sehr fein mahlen – bis sie eine fettige, mehlförmige Konsistenz haben.
- Safran in 2 EL warmem Wasser einweichen. Zwiebeln fein würfeln und in Olivenöl 12
  Minuten goldbraun anbraten.
- Hähnchen dazugeben und von allen Seiten anbraten. Gemahlene Walnüsse einrühren.
- Hühnerbrühe, Granatapfelsirup, Safranwasser, Zimt und Kardamom hinzufügen. Gut verrühren,
  aufkochen.
- Bei niedriger Hitze 45–60 Minuten unabgedeckt köcheln lassen, bis die Sauce tief
  dunkelbraun ist und sich das Walnussöl oben absetzt. Gelegentlich rühren.
- Mit Zucker und Salz nach Geschmack abschmecken – die Sauce soll süß-säuerlich-herb
  sein. Mit Basmatireis und frischen Granatapfelkernen servieren.
en_steps:
- Toast the walnuts in a dry pan until golden, let cool, then grind very finely in
  a blender until they reach a fatty, flour-like consistency.
- Soak saffron in 2 tbsp warm water. Finely dice the onions and sauté in olive oil
  for 12 minutes until golden.
- Add the chicken and brown on all sides. Stir in the ground walnuts.
- Add chicken stock, pomegranate molasses, saffron water, cinnamon, and cardamom.
  Stir well and bring to a boil.
- Simmer uncovered over low heat for 45–60 minutes until the sauce is a deep dark
  brown and the walnut oil rises to the surface. Stir occasionally.
- Season to taste with sugar and salt — the sauce should be sweet, sour, and slightly
  bitter. Serve with basmati rice and fresh pomegranate seeds.
