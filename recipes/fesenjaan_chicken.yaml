de:
  title: Persisches Fesenjan – Hähnchen in Walnuss-Granatapfel-Sauce
  summary: Hähnchen in einer unverwechselbaren, tiefbraunen Walnuss-Granatapfel-Sauce
    – das Herzstück der persischen Festküche.
en:
  title: Fesenjaan – Persian Chicken in Walnut & Pomegranate Sauce
  summary: Chicken simmered in a uniquely deep, dark walnut-pomegranate sauce — the
    jewel of Persian festive cooking.
