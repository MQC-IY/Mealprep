de_steps:
- Couscous mit heißem Wasser und etwas Salz quellen lassen.
- Hähnchen in Streifen schneiden und mit Kreuzkümmel, Koriander, Kurkuma, Zimt, Paprika
  edelsüß, Chiliflocken, Salz und Olivenöl marinieren.
- Hähnchen bei hoher Hitze in einer Pfanne scharf anbraten, bis es braune Stellen
  hat.
- Gurke und Möhren klein schneiden, Joghurt mit etwas Zitrone verrühren.
en_steps:
- Steep the couscous in hot salted water until absorbed.
- Cut the chicken into strips and marinate with cumin, coriander, turmeric, cinnamon,
  sweet paprika, chili flakes, salt, and olive oil.
- Sear the chicken in a hot pan over high heat until nicely browned.
- Dice the cucumber and carrots. Stir the yogurt with a squeeze of lemon.
