de:
  title: Shawarma-Hähnchen mit Couscous und Gurken-Joghurt
  summary: Hähnchen mit Shawarma-Gewürzmischung (Kreuzkümmel, Koriander, Kurkuma,
    Zimt) auf Couscous mit frischer Gurke und Knoblauchjoghurt.
en:
  title: Shawarma Chicken with Couscous and Cucumber Yogurt
  summary: Chicken spiced with a shawarma blend (cumin, coriander, turmeric, cinnamon)
    served on couscous with fresh cucumber and garlicky yogurt.
