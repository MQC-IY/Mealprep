de:
  title: Paprika-Orzo mit Hähnchen
  summary: Schnelle Orzo-Pfanne mit Hähnchen, Paprika und Frischkäse.
en:
  title: Paprika Orzo with Chicken
  summary: A quick orzo pan with juicy chicken, sweet bell pepper, and a creamy cream-cheese
    sauce — comfort food in under 25 minutes.
ingredients:
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 750
  unit: g
  category: Protein und Milchprodukte
- de_name: Orzo oder Kritharaki
  en_name: orzo
  qty: 300
  unit: g
