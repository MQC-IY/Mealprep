de:
  title: Türkischer Kısır-Bowl mit Hähnchen
  summary: Türkischer Bulgur-Salat mit Granatapfelmelasse, Sumach und frischen Kräutern,
    kombiniert mit gegrillter Hähnchenbrust – knackig, fruchtig und feurig.
en:
  title: Turkish Kısır Bowl with Chicken
  summary: A Turkish bulgur salad with pomegranate molasses, sumac, and fresh herbs,
    paired with grilled chicken breast – crunchy, fruity, and fiery.
