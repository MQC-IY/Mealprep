de_steps:
- Hähnchenbrust mit Paprikapulver, Pul Biber, Salz und Olivenöl (2 EL) einmassieren.
  In einer Grillpfanne bei hoher Hitze 5–6 Minuten pro Seite grillen, bis sie durch
  ist. 5 Minuten ruhen lassen, dann in Streifen schneiden.
- Bulgur in eine große Schüssel geben. Tomatenmark einrühren. 300 ml kochendes Wasser
  dazugießen, abdecken und 15 Minuten quellen lassen, bis die Flüssigkeit vollständig
  absorbiert ist.
- Bulgur mit einer Gabel auflockern. Restliches Olivenöl, Granatapfelmelasse, Zitronensaft,
  Pul Biber, Sumach, Salz und Pfeffer einarbeiten.
- Tomaten würfeln, Gurke in Halbmonde schneiden, Frühlingszwiebeln in Ringe schneiden,
  Petersilie und Minze fein hacken. Alles unter den Bulgur heben.
- Kısır in Bowls portionieren und die gegrillten Hähnchenstreifen darauf anrichten.
en_steps:
- Rub the chicken breast with smoked paprika, pul biber, salt, and 2 tbsp olive oil.
  Grill in a hot grill pan for 5–6 minutes per side until cooked through. Rest for
  5 minutes, then slice into strips.
- Place the bulgur in a large bowl and stir in the tomato paste. Pour over 300 ml
  boiling water, cover, and let soak for 15 minutes until all liquid is absorbed.
- Fluff the bulgur with a fork. Work in the remaining olive oil, pomegranate molasses,
  lemon juice, pul biber, sumac, salt, and pepper.
- Dice the tomatoes, cut the cucumber into half-moons, slice the spring onions into
  rings, and finely chop the parsley and mint. Fold everything into the bulgur.
- Portion the kısır into bowls and arrange the grilled chicken strips on top.
