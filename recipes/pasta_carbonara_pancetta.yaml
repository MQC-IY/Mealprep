de_steps:
- Einen großen Topf mit reichlich Salzwasser zum Kochen bringen. In einer Schüssel
  6 Eigelb und 2 ganze Eier verquirlen, Pecorino und Parmigiano einrühren. Mit sehr
  großzügig schwarzem Pfeffer würzen – die Mischung soll dickflüssig sein.
- Pancetta in einer großen, kalten Pfanne mit 1 EL Olivenöl bei mittlerer Hitze langsam
  auslassen, bis das Fett ausgetreten und die Würfel knusprig-goldbraun sind, ca.
  8–10 Min. Knoblauchzehen andrücken, mit anbraten, dann entfernen. Pfanne vom Herd
  nehmen, Pancettafett auffangen.
- Spaghetti al dente kochen (1–2 Min. kürzer als Packungsangabe). Vor dem Abgießen
  300 ml Nudelkochwasser abschöpfen.
- Heiße, abgetropfte Spaghetti sofort in die Pancetta-Pfanne geben (Pfanne vom Herd!).
  Ca. 60 ml Nudelkochwasser hinzufügen und alles schwenken, damit die Nudeln abkühlen
  – die Pfanne darf nicht mehr zu heiß sein.
- Eiermischung über die Nudeln gießen, sofort mit Zangen oder Gabeln zügig durchmischen.
  Schrittweise Nudelkochwasser zugeben und rühren, bis eine cremige, seidige Sauce
  entsteht. Pasta darf nicht stocken – bei Bedarf kurz auf sehr niedriger Hitze nacherwärmen.
- Sofort tief auf vorgewärmten Tellern anrichten. Restlichen Pecorino und viel frisch
  gemahlenen schwarzen Pfeffer darüber geben. Sofort servieren.
en_steps:
- Bring a large pot of well-salted water to the boil. In a bowl, whisk together the
  6 egg yolks and 2 whole eggs, then stir in the Pecorino and Parmigiano. Season very
  generously with black pepper – the mixture should be thick.
- Starting from cold, place the pancetta in a large pan with 1 tbsp olive oil over
  medium heat and render slowly until the fat has rendered out and the cubes are crisp
  and golden, about 8–10 minutes. Press the garlic cloves to bruise, add them and
  fry briefly, then remove. Take the pan off the heat and reserve the pancetta fat.
- Cook the spaghetti until al dente (1–2 minutes less than the packet instructions).
  Before draining, ladle out 300 ml of pasta cooking water.
- Immediately add the hot, drained spaghetti to the pancetta pan (pan off the heat).
  Add about 60 ml pasta water and toss so the noodles cool slightly – the pan must
  not be too hot.
- Pour the egg mixture over the noodles and immediately toss vigorously with tongs
  or forks. Add pasta water gradually, stirring until a creamy, silky sauce forms.
  The pasta must not scramble – if needed, briefly warm over the lowest possible heat.
- Serve immediately in deep, warmed bowls. Finish with the remaining Pecorino and
  plenty of freshly ground black pepper.
