de:
  title: Pasta Carbonara mit Pancetta
  summary: Klassische römische Carbonara mit Pancetta, Eigelb und Pecorino – seidig,
    würzig und ohne einen Tropfen Sahne.
en:
  title: Pasta Carbonara with Pancetta
  summary: Classic Roman carbonara with pancetta, egg yolks and Pecorino – silky,
    rich and made without a drop of cream.
