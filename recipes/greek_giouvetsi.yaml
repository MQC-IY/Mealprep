de:
  title: Griechisches Giouvetsi – Hähnchen-Orzo-Auflauf
  summary: Hähnchen und Orzo-Nudeln schmoren gemeinsam in einer Tomatensauce mit Zimt
    und Lorbeer im Ofen – ein kerniger griechischer Sonntagsauflauf.
en:
  title: Giouvetsi – Greek Chicken & Orzo Bake
  summary: Chicken and orzo pasta braised together in a cinnamon-and-bay tomato sauce
    in the oven — a hearty Greek Sunday casserole.
