de_steps:
- Ofen auf 200 °C vorheizen. Hähnchenstücke mit Salz, Pfeffer, Oregano und Zimt würzen.
  Olivenöl in einem Bräter erhitzen und Hähnchen von allen Seiten scharf anbraten.
  Herausnehmen.
- Zwiebeln würfeln und Knoblauch pressen. Im gleichen Bräter bei mittlerer Hitze 5
  Minuten anschwitzen. Tomatenmark, Zimt und Piment einrühren, 1 Minute rösten.
- Gehackte Tomaten, Hühnerbrühe und Lorbeerblätter hinzufügen. Kurz aufkochen, Hähnchen
  zurücklegen.
- Orzo-Nudeln in den Bräter streuen und alles gut verrühren, damit die Nudeln in der
  Sauce liegen. Bräter mit Alufolie fest abdecken.
- Im Ofen 30 Minuten backen. Folie entfernen, weitere 15 Minuten backen, bis die Oberfläche
  leicht gebräunt ist und die Orzo-Nudeln die Flüssigkeit aufgesogen haben.
- Feta in Brocken darüber krümeln und nochmals 5 Minuten im Ofen gratinieren. Heiß
  servieren.
en_steps:
- Preheat the oven to 200 °C. Season the chicken pieces with salt, pepper, oregano,
  and cinnamon. Heat olive oil in a roasting dish and brown the chicken on all sides.
  Remove.
- Dice the onions and crush the garlic. Sweat in the same dish over medium heat for
  5 minutes. Stir in the tomato purée, cinnamon, and allspice and fry for 1 minute.
- Add the chopped tomatoes, chicken stock, and bay leaves. Bring briefly to a boil
  and return the chicken.
- Scatter the orzo into the dish and stir well so the pasta is submerged in the sauce.
  Cover the dish tightly with aluminium foil.
- Bake for 30 minutes. Remove the foil and bake for a further 15 minutes until the
  surface is lightly browned and the orzo has absorbed the liquid.
- Crumble the feta over the top and return to the oven for 5 minutes to gratinate.
  Serve hot.
