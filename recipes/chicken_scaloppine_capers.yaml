de_steps:
- Hähnchenbrustfilets horizontal halbieren und zwischen Frischhaltefolie auf ca. 5
  mm Dicke flach klopfen. Mit Salz und Pfeffer würzen.
- Mehl auf einem tiefen Teller ausbreiten. Hähnchenschnitzel beidseitig im Mehl wenden,
  überschüssiges Mehl abklopfen.
- Olivenöl und die Hälfte der Butter in einer großen Pfanne bei mittlerer bis hoher
  Hitze erhitzen. Hähnchenschnitzel portionsweise 2–3 Minuten pro Seite goldbraun
  braten. Herausnehmen und warmhalten.
- Knoblauch fein hacken, in der gleichen Pfanne 30 Sekunden anrösten.
- Mit Weißwein ablöschen und kräftig aufkochen. Hühnerbrühe dazugießen und um die
  Hälfte einkochen lassen.
- Kapern und Zitronensaft einrühren. Restliche Butter einrühren, bis die Sauce glänzt
  und leicht sämig ist. Peperoncino-Flocken dazugeben.
- Hähnchenschnitzel zurück in die Sauce legen und kurz erwärmen.
- Mit gehackter Petersilie und Zitronenscheiben anrichten. Dazu Linguine oder Rucola-Salat
  reichen.
en_steps:
- Halve the chicken breast fillets horizontally and pound between plastic wrap to
  about 5 mm thick. Season with salt and pepper.
- Spread the flour on a deep plate. Dredge the cutlets on both sides and tap off any
  excess.
- Heat the olive oil and half the butter in a large pan over medium-high heat. Fry
  the cutlets in batches for 2–3 minutes per side until golden. Remove and keep warm.
- Finely chop the garlic and sauté in the same pan for 30 seconds.
- Deglaze with the white wine and bring to a vigorous boil. Pour in the chicken stock
  and reduce by half.
- Stir in the capers and lemon juice. Whisk in the remaining butter until the sauce
  is glossy and slightly thickened. Add the peperoncino flakes.
- Return the cutlets to the sauce and warm through briefly.
- Plate with chopped parsley and lemon slices. Serve with linguine or a rocket salad.
