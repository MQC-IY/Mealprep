id: chicken_scaloppine_capers
pool: lunch
healthy: false
quick: true
next_day: false
quick_minutes: 25
meals: 2
de:
  title: Hähnchen-Scaloppine mit Kapern und Zitrone
  summary: Dünne Hähnchenschnitzel in einer pikanten Zitronen-Kapern-Sauce – das klassische
    Piccata-Prinzip, schnell und geschmacksintensiv.
en:
  title: Chicken Scaloppine with Capers and Lemon
  summary: Thin chicken cutlets in a punchy lemon-caper sauce — the classic Piccata
    principle, quick to make and packed with flavour.
ingredients:
- de_name: Hähnchenbrustfilet
  en_name: chicken breast fillet
  qty: 500
  unit: g
  category: Protein und Milchprodukte
- de_name: Kapern abgetropft
  en_name: capers, drained
  qty: 3
  unit: EL
  category: Konserven und Vorrat
- de_name: Zitrone
  en_name: lemon
  qty: 2
  unit: Stk
  category: Obst
- de_name: Trockener Weißwein
  en_name: dry white wine
  qty: 120
  unit: ml
  category: Konserven und Vorrat
- de_name: Hühnerbrühe
  en_name: chicken stock
  qty: 150
  unit: ml
  category: Konserven und Vorrat
- de_name: Mehl
  en_name: flour
  qty: 3
  unit: EL
  category: Kohlenhydrate und Sattmacher
- de_name: Butter
  en_name: butter
  qty: 40
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Knoblauch
  en_name: garlic
  qty: 2
  unit: Zehen
  category: Gemüse und Salat
- de_name: Frische Petersilie
  en_name: fresh parsley
  qty: 0.5
  unit: Bund
  category: Gemüse und Salat
- de_name: Salz
  en_name: salt
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Schwarzer Pfeffer
  en_name: black pepper
  qty: 0.5
  unit: TL
  category: Gewürze
