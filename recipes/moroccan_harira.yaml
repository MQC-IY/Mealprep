de_steps:
- Zwiebeln fein würfeln. Sellerie in feine Scheiben schneiden. Knoblauch hacken.
- Olivenöl in einem großen Topf erhitzen. Zwiebeln und Sellerie 8 Minuten weich dünsten.
  Knoblauch 2 Minuten mitbraten.
- Ras el Hanout, Kurkuma, Kreuzkümmel, Koriander, Zimt und Chili einstreuen, 1 Minute
  rösten. Tomatenmark kurz mitbraten.
- Gehackte Tomaten und Gemüsebrühe hinzufügen. Rote Linsen dazugeben und aufkochen.
  20 Minuten köcheln lassen.
- Abgetropfte Kichererbsen einrühren, weitere 10 Minuten köcheln. Nach Belieben Eintopf
  leicht stampfen für eine cremigere Konsistenz.
- Mit Salz, Pfeffer und Zitronensaft abschmecken. Mit gehacktem Koriander und Petersilie
  bestreuen und servieren.
en_steps:
- Finely dice the onions. Slice the celery thinly. Mince the garlic.
- Heat the olive oil in a large pot. Sweat the onions and celery for 8 minutes. Add
  the garlic and cook for 2 minutes more.
- Add the ras el hanout, turmeric, cumin, coriander, cinnamon, and chili; toast for
  1 minute. Briefly cook the tomato paste.
- Add the chopped tomatoes and vegetable broth. Stir in the red lentils and bring
  to a boil. Simmer for 20 minutes.
- Stir in the drained chickpeas and simmer for a further 10 minutes. If desired, lightly
  mash the stew for a creamier texture.
- Season with salt, pepper, and lemon juice. Scatter over the chopped coriander and
  parsley and serve.
