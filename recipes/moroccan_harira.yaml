de:
  title: Marokkanischer Harira – Linseneintopf
  summary: Wärmender marokkanischer Eintopf mit Linsen, Kichererbsen, Tomaten und
    frischen Kräutern – ein nahrhaftes Traditionsgericht.
en:
  title: Moroccan Harira – Lentil Stew
  summary: A warming Moroccan stew of lentils, chickpeas, tomatoes, and fresh herbs
    — a nourishing traditional dish.
