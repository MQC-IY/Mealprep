de_steps:
- 'Für die Chermoula: Koriander, Petersilie, Knoblauch, Kreuzkümmel, Koriander, Paprika,
  Chili, Kurkuma, Salz, Zitronensaft und 4 EL Olivenöl im Mixer zu einer glatten Paste
  verarbeiten.'
- Hähnchenbrust mehrfach einschneiden. Zwei Drittel der Chermoula über das Hähnchen
  reiben, 1 Stunde marinieren.
- Hähnchen in einer heißen Grillpfanne oder im Backofen bei 200°C 20–25 Minuten grillen,
  bis durchgegart. Kurz ruhen lassen, dann in Streifen schneiden.
- Paprika und Zucchini in Würfel schneiden. In 1 EL Olivenöl 5–7 Minuten anbraten,
  bis weich und leicht angebräunt.
- Couscous in eine Schüssel geben. Heiße Gemüsebrühe (ca. 350 ml) darübergießen, bedeckt
  5 Minuten quellen lassen. Mit einer Gabel auflockern.
- Couscous mit der restlichen Chermoula vermengen, gebratenes Gemüse unterheben. Hähnchen
  darüber anrichten. Mit Zitronenspalten servieren.
en_steps:
- 'For the Chermoula: blend the cilantro, parsley, garlic, cumin, coriander, paprika,
  chili, turmeric, salt, lemon juice, and 4 tbsp olive oil into a smooth paste.'
- Score the chicken breast several times. Rub two-thirds of the Chermoula over the
  chicken and marinate for 1 hour.
- Grill the chicken in a hot griddle pan or in the oven at 200 °C for 20–25 minutes
  until cooked through. Rest briefly, then slice into strips.
- Cut the bell pepper and zucchini into chunks. Sauté in 1 tbsp olive oil for 5–7
  minutes until soft and lightly browned.
- Place the couscous in a bowl. Pour over the hot vegetable stock (approx. 350 ml),
  cover, and leave to absorb for 5 minutes. Fluff with a fork.
- Mix the couscous with the remaining Chermoula and fold in the sautéed vegetables.
  Arrange the chicken on top. Serve with lemon wedges.
