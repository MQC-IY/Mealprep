de:
  title: Marokkanisches Chermoula-Hähnchen mit Couscous
  summary: Hähnchen in einer lebhaften Chermoula-Marinade aus Koriander, Kreuzkümmel
    und Zitrone – gegrillt und auf fluffigem Couscous serviert.
en:
  title: Moroccan Chermoula Chicken with Couscous
  summary: Chicken marinated in a vibrant Chermoula paste of cilantro, cumin, and
    lemon – grilled and served over fluffy couscous.
