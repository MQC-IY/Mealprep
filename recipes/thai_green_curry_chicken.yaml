de_steps:
- Jasminreis waschen und im Verhältnis 1:1,5 mit Wasser aufkochen, bei niedriger Hitze
  12 Minuten garkochen, beiseite stellen.
- Hähnchenbrustfilet in mundgerechte Stücke schneiden. Zucchini und Paprika in grobe
  Stücke schneiden. Zitronengras anquetschen.
- Erdnussöl im Wok oder Topf bei mittlerer Hitze erhitzen. Grüne Currypaste 1–2 Minuten
  unter Rühren anrösten, bis es duftet.
- Kokoscreme hinzufügen und mit der Paste verrühren.
- Hähnchenstücke zugeben und 3–4 Minuten anbraten, bis sie leicht Farbe nehmen.
- Restliche Kokosmilch, Geflügelfond, Kaffirlimettenblätter, Zitronengras und Fischsauce
  hinzufügen. Aufkochen lassen.
- Zucchini und Paprika zugeben. 8–10 Minuten bei mittlerer Hitze köcheln, bis das
  Gemüse gar ist.
- Mit Palmzucker, Fischsauce und Limettensaft abschmecken. Zitronengras entfernen.
  Thai-Basilikum unterheben.
- Mit Jasminreis anrichten und mit geschnittener Chili garnieren.
en_steps:
- Wash jasmine rice and bring to a boil with 1.5 times the amount of water; cook on
  low heat for 12 minutes, then set aside.
- Cut chicken breast into bite-sized pieces. Cut zucchini and bell pepper into large
  chunks. Bruise lemongrass.
- Heat peanut oil in a wok or pot over medium heat. Stir-fry green curry paste for
  1–2 minutes until fragrant.
- Add coconut cream and stir into the paste.
- Add chicken pieces and fry for 3–4 minutes until they take on a little colour.
- Add remaining coconut milk, chicken stock, kaffir lime leaves, lemongrass and fish
  sauce. Bring to a boil.
- Add zucchini and bell pepper. Simmer over medium heat for 8–10 minutes until the
  vegetables are cooked.
- Season with palm sugar, fish sauce and lime juice. Remove lemongrass. Fold in Thai
  basil.
- Plate with jasmine rice and garnish with sliced chilli.
