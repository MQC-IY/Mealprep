de:
  title: Peruanischer Lomo Saltado – Wok-Rindfleisch mit Kartoffeln
  summary: Peruanisches Wok-Gericht mit Rinderstreifen, Paprika, Tomaten, Sojasauce,
    Ají-Amarillo-Chili und knusprigen Pommes frites.
en:
  title: Peruvian Lomo Saltado – Wok Beef with Potatoes
  summary: A classic Peruvian stir-fry of beef strips, peppers, tomatoes, soy sauce,
    ají amarillo chili, and crispy French fries.
