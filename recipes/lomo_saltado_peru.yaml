de_steps:
- Kartoffeln schälen, in dicke Sticks schneiden und in reichlich heißem Öl goldbraun
  und knusprig frittieren oder im Ofen bei 220 °C 30 Minuten backen. Mit Salz bestreuen.
- Reis nach Packungsangabe kochen.
- Rindfleisch quer zur Faser in 1 cm dicke Streifen schneiden. Mit Sojasauce, Kreuzkümmel,
  schwarzem Pfeffer und Ají-Amarillo-Paste marinieren.
- Wok oder große Pfanne bei höchster Hitze mit 2 EL Öl erhitzen bis er raucht. Rindfleisch
  portionsweise in 2 Minuten scharf anbraten und herausnehmen.
- Restliches Öl in den Wok, Knoblauch 30 Sekunden anrösten. Rote Zwiebelstreifen und
  Paprikastreifen 2 Minuten unter ständigem Rühren stark anbraten.
- Tomatenstücke und Rindfleisch zurück in den Wok, restliche Sojasauce zugeben und
  bei hoher Hitze 1–2 Minuten unter Rühren fertig garen.
- Kartoffelsticks unterheben. Mit Limettensaft, Salz und Ají-Amarillo abschmecken.
  Mit Reis und frischem Koriander servieren.
en_steps:
- Peel the potatoes, cut into thick sticks, and fry in plenty of hot oil until golden
  and crispy, or bake in the oven at 220 °C for 30 minutes. Season with salt.
- Cook the rice according to packet instructions.
- Slice the beef against the grain into 1 cm thick strips. Marinate with soy sauce,
  cumin, black pepper, and ají amarillo paste.
- Heat a wok or large pan with 2 tbsp oil over the highest heat until smoking. Sear
  the beef in batches for 2 minutes and set aside.
- Add the remaining oil to the wok, toast the garlic for 30 seconds. Stir-fry the
  red onion strips and bell pepper strips for 2 minutes over high heat, stirring constantly.
- Return the tomato pieces and beef to the wok, add the remaining soy sauce, and stir-fry
  for 1–2 minutes over high heat.
- Fold in the potato sticks. Adjust seasoning with lime juice, salt, and ají amarillo.
  Serve with rice and fresh coriander.
