de:
  title: Chicken Tikka Masala mit Reis
  summary: Gegrillte, marinierte Hähnchenstücke in einer aromatischen orangen Masala-Sauce
    – saftig, würzig und unwiderstehlich.
en:
  title: Chicken Tikka Masala with Rice
  summary: Grilled marinated chicken pieces in a vibrant orange Masala sauce — juicy,
    aromatic, and utterly irresistible.
