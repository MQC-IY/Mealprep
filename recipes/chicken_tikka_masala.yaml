de_steps:
- Hähnchen in große Würfel schneiden. Mit Joghurt, Tikka-Masala-Mischung, Kashmiri-Chili,
  Kurkuma, Salz und Öl vermengen. Mindestens 1 Stunde marinieren.
- Mariniertes Hähnchen unter dem Backofengrill oder in einer heißen Grillpfanne bei
  hoher Hitze 6–8 Minuten von allen Seiten grillen, bis leicht angebrannt. Beiseitestellen.
- Butter in einem Topf erhitzen. Fein gewürfelte Zwiebeln 10 Minuten goldbraun braten.
  Knoblauch und Ingwer (gerieben) 2 Minuten mitbraten.
- Koriander, Kreuzkümmel, geräuchertes Paprika und Garam Masala einstreuen, 1 Minute
  rösten. Tomatenmark einrühren, dann gehackte Tomaten hinzufügen.
- Sauce 15 Minuten köcheln lassen. Mit einem Stabmixer glatt pürieren. Sahne einrühren
  und weitere 5 Minuten köcheln.
- Gegrillte Hähnchenstücke in die Sauce geben, 10 Minuten bei niedriger Hitze fertig
  garen. Mit Basmatireis und frischem Koriander servieren.
en_steps:
- Cut the chicken into large cubes. Mix with yogurt, Tikka Masala spice blend, Kashmiri
  chilli, turmeric, salt, and oil. Marinate for at least 1 hour.
- Grill the marinated chicken under the oven broiler or in a hot grill pan over high
  heat for 6–8 minutes on all sides until lightly charred. Set aside.
- Heat the butter in a pot. Fry the finely diced onions until golden, about 10 minutes.
  Add the garlic and grated ginger and fry for 2 minutes.
- Add the coriander, cumin, smoked paprika, and garam masala and toast for 1 minute.
  Stir in the tomato paste, then add the chopped tomatoes.
- Simmer the sauce for 15 minutes. Blend smooth with an immersion blender. Stir in
  the cream and simmer for a further 5 minutes.
- Add the grilled chicken to the sauce and finish cooking over low heat for 10 minutes.
  Serve with basmati rice and fresh coriander.
