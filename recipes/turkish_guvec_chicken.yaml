de:
  title: Türkisches Güveç – Hähnchen-Gemüse-Tontopfeintopf
  summary: Saftige Hähnchenschenkel werden mit Sommergemüse, Pul Biber und Tomaten
    in einem geschlossenen Topf langsam geschmort, bis alles zart und aromatisch ist.
en:
  title: Turkish Güveç – Chicken and Vegetable Clay Pot Stew
  summary: Succulent chicken thighs slow-braised with summer vegetables, pul biber,
    and tomatoes in a covered pot until meltingly tender and fragrant.
