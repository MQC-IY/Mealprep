de_steps:
- Ofen auf 180 °C vorheizen. Hähnchenschenkel mit Salz, Pfeffer, Pul Biber und Paprikapulver
  einreiben.
- Auberginen und Zucchini in 2 cm Würfel schneiden, Paprika grob würfeln, Tomaten
  vierteln, Zwiebeln in Ringe schneiden. Alles in einer Schüssel mit Olivenöl, Kreuzkümmel
  und Oregano mischen.
- Gemüse in einem großen Bräter oder Tontopf auslegen. Tomatenmark und Knoblauch unter
  das Gemüse mischen.
- Hähnchenschenkel oben auf das Gemüse setzen. Mit 100 ml Wasser begießen. Topf fest
  mit Deckel oder Alufolie verschließen.
- Im Ofen 1 Stunde schmoren lassen. Deckel abnehmen, Hitze auf 220 °C erhöhen und
  weitere 15 Minuten offen garen, bis das Hähnchen goldbraun ist.
- Mit frischem Brot servieren und den Bratensaft als Sauce verwenden.
en_steps:
- Preheat the oven to 180 °C. Rub the chicken thighs all over with salt, pepper, pul
  biber, and smoked paprika.
- Cut the eggplants and zucchini into 2 cm cubes, roughly dice the bell peppers, quarter
  the tomatoes, and cut the onions into rings. Toss everything in a bowl with olive
  oil, cumin, and oregano.
- Spread the vegetables in a large roasting dish or clay pot. Mix in the tomato paste
  and garlic.
- Place the chicken thighs on top of the vegetables. Add 100 ml water. Cover tightly
  with a lid or aluminium foil.
- Braise in the oven for 1 hour. Remove the lid, raise the heat to 220 °C, and cook
  uncovered for a further 15 minutes until the chicken is golden brown.
- Serve with fresh bread, using the cooking juices as a sauce.
