de:
  title: Hähnchen-Bulgur-Pfanne mit Spinat
  summary: Schnelle Bulgurpfanne mit Hähnchen, Spinat und Möhren.
en:
  title: Chicken Bulgur Pan with Spinach
  summary: A quick bulgur pan with juicy chicken, wilted spinach, and sweet carrots
    — a healthy, filling weeknight dinner.
ingredients:
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 750
  unit: g
  category: Protein und Milchprodukte
- de_name: Bulgur
  en_name: bulgur
  qty: 300
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Blattspinat
  en_name: leaf spinach
  qty: 180
  unit: g
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Basilikum
  en_name: basil
  qty: 1
