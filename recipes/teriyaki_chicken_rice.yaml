de_steps:
- Reis waschen und mit 700 ml Wasser aufkochen, dann bei niedrigster Stufe 15 Minuten
  garen und 10 Minuten quellen lassen.
- Knoblauch und Ingwer fein reiben. Sojasoße, Mirin, Sake, Zucker, Knoblauch und Ingwer
  verrühren. 2 EL der Marinade abnehmen und mit der Speisestärke verrühren.
- Hähnchenschenkel in der Marinade 20 Minuten einlegen. Fleisch aus der Marinade nehmen
  und trocken tupfen.
- Pflanzenöl in einer großen Pfanne bei mittlerer bis hoher Hitze erhitzen. Hähnchen
  mit Haut nach unten 5–6 Minuten goldbraun anbraten, wenden und weitere 5 Minuten
  garen.
- Restliche Marinade in die Pfanne gießen und mit der Stärkelösung einrühren. Hähnchen
  3–4 Minuten glasieren, bis die Soße dickflüssig glänzt.
- Brokkoli in Röschen zerteilen und 3 Minuten in kochendem Salzwasser blanchieren,
  dann kalt abschrecken.
- Brokkoli mit Sesamöl und schwarzem Pfeffer schwenken.
- Hähnchen in Scheiben schneiden. Mit Reis und Brokkoli anrichten, mit Sesamkörnern
  und geschnittenen Frühlingszwiebeln garnieren.
en_steps:
- Wash rice and bring to a boil with 700 ml water, then cook on the lowest setting
  for 15 minutes and let steam for 10 minutes.
- Finely grate garlic and ginger. Stir together soy sauce, mirin, sake, sugar, garlic
  and ginger. Reserve 2 tbsp of the marinade and mix with the cornstarch.
- Marinate chicken thighs in the marinade for 20 minutes. Remove the chicken and pat
  dry.
- Heat vegetable oil in a large pan over medium-high heat. Fry chicken skin-side down
  for 5–6 minutes until golden, flip and cook for a further 5 minutes.
- Pour the remaining marinade into the pan and stir in the cornstarch slurry. Glaze
  chicken for 3–4 minutes until the sauce is thick and glossy.
- Divide broccoli into florets and blanch in boiling salted water for 3 minutes, then
  rinse in cold water.
- Toss broccoli with sesame oil and black pepper.
- Slice chicken. Plate up with rice and broccoli; garnish with sesame seeds and sliced
  spring onions.
