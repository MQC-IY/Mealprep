de:
  title: Teriyaki-Hähnchen mit Reis und Brokkoli
  summary: Saftige Hähnchenschenkel in hausgemachter Teriyaki-Glasur, serviert mit
    Jasminreis und knackigem Brokkoli.
en:
  title: Teriyaki Chicken with Rice and Broccoli
  summary: Juicy chicken thighs in a homemade Teriyaki glaze, served with jasmine
    rice and crisp broccoli.
