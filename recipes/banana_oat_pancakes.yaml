id: banana_oat_pancakes
pool: dessert
healthy: true
meals: 8
de:
  title: Bananenpfannkuchen mit Beeren
  summary: Saftige Pfannkuchen aus reifen Bananen und Haferflocken, ohne Mehl und
    Zucker, serviert mit frischen gemischten Beeren. Ideal zum Vorbereiten und schnellen
    Aufwärmen.
en:
  title: Banana Oat Pancakes with Berries
  summary: Moist pancakes made from ripe bananas and oats, with no flour or added
    sugar, served with fresh mixed berries. Perfect for meal prep and quick reheating.
ingredients:
- de_name: reife Bananen
  en_name: ripe bananas
  qty: 8
  unit: Stk
  category: Obst
- de_name: Haferflocken (zart)
  en_name: rolled oats (fine)
  qty: 400
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Eier
  en_name: eggs
  qty: 8
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 200
  unit: g
  category: Protein und Milchprodukte
- de_name: Backpulver
  en_name: baking powder
  qty: 2
  unit: TL
  category: Konserven und Vorrat
- de_name: Zimt gemahlen
  en_name: cinnamon, ground
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Vanilleextrakt
  en_name: vanilla extract
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Salz
  en_name: salt
  qty: 1
  unit: Prise
  category: Gewürze
- de_name: gemischte Beeren (Erdbeeren, Heidelbeeren, Himbeeren)
  en_name: mixed berries (strawberries, blueberries, raspberries)
  qty: 600
  unit: g
  category: Obst
- de_name: Kokosöl zum Braten
  en_name: coconut oil for frying
  qty: 2
  unit: EL
  category: Konserven und Vorrat
de_steps:
- Bananen in einer großen Schüssel mit einer Gabel zu einem feinen Mus zerdrücken.
- Eier und Naturjoghurt zu den Bananen geben und gut verrühren.
- Haferflocken, Backpulver, Zimt, Vanilleextrakt und Salz hinzufügen und alles zu
  einem gleichmäßigen Teig verrühren. 5 Minuten quellen lassen.
- Eine beschichtete Pfanne bei mittlerer Hitze erhitzen und etwas Kokosöl hineingeben.
- Je 2–3 EL Teig pro Pfannkuchen in die Pfanne geben und flach drücken. Ca. 3 Minuten
  backen, bis die Oberfläche Blasen wirft, dann wenden und weitere 2 Minuten backen.
- Alle Pfannkuchen nacheinander backen.
- Frische Beeren waschen, größere Erdbeeren halbieren.
- Pfannkuchen mit Beeren anrichten. Zum Meal-Prep die abgekühlten Pfannkuchen in einem
  luftdichten Behälter kühl lagern und vor dem Servieren kurz in der Pfanne oder Mikrowelle
  erwärmen.
en_steps:
- Mash the bananas in a large bowl with a fork until smooth.
- Add eggs and plain yogurt to the bananas and mix well.
- Add oats, baking powder, cinnamon, vanilla extract, and salt; stir into a smooth
  batter. Let rest for 5 minutes.
- Heat a non-stick pan over medium heat and add a little coconut oil.
- Spoon about 2–3 tbsp of batter per pancake into the pan and flatten slightly. Cook
  for about 3 minutes until the surface forms bubbles, then flip and cook for another
  2 minutes.
- Cook all pancakes in batches.
- Wash fresh berries; halve larger strawberries.
- Serve pancakes topped with berries. For meal prep, store cooled pancakes in an airtight
  container in the fridge and warm briefly in the pan or microwave before serving.
