id: chinese_beef_broccoli
pool: lunch
healthy: true
quick: false
next_day: false
meals: 2
de:
  title: Chinesisches Rindfleisch mit Brokkoli
  summary: Saftiges Rindfleisch und knackiger Brokkoli in einer glänzenden Soja-Austernsauce-Glasur
    – ein chinesischer Wokklassiker.
en:
  title: Chinese Beef and Broccoli
  summary: Juicy beef and crisp-tender broccoli in a glossy soy and oyster sauce glaze
    — a classic Chinese wok dish.
