de_steps:
- Jasminreis waschen und kochen.
- Rindfleisch gegen die Faser in dünne Scheiben schneiden. Mit 1 EL Sojasauce, 1 EL
  Shaoxing-Wein, Stärke (1 EL) und Pfeffer 20 Minuten marinieren.
- Brokkoli in Röschen teilen. In kochendem Salzwasser 2 Minuten blanchieren, kalt
  abschrecken.
- 'Sauce: restliche Sojasauce, Austernsauce, dunkle Sojasauce, Fond, Zucker und restliche
  Stärke (1 EL in Wasser) verrühren.'
- Öl im Wok bei maximaler Hitze erhitzen. Rindfleisch portionsweise 2 Minuten scharf
  braten. Herausnehmen.
- Knoblauch und Ingwer im Wok 30 Sek. anbraten. Brokkoli zugeben und 2 Minuten mitbraten.
- Rindfleisch zurückgeben. Sauce angießen. Unter Rühren 1–2 Minuten aufkochen bis
  die Sauce bindet.
- Sesamöl unterrühren. Sofort mit Jasminreis servieren.
en_steps:
- Wash and cook the jasmine rice.
- Slice the beef thinly against the grain. Marinate with 1 tbsp soy sauce, 1 tbsp
  Shaoxing wine, cornstarch (1 tbsp), and pepper for 20 minutes.
- Separate the broccoli into florets. Blanch in boiling salted water for 2 minutes,
  then refresh in cold water.
- 'Sauce: combine the remaining soy sauce, oyster sauce, dark soy sauce, stock, sugar,
  and the remaining cornstarch (1 tbsp dissolved in water).'
- Heat the oil in a wok over maximum heat. Sear the beef in batches for 2 minutes.
  Remove.
- Stir-fry the garlic and ginger in the wok for 30 seconds. Add the broccoli and stir-fry
  for 2 minutes.
- Return the beef to the wok. Pour in the sauce. Stir-fry for 1–2 minutes until the
  sauce thickens and coats everything.
- Stir in the sesame oil. Serve immediately with jasmine rice.
