id: strawberry_rhubarb_crumble
pool: dessert
healthy: true
meals: 8
de:
  title: Erdbeer-Rhabarber-Crumble
  summary: Fruchtiger Crumble mit saftigem Erdbeer-Rhabarber-Bett und knusprigem Hafer-Nuss-Topping,
    gesüßt mit Honig — warm oder kalt ein Genuss.
en:
  title: Strawberry Rhubarb Crumble
  summary: A fruity crumble with a juicy strawberry-rhubarb base and a crispy oat-nut
    topping sweetened with honey – delicious warm or cold.
ingredients:
