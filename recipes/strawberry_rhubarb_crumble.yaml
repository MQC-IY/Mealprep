de_steps:
- Ofen auf 190 °C Ober-/Unterhitze vorheizen.
- Erdbeeren waschen und halbieren. Rhabarber waschen, schälen und in 2 cm große Stücke
  schneiden.
- Früchte mit Honig, Maisstärke und Vanilleextrakt vermischen und in eine große Auflaufform
  (ca. 30×22 cm) geben.
- Für das Topping Haferflocken, gehackte Walnüsse, Mandelmehl, geschmolzenes Kokosöl,
  Agavendicksaft, Zimt und Salz in einer Schüssel vermengen, bis die Masse leicht
  klumpt.
- Topping gleichmäßig über die Fruchtmasse streuen.
- Im vorgeheizten Ofen 35–40 Minuten backen, bis das Topping goldbraun und die Früchte
  sprudelnd sind.
- 10 Minuten abkühlen lassen, dann warm servieren. Reste im Kühlschrank bis zu 3 Tage
  haltbar.
en_steps:
- Preheat oven to 190 °C (top/bottom heat).
- Wash and halve strawberries. Wash, peel and cut rhubarb into 2 cm pieces.
- Mix fruit with honey, cornstarch and vanilla extract and transfer to a large baking
  dish (approx. 30×22 cm).
- 'For the topping: combine oats, chopped walnuts, almond flour, melted coconut oil,
  agave syrup, cinnamon and salt in a bowl until the mixture clumps slightly.'
- Scatter the topping evenly over the fruit.
- Bake in the preheated oven for 35–40 minutes until the topping is golden brown and
  the fruit is bubbling.
- Leave to cool for 10 minutes, then serve warm. Leftovers keep in the fridge for
  up to 3 days.
