de_steps:
- Jasminreis waschen und kochen.
- Hähnchenbrustfilet in 2-cm-Würfel schneiden. Knoblauch und Ingwer fein reiben. Chili
  fein hacken.
- Erdnussbutter, Kokosmilch, Fischsauce, Sojasauce, Reisessig und Palmzucker in einer
  Schüssel zu einer glatten Sauce verrühren.
- Öl im Wok bei mittlerer Hitze erhitzen. Knoblauch und Ingwer 1 Minute anbraten.
- Hähnchenwürfel zugeben und 5–6 Minuten scharf anbraten, bis sie goldbraun und durchgegart
  sind.
- Erdnusssauce angießen und aufköcheln. 3–4 Minuten bei mittlerer Hitze einkochen,
  bis die Sauce sämig wird.
- Mit Limettensaft abschmecken und mit Chiliflocken und gemahlenem Koriander würzen.
- Über Jasminreis anrichten. Mit Frühlingszwiebeln, Koriander, gehackten Erdnüssen
  und frischer Chili garnieren.
en_steps:
- Wash and cook jasmine rice.
- Cut chicken breast into 2 cm cubes. Finely grate garlic and ginger. Finely chop
  chilli.
- Whisk peanut butter, coconut milk, fish sauce, soy sauce, rice vinegar and palm
  sugar in a bowl into a smooth sauce.
- Heat oil in a wok over medium heat. Fry garlic and ginger for 1 minute.
- Add chicken cubes and sear for 5–6 minutes until golden brown and cooked through.
- Pour in peanut sauce and bring to a gentle boil. Reduce for 3–4 minutes over medium
  heat until the sauce thickens.
- Season with lime juice, chilli flakes and ground coriander.
- Plate over jasmine rice. Garnish with spring onions, coriander, chopped peanuts
  and fresh chilli.
