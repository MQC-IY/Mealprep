de:
  title: Thai-Hähnchen mit Erdnusssauce und Reis
  summary: Zartes Hähnchen in cremiger, würziger Thai-Erdnusssauce mit Kokosmilch,
    Limette und Chili, serviert über duftendem Jasminreis.
en:
  title: Thai Chicken with Peanut Sauce and Rice
  summary: Tender chicken in a creamy, spiced Thai peanut sauce with coconut milk,
    lime and chilli, served over fragrant jasmine rice.
