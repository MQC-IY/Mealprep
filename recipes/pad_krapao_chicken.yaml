de:
  title: Pad Krapao – Thai-Basilikum-Hähnchen mit Spiegelei
  summary: Scharf-würziges Hähnchen-Hackfleisch mit Thai-Basilikum, Chili und Knoblauch,
    serviert mit Spiegelei und Jasminreis.
en:
  title: Pad Krapao – Thai Basil Chicken with Fried Egg
  summary: Spicy minced chicken stir-fried with Thai basil, chili and garlic, served
    with a crispy fried egg and jasmine rice.
