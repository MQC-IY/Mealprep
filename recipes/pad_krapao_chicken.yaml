de_steps:
- Jasminreis waschen und kochen.
- Knoblauch und Chilischoten im Mörser grob zerstoßen.
- 3 EL Öl im Wok bei sehr starker Hitze erhitzen. Knoblauch-Chili-Mischung 30 Sekunden
  anbraten.
- Hähnchen-Hackfleisch zugeben und unter ständigem Rühren 4–5 Minuten krümelig anbraten.
- Fischsauce, Austernsauce, dunkle Sojasauce und Palmzucker zugeben. Alles gut verrühren
  und 1 Minute einkochen.
- Thai-Basilikum-Blätter und Frühlingszwiebeln zugeben, kurz unterheben bis der Basilikum
  zusammenfällt.
- In einer zweiten Pfanne 1 EL Öl bei starker Hitze erhitzen und die Eier als knusprige
  Spiegeleier braten.
- Reis auf Teller geben, Hackfleisch daneben anrichten, Spiegelei obenauf. Mit weißem
  Pfeffer würzen.
en_steps:
- Wash and cook the jasmine rice.
- Roughly pound the garlic and chili peppers in a mortar.
- Heat 3 tbsp oil in a wok over very high heat. Fry the garlic-chili mixture for 30
  seconds.
- Add the minced chicken and stir-fry, breaking it up, for 4–5 minutes until cooked
  through.
- Add the fish sauce, oyster sauce, dark soy sauce and palm sugar. Stir well and reduce
  for 1 minute.
- Add the Thai basil leaves and spring onions, fold in briefly until the basil wilts.
- In a second pan, heat 1 tbsp oil over high heat and fry the eggs as crispy sunny-side-up
  eggs.
- Serve rice on a plate, top with the minced chicken, and place the fried egg on top.
  Season with white pepper.
