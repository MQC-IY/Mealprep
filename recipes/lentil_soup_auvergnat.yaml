de_steps:
- Karotten, Sellerie und Zwiebel in feine Würfel schneiden. Knoblauch hacken.
- Butter in einem großen Topf schmelzen. Speckwürfel bei mittlerer bis hoher Hitze
  4 Minuten knusprig auslassen.
- Zwiebel, Karotte und Sellerie dazugeben, 6 Minuten bei mittlerer Hitze anschwitzen.
- Knoblauch, Thymian und Lorbeer einrühren, 1 Minute weiterbraten.
- Linsen abspülen und in den Topf geben. Mit Brühe aufgießen. Aufkochen und bei niedriger
  bis mittlerer Hitze 30–35 Minuten köcheln lassen, bis die Linsen weich, aber noch
  ganz sind.
- Lorbeerblätter entfernen. Dijon-Senf und Weißweinessig einrühren.
- Ca. ein Drittel der Suppe mit dem Stabmixer pürieren, um die Suppe sämig zu machen.
  Wieder in den Topf einrühren.
- Mit Salz und reichlich schwarzem Pfeffer abschmecken. Mit gehackter Petersilie bestreuen,
  mit kräftigem Brot servieren.
en_steps:
- Finely dice the carrots, celery, and onion. Mince the garlic.
- Melt the butter in a large pot. Render the lardons over medium-high heat for 4 minutes
  until crispy.
- Add the onion, carrot, and celery; sweat over medium heat for 6 minutes.
- Stir in the garlic, thyme, and bay leaves; cook for 1 minute more.
- Rinse the lentils and add to the pot. Pour in the broth. Bring to a boil, then simmer
  over low-medium heat for 30–35 minutes until the lentils are tender but still whole.
- Remove the bay leaves. Stir in the Dijon mustard and white wine vinegar.
- Blend about one-third of the soup with an immersion blender to give it a creamy
  body. Stir back into the pot.
- Season generously with salt and black pepper. Scatter over the chopped parsley and
  serve with crusty bread.
