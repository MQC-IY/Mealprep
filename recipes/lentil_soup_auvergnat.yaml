de:
  title: Linsensuppe Auvergnat mit Speck und Senf
  summary: Deftige Auvergnater Linsensuppe mit Lardons, Gemüse, Lorbeer und einem
    kräftigen Schuss Dijon-Senf.
en:
  title: Auvergnat Lentil Soup with Bacon and Mustard
  summary: Hearty Auvergnat lentil soup with lardons, vegetables, bay leaf, and a
    bold splash of Dijon mustard.
