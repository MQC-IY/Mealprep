de_steps:
- Putenhack mit Ei, Semmelbröseln, der Hälfte von Oregano und Basilikum sowie etwas
  fein gehacktem Knoblauch mischen und kleine Bällchen formen.
- Zwiebel, Möhren und restlichen Knoblauch in Olivenöl anschwitzen.
- Passierte und gehackte Tomaten zugeben, restliche Kräuter einrühren und die Sauce
  einige Minuten köcheln lassen.
- Bällchen in der Sauce gar ziehen lassen, bis sie saftig und durchgegart sind.
en_steps:
- Mix ground turkey with egg, breadcrumbs, half the oregano and basil, and a little
  finely chopped garlic; shape into small balls.
- Sweat onion, carrots, and remaining garlic in olive oil.
- Add passata and chopped tomatoes, stir in the remaining herbs, and let the sauce
  simmer for a few minutes.
- Cook the meatballs in the sauce until they are juicy and cooked through.
