de:
  title: Italienische Putenbällchen in Tomatensauce
  summary: Saftige Polpette aus Putenhack in aromatischer Tomatensauce mit Kräutern,
    Knoblauch und Vollkornnudeln.
en:
  title: Italian Turkey Meatballs in Tomato Sauce
  summary: Juicy turkey polpette in a fragrant tomato sauce with herbs, garlic, and
    whole-wheat pasta.
