de:
  title: Hähnchen-Piccata mit Zitronen-Kapern-Sauce und Tagliatelle
  summary: Dünne Hähnchenschnitzel in Zitronenbutter mit Kapern, dazu Tagliatelle
    al dente – ein klassisches italienisches Gericht, das sofort serviert werden muss.
en:
  title: Chicken Piccata with Lemon-Caper Sauce and Tagliatelle
  summary: Thin chicken cutlets in lemon butter with capers, served on al-dente tagliatelle
    — a classic Italian dish that must be plated and served immediately.
