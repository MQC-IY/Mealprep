de:
  title: Hähnchen-Piccata mit Zitronen-Kapern-Sauce und Tagliatelle
  summary: |-
    Dünne Hähnchenschnitzel in Zitronenbutter mit Kapern, dazu Tagliatelle al dente – ein klassisches italienisches Gericht, das sofort serviert werden muss.
