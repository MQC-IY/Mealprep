de_steps:
- Reis waschen und mit 700 ml Wasser garen.
- Zwiebeln in halbe Ringe, Karotten in Scheiben, Kartoffeln in mundgerechte Stücke
  schneiden. In einem Topf mit etwas Öl 5 Minuten anbraten.
- Brühe angießen, aufkochen und 15 Minuten köcheln, bis Kartoffeln weich sind. Curry-Roux
  einrühren und vollständig auflösen. Worcestersoße hinzufügen. 5 Minuten einköcheln.
- Hähnchenbrust zwischen Frischhaltefolie auf 1 cm Dicke klopfen. Salzen und pfeffern.
- 'Drei Schüsseln bereitstellen: Mehl, verquirlte Eier, Panko. Hähnchen nacheinander
  wenden, gut andrücken.'
- Öl in einer tiefen Pfanne auf 175 °C erhitzen. Hähnchen portionsweise 3–4 Minuten
  pro Seite goldbraun frittieren. Auf Küchenpapier abtropfen lassen.
- Hähnchen-Katsu in diagonale Streifen schneiden. Reis in Schalen anrichten, Curry-Soße
  daneben geben, Katsu darauflegen. Mit Tonkatsu-Soße beträufeln.
en_steps:
- Wash rice and cook with 700 ml water.
- Slice onions into half-rings, carrots into rounds, potatoes into bite-sized pieces.
  Fry in a pot with a little oil for 5 minutes.
- Pour in stock, bring to a boil, and simmer for 15 minutes until potatoes are tender.
  Stir in curry roux and dissolve completely. Add Worcestershire sauce. Simmer for
  5 minutes.
- Place chicken breast between cling film and pound to 1 cm thickness. Season with
  salt and pepper.
- 'Set up three bowls: flour, beaten eggs, panko. Coat chicken in each in turn, pressing
  firmly.'
- Heat oil in a deep pan to 175 °C. Deep-fry chicken in batches for 3–4 minutes per
  side until golden. Drain on paper towels.
- Slice chicken katsu diagonally. Plate rice in bowls, spoon curry sauce alongside,
  place katsu on top. Drizzle with tonkatsu sauce.
