de:
  title: Japanisches Katsu-Curry mit Hähnchen und Reis
  summary: Knusprig paniertes Hähnchen-Katsu auf würzigem japanischen Curry-Soße mit
    Jasminreis – ein japanischer Klassiker.
en:
  title: Japanese Katsu Curry with Chicken and Rice
  summary: Crispy breaded chicken katsu on flavourful Japanese curry sauce with jasmine
    rice – a Japanese classic.
