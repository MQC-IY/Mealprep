de_steps:
- Nudeln nach Packungsanweisung kochen. Pak Choi im gleichen Kochwasser 1 Minute blanchieren.
  Abgießen.
- 'Sesampaste-Sauce: Tahini, Sojasauce, Reisessig, Zucker, Szechuanpfeffer (1 TL)
  und Hühnerbrühe glatt rühren.'
- Öl im Wok erhitzen. Knoblauch und Ingwer 30 Sek. anbraten.
- Hackfleisch zugeben und krümelig braten. Shaoxing-Wein, dunkle Sojasauce und Chiliflocken
  zugeben. 4–5 Minuten braten.
- Sesampaste-Sauce in Schalen aufteilen. Heiße Nudeln darauf geben.
- Hackfleisch über die Nudeln schöpfen. Pak Choi daneben anrichten.
- Mit Chiliöl, Frühlingszwiebeln und restlichem Szechuanpfeffer bestreuen. Vor dem
  Essen gut verrühren.
en_steps:
- Cook the noodles according to the packet instructions. Blanch the pak choi in the
  same boiling water for 1 minute. Drain.
- 'Sesame sauce: whisk together the tahini, soy sauce, rice vinegar, sugar, 1 tsp
  Sichuan pepper, and chicken stock until smooth.'
- Heat the oil in a wok. Stir-fry the garlic and ginger for 30 seconds.
- Add the ground pork and stir-fry until crumbly. Add the Shaoxing wine, dark soy
  sauce, and chili flakes. Cook for 4–5 minutes.
- Divide the sesame sauce among serving bowls. Place the hot noodles on top.
- Spoon the ground pork over the noodles. Arrange the pak choi alongside.
- Drizzle with chili oil, scatter over the spring onions and remaining Sichuan pepper.
  Mix everything together before eating.
