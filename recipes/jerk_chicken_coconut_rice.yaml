de_steps:
- 'Jerk-Marinade: Knoblauch, Ingwer, Frühlingszwiebeln, Chili, Sojasauce, Rapsöl,
  Piment, Thymian, Zimt, Muskatnuss, Paprika, Chiliflocken und Limettensaft im Mixer
  zu einer Paste verarbeiten.'
- Hähnchen einschneiden und großzügig mit Jerk-Marinade einreiben. Mind. 30 Minuten,
  besser über Nacht marinieren.
- 'Kokos-Reis: Reis mit Kokosmilch und gleicher Menge Wasser aufkochen, Hitze reduzieren,
  15 Minuten garen. Salzen.'
- 'Mango-Salsa: Mango fein würfeln. Mit Roten Zwiebelringen, Koriander, Limettensaft
  und einer Prise Chili mischen.'
- Hähnchen in einer heißen Grillpfanne oder im Ofen bei 220 °C (Grillstufe) 12–15
  Minuten garen, bis es schöne Röst-Stellen hat.
- Kokos-Reis in Bowls geben. Hähnchen in Scheiben schneiden und anrichten. Mango-Salsa
  großzügig darüber geben.
en_steps:
- 'Jerk marinade: blend garlic, ginger, spring onions, chili, soy sauce, rapeseed
  oil, allspice, thyme, cinnamon, nutmeg, paprika, chili flakes, and lime juice into
  a paste.'
- Score the chicken and rub generously with the jerk marinade. Marinate for at least
  30 minutes, ideally overnight.
- 'Coconut rice: bring rice to a boil with coconut milk and an equal amount of water;
  reduce heat and cook for 15 minutes. Season with salt.'
- 'Mango salsa: finely dice the mango. Mix with red onion rings, coriander, lime juice,
  and a pinch of chili.'
- Cook chicken in a hot griddle pan or in the oven at 220 °C (grill setting) for 12–15
  minutes until nicely charred.
- Spoon coconut rice into bowls. Slice chicken and arrange on top. Add mango salsa
  generously.
