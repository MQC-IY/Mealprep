de:
  title: Hähnchen-Jerk mit Kokos-Reis und Mango-Salsa
  summary: 'Karibischer Klassiker: feuriges Jerk-Hähnchen mit Scotch-Bonnet-Hitze,
    Allspice und Thymian, auf cremigem Kokos-Reis mit frischer Mango-Salsa.'
en:
  title: Jerk Chicken with Coconut Rice and Mango Salsa
  summary: 'Caribbean classic: fiery jerk chicken with scotch bonnet heat, allspice
    and thyme, on creamy coconut rice with fresh mango salsa.'
