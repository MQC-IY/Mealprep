de:
  title: Puten-Couscous mit Brokkoli und Erbsen
  summary: Schnelles Couscousgericht mit Putenhack, Brokkoli und Erbsen.
en:
  title: Turkey Couscous with Broccoli and Peas
  summary: Quick couscous dish with minced turkey, broccoli and peas.
ingredients:
- de_name: Putenhack
  en_name: minced turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Couscous
  en_name: couscous
  qty: 280
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Brokkoli
  en_name: broccoli
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 220
  unit: g
  category: Gemüse und Salat
