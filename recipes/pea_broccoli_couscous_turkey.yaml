de_steps:
- Couscous quellen lassen.
- Putenhack scharf anbraten.
- Brokkoli und Erbsen weich garen.
en_steps:
- Soak the couscous in hot stock or water according to the packet instructions.
- Sear the minced turkey in a hot pan until browned.
- Cook the broccoli and peas until tender, then combine with the turkey and couscous.
