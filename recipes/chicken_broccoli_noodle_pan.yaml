de:
  title: Hähnchen-Brokkoli-Nudelpfanne
  summary: Schnelle Nudelpfanne mit Hähnchen, Brokkoli, Erbsen und Joghurt-Sauce.
en:
  title: Chicken and Broccoli Noodle Pan
  summary: A quick noodle pan with chicken, broccoli, peas, and a light yogurt sauce.
