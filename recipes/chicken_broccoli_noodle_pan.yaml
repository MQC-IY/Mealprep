de_steps:
- Nudeln und Brokkoli weich garen.
- Hähnchen mit Zwiebel scharf anbraten.
- Erbsen und etwas Nudelwasser zugeben, Joghurt kurz unterrühren.
en_steps:
- Cook the pasta and broccoli until tender.
- Sear the chicken with the onion over high heat.
- Add the peas and a splash of pasta cooking water, then briefly stir in the yogurt.
