de:
  title: Ungarisches Hähnchen-Paprikás mit Nokedli
  summary: Saftiges Hähnchen in cremiger Sauerrahm-Paprikasauce mit selbst gemachten
    Nokedli-Knöpfle – Ungarns berühmtestes Schmorgeschirr.
en:
  title: Hungarian Chicken Paprikás with Nokedli
  summary: Juicy chicken in a creamy sour cream paprika sauce with home-made nokedli
    dumplings — Hungary's most celebrated braise.
