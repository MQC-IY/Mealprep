de_steps:
- Hähnchenstücke salzen und pfeffern. Schmalz in einem schweren Topf erhitzen, Hähnchen
  von allen Seiten goldbraun anbraten. Herausnehmen.
- 'Zwiebeln fein würfeln und im Bratfett 8 Minuten golden anschwitzen. Topf vom Herd
  nehmen, edelsüßes Paprikapulver und Rosenpaprika einrühren – wichtig: Paprika nie
  bei hoher Hitze rösten.'
- Hühnerbrühe einrühren, Hähnchen zurücklegen. Knoblauch, Paprikaschoten (gewürfelt),
  Kümmel und Lorbeer hinzufügen. Zugedeckt bei mittlerer Hitze 40 Minuten schmoren.
- 'Für die Nokedli: Mehl, Eier, 1 TL Salz und 100–120 ml Wasser zu einem zähen Teig
  rühren. Gesalzenes Wasser zum Kochen bringen. Teig durch ein Spätzlesieb oder eine
  Nokedli-Reibe ins Wasser drücken, 2–3 Minuten kochen. Abgießen.'
- Hähnchen herausnehmen, Lorbeer entfernen. Sauerrahm mit 2 EL Sauce glatt rühren,
  dann in die Sauce einrühren. Nicht mehr kochen lassen.
- Hähnchen zurück in die Sauce legen. Mit Nokedli servieren und frischer Petersilie
  bestreuen.
en_steps:
- Season the chicken pieces with salt and pepper. Heat lard in a heavy pot and brown
  the chicken on all sides until golden. Remove.
- 'Finely dice the onions and sweat golden in the fat for 8 minutes. Remove the pot
  from the heat; stir in the sweet paprika and rose paprika — important: never fry
  paprika over high heat.'
- Stir in the chicken stock and return the chicken. Add the garlic, diced red peppers,
  caraway, and bay leaves. Cover and braise over medium heat for 40 minutes.
- 'For the nokedli: mix the flour, eggs, 1 tsp salt, and 100–120 ml water into a thick
  batter. Bring salted water to a boil. Push the batter through a spätzle sieve or
  nokedli grater into the water and cook for 2–3 minutes. Drain.'
- Remove the chicken and discard the bay leaves. Stir the sour cream with 2 tbsp of
  the sauce until smooth, then stir into the sauce. Do not allow to boil again.
- Return the chicken to the sauce. Serve with nokedli and a sprinkle of fresh parsley.
