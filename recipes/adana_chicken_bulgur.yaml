de:
  title: Türkisches Hähnchen-Adana mit Bulgur-Salat
  summary: Feurige türkische Adana-Köfte-Spieße aus Hähnchenhack mit Pul Biber und
    Kreuzkümmel, dazu frischer Bulgur-Salat mit Petersilie und Granatapfelsirup.
en:
  title: Turkish Chicken Adana with Bulgur Salad
  summary: Fiery Turkish Adana kofta skewers made from ground chicken with pul biber
    and cumin, served alongside a fresh bulgur salad with parsley and pomegranate
    molasses.
