de_steps:
- 'Bulgur: Brühe aufkochen, Bulgur einrühren, Herd abschalten, 15 Minuten quellen
  lassen.'
- Zwiebel sehr fein reiben oder im Mixer zerkleinern. Hähnchenhack mit Pul Biber,
  Kreuzkümmel, Paprika, Zimt, Knoblauch und geriebener Zwiebel verkneten. Kräftig
  salzen. Auf flache Spieße formen.
- Spieße in einer sehr heißen Grillpfanne von jeder Seite 4–5 Minuten scharf anbraten.
- Bulgur mit einer Gabel auflockern. Tomaten würfeln, Frühlingszwiebeln schneiden,
  Petersilie hacken. Alles mit Bulgur mischen.
- Bulgur-Salat mit Granatapfelsirup, Zitronensaft, Olivenöl, Sumach und Salz abschmecken.
- Joghurt mit etwas Pul Biber und Olivenöl auf den Boden der Bowl geben, Bulgur-Salat
  daneben, Adana-Spieße obenauf.
en_steps:
- 'Bulgur: bring stock to the boil, stir in bulgur, turn off the heat, and let it
  swell for 15 minutes.'
- Grate or blend the onion very finely. Knead ground chicken with pul biber, cumin,
  sweet paprika, cinnamon, garlic, and grated onion. Season generously with salt.
  Shape onto flat skewers.
- Sear the skewers in a very hot grill pan for 4–5 minutes per side.
- Fluff bulgur with a fork. Dice tomatoes, slice spring onions, chop parsley. Toss
  everything with the bulgur.
- Season bulgur salad with pomegranate molasses, lemon juice, olive oil, sumac, and
  salt.
- Spoon yogurt mixed with a little pul biber and olive oil into the base of the bowl,
  add bulgur salad alongside, and place the Adana skewers on top.
