de:
  title: Indisches Hähnchen mit Spinat und Joghurt
  summary: Zartes Hähnchen in einer würzigen Joghurtsauce mit frischem Spinat – leicht,
    aromatisch und schnell zubereitet.
en:
  title: Indian Chicken with Spinach and Yogurt
  summary: Tender chicken in a spiced yogurt sauce with fresh spinach – light, aromatic,
    and ready in no time.
