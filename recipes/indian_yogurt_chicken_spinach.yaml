de_steps:
- Hähnchen in Streifen schneiden. Mit 100 g Joghurt, Kurkuma, Chilipulver, Koriander
  und Salz marinieren. 30 Minuten ruhen lassen.
- Öl in einer großen Pfanne erhitzen. Kreuzkümmelsamen knistern lassen. Zwiebeln 8
  Minuten goldbraun braten. Knoblauch und Ingwer reiben und hinzufügen.
- Garam Masala, Kreuzkümmel und Kardamom einstreuen, 1 Minute rösten. Gehackte grüne
  Chilischoten hinzufügen.
- Hähnchen in die Pfanne geben, bei starker Hitze 6–7 Minuten anbraten, bis es gar
  ist.
- Restlichen Joghurt einrühren, bei niedriger Hitze 5 Minuten erwärmen (nicht kochen,
  damit der Joghurt nicht gerinnt). Spinat portionsweise einrühren und zusammenfallen
  lassen.
- Mit Salz und Garam Masala abschmecken. Mit Basmatireis servieren.
en_steps:
- Cut chicken into strips. Marinate with 100 g yogurt, turmeric, chili powder, coriander,
  and salt. Let rest for 30 minutes.
- Heat oil in a large pan. Let cumin seeds sizzle. Fry onions for 8 minutes until
  golden brown. Grate garlic and ginger and add to the pan.
- Sprinkle in garam masala, cumin, and cardamom; toast for 1 minute. Add chopped green
  chilies.
- Add chicken to the pan and sear over high heat for 6–7 minutes until cooked through.
- Stir in the remaining yogurt and warm over low heat for 5 minutes (do not boil,
  or the yogurt will curdle). Fold in spinach in batches and let it wilt.
- Season with salt and garam masala. Serve with basmati rice.
