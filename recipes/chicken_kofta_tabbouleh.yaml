de_steps:
- Bulgur mit kochendem Salzwasser (gleiches Volumen) übergießen, 15 Minuten quellen
  lassen, abkühlen.
- Petersilie und Minze sehr fein hacken. Tomaten und Frühlingszwiebeln klein würfeln.
  Alles mit Bulgur mischen.
- Tabbouleh mit Olivenöl, Zitronensaft, Sumach und Salz abschmecken. Granatapfelkerne
  unterheben.
- Hähnchenhack mit Kreuzkümmel, Koriander, Piment, Zimt, Chiliflocken, Knoblauch,
  frischer Petersilie und Minze verkneten. Auf Spieße formen oder flache Bällchen
  formen.
- Kofta in einer heißen Grillpfanne 4–5 Minuten je Seite garen.
- 'Tahini-Dressing: Tahini mit Zitronensaft, etwas Wasser und Salz cremig rühren.
  Kofta auf Tabbouleh anrichten, Tahini darüber.'
en_steps:
- Pour boiling salted water over the bulgur (equal volume), steep for 15 minutes,
  then let cool.
- Finely chop the parsley and mint. Dice the tomatoes and spring onions. Mix everything
  with the bulgur.
- Season the Tabbouleh with olive oil, lemon juice, sumac, and salt. Fold in the pomegranate
  seeds.
- Knead the ground chicken with cumin, coriander, allspice, cinnamon, chili flakes,
  garlic, fresh parsley, and mint. Shape onto skewers or form into flat patties.
- Grill the Kofta in a hot grill pan for 4–5 minutes per side.
- 'Tahini dressing: whisk the tahini with lemon juice, a little water, and salt until
  smooth and creamy. Plate the Kofta over the Tabbouleh and drizzle with the tahini.'
