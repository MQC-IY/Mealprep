de:
  title: Hähnchen-Kofta mit Granatapfel-Tabbouleh
  summary: Würzige Hähnchenhack-Kofta mit Petersilie, Minze und Allspice, auf leuchtendem
    Bulgur-Tabbouleh mit Granatapfelkernen und Tahini-Zitronen-Dressing.
en:
  title: Chicken Kofta with Pomegranate Tabbouleh
  summary: Spiced ground-chicken Kofta with parsley, mint, and allspice, served on
    a vibrant bulgur Tabbouleh with pomegranate seeds and a tahini-lemon dressing.
