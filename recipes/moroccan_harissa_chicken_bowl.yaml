de:
  title: Marokkanische Hähnchen-Bowl mit Harissa-Karotten
  summary: Ofengeröstete Harissa-Karotten, zartes Hähnchen mit Ras el Hanout, Couscous
    mit Rosinen und gerösteten Mandeln – intensive nordafrikanische Aromen.
en:
  title: Moroccan Chicken Bowl with Harissa Carrots
  summary: Oven-roasted harissa carrots, tender ras el hanout chicken, couscous with
    raisins, and toasted almonds — bold North African flavours.
