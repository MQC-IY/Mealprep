de_steps:
- Möhren schälen und in Stifte schneiden. Mit Harissa-Paste, 2 EL Olivenöl, Salz und
  einer Prise Kreuzkümmel mischen. Im Ofen bei 200 °C 25 Minuten rösten.
- Hähnchen mit Ras el Hanout, Zimt, Chiliflocken, Knoblauch und 2 EL Olivenöl marinieren.
- 'Couscous: Brühe aufkochen, Couscous einrühren, Topf vom Herd nehmen, 5 Minuten
  quellen lassen. Mit Gabel auflockern, Rosinen und Zitronensaft untermengen.'
- Mandeln in einer trockenen Pfanne goldbraun rösten.
- Hähnchen in einer heißen Pfanne scharf anbraten und durchgaren, ca. 6–7 Minuten
  je Seite.
- Couscous in Bowls geben. Hähnchen und Harissa-Karotten anrichten. Mit gerösteten
  Mandeln und frischem Koriander bestreuen.
en_steps:
- Peel the carrots and cut into sticks. Toss with harissa paste, 2 tbsp olive oil,
  salt, and a pinch of cumin. Roast in the oven at 200 °C for 25 minutes.
- Marinate the chicken with ras el hanout, cinnamon, chili flakes, garlic, and 2 tbsp
  olive oil.
- 'For the couscous: bring the broth to a boil, stir in the couscous, remove from
  the heat, and leave to absorb for 5 minutes. Fluff with a fork and stir in the raisins
  and lemon juice.'
- Toast the flaked almonds in a dry pan until golden.
- Sear the chicken in a hot pan until cooked through, about 6–7 minutes per side.
- Spoon the couscous into bowls. Arrange the chicken and harissa carrots on top. Scatter
  with the toasted almonds and fresh coriander.
