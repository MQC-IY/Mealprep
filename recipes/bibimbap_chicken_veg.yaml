de:
  title: Bibimbap mit Hähnchen und Gemüse
  summary: Koreanische Reisschale mit würzigem mariniertem Hähnchen, buntem sautierten
    Gemüse, Spiegelei und würziger Gochujang-Paste.
en:
  title: Bibimbap with Chicken and Vegetables
  summary: Korean rice bowl with spiced marinated chicken, colourful sautéed vegetables,
    a fried egg with a soft yolk, and fiery gochujang sauce.
