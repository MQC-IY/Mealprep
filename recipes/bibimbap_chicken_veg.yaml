de_steps:
- Reis waschen und garen.
- Hähnchen in dünne Streifen schneiden, mit 2 EL Sojasoße, 1 EL Sesamöl, 2 zerdrückten
  Knoblauchzehen, Zucker und Pfeffer 20 Minuten marinieren.
- 'Bibimbap-Soße: Gochujang, Reisessig, 1 EL Sesamöl und 2 EL Wasser glatt rühren.'
- Gemüse einzeln in einer Pfanne kurz sautieren. Alles mit Sojasoße und Sesamkörnern
  würzen.
- Hähnchen in einer Pfanne mit Pflanzenöl scharf 5–6 Minuten braten.
- Eier als Spiegeleier mit weichem Dotter braten.
- Reis in Schüsseln geben, Hähnchen und alle Gemüsesorten ordentlich darauf anrichten.
  Spiegelei obenauf setzen.
en_steps:
- Wash and cook the rice.
- Slice chicken into thin strips; marinate with 2 tbsp soy sauce, 1 tbsp sesame oil,
  2 crushed garlic cloves, sugar, and pepper for 20 minutes.
- 'Bibimbap sauce: stir together gochujang, rice vinegar, 1 tbsp sesame oil, and 2
  tbsp water until smooth.'
- Sauté each vegetable separately in a pan for a short time. Season everything with
  soy sauce and sesame seeds.
- Fry chicken in a pan with vegetable oil for 5–6 minutes over high heat.
- Fry eggs sunny-side up with a soft yolk.
- Place rice in bowls, neatly arrange chicken and all the vegetables on top. Set a
  fried egg on each.
