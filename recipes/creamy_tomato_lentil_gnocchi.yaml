meals: 3
de:
  title: Gnocchi mit Tomaten-Linsen-Sauce
  summary: Schnelle Gnocchi mit mild-cremiger Linsen-Tomatensauce.
en:
  title: Gnocchi with Creamy Tomato-Lentil Sauce
  summary: Quick gnocchi in a mildly creamy red lentil and tomato sauce.
ingredients:
- de_name: Gnocchi
  en_name: gnocchi
  qty: 800
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Rote Linsen
  en_name: red lentils
  qty: 180
  unit: g
  category: Konserven und Vorrat
- de_name: Passierte Tomaten
  en_name: passata
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Frischkäse natur
  en_name: plain cream cheese
  qty: 100
  unit: g
  category: Protein und Milchprodukte
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Basilikum
  en_name: basil
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
