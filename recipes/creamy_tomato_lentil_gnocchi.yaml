de:
  title: Gnocchi mit Tomaten-Linsen-Sauce
  summary: Schnelle Gnocchi mit mild-cremiger Linsen-Tomatensauce.
en:
  title: Gnocchi with Creamy Tomato-Lentil Sauce
  summary: Quick gnocchi in a mildly creamy red lentil and tomato sauce.
