de_steps:
- Gnocchi weich garen.
- Zwiebel in Olivenöl anschwitzen, Linsen und Tomaten zugeben und weich köcheln.
- Frischkäse unterrühren.
en_steps:
- Cook the gnocchi until tender.
- Sauté the onion in olive oil, add the lentils and passata, and simmer until soft.
- Stir in the cream cheese.
