de:
  title: Schneller Tomaten-Linsen-Topf mit Chorizo
  summary: Herzhafte rote Linsen mit würziger Chorizo und geräuchertem Paprika in
    Tomaten-Eintopf.
en:
  title: Quick Tomato Lentil Pot with Chorizo
  summary: Hearty red lentils with spicy chorizo and smoked paprika in a rich tomato
    stew.
