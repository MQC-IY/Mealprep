de_steps:
- Chorizo-Scheiben in einem großen Topf ohne Öl bei mittlerer Hitze 3 Minuten kräftig
  anbraten. Herausnehmen.
- Zwiebel, Knoblauch und Paprika würfeln und im Chorizo-Fett 3 Minuten anschwitzen.
- Geräuchertes Paprikapulver, Kreuzkümmel und Cayennepfeffer einrühren und 30 Sekunden
  rösten.
- Linsen, Tomaten und Brühe hinzufügen. Aufkochen, dann 18 Minuten bei mittlerer Hitze
  köcheln lassen, bis die Linsen gar sind.
- Chorizo zurückgeben, abschmecken und servieren.
en_steps:
- Sear the chorizo slices in a large pot without oil over medium heat for 3 minutes.
  Remove and set aside.
- Dice the onion, garlic, and bell pepper and sauté in the chorizo fat for 3 minutes.
- Stir in the smoked paprika, cumin, and cayenne pepper and toast for 30 seconds.
- Add the lentils, tomatoes, and broth. Bring to a boil, then simmer over medium heat
  for 18 minutes until the lentils are cooked through.
- Return the chorizo to the pot, season to taste, and serve.
