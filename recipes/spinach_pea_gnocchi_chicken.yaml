de:
  title: Gnocchi-Pfanne mit Hähnchen, Erbsen und Spinat
  summary: Sehr schnelle Pfanne mit Gnocchi, Hähnchen, Erbsen und Frischkäse-Sauce.
en:
  title: Gnocchi Pan with Chicken, Peas and Spinach
  summary: A very quick skillet with gnocchi, chicken, peas and a cream cheese sauce.
