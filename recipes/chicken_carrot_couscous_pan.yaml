de_steps:
- Couscous quellen lassen.
- Hähnchen mit Zwiebel scharf anbraten.
- Möhren und Erbsen weich garen.
en_steps:
- Soak the couscous in hot stock or water.
- Sear the chicken with the onion over high heat.
- Cook the carrots and peas until tender.
