de:
  title: Aloo Gobi – Blumenkohl-Kartoffel-Curry
  summary: Knusprig gebratener Blumenkohl und Kartoffeln in einem duftenden Trocken-Curry
    – veganer Klassiker mit lebhafter Gewürznote.
en:
  title: Aloo Gobi – Cauliflower and Potato Curry
  summary: Crispy pan-fried cauliflower and potatoes in a fragrant dry curry — a vegan
    classic bursting with vibrant spice.
