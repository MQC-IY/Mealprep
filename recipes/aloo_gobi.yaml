de_steps:
- Kartoffeln schälen und in gleichmäßige Würfel schneiden. Blumenkohl in kleine Röschen
  teilen. Beides in Salzwasser 6 Minuten vorkochen – bissfest halten. Abgießen.
- Öl in einer großen schweren Pfanne bei hoher Hitze erhitzen. Kartoffeln und Blumenkohl
  portionsweise einlegen und goldbraun anbraten. Herausnehmen.
- Im verbleibenden Öl Senfkörner und Kreuzkümmelsamen knistern lassen. Zwiebeln 8
  Minuten goldbraun anbraten. Knoblauch und Ingwer einrühren.
- Kurkuma, Kreuzkümmel, Koriander und Chilipulver einstreuen, 1 Minute rösten. Gehackte
  Tomaten und Chilischoten hinzufügen, 5 Minuten köcheln.
- Gebratenes Gemüse zurück in die Pfanne geben. Alles gut vermischen, 5 Minuten unter
  gelegentlichem Rühren fertig garen.
- Garam Masala und Amchur einstreuen, mit Salz abschmecken. Mit frischem Koriander
  bestreuen und mit Naan oder Reis servieren.
en_steps:
- Peel potatoes and cut into even cubes. Break cauliflower into small florets. Parboil
  both in salted water for 6 minutes — keep them al dente. Drain.
- Heat oil in a large heavy pan over high heat. Add potatoes and cauliflower in batches
  and fry until golden brown. Remove.
- In the remaining oil, let mustard seeds and cumin seeds pop. Fry onions until golden,
  about 8 minutes. Stir in garlic and ginger.
- Sprinkle in turmeric, cumin, coriander, and chili powder; toast for 1 minute. Add
  chopped tomatoes and chilies and simmer for 5 minutes.
- Return the fried vegetables to the pan. Mix well and cook for a further 5 minutes,
  stirring occasionally.
- Stir in garam masala and amchur; season with salt. Garnish with fresh cilantro and
  serve with naan or rice.
