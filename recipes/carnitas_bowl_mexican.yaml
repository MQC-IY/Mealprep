de_steps:
- Hähnchen mit Kreuzkümmel, Chipotle, Oregano, Paprika, Zimt, Knoblauch, Orangensaft
  und Olivenöl marinieren. 30 Minuten ruhen lassen.
- Hähnchen in einem schweren Topf mit Deckel bei mittlerer Hitze 25 Minuten schmoren.
  Dann herausnehmen und mit zwei Gabeln zerzupfen.
- Gezupftes Hähnchen in einer heißen Pfanne ohne zusätzliches Fett 3–4 Minuten knusprig
  braten.
- Reis kochen. Bohnen aus der Dose abgießen, in der Pfanne mit Kreuzkümmel und Salz
  kurz erhitzen.
- 'Pico de Gallo: Tomaten, halbe Zwiebel, Jalapeño und Koriander fein würfeln. Mit
  Limettensaft und Salz abschmecken.'
- Avocado in Scheiben schneiden. Bowls mit Reis, Bohnen, Carnitas, Avocado und Pico
  de Gallo füllen.
en_steps:
- Marinate the chicken with cumin, chipotle, oregano, paprika, cinnamon, garlic, orange
  juice, and olive oil. Rest for 30 minutes.
- Braise the chicken in a heavy pot with a lid over medium heat for 25 minutes. Remove
  and shred with two forks.
- Fry the shredded chicken in a hot pan without extra fat for 3–4 minutes until crispy.
- Cook the rice. Drain the canned beans and heat briefly in a pan with cumin and salt.
- 'Pico de Gallo: finely dice the tomatoes, half the onion, jalapeño, and cilantro.
  Season with lime juice and salt.'
- Slice the avocado. Fill the bowls with rice, beans, Carnitas, avocado, and pico
  de gallo.
