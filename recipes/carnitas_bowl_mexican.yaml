de:
  title: Mexikanische Carnitas-Bowl
  summary: Langsam geschmortes Hähnchen mit mexikanischen Gewürzen, knusprig angebratene
    Carnitas-Stücke auf Chipotle-Reis mit schwarzen Bohnen, Avocado und Pico de Gallo.
en:
  title: Mexican Carnitas Bowl
  summary: Slow-braised chicken with Mexican spices, crisped up Carnitas-style, served
    over chipotle rice with black beans, avocado, and pico de gallo.
