de:
  title: Philippinischer Hähnchen-Adobo
  summary: 'Philippinischer Klassiker: Hähnchen in einem würzig-sauren Schmorfond
    aus Sojasauce, Reisessig, Lorbeer, schwarzem Pfeffer und Knoblauch.'
en:
  title: Philippine Chicken Adobo
  summary: 'A Filipino classic: chicken braised in a tangy, savory braise of soy sauce,
    rice vinegar, bay leaves, black pepper and garlic.'
