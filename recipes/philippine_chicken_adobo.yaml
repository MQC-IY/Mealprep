de_steps:
- Knoblauchzehen andrücken. Hähnchenstücke mit Sojasauce, Reisessig, Knoblauch, Lorbeerblättern
  und schwarzem Pfeffer in einer Schüssel mischen. Mindestens 30 Minuten marinieren,
  am besten über Nacht.
- Rapsöl in einem schweren Topf bei mittlerer-hoher Hitze erhitzen. Hähnchenstücke
  aus der Marinade heben und von allen Seiten goldbraun anbraten, herausnehmen.
- Die komplette Marinade (mit Knoblauch und Lorbeer) in den Topf gießen. Aufkochen,
  Hähnchen zurücklegen.
- Hitze reduzieren, Deckel drauf und 25 Minuten bei niedriger Hitze schmoren.
- Deckel abnehmen, Hitze erhöhen und die Sauce 10–15 Minuten einreduzieren bis sie
  dicklich und glänzend ist. Hähnchen dabei gelegentlich wenden.
- Mit Chiliflocken abschmecken. Reis kochen und dazu servieren. Die intensive, säuerlich-salzige
  Sauce über den Reis löffeln.
en_steps:
- Crush the garlic cloves. Combine the chicken pieces with soy sauce, rice vinegar,
  garlic, bay leaves and black pepper in a bowl. Marinate for at least 30 minutes,
  preferably overnight.
- Heat the rapeseed oil in a heavy pot over medium-high heat. Lift the chicken pieces
  out of the marinade and brown on all sides until golden. Remove and set aside.
- Pour the entire marinade (including garlic and bay leaves) into the pot. Bring to
  a boil, then return the chicken.
- Reduce the heat, cover and braise over low heat for 25 minutes.
- Remove the lid, increase the heat and reduce the sauce for 10–15 minutes until thick
  and glossy, turning the chicken occasionally.
- Season with chili flakes. Cook the rice and serve alongside. Spoon the intense,
  tangy-savoury sauce over the rice.
