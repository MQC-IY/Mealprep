de_steps:
- Safranfäden in 3 EL warmem Wasser einweichen. Hähnchenstücke mit Salz, Pfeffer und
  Pimentón würzen.
- Mandeln in einer trockenen Pfanne goldbraun rösten. Beiseitestellen.
- Olivenöl im Schmortopf erhitzen. Hähnchenstücke von beiden Seiten 5 Minuten kräftig
  anbraten. Herausnehmen.
- Zwiebel fein würfeln, im Bratfett 6 Minuten anschwitzen. Knoblauch (3 Zehen gehackt)
  dazugeben, 1 Minute weiterbraten.
- Tomaten zerdrückt, Safranwasser, Zimt und Sherry dazugeben. Aufkochen, 3 Minuten
  einkochen.
- Brühe und Zitronenschale dazugeben. Hähnchenstücke zurücklegen. Zugedeckt 35 Minuten
  bei niedriger Hitze schmoren.
- 'Für die Picada: Geröstete Mandeln, 1 rohe Knoblauchzehe und Petersilie im Mörser
  oder Mixer zu einer groben Paste verarbeiten. Mit Zitronensaft abschmecken.'
- Oliven und Picada in die Sauce einrühren. 10 Minuten offen köcheln. Mit Reis oder
  Brot servieren.
en_steps:
- Soak the saffron threads in 3 tbsp warm water. Season the chicken pieces with salt,
  pepper and pimentón.
- Toast the almonds in a dry pan until golden. Set aside.
- Heat the olive oil in a braising pot. Brown the chicken pieces on both sides for
  5 minutes. Remove and set aside.
- Finely dice the onion and sweat in the cooking fat for 6 minutes. Add 3 chopped
  garlic cloves and cook for 1 more minute.
- Add the crushed tomatoes, saffron water, cinnamon and sherry. Bring to a boil and
  reduce for 3 minutes.
- Add the stock and lemon zest. Return the chicken pieces. Cover and braise over low
  heat for 35 minutes.
- 'For the picada: pound the toasted almonds, 1 raw garlic clove and the parsley in
  a mortar or blender to a rough paste. Season with lemon juice.'
- Stir the olives and picada into the sauce. Simmer uncovered for 10 minutes. Serve
  with rice or bread.
