de:
  title: Pollo a la Catalana – Hähnchen mit Oliven und Mandeln
  summary: Katalanisches Schmorhuhn mit Tomaten, grünen Oliven, gerösteten Mandeln,
    Sherry und Zitrone – die Picada macht die Sauce einzigartig.
en:
  title: Pollo a la Catalana – Chicken with Olives and Almonds
  summary: Catalan braised chicken with tomatoes, green olives, toasted almonds, sherry
    and lemon – the picada makes the sauce truly special.
