de:
  title: Türkischer Linsen-Bulgur-Topf
  summary: Türkisch inspirierter Topf mit roten Linsen, Bulgur, Tomate, Paprika, Minze
    und Kreuzkümmel.
en:
  title: Turkish Lentil Bulgur Pot
  summary: A Turkish-inspired pot of red lentils, bulgur, tomato, bell pepper, mint,
    and cumin.
