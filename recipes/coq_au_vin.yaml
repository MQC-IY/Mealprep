de_steps:
- Hähnchenstücke trocken tupfen und kräftig mit Salz und Pfeffer würzen. Leicht mit
  Mehl bestäuben.
- Öl und die Hälfte der Butter in einem schweren Schmortopf erhitzen. Hähnchenstücke
  portionsweise 4–5 Minuten pro Seite kräftig anbraten. Herausnehmen.
- Speckwürfel im gleichen Topf 3–4 Minuten auslassen. Perlzwiebeln dazugeben und 5
  Minuten goldbraun braten. Knoblauch einrühren, 1 Minute weiterbraten.
- Tomatenmark einrühren und kurz rösten. Mit Rotwein ablöschen, kräftig aufkochen
  und 5 Minuten einkochen lassen.
- Brühe, Thymian und Lorbeer dazugeben. Hähnchen zurücklegen. Zugedeckt bei niedriger
  Hitze 45 Minuten schmoren.
- Champignons in der restlichen Butter bei hoher Hitze 4–5 Minuten kräftig anbraten,
  bis sie goldbraun sind. Beiseitestellen.
- Hähnchen herausnehmen, Sauce ggf. 5–10 Minuten offen einkochen. Champignons einrühren,
  Hähnchen zurücklegen.
- Mit gehackter Petersilie und frischen Thymianblättern bestreuen. Mit Kartoffelpüree
  oder Eiernudeln servieren.
en_steps:
- Pat the chicken pieces dry and season generously with salt and pepper. Dust lightly
  with flour.
- Heat the oil and half the butter in a heavy casserole dish. Brown the chicken pieces
  in batches for 4–5 minutes per side. Remove and set aside.
- Fry the lardons in the same pot for 3–4 minutes. Add the pearl onions and cook for
  5 minutes until golden. Stir in the garlic and cook for 1 minute.
- Stir in the tomato paste and cook briefly. Deglaze with the red wine, bring to a
  vigorous boil, and reduce for 5 minutes.
- Add the stock, thyme, and bay leaves. Return the chicken. Cover and braise over
  low heat for 45 minutes.
- Sauté the mushrooms in the remaining butter over high heat for 4–5 minutes until
  golden. Set aside.
- Remove the chicken. If needed, reduce the sauce uncovered for 5–10 minutes. Stir
  in the mushrooms and return the chicken.
- Sprinkle with chopped parsley and fresh thyme leaves. Serve with mashed potato or
  egg noodles.
