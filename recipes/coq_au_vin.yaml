de:
  title: Coq au Vin – Hähnchen in Rotwein
  summary: 'Klassischer burgundischer Schmortopf: Hähnchen in kräftigem Rotwein mit
    Champignons, Speckwürfeln, Perlzwiebeln und Bouquet garni.'
en:
  title: Coq au Vin
  summary: 'Classic Burgundian braise: chicken slow-cooked in robust red wine with
    mushrooms, lardons, pearl onions, and a bouquet garni.'
