de:
  title: Hähnchen-Tikka-Bowl mit Raita und Naan
  summary: Saftiges Tikka-Hähnchen in würziger Joghurtmarinade mit Garam Masala und
    Tandoori-Gewürzen, serviert mit Gurken-Raita und warmem Naan.
en:
  title: Chicken Tikka Bowl with Raita and Naan
  summary: Juicy Tikka chicken marinated in a spiced yogurt blend with garam masala
    and tandoori seasonings, served with cucumber raita and warm naan.
