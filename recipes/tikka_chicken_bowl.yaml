de_steps:
- Hähnchen in große Würfel schneiden. 200 g Joghurt mit Knoblauch, Ingwer, Garam Masala,
  Tandoori-Gewürz, Kurkuma, Kreuzkümmel, Paprika, Chiliflocken und Zitronensaft vermengen.
  Hähnchen mindestens 30 Minuten marinieren.
- Reis nach Packungsanweisung garen.
- 'Raita: Gurke fein reiben oder würfeln, ausdrücken. Mit 100 g Joghurt, gehackter
  Minze, Salz und einer Prise Kreuzkümmel verrühren.'
- Hähnchen in einer sehr heißen Grillpfanne oder unter dem Ofengrill bei 220 °C garen,
  bis es leicht angebrannt und durchgegart ist, ca. 10–12 Minuten.
- Naan kurz in der trockenen Pfanne oder im Ofen aufwärmen.
- Bowls mit Reis und Hähnchen-Tikka anrichten. Raita daneben servieren, Naan zur Seite.
en_steps:
- Cut chicken into large cubes. Mix 200 g yogurt with garlic, ginger, garam masala,
  tandoori spice blend, turmeric, cumin, paprika, chili flakes, and lemon juice. Marinate
  the chicken for at least 30 minutes.
- Cook the rice according to package instructions.
- 'Raita: finely grate or dice the cucumber and squeeze out excess moisture. Stir
  together with 100 g yogurt, chopped mint, salt, and a pinch of cumin.'
- Cook the chicken in a very hot grill pan or under the oven grill at 220 °C until
  slightly charred and cooked through, about 10–12 minutes.
- Warm the naan briefly in a dry pan or in the oven.
- Assemble the bowls with rice and chicken tikka. Serve the raita alongside and the
  naan on the side.
