de:
  title: Badischer Sauerbraten-Hähnchen-Topf
  summary: 'Die Aromen des Badens: Hähnchen 24 Stunden in Rotweinessig-Marinade eingelegt,
    dann langsam mit Gewürzen und Lebkuchen geschmort.'
en:
  title: Baden-Style Sauerbraten Chicken Pot
  summary: 'The flavours of Baden: chicken marinated for 24 hours in red-wine-vinegar
    brine, then slowly braised with spices and gingerbread.'
