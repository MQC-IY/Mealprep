de_steps:
- 'Marinade: Rotwein, Rotweinessig, Lorbeer, Wacholder, Piment, Pfefferkörner und
  Nelken kurz aufkochen, abkühlen. Hähnchen in einer Schüssel mit der Marinade bedecken
  und 12–24 Stunden im Kühlschrank marinieren.'
- Hähnchen aus der Marinade nehmen, gut trocken tupfen. Marinade durch ein Sieb gießen
  und aufbewahren. Hähnchen salzen.
- Schmalz in einem Bräter erhitzen, Hähnchen von allen Seiten goldbraun anbraten.
  Herausnehmen. Gewürfeltes Gemüse (Zwiebeln, Karotten, Sellerie) im Bratfett 8 Minuten
  anbraten.
- Marinierflüssigkeit und Hühnerbrühe aufgießen. Thymian einrühren. Hähnchen zurücklegen,
  zugedeckt 40 Minuten bei mittlerer Hitze schmoren.
- Hähnchen herausnehmen, Sauce durch ein Sieb passieren. Lebkuchen zerbröseln und
  in die Sauce einrühren – er dickt die Sauce an und gibt süß-würzige Tiefe. Sahne
  einrühren, kurz aufkochen, abschmecken.
- Hähnchen in der Sauce erwärmen. Mit Rotkohl, Kartoffelklößen oder Spätzle servieren.
en_steps:
- 'Marinade: briefly bring the red wine, red wine vinegar, bay leaves, juniper berries,
  allspice, peppercorns, and cloves to a boil, then let cool. Submerge the chicken
  in the marinade in a bowl and refrigerate for 12–24 hours.'
- Remove the chicken from the marinade and pat dry thoroughly. Strain the marinade
  through a sieve and set aside. Season the chicken with salt.
- Heat lard in a roasting pot and brown the chicken on all sides until golden. Remove.
  Sauté the diced vegetables (onions, carrots, celery) in the fat for 8 minutes.
- Pour in the marinade liquid and chicken stock. Stir in the thyme. Return the chicken,
  cover, and braise over medium heat for 40 minutes.
- Remove the chicken and pass the sauce through a sieve. Crumble in the gingerbread
  and stir into the sauce — it thickens it and adds a sweet-spicy depth. Stir in the
  cream, bring briefly to a boil, season to taste.
- Warm the chicken in the sauce. Serve with red cabbage, potato dumplings, or Spätzle.
