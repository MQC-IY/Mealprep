de:
  title: Japanisches Tofu-Hähnchen-Eintopf (Yosenabe)
  summary: Japanischer Eintopf-Klassiker mit Hähnchen, Seidentofu, Pilzen und Gemüse
    in leichter Kombu-Dashi-Brühe mit Ponzu zum Dippen.
en:
  title: Japanese Tofu and Chicken Hot Pot (Yosenabe)
  summary: A Japanese hot pot classic with chicken, silken tofu, mushrooms, and vegetables
    in a light kombu dashi broth, served with ponzu for dipping.
