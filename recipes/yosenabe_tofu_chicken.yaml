de_steps:
- 'Brühe-Basis: Dashi-Brühe mit Sojasoße, Mirin und Sake aufkochen. Knoblauch und
  Ingwer (dünn geschnitten) 5 Minuten mitköcheln.'
- Hähnchenbrust schräg in dünne Scheiben schneiden. Karotten schräg in Scheiben schneiden.
  Pak Choi halbieren.
- Seidentofu vorsichtig in grobe Würfel schneiden.
- Hähnchen in die köchelnde Brühe geben und 5 Minuten garen.
- Karotten und Shiitake-Pilze dazugeben, 3 Minuten köcheln. Pak Choi, Enoki-Pilze
  und Udon-Nudeln einlegen und weitere 3 Minuten garen.
- Tofu vorsichtig zuletzt einlegen und nur 2 Minuten erhitzen.
- Sesamöl einträufeln. In tiefe Schalen schöpfen, mit Frühlingszwiebeln und Shichimi-Togarashi
  garnieren. Ponzu-Soße separat zum Dippen servieren.
en_steps:
- 'Make the broth base: bring the dashi broth to a boil with the soy sauce, mirin,
  and sake. Add the thinly sliced garlic and ginger and simmer for 5 minutes.'
- Cut the chicken breast diagonally into thin slices. Cut the carrots diagonally into
  slices. Halve the bok choy.
- Carefully cut the silken tofu into rough cubes.
- Add the chicken to the simmering broth and cook for 5 minutes.
- Add the carrots and shiitake mushrooms; simmer for 3 minutes. Add the bok choy,
  enoki mushrooms, and udon noodles and cook for a further 3 minutes.
- Gently place the tofu in last and heat for just 2 minutes.
- Drizzle with sesame oil. Ladle into deep bowls and garnish with spring onions and
  shichimi togarashi. Serve ponzu sauce separately for dipping.
