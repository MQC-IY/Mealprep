de_steps:
- Zwiebeln fein würfeln. Knoblauch und Ingwer zu einer Paste reiben. Grüne Chilischoten
  fein hacken.
- Öl in einem schweren Topf erhitzen. Kreuzkümmelsamen 30 Sekunden anrösten. Zwiebeln
  dazugeben und 10–12 Minuten dunkelgoldbraun braten.
- Knoblauch-Ingwer-Paste und Chilischoten einrühren, 2 Minuten braten. Alle gemahlenen
  Gewürze außer Garam Masala hinzufügen und 1 Minute rösten.
- Tomatenmark einrühren, dann gehackte Tomaten dazugeben. 10 Minuten köcheln, bis
  sich das Öl absetzt.
- Abgetropfte Kichererbsen hinzufügen, 150 ml Wasser einrühren. 15 Minuten köcheln,
  einige Kichererbsen dabei leicht zerdrücken, um die Sauce zu binden.
- Mit Garam Masala, Amchur, Salz und einem Spritzer Zitronensaft abschmecken. Mit
  frischem Koriander garnieren und mit Basmatireis servieren.
en_steps:
- Finely dice the onions. Grate the garlic and ginger into a paste. Finely chop the
  green chilies.
- Heat the oil in a heavy pot. Toast the cumin seeds for 30 seconds. Add the onions
  and fry for 10–12 minutes until deep golden brown.
- Stir in the garlic-ginger paste and chilies and cook for 2 minutes. Add all the
  ground spices except the garam masala and toast for 1 minute.
- Stir in the tomato paste, then add the chopped tomatoes. Simmer for 10 minutes until
  the oil separates.
- Add the drained chickpeas and 150 ml water. Simmer for 15 minutes, lightly crushing
  some chickpeas to thicken the sauce.
- Season with garam masala, amchur, salt, and a squeeze of lemon juice. Garnish with
  fresh cilantro and serve with basmati rice.
