meals: 2
de:
  title: Hähnchen-Saltimbocca mit Marsala-Sauce
  summary: Zarte Hähnchenbrust mit Salbei und Prosciutto, in Butter scharf angebraten
    und mit einer tiefen Marsala-Jus vollendet.
en:
  title: Chicken Saltimbocca with Marsala Sauce
  summary: Tender chicken breasts with sage and prosciutto, seared in butter until
    golden, and finished with a deep, glossy Marsala jus.
