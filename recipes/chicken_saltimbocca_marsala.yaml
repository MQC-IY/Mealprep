de_steps:
- Hähnchenbrüste horizontal halbieren, sodass 8 flache Schnitzel entstehen. Zwischen
  Frischhaltefolie auf ca. 8 mm Dicke plattieren. Salzen und pfeffern.
- Je 1–2 Salbeiblätter auf die glatte Seite jedes Schnitzels legen, dann eine Scheibe
  Prosciutto darüberlegen und andrücken. Prosciuttoseite leicht in Mehl tauchen, abklopfen.
- 2 EL Olivenöl und ein Nussbutterreserve in einer großen Pfanne bei hoher Hitze erhitzen.
  Schnitzel mit Prosciuttoseite nach unten einlegen, 2–3 Min. knusprig braten. Wenden
  und 2 Min. fertig garen. In Lagen warmhalten.
- Pfannenfett abgießen, 1 EL frisches Olivenöl bei mittlerer Hitze erhitzen. Schalotten
  fein würfeln und glasig dünsten, ca. 3 Min. Knoblauch fein hacken, 1 Min. mitdünsten.
- Marsala in die Pfanne gießen, aufkochen und auf die Hälfte einreduzieren lassen,
  dabei alle Röststoffe lösen, ca. 4 Min. Hühnerbrühe hinzufügen, erneut um ein Drittel
  einkochen.
- Pfanne vom Herd nehmen, kalte Butterwürfel Stück für Stück einrühren (montieren),
  bis eine glänzende, sämige Sauce entsteht. Abschmecken. Saltimbocca in der Sauce
  schwenken, mit restlichen frischen Salbeiblättern bestreut sofort servieren.
en_steps:
- Halve the chicken breasts horizontally to make 8 flat cutlets. Pound between plastic
  wrap to about 8 mm thick. Season with salt and pepper.
- Place 1–2 sage leaves on the smooth side of each cutlet, top with a slice of prosciutto
  and press to adhere. Lightly dip the prosciutto side in flour and tap off the excess.
- Heat 2 tbsp olive oil and a knob of butter in a large pan over high heat. Place
  the cutlets prosciutto-side down and fry for 2–3 minutes until crispy. Turn and
  cook for a further 2 minutes. Keep warm in layers.
- Discard the pan fat, heat 1 tbsp fresh olive oil over medium heat. Finely dice the
  shallots and sweat until translucent, about 3 minutes. Finely chop the garlic and
  cook for 1 minute.
- Pour in the Marsala, bring to a boil and reduce by half, scraping up any browned
  bits, about 4 minutes. Add the chicken stock and reduce again by one-third.
- Remove the pan from the heat and whisk in the cold butter cubes piece by piece (mounting)
  until a glossy, silky sauce forms. Season. Toss the Saltimbocca in the sauce, scatter
  with fresh sage leaves, and serve immediately.
