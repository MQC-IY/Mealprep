id: cauliflower_lentil_pot
pool: lunch
healthy: true
quick: false
next_day: true
meals: 3
de:
  title: Blumenkohl-Linsen-Topf mit Kartoffeln
  summary: Milder Topf mit roten Linsen, Blumenkohl, Kartoffeln und leichter Tomatenbasis.
en:
  title: Cauliflower and Lentil Pot with Potatoes
  summary: A mild one-pot with red lentils, cauliflower, potatoes, and a light tomato
    base.
ingredients:
- de_name: Rote Linsen
  en_name: red lentils
  qty: 220
  unit: g
  category: Konserven und Vorrat
- de_name: Blumenkohl
  en_name: cauliflower
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Kartoffeln
  en_name: potatoes
  qty: 700
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Passierte Tomaten
  en_name: strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Currypulver
  en_name: curry powder
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Zwiebel und Möhren in Olivenöl anschwitzen.
- Kartoffeln und Blumenkohl klein schneiden und mit Linsen und Tomaten zugeben.
- Mit Wasser auffüllen und weich köcheln lassen.
en_steps:
- Sauté the onion and carrots in olive oil until softened.
- Chop the potatoes and cauliflower into small pieces and add along with the lentils
  and tomatoes.
- Top up with water and simmer until tender.
