de_steps:
- Hähnchen in dünne Scheiben schneiden. Mit 2 EL Sojasauce, 1 EL Gochujang, Honig,
  2 Knoblauchzehen (gepresst) und 1 TL Sesamöl marinieren.
- Reis nach Packungsanweisung garen.
- Gurke in dünne Scheiben hobeln, mit Reisessig, 1 Prise Salz und Chiliflocken kurz
  einlegen.
- Möhren in feine Julienne schneiden, kurz in kochendem Salzwasser blanchieren oder
  roh belassen.
- Spinat in einer Pfanne mit etwas Sesamöl und 1 Knoblauchzehe zusammenfallen lassen,
  mit Sojasauce und Sesam abschmecken.
- Hähnchen in einer sehr heißen Pfanne scharf anbraten, bis es karamellisiert und
  durchgegart ist.
- Bowls mit Reis füllen. Hähnchen, Kimchi, eingelegte Gurken, Möhren und Spinat nebeneinander
  anrichten. Mit Frühlingszwiebeln und Sesam bestreuen. Restliche Gochujang-Sauce
  dazu reichen.
en_steps:
- Slice chicken thinly. Marinate with 2 tbsp soy sauce, 1 tbsp gochujang, honey, 2
  pressed garlic cloves, and 1 tsp sesame oil.
- Cook rice according to package instructions.
- Thinly slice cucumber; briefly pickle with rice vinegar, a pinch of salt, and chili
  flakes.
- Cut carrots into fine julienne; blanch briefly in boiling salted water or leave
  raw.
- Wilt spinach in a pan with a little sesame oil and 1 garlic clove; season with soy
  sauce and sesame seeds.
- Sear chicken in a very hot pan until caramelised and cooked through.
- Fill bowls with rice. Arrange chicken, kimchi, pickled cucumber, carrots, and spinach
  side by side. Sprinkle with spring onions and sesame seeds. Serve remaining gochujang
  sauce on the side.
