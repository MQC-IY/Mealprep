id: baked_apple_walnut
pool: dessert
healthy: true
meals: 8
de:
  title: Gebackene Äpfel mit Walnüssen und Zimt
  summary: Klassische Bratäpfel gefüllt mit Walnüssen, Datteln und Zimt — ein wärmendes,
    zuckerfreies Herbst- und Winterdessert für die ganze Familie.
en:
  title: Baked Apples with Walnuts and Cinnamon
  summary: Classic baked apples filled with walnuts, dates, and cinnamon — a warming,
    sugar-free autumn and winter dessert for the whole family.
ingredients:
- de_name: große Äpfel (z.B. Boskoop)
  en_name: large apples (e.g. Boskoop)
  qty: 8
  unit: Stk
  category: Obst
- de_name: Walnüsse grob gehackt
  en_name: walnuts, roughly chopped
  qty: 160
  unit: g
  category: Konserven und Vorrat
- de_name: Medjool-Datteln entsteint fein gehackt
  en_name: Medjool dates, pitted and finely chopped
  qty: 120
  unit: g
  category: Obst
- de_name: Haferflocken (zart)
  en_name: rolled oats (fine)
  qty: 80
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Zimt gemahlen
  en_name: cinnamon, ground
  qty: 2
  unit: TL
  category: Gewürze
- de_name: Kardamom gemahlen
  en_name: cardamom, ground
  qty: 0.5
  unit: TL
  category: Gewürze
- de_name: Vanilleextrakt
  en_name: vanilla extract
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Honig
  en_name: honey
  qty: 3
  unit: EL
  category: Konserven und Vorrat
- de_name: Kokosöl
  en_name: coconut oil
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Apfelsaft naturtrüb
  en_name: cloudy apple juice
  qty: 200
  unit: ml
  category: Obst
- de_name: Naturjoghurt zum Servieren
  en_name: plain yogurt, for serving
