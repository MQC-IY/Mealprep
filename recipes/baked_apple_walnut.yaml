de_steps:
- Ofen auf 180 °C Ober-/Unterhitze vorheizen.
- Äpfel waschen und mit einem Apfelausstecher oder Teelöffel das Kerngehäuse von oben
  aushöhlen, dabei ca. 1 cm Boden stehen lassen.
- Walnüsse, gehackte Datteln, Haferflocken, Zimt, Kardamom, Vanilleextrakt, Honig
  und Kokosöl in einer Schüssel gut vermengen.
- Äpfel in eine Auflaufform stellen und die Füllung fest in die Höhlung drücken.
- Apfelsaft in den Boden der Form gießen.
- Im vorgeheizten Ofen 30–35 Minuten backen, bis die Äpfel weich sind und die Füllung
  leicht gebräunt ist.
- Warm mit einem Löffel Naturjoghurt servieren. Reste im Kühlschrank bis zu 2 Tage
  haltbar.
en_steps:
- Preheat oven to 180 °C (350 °F) top/bottom heat.
- Wash the apples and core them from the top using an apple corer or teaspoon, leaving
  about 1 cm of base intact.
- Mix together walnuts, chopped dates, oats, cinnamon, cardamom, vanilla extract,
  honey, and coconut oil in a bowl.
- Place apples in a baking dish and press the filling firmly into the cavity.
- Pour apple juice into the base of the dish.
- Bake in the preheated oven for 30–35 minutes until the apples are tender and the
  filling is lightly browned.
- Serve warm with a spoonful of plain yogurt. Leftovers keep in the fridge for up
  to 2 days.
