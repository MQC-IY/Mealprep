meals: 2
de:
  title: Canh Chua – Vietnamesische Sauere Fischsuppe
  summary: Leichte, fruchtig-saure vietnamesische Suppe mit weißem Fisch, Tomaten,
    Ananas, Tamarinde und frischen Kräutern.
en:
  title: Canh Chua – Vietnamese Sour Fish Soup
  summary: A light, fruity-sour Vietnamese soup with white fish, tomatoes, pineapple,
    tamarind, and fresh herbs.
ingredients:
