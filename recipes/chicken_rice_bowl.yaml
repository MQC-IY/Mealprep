de_steps:
- Reis nach Packungsangabe garen.
- Brokkoli in Röschen teilen, Paprika in Streifen und Möhren in Scheiben schneiden.
- Gemüse mit etwas Olivenöl mischen und weich garen, im Ofen oder in der Pfanne.
- Hähnchen mit Paprika, etwas Kreuzkümmel, Knoblauch und Zitronensaft würzen und durchgaren.
en_steps:
- Cook the rice according to the package instructions.
- Break the broccoli into florets, slice the bell pepper into strips, and cut the
  carrots into rounds.
- Toss the vegetables with a little olive oil and cook until tender, in the oven or
  in a pan.
- Season the chicken with paprika, a little cumin, garlic, and lemon juice and cook
  through.
