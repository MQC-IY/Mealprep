  summary: Milde Bowl mit Brokkoli, Paprika und Möhren, ideal für Meal Prep und Familienmittag.
en:
  title: Chicken Rice and Vegetable Bowl
  summary: A mild and nourishing bowl with broccoli, bell pepper, and carrots — perfect
    for meal prep and family lunches.
