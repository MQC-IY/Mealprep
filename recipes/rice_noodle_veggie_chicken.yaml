de:
  title: Reisnudel-Pfanne mit Hähnchen und Gemüse
  summary: Reisnudeln mit Hähnchen, Karotten und Paprika, ohne scharfe Sauce.
en:
  title: Rice Noodle Stir-Fry with Chicken and Vegetables
  summary: Rice noodles with chicken, carrots, and bell peppers in a light, mild sauce.
