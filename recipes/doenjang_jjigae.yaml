de_steps:
- Reis garen.
- Hähnchenbrust in kleine Würfel schneiden. Tofu in 2 cm große Würfel. Zucchini in
  Halbmonde. Zwiebel in grobe Stücke. Knoblauch fein hacken. Chili in dünne Ringe.
- In einem Topf Pflanzenöl erhitzen, Knoblauch und Hähnchen 3 Minuten anbraten.
- Brühe angießen und aufkochen. Doenjang und Gochujang mit einem Schöpflöffel voll
  Brühe glatt rühren, dann in den Topf einrühren.
- Zucchini, Champignons und Zwiebeln dazugeben. 10 Minuten köcheln.
- Tofu einlegen und weitere 5 Minuten köcheln. Gochugaru einrühren.
- Sesamöl einträufeln. Mit Frühlingszwiebeln garnieren. Mit Reis in Schüsseln servieren.
en_steps:
- Cook the rice.
- Cut the chicken breast into small cubes. Cut the tofu into 2 cm cubes, the courgette
  into half-moons, and the onion into rough chunks. Finely chop the garlic. Slice
  the chilli into thin rings.
- Heat the vegetable oil in a pot, then stir-fry the garlic and chicken for 3 minutes.
- Pour in the broth and bring to a boil. Whisk the doenjang and gochujang with a ladle
  of broth until smooth, then stir into the pot.
- Add the courgette, mushrooms, and onion. Simmer for 10 minutes.
- Add the tofu and simmer for a further 5 minutes. Stir in the gochugaru.
- Drizzle with sesame oil. Garnish with spring onions. Serve in bowls with rice.
