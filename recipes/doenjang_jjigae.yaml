de:
  title: Doenjang Jjigae – Koreanischer Sojabohneneintopf
  summary: Kräftiger fermentierter Sojabohneneintopf mit Tofu, Zucchini, Pilzen und
    Hähnchen in Anchovy-Dasida-Brühe.
en:
  title: Doenjang Jjigae – Korean Fermented Soybean Stew
  summary: A robust fermented soybean paste stew with tofu, courgette, mushrooms,
    and chicken in an anchovy-based broth.
