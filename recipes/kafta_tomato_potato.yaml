de_steps:
- Hackfleisch mit fein gewürfelter halber Zwiebel, gehackter Petersilie, Allgewürz,
  Zimt, Kreuzkümmel, Chili, Salz und Pfeffer vermengen. Zu etwa 8 cm langen Rollen
  formen.
- Kartoffeln schälen und in dicke Scheiben schneiden. In Olivenöl bei hoher Hitze
  von beiden Seiten anbraten, bis goldbraun. Beiseitestellen.
- Kafta-Rollen in derselben Pfanne von allen Seiten anbraten (3–4 Minuten). Beiseitestellen.
- Restliche Zwiebel und Paprika würfeln, im Bratfett 5 Minuten weich dünsten. Knoblauch
  einrühren. Tomatenmark kurz rösten.
- 'Gehackte Tomaten und Hühnerbrühe hinzufügen. Frische Tomaten in Scheiben schneiden.
  Alle Zutaten in einen Auflauf schichten: Kartoffeln, Kafta, Tomatenscheiben, Sauce.'
- Backofen auf 180°C vorheizen. Auflauf 35–40 Minuten backen, bis die Sauce eingedickt
  und alles durchgegart ist. Mit Petersilie bestreuen und mit Brot oder Reis servieren.
en_steps:
- Combine ground beef with finely diced half an onion, chopped parsley, allspice,
  cinnamon, cumin, chili, salt, and pepper. Shape into rolls about 8 cm long.
- Peel potatoes and cut into thick slices. Fry in olive oil over high heat on both
  sides until golden brown. Set aside.
- Sear the kafta rolls in the same pan on all sides (3–4 minutes). Set aside.
- Dice the remaining onion and bell pepper; sweat in the cooking fat for 5 minutes.
  Stir in garlic. Briefly toast the tomato paste.
- 'Add chopped tomatoes and chicken stock. Slice fresh tomatoes. Layer all ingredients
  in a baking dish: potatoes, kafta, tomato slices, sauce.'
- Preheat oven to 180 °C. Bake for 35–40 minutes until the sauce has thickened and
  everything is cooked through. Sprinkle with parsley and serve with bread or rice.
