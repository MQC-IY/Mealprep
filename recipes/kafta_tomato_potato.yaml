de:
  title: Libanesischer Kafta-Topf mit Tomaten und Kartoffeln
  summary: Würzige Hackfleisch-Rollen mit Kartoffeln und Tomaten in einer aromatischen
    Sauce geschmort – ein gemütlicher levantinischer Auflauf.
en:
  title: Lebanese Kafta Pot with Tomatoes and Potatoes
  summary: Spiced ground meat rolls braised with potatoes and tomatoes in an aromatic
    sauce – a comforting Levantine bake.
