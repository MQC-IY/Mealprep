de:
  title: Hähnchen-Ossobuco – Geschmortes Hähnchen
  summary: Hähnchenkeulen nach Ossobuco-Art geschmort mit Weißwein, Tomaten, Karotte
    und Sellerie – abgerundet mit frischer Gremolata.
en:
  title: Chicken Ossobuco – Braised Chicken
  summary: Chicken legs braised Ossobuco-style with white wine, tomatoes, carrot,
    and celery — finished with bright, fresh gremolata.
