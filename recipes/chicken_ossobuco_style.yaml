de_steps:
- Hähnchenkeulen mit Salz, Pfeffer und Thymian würzen, beidseitig leicht in Mehl wenden.
- Olivenöl im Schmortopf bei hoher Hitze erhitzen. Hähnchen von beiden Seiten 4–5
  Minuten scharf anbraten. Herausnehmen.
- Zwiebel, Karotten und Sellerie fein würfeln. Im Bratfett bei mittlerer Hitze 6–7
  Minuten anschwitzen. Knoblauch dazugeben, 1 Minute weiterbraten.
- Mit Weißwein ablöschen, kräftig aufkochen und 3 Minuten einkochen. Tomaten (zerdrückt),
  Brühe und Lorbeerblätter einrühren.
- Hähnchenkeulen zurücklegen. Bei geschlossenem Deckel bei niedriger Hitze 45 Minuten
  schmoren.
- Deckel abnehmen, weitere 15 Minuten offen köcheln, bis die Sauce sämig wird. Lorbeer
  entfernen.
- 'Für die Gremolata: Petersilie fein hacken, Zitronenschale fein abreiben und mit
  gepresstem Knoblauch (1 Zehe, roh) vermischen.'
- Hähnchen auf dem Schmortopfinhalt anrichten, Gremolata großzügig darüberstreuen.
  Mit Risotto oder Polenta servieren.
en_steps:
- Season the chicken legs with salt, pepper, and thyme; lightly dredge both sides
  in flour.
- Heat the olive oil in a braising pot over high heat. Sear the chicken on both sides
  for 4–5 minutes. Remove.
- Finely dice the onion, carrots, and celery. Sweat in the pan drippings over medium
  heat for 6–7 minutes. Add the garlic and cook for 1 more minute.
- Deglaze with the white wine, bring to a vigorous boil and reduce for 3 minutes.
  Stir in the crushed tomatoes, stock, and bay leaves.
- Return the chicken legs to the pot. Braise, covered, over low heat for 45 minutes.
- Remove the lid and simmer uncovered for a further 15 minutes until the sauce thickens.
  Discard the bay leaves.
- 'For the gremolata: finely chop the parsley, finely zest the lemon, and mix with
  1 clove of raw pressed garlic.'
- Plate the chicken over the braising juices and scatter the gremolata generously
  on top. Serve with risotto or polenta.
