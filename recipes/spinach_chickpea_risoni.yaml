id: spinach_chickpea_risoni
pool: lunch
healthy: true
quick: true
next_day: false
quick_minutes: 25
meals: 3
de:
  title: Risoni mit Kichererbsen und Spinat
  summary: Schnelle, milde Risoni-Pfanne mit Kichererbsen, Spinat und leichter Tomatensauce.
en:
  title: Risoni with Chickpeas and Spinach
  summary: A quick, mild orzo pan with chickpeas, spinach and a light tomato sauce.
ingredients:
- de_name: Orzo oder Kritharaki
  en_name: orzo (risoni)
  qty: 300
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Kichererbsen
  en_name: chickpeas
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Blattspinat
  en_name: baby spinach
  qty: 180
  unit: g
  category: Gemüse und Salat
- de_name: Passierte Tomaten
  en_name: strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Basilikum
  en_name: basil
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chilli flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Risoni weich garen.
- Zwiebel in Olivenöl anschwitzen, Tomaten und Kichererbsen zugeben.
- Spinat unterheben, bis er zusammenfällt.
en_steps:
- Cook risoni (orzo) until tender.
- Sauté onion in olive oil, add tomatoes and chickpeas.
- Fold in spinach until it wilts down.
