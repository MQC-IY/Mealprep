de:
  title: Risoni mit Kichererbsen und Spinat
  summary: Schnelle, milde Risoni-Pfanne mit Kichererbsen, Spinat und leichter Tomatensauce.
en:
  title: Risoni with Chickpeas and Spinach
  summary: A quick, mild orzo pan with chickpeas, spinach and a light tomato sauce.
ingredients:
- de_name: Orzo oder Kritharaki
  en_name: orzo (risoni)
  qty: 300
  unit: g
