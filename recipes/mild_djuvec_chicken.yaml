de:
  title: Djuvec-Hähnchen mit Reis
  summary: Klassische Balkan-Reispfanne mit Hähnchen, Paprika, Erbsen und Tomate –
    Ajvar und geräucherter Paprika geben dem Djuvec seinen unverwechselbaren Charakter.
en:
  title: Djuvec Chicken with Rice
  summary: A classic Balkan rice pan with chicken, bell pepper, peas, and tomato —
    ajvar and smoked paprika give the Djuvec its unmistakable character.
