de:
  title: Französisches Cassoulet-Eintopf
  summary: Üppiger südfranzösischer Cassoulet mit weißen Bohnen, Entenschenkel, Toulouse-Salsiccia
    und kräftiger Fleischbrühe – langsam geschmort mit goldbrauner Kruste.
en:
  title: French Cassoulet
  summary: A hearty southern French Cassoulet with white beans, duck legs, Toulouse
    sausage, and rich stock – slow-braised with a golden breadcrumb crust.
