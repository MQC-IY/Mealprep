de_steps:
- Ofen auf 160 °C vorheizen. Entenschenkel/Hähnchenschenkel mit Salz und Pfeffer würzen.
- Olivenöl im Schmortopf (ofenfest) erhitzen. Geflügelschenkel rundherum 5–6 Minuten
  kräftig anbraten. Herausnehmen.
- Salsiccia in Stücke schneiden, im gleichen Topf 3 Minuten anbraten. Herausnehmen.
- Zwiebel, Karotte würfeln, Knoblauch hacken. Im Bratfett 6 Minuten anschwitzen. Tomatenmark
  einrühren, 2 Minuten rösten.
- Dosentomaten zerdrückt, Brühe, Herbes de Provence und Lorbeer dazugeben. Aufkochen.
- Bohnen (abgetropft) einrühren. Geflügelschenkel und Salsiccia-Stücke in den Topf
  legen.
- Semmelbrösel gleichmäßig über den gesamten Topf streuen. Mit dem Deckel abdecken
  und im vorgeheizten Ofen 90 Minuten garen.
- Deckel abnehmen, Ofen auf 200 °C hochdrehen. 20–25 Minuten weiterbacken, bis die
  Semmelbrösekruste goldbraun und knusprig ist. Lorbeer entfernen.
en_steps:
- Preheat the oven to 160 °C. Season the duck/chicken legs with salt and pepper.
- Heat olive oil in an ovenproof casserole. Brown the poultry legs all over for 5–6
  minutes. Remove.
- Cut the sausage into pieces and brown in the same pot for 3 minutes. Remove.
- Dice the onion and carrot, chop the garlic. Sauté in the cooking fat for 6 minutes.
  Stir in the tomato paste and toast for 2 minutes.
- Add the crushed canned tomatoes, stock, herbes de Provence, and bay leaves. Bring
  to a boil.
- Stir in the drained beans. Nestle the poultry legs and sausage pieces into the pot.
- Scatter the breadcrumbs evenly over the top. Cover with the lid and braise in the
  preheated oven for 90 minutes.
- Remove the lid, increase the oven to 200 °C, and bake for a further 20–25 minutes
  until the breadcrumb crust is golden and crispy. Remove the bay leaves.
