de:
  title: Japanischer Hayashi Rice (Hähnchen in Demi-Glace)
  summary: Hähnchen und Pilze in einer tiefen, weinreichen Demi-Glace-Soße nach japanischer
    Art auf Reis – das westlich-japanische Comfort-Food.
en:
  title: Hayashi Rice – Chicken in Demi-Glace Sauce
  summary: Chicken and mushrooms in a rich, wine-laced demi-glace sauce in the Japanese
    style, served over rice — the ultimate Japanese-Western comfort food.
