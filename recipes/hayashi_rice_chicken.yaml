de_steps:
- Hähnchen in mundgerechte Stücke schneiden, salzen, pfeffern. Zwiebeln in halbe Ringe,
  Champignons in Scheiben, Knoblauch fein hacken.
- Butter und Öl in einem Schmortopf erhitzen. Hähnchen von allen Seiten scharf anbraten
  (5 Minuten), herausnehmen.
- Zwiebeln im Bratfett 8 Minuten bei mittlerer Hitze karamellisieren lassen. Knoblauch
  und Tomatenmark dazugeben, 2 Minuten mitbraten.
- Rotwein angießen und stark einkochen lassen (3 Minuten). Brühe, Sojasoße, Worcestersoße,
  Zucker und Thymian einrühren. Aufkochen.
- Hähnchen zurückgeben, Champignons dazugeben. Abdecken und 25 Minuten bei niedriger
  Hitze schmoren.
- Hayashi-Roux oder Demi-Glace-Pulver einrühren und die Soße unter Rühren 5 Minuten
  eindicken lassen.
- Reis garen und auf Tellern anrichten. Hayashi-Hähnchen daneben schöpfen.
en_steps:
- Cut the chicken into bite-sized pieces, season with salt and pepper. Slice the onions
  into half-rings, slice the mushrooms, finely chop the garlic.
- Heat the butter and oil in a casserole. Sear the chicken on all sides over high
  heat (5 minutes), then remove.
- Caramelise the onions in the same fat over medium heat for 8 minutes. Add the garlic
  and tomato purée and fry for 2 minutes.
- Pour in the red wine and reduce strongly (3 minutes). Stir in the stock, soy sauce,
  Worcestershire sauce, sugar, and thyme. Bring to a boil.
- Return the chicken and add the mushrooms. Cover and braise over low heat for 25
  minutes.
- Stir in the hayashi roux or demi-glace powder and let the sauce thicken for 5 minutes,
  stirring.
- Cook the rice and plate up. Ladle the hayashi chicken alongside.
