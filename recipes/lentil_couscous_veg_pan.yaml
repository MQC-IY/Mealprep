de_steps:
- Linsen weich kochen und Couscous quellen lassen.
- Zucchini und Paprika weich garen.
- Tomaten zugeben und alles mischen.
en_steps:
- Cook lentils until tender and steep couscous.
- Cook zucchini and bell pepper until soft.
- Add tomatoes and mix everything together.
