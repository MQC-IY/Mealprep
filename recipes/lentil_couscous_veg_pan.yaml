  en_name: red lentils
  qty: 180
  unit: g
  category: Konserven und Vorrat
- de_name: Zucchini
  en_name: zucchini
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Paprika
  en_name: bell pepper
  qty: 1
  unit: Stk
