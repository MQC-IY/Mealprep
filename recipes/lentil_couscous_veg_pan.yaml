de:
  title: Linsen-Couscous-Pfanne mit Gemüse
  summary: Schnelles Couscousgericht mit roten Linsen, Zucchini und Paprika.
en:
  title: Lentil Couscous Pan with Vegetables
  summary: Quick couscous dish with red lentils, zucchini, and bell pepper.
