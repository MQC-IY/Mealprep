de_steps:
- Hähnchenschenkel trocken tupfen. Mit Ras el Hanout, Kurkuma, gemahlenem Ingwer,
  Kreuzkümmel und Olivenöl einreiben. 1 Stunde marinieren.
- Olivenöl in einem Schmortopf oder Tajine erhitzen. Hähnchenstücke von allen Seiten
  goldbraun anbraten (ca. 4 Minuten pro Seite). Herausnehmen.
- Halbierte Zwiebeln in dünne Scheiben schneiden und im Bratfett 10 Minuten weich
  dünsten. Knoblauch fein hacken und 2 Minuten mitbraten.
- Zimtpulver, Paprika und Pfeffer einrühren. Hühnerbrühe angießen, aufkochen. Hähnchen
  zurück in den Topf legen.
- Salzzitrone in Viertel schneiden, das Fruchtfleisch entfernen und nur die Schale
  verwenden. Mit Oliven zum Hähnchen geben. Deckel auflegen und 45 Minuten bei niedriger
  Hitze schmoren.
- Couscous nach Packungsanweisung zubereiten (mit heißer Hühnerbrühe aufgießen). Tagine
  mit Koriander und Petersilie bestreuen und mit Couscous servieren.
en_steps:
- Pat the chicken legs dry. Rub with ras el hanout, turmeric, ground ginger, cumin,
  and olive oil. Marinate for 1 hour.
- Heat olive oil in a casserole or tagine. Sear the chicken pieces until golden on
  all sides (about 4 minutes per side). Remove.
- Slice the halved onions thinly and sweat in the cooking fat for 10 minutes. Add
  the garlic and cook for 2 minutes more.
- Stir in the ground cinnamon, paprika, and pepper. Pour in the chicken broth and
  bring to a boil. Return the chicken to the pot.
- Quarter the preserved lemon, scoop out and discard the flesh, and use only the rind.
  Add to the pot along with the olives. Cover and braise over low heat for 45 minutes.
- Prepare the couscous according to the packet instructions (pour over hot chicken
  broth). Scatter coriander and parsley over the tagine and serve with the couscous.
