de:
  title: Marokkanisches Hähnchen-Tagine mit Oliven und Salzzitronen
  summary: Schmortopf mit zartem Hähnchen, grünen Oliven und Salzzitronen in einer
    tief gewürzten Ras-el-Hanout-Sauce – marokkanische Küche in ihrer schönsten Form.
en:
  title: Moroccan Chicken Tagine with Olives and Preserved Lemon
  summary: A slow-braised pot of tender chicken, green olives, and preserved lemon
    in a deeply spiced ras el hanout sauce — Moroccan cuisine at its finest.
