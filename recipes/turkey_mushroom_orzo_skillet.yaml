de_steps:
- Orzo weich garen.
- Putenhack mit Zwiebel scharf anbraten.
- Champignons und Möhren zugeben und weich garen.
en_steps:
- Cook the orzo until tender.
- Brown the ground turkey with the onion over high heat.
- Add the mushrooms and carrots and cook until tender.
