- de_name: Champignons
  en_name: mushrooms
  qty: 250
  unit: g
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Frischkäse natur
  en_name: plain cream cheese
  qty: 100
  unit: g
