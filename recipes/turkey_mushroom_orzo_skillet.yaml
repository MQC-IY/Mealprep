de:
  title: Puten-Orzo-Pfanne mit Champignons
  summary: Schnelle Orzo-Pfanne mit Putenhack, Champignons und Möhren.
en:
  title: Turkey Orzo Skillet with Mushrooms
  summary: A quick orzo skillet with ground turkey, mushrooms, and carrots.
