de:
  title: Taco-Reis-Pfanne mit Pute
  summary: Mexikanisch gewürzte Reispfanne mit Putenhack, Kidneybohnen und Mais –
    mit Kreuzkümmel, Chili, geräuchertem Paprika und einem Spritzer Limette.
en:
  title: Taco Rice Skillet with Turkey
  summary: A Mexican-spiced rice skillet with ground turkey, kidney beans, and corn
    — seasoned with cumin, chili, smoked paprika, and a squeeze of lime.
