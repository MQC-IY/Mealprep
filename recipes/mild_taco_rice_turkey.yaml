de_steps:
- Reis garen.
- Zwiebel und Knoblauch fein würfeln. In Rapsöl bei hoher Hitze anbraten, bis die
  Zwiebel goldbraun ist.
- Putenhack zugeben und kräftig anbraten, bis es braune Röstaromen entwickelt und
  nicht mehr roh aussieht.
- Tomatenmark einrühren und 2 Minuten mitrösten. Kreuzkümmel, geräucherten Paprika,
  Paprika edelsüß, Chiliflocken, Koriander und Oregano einrühren und 1 Minute rösten.
- Passierte Tomaten, Kidneybohnen und Mais zugeben. 10 bis 15 Minuten bei mittlerer
  Hitze einköcheln lassen.
- Reis unterheben. Mit Limettensaft, Salz und Pfeffer abschmecken. Nach Belieben mit
  Sauerrahm, Käse oder Avocado servieren.
en_steps:
- Cook the rice.
- Finely dice the onion and garlic. Sauté in rapeseed oil over high heat until the
  onion is golden.
- Add the ground turkey and fry vigorously until nicely browned and no longer raw.
- Stir in the tomato paste and toast for 2 minutes. Stir in the cumin, smoked paprika,
  sweet paprika, chili flakes, coriander, and oregano; toast for 1 minute.
- Add the passata, kidney beans, and corn. Simmer over medium heat for 10–15 minutes.
- Fold in the rice. Season with lime juice, salt, and pepper. Serve with sour cream,
  cheese, or avocado as desired.
