de_steps:
- 'Bulgogi-Marinade: Sojasoße, braunen Zucker, geriebene Birne, gehackten Knoblauch
  (4 Zehen), geriebenen Ingwer, 2 EL Sesamöl und schwarzen Pfeffer verrühren. Dünn
  geschnittenes Rindfleisch einlegen, mind. 20 Min. marinieren (länger = besser).'
- 'Kimchi-Slaw: Weißkohl fein raspeln und mit 1 TL Salz mischen, 10 Min. ziehen lassen,
  dann ausdrücken. Kimchi grob hacken. Mayonnaise, Gochujang, Reisessig und 1 EL Sesamöl
  zur Kimchi-Creme verrühren. Kohl, Kimchi und 2 gehackte Knoblauchzehen unterheben.
  Frühlingszwiebeln in dünne Ringe schneiden – Hälfte in den Slaw, Hälfte zum Garnieren.'
- Tortillas in einer trockenen Pfanne oder direkt auf der Gasflamme beidseitig erwärmen
  bis sie leichte Röststellen haben. In ein Küchentuch wickeln, warm halten.
- Rindfleisch aus der Marinade nehmen, überschüssige Flüssigkeit leicht abtropfen
  – nicht abwischen. In einer gusseisernen Pfanne oder einem Wok bei sehr hoher Hitze
  neutrales Öl erhitzen bis es raucht. Fleisch in Portionen (nicht überfüllen!) ausbreiten
  und 60–90 Sek. karamellisieren lassen ohne zu rühren, dann kurz wenden. Das Karamellisieren
  des Zuckers erzeugt die Knusprigkeit.
- 'Alle Komponenten bereitstellen: Bulgogi-Fleisch, Kimchi-Slaw, Frühlingszwiebelringe,
  Sesamsamen.'
- 'Tacos belegen: Je 2 Tortillas übereinanderlegen (klassisch koreanisch-mexikanischer
  Stil für Stabilität). Großzügig Kimchi-Slaw auflegen, dann Bulgogi-Rindfleisch darauf
  verteilen. Mit Frühlingszwiebeln und Sesamsamen bestreuen. Sofort servieren – die
  Tortillas werden sonst weich.'
en_steps:
- 'Bulgogi marinade: stir together the soy sauce, brown sugar, grated pear, chopped
  garlic (4 cloves), grated ginger, 2 tbsp sesame oil, and black pepper. Add the thinly
  sliced beef and marinate for at least 20 minutes (longer is better).'
- 'Kimchi slaw: finely shred the cabbage and mix with 1 tsp salt; leave for 10 minutes,
  then squeeze out the liquid. Coarsely chop the kimchi. Stir together the mayonnaise,
  gochujang, rice vinegar, and 1 tbsp sesame oil into a kimchi cream. Fold in the
  cabbage, kimchi, and 2 minced garlic cloves. Slice the spring onions into thin rings
  – half goes into the slaw, half reserved for garnishing.'
- Warm the tortillas in a dry pan or directly over a gas flame on both sides until
  lightly charred. Wrap in a kitchen towel to keep warm.
- Remove the beef from the marinade and let excess liquid drip off – do not wipe.
  Heat neutral oil in a cast-iron pan or wok over very high heat until smoking. Spread
  the beef in portions (do not crowd!) and let it caramelise for 60–90 seconds without
  stirring, then briefly turn. The caramelising sugar creates the crispiness.
- 'Arrange all components: Bulgogi beef, kimchi slaw, spring onion rings, sesame seeds.'
- 'Assemble the tacos: stack 2 tortillas on top of each other (classic Korean-Mexican
  style for stability). Add a generous layer of kimchi slaw, then distribute the Bulgogi
  beef on top. Scatter with spring onions and sesame seeds. Serve immediately – the
  tortillas will soften otherwise.'
