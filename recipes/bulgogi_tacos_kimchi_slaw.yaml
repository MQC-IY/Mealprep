  title: Beef Bulgogi-Tacos mit Kimchi-Slaw
  summary: Knusprig karamellisiertes Bulgogi-Rindfleisch in Mais-Tortillas, getoppt
    mit würzigem Kimchi-Slaw – Korea trifft Mexiko.
en:
  title: Beef Bulgogi Tacos with Kimchi Slaw
  summary: Crispy caramelised Bulgogi beef in corn tortillas topped with spicy kimchi
    slaw – Korea meets Mexico.
