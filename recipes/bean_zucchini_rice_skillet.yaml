  en_name: white beans
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Zucchini
  en_name: zucchini
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Paprika edelsüß
  en_name: sweet paprika
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
