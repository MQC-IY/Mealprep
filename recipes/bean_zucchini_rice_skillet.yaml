de_steps:
- Reis garen.
- Zucchini und Möhren weich garen.
- Bohnen kurz erwärmen und alles mischen.
en_steps:
- Cook the rice.
- Cook zucchini and carrots until tender.
- Warm the beans briefly and mix everything together.
