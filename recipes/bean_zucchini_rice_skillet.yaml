meals: 3
de:
  title: Reispfanne mit Bohnen und Zucchini
  summary: Schnelle milde Reispfanne mit weißen Bohnen, Zucchini und Möhren.
en:
  title: Rice Skillet with Beans and Zucchini
  summary: Quick, mild rice skillet with white beans, zucchini, and carrots.
ingredients:
- de_name: Reis
  en_name: rice
  qty: 300
  unit: g
