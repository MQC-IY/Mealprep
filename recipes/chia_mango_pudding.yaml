id: chia_mango_pudding
pool: dessert
healthy: true
meals: 8
de:
  title: Chia-Pudding mit Mango und Kokosmilch
  summary: Cremiger Chia-Pudding auf Kokosmilchbasis mit süßem Mangopüree — ein erfrischend
    leichtes Dessert, das sich perfekt einen Tag im Voraus zubereiten lässt.
en:
  title: Chia Pudding with Mango and Coconut Milk
  summary: Creamy chia pudding on a coconut milk base with sweet mango purée – a refreshingly
    light dessert that is perfect to prepare a day ahead.
ingredients:
- de_name: Chiasamen
  en_name: chia seeds
  qty: 160
  unit: g
  category: Konserven und Vorrat
- de_name: Kokosmilch (Vollfett, Dose)
  en_name: full-fat coconut milk (canned)
  qty: 800
  unit: ml
  category: Konserven und Vorrat
- de_name: Hafermilch oder Mandelmilch
  en_name: oat milk or almond milk
  qty: 400
  unit: ml
  category: Protein und Milchprodukte
- de_name: Agavendicksaft
  en_name: agave syrup
  qty: 3
  unit: EL
  category: Konserven und Vorrat
- de_name: Vanilleextrakt
  en_name: vanilla extract
  qty: 1
  unit: TL
  category: Gewürze
- de_name: reife Mangos
  en_name: ripe mangoes
  qty: 4
  unit: Stk
  category: Obst
- de_name: Limettensaft
  en_name: lime juice
  qty: 2
  unit: EL
  category: Obst
- de_name: Kokosflocken ungesüßt zum Garnieren
  en_name: unsweetened coconut flakes, to garnish
  qty: 40
  unit: g
  category: Konserven und Vorrat
de_steps:
- Kokosmilch, Hafermilch, Agavendicksaft und Vanilleextrakt in einer großen Schüssel
  verrühren.
- Chiasamen einrühren und die Mischung 5 Minuten stehen lassen, dann nochmals kräftig
  rühren, damit sich keine Klumpen bilden.
- Die Schüssel abdecken und mindestens 4 Stunden oder über Nacht im Kühlschrank quellen
  lassen.
- Mangos schälen, das Fruchtfleisch vom Stein schneiden und in einem Mixer zu einem
  glatten Püree verarbeiten.
- Limettensaft unter das Mangopüree rühren.
- Chia-Pudding auf 8 Portionsgläser verteilen und das Mangopüree darauf schichten.
- Kokosflocken darüber streuen und bis zum Servieren kalt stellen. Hält sich abgedeckt
  bis zu 4 Tage im Kühlschrank.
en_steps:
- Whisk together the coconut milk, oat milk, agave syrup, and vanilla extract in a
  large bowl.
- Stir in the chia seeds and leave the mixture for 5 minutes, then stir vigorously
  again to prevent clumping.
- Cover the bowl and refrigerate for at least 4 hours or overnight to set.
- Peel the mangoes, cut the flesh from the stone, and blend to a smooth purée.
- Stir the lime juice into the mango purée.
- Divide the chia pudding among 8 serving glasses and layer the mango purée on top.
- Scatter with coconut flakes and refrigerate until serving. Keeps covered for up
  to 4 days in the fridge.
