id: chicken_pea_couscous_bowl
pool: lunch
healthy: true
quick: true
next_day: false
quick_minutes: 25
meals: 3
de:
  title: Hähnchen-Couscous-Bowl mit Erbsen
  summary: Schnelle Bowl mit Hähnchen, Couscous, Erbsen und Gurke.
en:
  title: Chicken Couscous Bowl with Peas
  summary: A quick and fresh bowl with seared chicken, fluffy couscous, sweet peas,
    carrots, and crisp cucumber with a yogurt drizzle.
ingredients:
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 750
  unit: g
  category: Protein und Milchprodukte
- de_name: Couscous
  en_name: couscous
  qty: 280
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 220
  unit: g
  category: Gemüse und Salat
- de_name: Gurke
  en_name: cucumber
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 100
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Couscous quellen lassen.
- Hähnchen scharf anbraten.
- Erbsen und Möhren weich garen, Gurke klein schneiden.
en_steps:
- Soak the couscous in boiling water until fluffy.
- Sear the chicken over high heat.
- Cook the peas and carrots until tender, then slice the cucumber.
