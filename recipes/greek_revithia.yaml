de_steps:
- Zwiebeln grob würfeln, Sellerie schräg schneiden, Knoblauch pressen. 4 EL Olivenöl
  in einem Topf erhitzen und Zwiebeln und Sellerie 8 Minuten weich dünsten.
- Knoblauch, Chiliflocken und Oregano hinzufügen, 1 Minute rösten. Gehackte Tomaten
  und Gemüsebrühe einrühren.
- Abgetropfte Kichererbsen und Rosmarinzweige einlegen. Alles zum Kochen bringen,
  Hitze reduzieren und 30 Minuten zugedeckt köcheln.
- Rosmarinzweige entfernen. Etwa ein Viertel der Kichererbsen mit einer Gabel zerdrücken,
  um den Eintopf anzudicken.
- Restliches Olivenöl (2 EL), Zitronensaft und Zitronenschale einrühren. Kräftig abschmecken.
  Mit crustigem Brot und Kalamata-Oliven servieren.
en_steps:
- Roughly dice the onions, cut the celery diagonally, and crush the garlic. Heat 4
  tbsp olive oil in a pot and sweat the onions and celery for 8 minutes until soft.
- Add the garlic, chilli flakes, and oregano; toast for 1 minute. Stir in the chopped
  tomatoes and vegetable stock.
- Add the drained chickpeas and rosemary sprigs. Bring everything to a boil, reduce
  the heat, and simmer covered for 30 minutes.
- Remove the rosemary sprigs. Roughly mash about a quarter of the chickpeas with a
  fork to thicken the stew.
- Stir in the remaining olive oil (2 tbsp), lemon juice, and lemon zest. Season generously.
  Serve with crusty bread and Kalamata olives.
