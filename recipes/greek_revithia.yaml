de:
  title: Griechischer Revithia – Kichererbseneintopf
  summary: 'Santorinis Sonntagsgericht: langsam gegarte Kichererbsen mit Olivenöl,
    Rosmarin und Zitrone – vollmundig, nährstoffreich und unaufwändig.'
en:
  title: Revithia – Greek Chickpea Stew
  summary: 'Santorini''s Sunday dish: slow-cooked chickpeas with olive oil, rosemary,
    and lemon — full-bodied, nutritious, and effortless.'
