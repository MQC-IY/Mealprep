de_steps:
- Salsiccia aus der Haut drücken und in walnussgroße Stücke formen. Zwiebel, Karotte
  und Sellerie würfeln, Knoblauch hacken.
- Olivenöl in einem großen Topf bei mittlerer bis hoher Hitze erhitzen. Salsiccia-Stücke
  4–5 Minuten rundherum anbraten, bis sie Farbe bekommen. Herausnehmen.
- Im selben Topf Zwiebel, Karotte und Sellerie 6 Minuten anschwitzen. Knoblauch, Fenchelsamen
  und Peperoncino einrühren, 1 Minute rösten.
- Tomatenmark dazugeben, kurz mitrösten. Mit Rotwein ablöschen, 2 Minuten stark einkochen.
- Linsen (abgespült), Brühe und Thymian dazugeben. Salsiccia zurücklegen. Zugedeckt
  25 Minuten bei niedriger Hitze köcheln.
- Grünkohl von den Stielen befreien, grob hacken. In den Eintopf einrühren, weitere
  10 Minuten offen köcheln.
- 'Konsistenz prüfen: Der Eintopf soll sämig sein, nicht suppig.'
- Mit Salz und Pfeffer abschmecken. Mit rustikalem Brot und einem Schuss Olivenöl
  servieren.
en_steps:
- Squeeze the Salsiccia from its casing and shape into walnut-sized pieces. Dice the
  onion, carrot, and celery; mince the garlic.
- Heat the olive oil in a large pot over medium-high heat. Brown the Salsiccia pieces
  on all sides for 4–5 minutes until coloured. Remove.
- In the same pot, sweat the onion, carrot, and celery for 6 minutes. Stir in the
  garlic, fennel seeds, and peperoncino; toast for 1 minute.
- Add the tomato paste and briefly fry. Deglaze with red wine and reduce hard for
  2 minutes.
- Add the rinsed lentils, broth, and thyme. Return the Salsiccia. Cover and simmer
  over low heat for 25 minutes.
- Strip the kale from the stems and roughly chop. Stir into the stew and cook uncovered
  for a further 10 minutes.
- 'Check consistency: the stew should be thick, not soupy.'
- Season with salt and pepper. Serve with rustic bread and a drizzle of olive oil.
