de:
  title: Salsiccia-Linsen mit Grünkohl
  summary: Herzhafte Umbro-toskanische Linsen mit würziger Salsiccia, Grünkohl, Fenchelsamen
    und Rotwein – bodenständige Winterküche mit Tiefe.
en:
  title: Salsiccia Lentils with Kale
  summary: Hearty Umbrian-Tuscan lentils with spicy Salsiccia, kale, fennel seeds,
    and red wine — a rustic winter dish with real depth.
