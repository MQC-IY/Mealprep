de:
  title: Balkan-Musaka mit Kartoffeln und Rinderhack
  summary: 'Klassische Balkan-Musaka: geschichtete Kartoffeln mit kräftig gewürztem
    Rinderhack, Tomate und einem üppigen Sauerrahm-Ei-Guss.'
en:
  title: Balkan Musaka with Potatoes and Ground Beef
  summary: 'Classic Balkan musaka: layered potatoes with boldly seasoned ground beef
    and tomato, topped with a generous sour cream and egg custard.'
