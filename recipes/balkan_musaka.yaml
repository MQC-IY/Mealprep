de_steps:
- Backofen auf 200 °C (Ober-/Unterhitze) vorheizen.
- Kartoffeln schälen und in etwa 4 mm dicke Scheiben schneiden. In Salzwasser 8 bis
  10 Minuten halbweich garen, abgießen.
- Zwiebeln und Knoblauch fein würfeln. In Olivenöl bei hoher Hitze anschwitzen. Rinderhack
  zugeben und kräftig anbraten, bis es Farbe bekommt.
- Tomatenmark einrühren und 2 Minuten rösten. Mit passierten Tomaten ablöschen. Paprika
  edelsüß, Paprika scharf, Kreuzkümmel, Piment, Oregano, Salz und Pfeffer einrühren.
  10 Minuten einköcheln lassen.
- Sauerrahm, Joghurt und Eier gründlich verquirlen, mit Salz und Pfeffer würzen.
- 'Eine Auflaufform fetten. Schichten: Kartoffeln – Fleischsauce – Kartoffeln – Fleischsauce
  – Kartoffeln. Den Sauerrahm-Ei-Guss gleichmäßig darübergießen.'
- Im vorgeheizten Ofen 35 bis 40 Minuten goldbraun backen, bis der Guss gestockt und
  die Oberfläche gebräunt ist. 10 Minuten ruhen lassen, dann portionieren.
en_steps:
- Preheat oven to 200 °C (400 °F) top/bottom heat.
- Peel potatoes and slice about 4 mm thick. Parboil in salted water for 8–10 minutes
  until just tender; drain.
- Finely dice onions and garlic. Sweat in olive oil over high heat. Add ground beef
  and fry until browned.
- Stir in tomato paste and toast for 2 minutes. Deglaze with passata. Stir in sweet
  paprika, hot paprika, cumin, allspice, oregano, salt, and pepper. Simmer for 10
  minutes.
- Thoroughly whisk sour cream, yogurt, and eggs; season with salt and pepper.
- 'Grease a baking dish. Layer: potatoes – meat sauce – potatoes – meat sauce – potatoes.
  Pour the sour cream and egg topping evenly over the top.'
- Bake in the preheated oven for 35–40 minutes until golden and the topping has set.
  Leave to rest for 10 minutes before portioning.
