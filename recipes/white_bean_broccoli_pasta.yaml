de_steps:
- Nudeln und Brokkoli weich garen.
- Bohnen kurz erwärmen und mit etwas Joghurt verrühren.
- Erwachsenenportion danach mit etwas Zitrone und Basilikum abschmecken.
en_steps:
- Cook the pasta and broccoli until tender.
- Warm the beans briefly and stir in a little yogurt.
- Season the adult portion with a squeeze of lemon and a pinch of basil.
