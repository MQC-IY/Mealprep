de:
  title: Brokkoli-Pasta mit weißen Bohnen
  summary: Milde Pasta mit Brokkoli, weißen Bohnen und cremiger Zitronen-Joghurt-Note.
en:
  title: Broccoli Pasta with White Beans
  summary: A mild pasta with broccoli, white beans, and a creamy lemon-yogurt finish.
