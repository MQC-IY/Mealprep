de:
  title: Tansanischer Pilau-Reis mit Hähnchen
  summary: Ostafrikanischer Gewürzreis mit Hähnchen, ganzen Gewürzen – Kardamom, Nelken,
    Zimt, Kreuzkümmel – und karamellisierten Zwiebeln.
en:
  title: Tanzanian Pilau Rice with Chicken
  summary: East African spiced rice with chicken, whole spices – cardamom, cloves,
    cinnamon, cumin – and deeply caramelised onions.
