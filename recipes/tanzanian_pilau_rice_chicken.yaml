de_steps:
- Reis waschen und 20 Minuten in kaltem Wasser einweichen, dann abgießen.
- Öl in einem großen schweren Topf bei mittlerer Hitze erhitzen. Kardamomkapseln,
  Nelken, Zimtstange, ganzen Kreuzkümmel und Pfefferkörner zugeben und 1 Minute knistern
  lassen bis es duftet.
- Zwei Zwiebeln fein würfeln und im Gewürzöl 15 Minuten karamellisieren, bis sie dunkelbraun
  und süßlich sind.
- Knoblauch und Ingwer reiben, mit gehackter Chili zugeben und 2 Minuten mitrösten.
  Kurkuma einrühren.
- Gehackte Tomaten zugeben und 8 Minuten bei mittlerer Hitze einköcheln bis die Masse
  trocken wird.
- Hähnchenstücke zugeben und rundherum in der Gewürzmasse 5 Minuten anbraten. Restliche
  Zwiebel in Ringe schneiden und zugeben.
- Eingeweichten Reis zugeben und 2 Minuten mitrösten. Hühnerbrühe angießen, aufkochen.
  Hitze minimal, Deckel drauf, 25 Minuten kochen bis Reis gar ist. Mit frischem Koriander
  und Limettenspalten servieren.
en_steps:
- Wash rice and soak in cold water for 20 minutes, then drain.
- Heat oil in a large heavy pot over medium heat. Add cardamom pods, cloves, cinnamon
  stick, whole cumin and peppercorns; let sizzle for 1 minute until fragrant.
- Finely dice two onions and caramelise in the spiced oil for 15 minutes until dark
  brown and sweet.
- Grate garlic and ginger, add with chopped chilli and toast for 2 minutes. Stir in
  turmeric.
- Add chopped tomatoes and reduce over medium heat for 8 minutes until the mixture
  dries out.
- Add chicken pieces and fry in the spice paste for 5 minutes on all sides. Cut remaining
  onion into rings and add.
- Add drained rice and toast for 2 minutes. Pour in chicken stock and bring to a boil.
  Reduce heat to minimum, cover and cook for 25 minutes until rice is done. Serve
  with fresh coriander and lime wedges.
