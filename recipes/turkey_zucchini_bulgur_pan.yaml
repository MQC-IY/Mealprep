de:
  title: Puten-Bulgur-Pfanne mit Zucchini
  summary: Milde Pfanne mit Putenhack, Bulgur, Zucchini und Paprika.
en:
  title: Turkey Bulgur Pan with Zucchini
  summary: A mild skillet of ground turkey, bulgur, zucchini, and bell pepper.
