de_steps:
- Tofu in Würfel schneiden und auf Küchenpapier gut abtrocknen. In heißem Öl von allen
  Seiten goldbraun und knusprig braten. Herausnehmen.
- Im gleichen Wok oder Topf grüne Currypaste, Knoblauch und Ingwer 2 Minuten in etwas
  Öl rösten.
- Kokosmilch zugießen, Kaffir-Limettenblätter und Sojasauce zugeben. Aufkochen lassen.
- Aubergine, Zucchini und Paprika in Stücke schneiden, ins Curry geben. 12–15 Minuten
  köcheln lassen.
- Tofu zurückgeben und 5 Minuten mitgaren. Mit Limettensaft und Chiliflocken abschmecken.
- Reis kochen. Curry mit Thai-Basilikum und Frühlingszwiebeln bestreuen. Mit Reis
  servieren.
en_steps:
- Cut tofu into cubes and pat dry thoroughly with kitchen paper. Fry in hot oil on
  all sides until golden and crispy. Remove and set aside.
- In the same wok or pot, fry green curry paste, garlic and ginger in a little oil
  for 2 minutes.
- Pour in coconut milk, add kaffir lime leaves and soy sauce. Bring to a boil.
- Cut eggplant, zucchini and bell pepper into pieces and add to the curry. Simmer
  for 12–15 minutes.
- Return tofu and cook for 5 more minutes. Season with lime juice and chilli flakes.
- Cook rice. Scatter Thai basil and spring onions over the curry. Serve with rice.
