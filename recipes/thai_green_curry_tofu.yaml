de:
  title: Grünes Thai-Curry mit Tofu und Zucchini
  summary: Aromatisches grünes Thai-Curry mit festem Tofu, Zucchini, Aubergine und
    Kokosmilch – intensiv gewürzt mit grüner Currypaste, Kaffir-Limettenblättern und
    Thai-Basilikum.
en:
  title: Thai Green Curry with Tofu and Zucchini
  summary: Aromatic Thai Green Curry with firm tofu, zucchini, eggplant and coconut
    milk – boldly seasoned with green curry paste, kaffir lime leaves and Thai basil.
