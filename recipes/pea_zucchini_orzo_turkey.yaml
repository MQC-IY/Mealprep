de:
  title: Puten-Orzo mit Zucchini und Erbsen
  summary: Schnelle Orzo-Pfanne mit Putenhack, Zucchini und Erbsen.
en:
  title: Turkey Orzo with Zucchini and Peas
  summary: Quick orzo pan with minced turkey, zucchini and peas.
ingredients:
- de_name: Putenhack
  en_name: minced turkey
  qty: 650
  unit: g
  category: Protein und Milchprodukte
- de_name: Orzo oder Kritharaki
  en_name: orzo or kritharaki
  qty: 300
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Zucchini
  en_name: zucchini
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 220
  unit: g
  category: Gemüse und Salat
- de_name: Frischkäse natur
  en_name: plain cream cheese
  qty: 100
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
