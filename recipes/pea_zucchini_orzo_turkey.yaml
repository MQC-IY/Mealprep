de_steps:
- Orzo weich garen.
- Putenhack scharf anbraten.
- Zucchini und Erbsen weich garen und Frischkäse unterrühren.
en_steps:
- Cook the orzo until tender.
- Sear the minced turkey in a hot pan until browned.
- Cook the zucchini and peas until tender, then stir in the cream cheese.
