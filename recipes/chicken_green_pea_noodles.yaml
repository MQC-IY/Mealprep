de:
  title: Hähnchen-Nudeln mit Erbsen
  summary: Schnelles Nudelgericht mit Hähnchen, Erbsen und milder Joghurt-Sauce.
en:
  title: Chicken Noodles with Peas
  summary: A quick pasta dish with seared chicken, sweet green peas, and a light yogurt
    sauce — on the table in 25 minutes.
ingredients:
- de_name: Vollkornnudeln
  en_name: whole-wheat pasta
  qty: 320
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 750
  unit: g
  category: Protein und Milchprodukte
- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 220
  unit: g
  category: Gemüse und Salat
- de_name: Naturjoghurt
  en_name: plain yogurt
