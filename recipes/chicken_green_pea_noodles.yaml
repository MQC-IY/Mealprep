- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 220
  unit: g
  category: Gemüse und Salat
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 150
  unit: g
  category: Protein und Milchprodukte
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
