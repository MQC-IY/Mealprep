de_steps:
- Nudeln weich kochen.
- Hähnchen mit Zwiebel scharf anbraten.
- Erbsen kurz mitgaren und Joghurt unterrühren.
en_steps:
- Cook the pasta until tender.
- Sear the chicken with onion over high heat.
- Add the peas and heat through, then stir in the yogurt.
