- de_name: Champignons
  en_name: mushrooms
  qty: 300
  unit: g
  category: Gemüse und Salat
- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 200
  unit: g
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Rapsöl
  en_name: rapeseed oil
  qty: 1
  unit: EL
