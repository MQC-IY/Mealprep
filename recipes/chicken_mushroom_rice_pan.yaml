de:
  title: Hähnchen-Reis-Pfanne mit Champignons
  summary: Milde Reispfanne mit Hähnchen, Champignons, Erbsen und Möhren.
en:
  title: Chicken Rice Pan with Mushrooms
  summary: A mild and hearty rice pan with chicken, mushrooms, peas, and carrots —
    a satisfying weeknight meal.
ingredients:
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 750
  unit: g
  category: Protein und Milchprodukte
- de_name: Reis
  en_name: rice
  qty: 300
