de_steps:
- Reis garen.
- Hähnchen mit Zwiebel scharf anbraten.
- Champignons, Möhren und Erbsen zugeben und weich garen.
en_steps:
- Cook the rice.
- Sear the chicken with onion over high heat.
- Add the mushrooms, carrots, and peas and cook until tender.
