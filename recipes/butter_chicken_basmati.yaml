de:
  title: Butter Chicken (Murgh Makhani) mit Basmatireis
  summary: Zartes Hähnchen in einer reichhaltigen, cremigen Tomatensauce mit Butter
    und Gewürzen – ein indischer Klassiker mit duftendem Basmatireis.
en:
  title: Butter Chicken (Murgh Makhani) with Basmati Rice
  summary: Tender chicken in a rich, creamy tomato sauce with butter and warming spices
    – an Indian classic served with fragrant basmati rice.
