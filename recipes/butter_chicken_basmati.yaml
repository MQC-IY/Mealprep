de_steps:
- Hähnchenbrust in mundgerechte Würfel schneiden. Mit Joghurt, 1 TL Garam Masala,
  Kurkuma, Kashmiri-Chili und einer Prise Salz vermengen. Mindestens 30 Minuten marinieren.
- Öl in einer großen Pfanne erhitzen. Mariniertes Hähnchen bei starker Hitze 5–6 Minuten
  anbraten, bis es leicht gebräunt ist. Herausnehmen und beiseitestellen.
- Butter in derselben Pfanne schmelzen. Fein gewürfelte Zwiebeln bei mittlerer Hitze
  10 Minuten goldbraun anbraten. Knoblauch und geriebenen Ingwer hinzufügen und 2
  Minuten mitbraten.
- Kreuzkümmel, Koriander, Paprika, restliches Garam Masala und Bockshornklee in die
  Pfanne geben und 1 Minute unter Rühren rösten.
- Tomatenmark einrühren, kurz anrösten, dann die gehackten Tomaten hinzufügen. Alles
  15 Minuten köcheln lassen, bis die Sauce eindickt. Mit einem Stabmixer glatt pürieren.
- Hähnchen zurück in die Sauce geben. Sahne einrühren, mit Salz und Zucker abschmecken.
  10 Minuten bei niedriger Hitze köcheln lassen.
- Basmatireis nach Packungsanweisung garen. Butter Chicken mit dem Reis servieren,
  nach Belieben mit frischem Koriander bestreuen.
en_steps:
- Cut the chicken breast into bite-sized cubes. Mix with the yogurt, 1 tsp garam masala,
  turmeric, Kashmiri chili, and a pinch of salt. Marinate for at least 30 minutes.
- Heat oil in a large pan. Sear the marinated chicken over high heat for 5–6 minutes
  until lightly browned. Remove and set aside.
- Melt the butter in the same pan. Sauté the finely diced onions over medium heat
  for 10 minutes until golden. Add the garlic and grated ginger and cook for 2 minutes.
- Add the cumin, coriander, paprika, remaining garam masala, and fenugreek to the
  pan and toast, stirring, for 1 minute.
- Stir in the tomato paste and toast briefly, then add the chopped tomatoes. Simmer
  for 15 minutes until the sauce thickens. Blend smooth with a hand blender.
- Return the chicken to the sauce. Stir in the cream, season with salt and sugar.
  Simmer over low heat for 10 minutes.
- Cook the basmati rice according to the packet instructions. Serve the Butter Chicken
  with the rice, garnished with fresh cilantro if desired.
