de:
  title: Quinoa-Bohnentopf mit Möhren
  summary: Milder Topf mit Quinoa, weißen Bohnen, Möhren und Tomaten.
en:
  title: Quinoa and White Bean Stew with Carrots
  summary: A mild, nourishing stew with quinoa, white beans, carrots, and tomatoes.
ingredients:
- de_name: Quinoa
  en_name: Quinoa
  qty: 240
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Weiße Bohnen
  en_name: White beans
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Möhren
  en_name: Carrots
  qty: 4
  unit: Stk
  category: Gemüse und Salat
- de_name: Passierte Tomaten
  en_name: Passata (tomato purée)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Zwiebel
  en_name: Onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Oregano
  en_name: Oregano
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: Chili flakes
  qty: 0.5
  unit: TL
