de_steps:
- Zwiebel und Möhren in Olivenöl anschwitzen.
- Tomaten, Bohnen und Quinoa zugeben.
- Mit Wasser auffüllen und weich köcheln lassen.
en_steps:
- Sauté the onion and carrots in olive oil.
- Add the tomatoes, beans, and quinoa.
- Top up with water and simmer until tender.
