de_steps:
- Orzo weich garen.
- Hähnchen klein schneiden und mit Zwiebel in Olivenöl scharf anbraten.
- Tomaten und Frischkäse unterrühren, Spinat zusammenfallen lassen.
en_steps:
- Cook the orzo until tender.
- Dice the chicken and sear with onion in olive oil over high heat.
- Stir in the passata and cream cheese, then let the spinach wilt into the pan.
