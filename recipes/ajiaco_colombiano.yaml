de_steps:
- Hähnchen in die Hühnerbrühe legen, Zwiebel und Knoblauch zugeben, aufkochen. Bei
  mittlerer Hitze 25 Minuten gar köcheln. Hähnchen herausnehmen, zupfen, Brühe durch
  ein Sieb gießen.
- Mehligkochende Kartoffeln schälen und in Stücke schneiden. In der gefilterten Brühe
  20 Minuten kochen bis sie zerfallen und die Suppe eindicken.
- Festkochende Kartoffeln in Scheiben schneiden, zusammen mit dem Mais zugeben und
  15 Minuten mitkochen.
- Gezupftes Hähnchen zurück in die Suppe geben. Kreuzkümmel, Guascas und Chiliflocken
  einrühren.
- Frühlingszwiebeln in Ringe schneiden und zugeben. 5 Minuten bei niedriger Hitze
  ziehen lassen.
- Mit Salz, Limettensaft und Chiliflocken abschmecken. Mit Sahne und frischem Koriander
  servieren.
en_steps:
- Place chicken in the chicken stock with onion and garlic, bring to the boil. Simmer
  over medium heat for 25 minutes until cooked through. Remove chicken, shred it,
  and strain the broth through a sieve.
- Peel floury potatoes and cut into chunks. Cook in the strained broth for 20 minutes
  until they break down and thicken the soup.
- Slice waxy potatoes and add together with the corn; cook for a further 15 minutes.
- Return shredded chicken to the soup. Stir in cumin, guascas, and chili flakes.
- Slice spring onions into rings and add. Simmer on low heat for 5 minutes.
- Season with salt, lime juice, and chili flakes. Serve with cream and fresh cilantro.
