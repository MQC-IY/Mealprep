de:
  title: Kolumbianische Ajiaco – Hähnchen-Kartoffelsuppe
  summary: Reichhaltige kolumbianische Suppe aus Bogotá mit Hähnchen, drei Kartoffelsorten,
    Guascas-Kräutern, Mais und Sahne.
en:
  title: Ajiaco Colombiano – Chicken and Potato Soup
  summary: A rich Colombian soup from Bogotá made with chicken, three varieties of
    potato, guascas herb, corn, and cream.
