de_steps:
- Jasminreis waschen und kochen. Kartoffeln schälen und in 3-cm-Würfel schneiden.
  Zwiebel in Spalten schneiden.
- Hähnchenschenkel in große Stücke teilen. Zitronengras anquetschen.
- Öl im Topf erhitzen. Massaman-Paste mit Zimtstange, Sternanis und Kardamom 2 Minuten
  bei mittlerer Hitze anrösten.
- Hähnchen zugeben und von allen Seiten anbraten (4–5 Min.).
- Kokosmilch, Geflügelfond, Zitronengras und Kaffirlimettenblätter zugießen. Aufkochen.
- Kartoffeln und Zwiebel zugeben. Hitze reduzieren und 25–30 Minuten zugedeckt köcheln,
  bis Kartoffeln weich sind.
- Mit Fischsauce, Tamarindenpaste, Palmzucker und Limettensaft abschmecken. Ganzgewürze
  entfernen.
- Mit Jasminreis anrichten und mit gerösteten Erdnüssen bestreuen.
en_steps:
- Wash and cook the jasmine rice. Peel the potatoes and cut into 3 cm cubes. Cut the
  onion into wedges.
- Cut the chicken thighs into large pieces. Bruise the lemongrass.
- Heat the oil in a pot. Toast the Massaman paste with the cinnamon stick, star anise,
  and cardamom over medium heat for 2 minutes.
- Add the chicken and sear on all sides (4–5 minutes).
- Pour in the coconut milk, chicken stock, lemongrass, and kaffir lime leaves. Bring
  to a boil.
- Add the potatoes and onion. Reduce the heat and simmer covered for 25–30 minutes
  until the potatoes are tender.
- Season with fish sauce, tamarind paste, palm sugar, and lime juice. Remove the whole
  spices.
- Serve over jasmine rice and scatter with roasted peanuts.
