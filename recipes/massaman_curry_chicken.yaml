de:
  title: Massaman Curry mit Hähnchen und Kartoffeln
  summary: Mildes, tiefwürziges Massaman-Curry mit zartem Hähnchen, Kartoffeln, gerösteten
    Erdnüssen und wärmenden Gewürzen.
en:
  title: Massaman Curry with Chicken and Potatoes
  summary: A mild, deeply flavoured Massaman curry with tender chicken, potatoes,
    roasted peanuts, and warming whole spices.
