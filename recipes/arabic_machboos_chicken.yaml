de:
  title: Arabisches Hähnchen-Machboos mit Reis
  summary: 'Das Nationalgericht der Golfstaaten: aromatischer Gewürzreis mit saftigem
    Hähnchen, getrockneten Zitronen und einer tiefen Baharat-Würzung.'
en:
  title: Arabic Chicken Machboos with Rice
  summary: 'The national dish of the Gulf states: aromatic spiced rice with succulent
    chicken, dried limes, and a deep baharat seasoning.'
