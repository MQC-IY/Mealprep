de_steps:
- Hähnchen mit Baharat, Kurkuma, Kreuzkümmel, Salz und Pfeffer einreiben. Getrocknete
  Zitronen einstechen.
- Öl in einem großen Topf erhitzen. Hähnchen von allen Seiten goldbraun anbraten.
  Herausnehmen.
- Butter zugeben. Fein gewürfelte Zwiebeln 10 Minuten goldbraun braten. Knoblauch
  und geriebenen Ingwer einrühren. Gehackte Chili dazugeben.
- Zimtpulver, Kardamom und Nelken einstreuen, 1 Minute rösten. Tomatenmark kurz mitrösten.
  Gehackte Tomaten und Dosentomaten hinzufügen, 5 Minuten köcheln.
- Hühnerbrühe und eingestochene Zitronen dazugeben. Hähnchen zurück in den Topf legen.
  Abdecken und 30 Minuten bei niedriger Hitze schmoren. Hähnchen herausnehmen, Brühe
  aufbewahren.
- Reis waschen. In der Gewürzbrühe (ca. 600 ml, bei Bedarf mit Wasser auffüllen) 18
  Minuten garen. Rosenwasser kurz vor dem Servieren einrühren. Hähnchen auf dem Reis
  anrichten, mit Koriander bestreuen.
en_steps:
- Rub chicken with baharat, turmeric, cumin, salt, and pepper. Pierce the dried limes.
- Heat oil in a large pot. Brown chicken on all sides until golden. Remove.
- Add butter. Fry finely diced onions until golden, about 10 minutes. Stir in garlic
  and grated ginger. Add chopped chili.
- Sprinkle in ground cinnamon, cardamom, and cloves; toast for 1 minute. Briefly fry
  tomato paste. Add chopped fresh tomatoes and canned tomatoes; simmer for 5 minutes.
- Pour in chicken stock and add the pierced dried limes. Return chicken to the pot.
  Cover and braise on low heat for 30 minutes. Remove chicken and reserve the broth.
- Wash rice. Cook in the spiced broth (approx. 600 ml, top up with water if needed)
  for 18 minutes. Stir in rose water just before serving. Arrange chicken on the rice
  and scatter with cilantro.
