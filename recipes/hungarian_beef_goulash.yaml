de:
  title: Ungarisches Gulasch mit Rindfleisch und Kartoffeln
  summary: 'Das Urrezept: Rindfleischwürfel mit enormen Mengen edelsüßem Paprikapulver
    langsam geschmort mit Kartoffeln, Zwiebeln und Kümmel.'
en:
  title: Hungarian Beef Goulash with Potatoes
  summary: 'The original recipe: beef cubes with generous amounts of sweet paprika,
    slowly braised with potatoes, onions, and caraway.'
