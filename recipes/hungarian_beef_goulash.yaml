de_steps:
- Rindfleisch in 3 cm Würfel schneiden, salzen und pfeffern. Schmalz in einem schweren
  Gulaschkessel oder Schmortopf erhitzen. Fleisch portionsweise scharf anbraten, bis
  eine Kruste entsteht. Herausnehmen.
- Zwiebeln in feine Würfel schneiden und im gleichen Fett bei mittlerer Hitze 15 Minuten
  langsam karamellisieren.
- Topf vom Herd nehmen. Edelsüßes und Rosenpaprika großzügig einrühren. Tomatenmark
  einrühren. Dann sofort Rindfleischbrühe aufgießen und gut rühren.
- Fleisch zurücklegen. Tomaten würfeln und hinzufügen, Paprikaschoten in Streifen
  schneiden und einrühren. Knoblauch, Kümmel, Majoran und Lorbeer hinzufügen.
- Zugedeckt bei niedriger Hitze 1,5 Stunden schmoren, bis das Fleisch sehr zart ist.
  Kartoffeln in Würfel schneiden, in der letzten halben Stunde einrühren.
- Lorbeer entfernen, abschmecken. Mit Sauerrahm und Brot oder Semmelknödeln servieren.
en_steps:
- Cut the beef into 3 cm cubes, season with salt and pepper. Heat the lard in a heavy
  goulash pot or casserole. Brown the meat in batches until a crust forms. Remove.
- Finely dice the onions and slowly caramelise in the same fat over medium heat for
  15 minutes.
- Remove the pot from the heat. Generously stir in the sweet paprika and rose paprika.
  Stir in the tomato purée. Immediately pour in the beef stock and stir well.
- Return the meat. Dice the tomatoes and add, cut the red peppers into strips and
  stir in. Add the garlic, caraway, marjoram, and bay leaves.
- Braise covered over low heat for 1.5 hours until the meat is very tender. Dice the
  potatoes and stir in for the final 30 minutes.
- Remove the bay leaves and season. Serve with sour cream and bread or bread dumplings.
