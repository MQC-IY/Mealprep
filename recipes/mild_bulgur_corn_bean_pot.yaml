de_steps:
- Zwiebel und Paprika anschwitzen.
- Tomaten, Bohnen, Mais und Bulgur zugeben.
- Mit Wasser weich köcheln lassen.
en_steps:
- Sauté the onion and bell pepper until soft.
- Add the tomatoes, beans, corn, and bulgur.
- Simmer with water until the bulgur is tender.
