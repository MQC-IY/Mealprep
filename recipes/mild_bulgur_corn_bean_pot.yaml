de:
  title: Bulgur-Bohnen-Mais-Topf
  summary: Milder Topf mit Bulgur, weißen Bohnen, Mais und Tomate.
en:
  title: Bulgur, Bean, and Corn Pot
  summary: A mild pot of bulgur, white beans, corn, and tomato.
ingredients:
- de_name: Bulgur
  en_name: Bulgur
  qty: 220
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Weiße Bohnen
  en_name: White beans
  qty: 2
  unit: Dosen
