de_steps:
- Zwiebel fein würfeln und im Olivenöl bei mittlerer Hitze 3 Minuten glasig dünsten.
  Knoblauch hacken und 1 Minute mitdünsten.
- Kreuzkümmel, Koriander, Paprika und Cayennepfeffer hinzufügen und 30 Sekunden rösten.
- Kichererbsen, Tomaten und Brühe einrühren. Aufkochen und 10 Minuten kräftig köcheln
  lassen.
- Spinat unterheben und 2 Minuten köcheln lassen, bis er zusammengefallen ist. Mit
  Salz und Pfeffer abschmecken.
en_steps:
- Finely dice the onion and sauté in olive oil over medium heat for 3 minutes until
  translucent. Chop the garlic and cook for 1 more minute.
- Add the cumin, coriander, paprika, and cayenne pepper and toast for 30 seconds.
- Stir in the chickpeas, tomatoes, and broth. Bring to a boil and simmer vigorously
  for 10 minutes.
- Fold in the spinach and simmer for 2 minutes until wilted. Season with salt and
  pepper.
