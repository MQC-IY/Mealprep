id: quick_chickpea_spinach_stew
pool: lunch
healthy: true
quick: true
next_day: true
quick_minutes: 20
meals: 2
de:
  title: Schneller Kichererbsen-Spinat-Eintopf
  summary: Kräftig gewürzter Eintopf aus Kichererbsen und Spinat — in 20 Minuten auf
    dem Tisch.
en:
  title: Quick Chickpea Spinach Stew
  summary: A boldly spiced stew of chickpeas and spinach — on the table in 20 minutes.
ingredients:
- de_name: Kichererbsen, abgetropft
  en_name: Chickpeas, drained
  qty: 2
  unit: Dose
  category: Konserven und Vorrat
- de_name: Gehackte Tomaten
  en_name: Chopped tomatoes
  qty: 1
  unit: Dose
  category: Konserven und Vorrat
- de_name: Gemüsebrühe
  en_name: Vegetable broth
  qty: 400
  unit: ml
  category: Konserven und Vorrat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 3
  unit: EL
  category: Konserven und Vorrat
- de_name: Babyspinat
  en_name: Baby spinach
  qty: 200
  unit: g
  category: Gemüse und Salat
- de_name: Zwiebel
  en_name: Onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Knoblauchzehen
  en_name: Garlic cloves
  qty: 4
  unit: Zehen
  category: Gemüse und Salat
- de_name: Kreuzkümmel, gemahlen
  en_name: Cumin, ground
  qty: 2
  unit: TL
  category: Gewürze
- de_name: Koriander, gemahlen
  en_name: Coriander, ground
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Geräuchertes Paprikapulver
  en_name: Smoked paprika
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Cayennepfeffer
  en_name: Cayenne pepper
  qty: 0.25
  unit: TL
  category: Gewürze
