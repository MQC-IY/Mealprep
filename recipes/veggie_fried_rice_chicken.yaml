de_steps:
- 'Wenn möglich: Reis am Vortag kochen und über Nacht im Kühlschrank aufbewahren –
  kalter Reis brät besser. Ansonsten frisch gekochten Reis ausgebreitet abkühlen und
  ausdampfen lassen.'
- Hähnchen in kleine Würfel schneiden und mit 1 EL Sojasauce marinieren. Möhren fein
  würfeln. Knoblauch und Ingwer fein hacken. Frühlingszwiebeln in Ringe schneiden
  (Weiß und Grün trennen).
- Wok oder große Pfanne bei hoher Hitze stark erhitzen. 1 EL Rapsöl zugeben, bis es
  raucht. Hähnchen kräftig anbraten, bis es goldbraun ist. Herausnehmen.
- Wieder 1 EL Öl in den Wok. Knoblauch, Ingwer und weißen Teil der Frühlingszwiebeln
  30 Sekunden scharf anrösten. Möhren und Erbsen zugeben und 2 bis 3 Minuten bei hoher
  Hitze rühren.
- Gemüse an den Rand schieben. Letztes EL Öl in die Mitte geben, Eier aufschlagen
  und zu lockeren Stücken stocken lassen, dann mit dem Gemüse vermischen.
- Kalten Reis zugeben und bei maximaler Hitze 3 bis 4 Minuten unter ständigem Rühren
  braten, bis der Reis leicht geröstet und trocken ist.
- Hähnchen zurückgeben. Sojasauce, dunkle Sojasauce und Austernsauce am Rand des Woks
  entlanggießen, sodass sie kurz karamellisieren, dann alles durchschwenken. Sesamöl
  drüber träufeln.
- Mit grünem Teil der Frühlingszwiebeln und Sesam servieren.
en_steps:
- If possible, cook the rice the day before and refrigerate overnight – cold rice
  fries much better. Otherwise spread freshly cooked rice out and let it cool and
  steam dry.
- Cut the chicken into small cubes and marinate with 1 tbsp soy sauce. Finely dice
  the carrots. Mince the garlic and ginger. Slice the spring onions into rings, keeping
  the white and green parts separate.
- Heat a wok or large skillet over high heat until very hot. Add 1 tbsp rapeseed oil
  and heat until smoking. Sear the chicken hard until golden brown. Remove and set
  aside.
- Add another 1 tbsp oil to the wok. Stir-fry the garlic, ginger, and white parts
  of the spring onions for 30 seconds. Add the carrots and peas and stir-fry for 2–3
  minutes over high heat.
- Push the vegetables to the side. Add the last tbsp of oil to the centre, crack in
  the eggs, and scramble into soft curds, then mix with the vegetables.
- Add the cold rice and fry over maximum heat for 3–4 minutes, stirring constantly,
  until the rice is lightly toasted and dry.
- Return the chicken to the wok. Pour the soy sauce, dark soy sauce, and oyster sauce
  around the edge of the wok so they caramelise briefly, then toss everything together.
  Drizzle over the sesame oil.
- Serve topped with the green spring onion rings and sesame seeds.
