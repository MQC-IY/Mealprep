de:
  title: Gemüse-Fried-Rice mit Hähnchen
  summary: Authentischer Fried Rice mit Hähnchen, Ei, Gemüse und echtem Wok-Aroma
    – Sojasauce, Sesamöl und hohe Hitze machen den Unterschied.
en:
  title: Vegetable Fried Rice with Chicken
  summary: Authentic fried rice with chicken, egg, vegetables, and real wok aroma
    – soy sauce, sesame oil, and high heat make all the difference.
