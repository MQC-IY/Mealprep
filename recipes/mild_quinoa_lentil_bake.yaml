id: mild_quinoa_lentil_bake
pool: lunch
healthy: true
quick: false
next_day: true
meals: 3
de:
  title: Quinoa-Linsen-Auflauf
  summary: Auflauf mit Quinoa, roten Linsen, Möhren und Joghurt-Ei-Guss.
en:
  title: Mild Quinoa and Lentil Bake
  summary: A baked dish of quinoa, red lentils, and carrots finished with a yogurt
    and egg topping.
ingredients:
- de_name: Quinoa
  en_name: Quinoa
  qty: 240
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Rote Linsen
  en_name: Red lentils
  qty: 180
  unit: g
  category: Konserven und Vorrat
- de_name: Möhren
  en_name: Carrots
  qty: 3
  unit: Stk
  category: Gemüse und Salat
- de_name: Eier
  en_name: Eggs
  qty: 3
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Naturjoghurt
  en_name: Plain yogurt
  qty: 180
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: Chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Quinoa und Linsen vorgaren.
- Möhren fein würfeln und kurz vorgaren.
- Alles in eine Form geben, Eier mit Joghurt verrühren und darübergeben.
en_steps:
- Par-cook the quinoa and lentils.
- Finely dice the carrots and briefly pre-cook.
- Transfer everything to a baking dish. Whisk the eggs with the yogurt and pour over
  the top. Bake until set.
