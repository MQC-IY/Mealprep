de:
  title: Yalancı Mantı – Türkische Pasta mit Joghurt und Pul-Biber-Butter
  summary: 'Schnelle türkische Manti-Variante: kurze Pasta mit würzigem Rinderhack,
    reichem Knoblauchjoghurt und feuriger Pul-Biber-Butter.'
en:
  title: Yalancı Mantı – Turkish Pasta with Yogurt and Pul Biber Butter
  summary: 'A quick Turkish mantı variation: short pasta with spiced ground beef,
    rich garlic yogurt, and a fiery pul biber butter.'
