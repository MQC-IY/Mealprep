de_steps:
- Nudeln in gut gesalzenem Wasser al dente kochen, abgießen und dabei eine Tasse Nudelwasser
  aufheben.
- Knoblauch fein hacken oder pressen. Joghurt mit Knoblauch, etwas Salz und einem
  Schuss Nudelwasser cremig verrühren – er muss Raumtemperatur haben, damit er nicht
  gerinnt.
- Zwiebel fein würfeln und in Olivenöl bei hoher Hitze anbraten. Rinderhack zugeben
  und kräftig anbraten, bis es braune Röstaromen entwickelt.
- Tomatenmark einrühren und 2 Minuten mitrösten. Mit Kreuzkümmel, der Hälfte des Pul
  Bibers, Paprika edelsüß, Salz und Pfeffer würzen.
- Butter in einer kleinen Pfanne bei mittlerer Hitze schmelzen lassen, bis sie leicht
  nussig riecht. Pul Biber, geräucherten Paprika und getrocknete Minze einrühren und
  sofort vom Herd nehmen.
- Nudeln auf vorgewärmten Tellern anrichten. Großzügig Knoblauchjoghurt darüber verteilen.
  Hack daraufgeben. Die Pul-Biber-Butter darüberträufeln. Mit Sumach und Minze abschließen.
en_steps:
- Cook the pasta al dente in well-salted water, then drain, reserving a cup of pasta
  water.
- Finely chop or press the garlic. Whisk the yogurt with the garlic, a little salt,
  and a splash of pasta water until smooth and creamy – it must be at room temperature
  so it does not curdle.
- Finely dice the onion and fry in olive oil over high heat. Add the ground beef and
  brown well until it develops deep, caramelised colour.
- Stir in the tomato paste and toast for 2 minutes. Season with cumin, half the pul
  biber, sweet paprika, salt, and pepper.
- Melt the butter in a small pan over medium heat until it smells faintly nutty. Stir
  in the pul biber, smoked paprika, and dried mint, then remove from the heat immediately.
- Plate the pasta on warmed plates. Spoon the garlic yogurt generously over the top.
  Add the meat. Drizzle over the pul biber butter. Finish with sumac and mint.
