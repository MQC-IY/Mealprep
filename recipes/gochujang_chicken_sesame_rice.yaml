de_steps:
- 'Gochujang-Marinade: Gochujang, Sojasoße, Honig, Reisessig, Sesamöl, Knoblauch (gepresst),
  Ingwer (gerieben), Gochugaru und Pfeffer verrühren.'
- Hähnchenbrust in gleich große Stücke schneiden oder ganz lassen. In der Marinade
  mindestens 30 Minuten einlegen.
- Backofen auf 200 °C vorheizen. Hähnchen auf einem mit Backpapier belegten Blech
  20–22 Minuten garen, nach der Hälfte einmal wenden und erneut bestreichen.
- Reis mit 700 ml Wasser garen. Nach dem Abgießen 2 EL Sesamöl und die Hälfte der
  Sesamkörner unterheben.
- Gurke in dünne Halbmonde schneiden, mit 1 EL Reisessig und Prise Salz mischen.
- Hähnchen aus dem Ofen nehmen und 5 Minuten ruhen lassen.
- Sesam-Reis in Schüsseln geben. Hähnchen darauflegen, Gurkensalat daneben arrangieren.
en_steps:
- 'Make the gochujang marinade: mix together the gochujang, soy sauce, honey, rice
  vinegar, sesame oil, pressed garlic, grated ginger, gochugaru, and pepper.'
- Cut the chicken breast into even-sized pieces or leave whole. Marinate for at least
  30 minutes.
- Preheat the oven to 200 °C. Arrange the chicken on a baking-paper-lined tray and
  roast for 20–22 minutes, turning once halfway through and brushing again with the
  marinade.
- Cook the rice with 700 ml water. After draining, fold in 2 tbsp sesame oil and half
  the sesame seeds.
- Slice the cucumber into thin half-moons and toss with 1 tbsp rice vinegar and a
  pinch of salt.
- Remove the chicken from the oven and rest for 5 minutes.
- Divide the sesame rice into bowls. Place the chicken on top and arrange the cucumber
  salad alongside.
