de:
  title: Gochujang-Hähnchen mit Sesam-Reis
  summary: Mariniertes Gochujang-Hähnchen, ofengegart oder in der Pfanne glasiert,
    auf nussigem Sesam-Reis mit frischen Gurken und Frühlingszwiebeln.
en:
  title: Gochujang Chicken with Sesame Rice
  summary: Marinated gochujang chicken, oven-roasted or pan-glazed, served over nutty
    sesame rice with fresh cucumber and spring onions.
