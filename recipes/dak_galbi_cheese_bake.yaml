de_steps:
- 'Hähnchen in mundgerechte Stücke schneiden. Marinade: Gochujang, Sojasoße, Gochugaru,
  Zucker, Sesamöl, Knoblauch (gerieben), Ingwer (gerieben) und Pfeffer. Hähnchen 30
  Minuten marinieren.'
- Tteok 10 Minuten in warmem Wasser einweichen, abgießen.
- Süßkartoffeln in 1 cm dicke Scheiben, Weißkohl in Stücke schneiden.
- Reis garen.
- Backofen auf 220 °C Oberhitze/Grill vorheizen. In einer ofenfesten Pfanne Pflanzenöl
  erhitzen. Hähnchen mit Marinade scharf 5 Minuten anbraten.
- Süßkartoffeln, Tteok und Weißkohl untermischen. Kokosmilch angießen. 15 Minuten
  bei 200 °C backen.
- Pfanne herausnehmen, geriebenen Mozzarella großzügig darüberstreuen. Auf Grill stellen
  und 3–4 Minuten gratinieren. Mit Frühlingszwiebeln und Sesamkörnern bestreuen.
en_steps:
- 'Cut the chicken into bite-sized pieces. Marinade: combine gochujang, soy sauce,
  gochugaru, sugar, sesame oil, grated garlic, grated ginger, and pepper. Marinate
  the chicken for 30 minutes.'
- Soak the tteok in warm water for 10 minutes, then drain.
- Cut the sweet potatoes into 1 cm thick slices; cut the cabbage into chunks.
- Cook the rice.
- Preheat the oven to 220 °C grill/broil. Heat the vegetable oil in an oven-safe pan.
  Sear the chicken with the marinade for 5 minutes over high heat.
- Mix in the sweet potatoes, tteok, and cabbage. Pour in the coconut milk. Bake at
  200 °C for 15 minutes.
- Remove the pan from the oven, sprinkle the grated mozzarella generously on top.
  Place under the grill for 3–4 minutes until gratinéed. Scatter with spring onions
  and sesame seeds.
