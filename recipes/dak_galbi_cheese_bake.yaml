de:
  title: Koreanischer Dak-Galbi-Auflauf mit Käse
  summary: Scharfe Hähnchen-Dak-Galbi-Pfanne mit Süßkartoffeln und Tokkteig, überbacken
    mit zerlaufenem Mozzarella – beliebte Fusion-Variante.
en:
  title: Korean Dak Galbi Cheese Bake
  summary: Spicy Dak Galbi chicken pan with sweet potato and tteok rice cakes, baked
    under a blanket of melted mozzarella — a popular Korean fusion favourite.
