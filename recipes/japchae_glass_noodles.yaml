de:
  title: Koreanische Japchae-Glasnudelpfanne mit Hähnchen
  summary: Seidig-geschmeidige Glasnudeln aus Süßkartoffelstärke mit Hähnchen, buntem
    Gemüse und süß-würziger Sesam-Sojasoße.
en:
  title: Korean Japchae Glass Noodle Pan with Chicken
  summary: Silky sweet-potato glass noodles with chicken, colourful vegetables, and
    a sweet-savoury sesame-soy sauce.
