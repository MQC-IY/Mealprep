de_steps:
- Glasnudeln 20 Minuten in kaltem Wasser einweichen, dann 5 Minuten in kochendem Wasser
  garen. Abgießen, kalt abspülen und in grobe Stücke schneiden.
- 'Hauptsoße: 3 EL Sojasoße, 2 EL Sesamöl, Zucker und Reisessig verrühren.'
- Hähnchen in dünne Streifen schneiden, mit 1 EL Sojasoße und Pfeffer 10 Minuten marinieren.
- Eier zu dünnen Omelett-Scheiben braten und in Streifen schneiden. Beiseite legen.
- Gemüse einzeln in einer Pfanne kurz sautieren. Alles mit Sojasoße und Knoblauch
  würzen.
- Hähnchen in der Pfanne mit Öl 5 Minuten braten.
- Alle Zutaten in einer großen Schüssel mit der Hauptsoße, Gochugaru und restlichem
  Sesamöl vermengen.
en_steps:
- Soak glass noodles in cold water for 20 minutes, then cook in boiling water for
  5 minutes. Drain, rinse cold, and cut into rough pieces.
- 'Main sauce: whisk together 3 tbsp soy sauce, 2 tbsp sesame oil, sugar, and rice
  vinegar.'
- Cut chicken into thin strips; marinate with 1 tbsp soy sauce and pepper for 10 minutes.
- Cook eggs into thin omelette sheets and cut into strips. Set aside.
- Sauté each vegetable separately in a pan for a short time. Season everything with
  soy sauce and garlic.
- Fry the chicken in the pan with oil for 5 minutes.
- Combine all ingredients in a large bowl with the main sauce, gochugaru, and remaining
  sesame oil.
