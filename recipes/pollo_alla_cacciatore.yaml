de:
  title: Hähnchen alla Cacciatore – Hähnchen Jäger-Art
  summary: Rustikales Schmorhuhn auf Jäger-Art mit Tomaten, Oliven, Kapern, Rosmarin
    und Weißwein – ein Klassiker aus der toskanischen Landküche.
en:
  title: Pollo alla Cacciatore – Hunter-Style Chicken
  summary: Rustic hunter-style braised chicken with tomatoes, olives, capers, rosemary
    and white wine – a classic from the Tuscan farmhouse kitchen.
