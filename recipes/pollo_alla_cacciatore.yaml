de_steps:
- Hähnchenschenkel trocken tupfen, großzügig mit Salz und Pfeffer würzen.
- Olivenöl in einem schweren Schmortopf bei hoher Hitze erhitzen. Hähnchenschenkel
  von allen Seiten 4–5 Minuten kräftig anbraten, bis sie goldbraun sind. Herausnehmen.
- Zwiebel in Streifen, Knoblauch grob hacken, Paprika in grobe Stücke schneiden. Im
  Bratfett bei mittlerer Hitze 5 Minuten anschwitzen.
- Mit Weißwein ablöschen, 2 Minuten einkochen lassen, dabei den Bratensatz vom Topfboden
  lösen.
- Tomaten (zerdrückt), Hühnerbrühe, Oregano und Peperoncino einrühren.
- Hähnchenschenkel zurücklegen, Rosmarinzweige dazugeben. Zugedeckt bei niedriger
  Hitze 35–40 Minuten schmoren.
- Deckel abnehmen, Oliven und Kapern einrühren. Weitere 10 Minuten offen köcheln,
  bis die Sauce etwas eindickt.
- Rosmarinzweige entfernen. Mit Weißbrot oder Polenta servieren.
en_steps:
- Pat the chicken thighs dry and season generously with salt and pepper.
- Heat the olive oil in a heavy braising pot over high heat. Brown the chicken thighs
  on all sides for 4–5 minutes until golden. Remove and set aside.
- Slice the onion, roughly chop the garlic and cut the pepper into large pieces. Sweat
  in the cooking fat over medium heat for 5 minutes.
- Deglaze with the white wine and reduce for 2 minutes, scraping up the browned bits
  from the bottom of the pot.
- Stir in the crushed tomatoes, chicken stock, oregano and peperoncino.
- Return the chicken thighs and add the rosemary sprigs. Cover and braise over low
  heat for 35–40 minutes.
- Remove the lid, stir in the olives and capers. Simmer uncovered for a further 10
  minutes until the sauce thickens slightly.
- Remove the rosemary sprigs. Serve with white bread or polenta.
