de_steps:
- Hähnchen in große Stücke schneiden. Mit Joghurt, Garam Masala, Biryani-Masala, Kurkuma,
  Kashmiri-Chili und Salz marinieren. Mindestens 2 Stunden oder über Nacht marinieren.
- Safranfäden in warmer Milch einweichen. Zwiebeln in dünne Ringe schneiden und in
  reichlich Öl bei mittlerer Hitze 20 Minuten goldbraun und knusprig braten. Auf Küchenpapier
  abtropfen lassen.
- Basmatireis waschen und 20 Minuten einweichen. In stark gesalzenem Wasser mit Kardamom,
  Nelken, Zimtstange und Lorbeer 6 Minuten kochen – al dente halten. Abgießen.
- Im selben Topf das marinierte Hähnchen mit Knoblauch- und Ingwerpaste schichten.
  Die Hälfte der Zwiebeln darüberstreuen, dann die Hälfte von Minze und Koriander.
- Reis gleichmäßig über das Hähnchen schichten. Restliche Zwiebeln, Minze und Koriander
  darüber verteilen. Safranmilch und Butter in kleinen Stücken obendrauf geben.
- Topf fest verschließen (oder mit Alufolie abdichten) und bei sehr niedriger Hitze
  35–40 Minuten dampfgaren (Dum-Methode). Nicht öffnen! Fertig servieren.
en_steps:
- Cut the chicken into large pieces. Marinate with yogurt, garam masala, biryani masala,
  turmeric, Kashmiri chili, and salt. Marinate for at least 2 hours or overnight.
- Soak the saffron threads in the warm milk. Slice the onions into thin rings and
  fry in plenty of oil over medium heat for 20 minutes until golden and crispy. Drain
  on kitchen paper.
- Wash the basmati rice and soak for 20 minutes. Boil in heavily salted water with
  the cardamom, cloves, cinnamon, and bay leaves for 6 minutes – keep it al dente.
  Drain.
- Layer the marinated chicken with garlic and ginger paste in the same pot. Scatter
  half the fried onions over it, then half the mint and cilantro.
- Layer the rice evenly over the chicken. Distribute the remaining onions, mint, and
  cilantro on top. Add the saffron milk and butter in small pieces.
- Seal the pot tightly (or cover with foil) and steam over very low heat for 35–40
  minutes using the dum method. Do not open the lid! Serve directly.
