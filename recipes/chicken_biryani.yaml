de:
  title: Hähnchen-Biryani
  summary: Aromatisches Schichtgericht aus safrangewürztem Basmatireis und würzigem
    Hähnchen – das festliche Herzstück der indischen Küche.
en:
  title: Chicken Biryani
  summary: An aromatic layered dish of saffron-scented basmati rice and spiced chicken
    – the festive centrepiece of Indian cuisine.
