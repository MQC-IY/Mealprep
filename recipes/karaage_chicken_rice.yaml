de:
  title: Hähnchen Karaage mit Reis und Coleslaw
  summary: Japanisch marinierter, knuspriger frittierter Hähnchen-Karaage mit Zitronenmayonnaise,
    Reis und knackigem Coleslaw.
en:
  title: Chicken Karaage with Rice and Coleslaw
  summary: Japanese-marinated crispy fried chicken Karaage with lemon mayonnaise,
    rice, and crunchy coleslaw.
