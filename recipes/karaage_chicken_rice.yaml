de_steps:
- Hähnchenschenkel in mundgerechte Stücke (ca. 4 cm) schneiden. Knoblauch und Ingwer
  fein reiben.
- Hähnchen mit Sojasoße, Sake, Knoblauch, Ingwer und Pfeffer mischen. Mindestens 30
  Minuten im Kühlschrank marinieren.
- Reis garen.
- 'Für den Coleslaw: Weißkohl, Rotkohl und Karotten fein hobeln. Mit Reisessig, Sesamöl,
  Zucker, 1 Prise Salz und Sesamkörnern mischen. Kühl stellen.'
- Öl in einem Topf auf 170 °C erhitzen. Mariniertes Hähnchen portionsweise in Kartoffelstärke
  wenden, überschüssige Stärke abschütteln.
- Hähnchen 3–4 Minuten frittieren, herausnehmen und 2 Minuten ruhen lassen. Für extra
  Knusprigkeit bei 180 °C nochmals 1 Minute frittieren.
- Mayonnaise mit Zitronensaft verrühren. Karaage auf Küchenpapier abtropfen lassen
  und mit Reis, Coleslaw und Zitronenmayo servieren.
en_steps:
- Cut chicken thighs into bite-sized pieces (about 4 cm). Finely grate garlic and
  ginger.
- Mix chicken with soy sauce, sake, garlic, ginger, and pepper. Marinate in the fridge
  for at least 30 minutes.
- Cook the rice.
- 'For the coleslaw: thinly shred white cabbage, red cabbage, and carrots. Mix with
  rice vinegar, sesame oil, sugar, a pinch of salt, and sesame seeds. Chill.'
- Heat oil in a pot to 170 °C. Toss marinated chicken in potato starch in batches;
  shake off excess starch.
- Deep-fry chicken for 3–4 minutes; remove and rest for 2 minutes. For extra crispiness,
  fry again at 180 °C for 1 minute.
- Stir mayonnaise with lemon juice. Drain karaage on paper towels and serve with rice,
  coleslaw, and lemon mayo.
