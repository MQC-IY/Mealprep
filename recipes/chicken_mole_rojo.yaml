de_steps:
- Hähnchenstücke salzen. Öl in einem Schmortopf bei hoher Hitze erhitzen. Hähnchen
  rundherum goldbraun anbraten, herausnehmen.
- Zwiebeln fein würfeln, in demselben Topf 5 Minuten anschwitzen. Knoblauch zugeben,
  1 Minute mitrösten.
- Sesam in einer trockenen Pfanne kurz goldbraun rösten. Ancho-Chilipulver, Chipotle-Chilipulver,
  Kreuzkümmel, Zimt, gemahlenen Koriander und Nelken zum Topf geben und 1 Minute trocken
  rösten.
- Gehackte Tomaten, Hühnerbrühe, gerösteten Sesam und die zerbrochene Schokolade zugeben.
  Aufkochen und unter Rühren die Schokolade vollständig schmelzen lassen.
- Sauce mit Stabmixer glatt pürieren. Mit Salz abschmecken.
- Hähnchenstücke zurück in die Sauce legen, Deckel drauf und bei niedriger Hitze 35–40
  Minuten schmoren, bis das Hähnchen sehr zart ist.
- Reis kochen. Mole mit Reis servieren, mit frischem Koriander und geröstetem Sesam
  garnieren.
en_steps:
- Season the chicken pieces with salt. Heat the oil in a braising pot over high heat.
  Brown the chicken all over, then remove.
- Finely dice the onions and sweat in the same pot for 5 minutes. Add the garlic and
  fry for 1 minute.
- Toast the sesame seeds in a dry pan until golden. Add the ancho chilli powder, chipotle
  chilli powder, cumin, cinnamon, ground coriander, and cloves to the pot and toast
  dry for 1 minute.
- Add the chopped tomatoes, chicken stock, toasted sesame, and the broken chocolate.
  Bring to a boil, stirring until the chocolate is fully melted.
- Blend the sauce smooth with an immersion blender. Season with salt.
- Return the chicken pieces to the sauce, cover, and braise over low heat for 35–40
  minutes until very tender.
- Cook the rice. Serve the Mole with rice, garnished with fresh coriander and toasted
  sesame.
