de:
  title: Mexikanischer Hähnchen-Mole Rojo
  summary: Tiefgründige mexikanische Mole-Sauce aus Ancho-Chilis, dunkler Schokolade,
    Sesam, Gewürzen und Tomaten – über zartem, geschmortem Hähnchen.
en:
  title: Mexican Chicken Mole Rojo
  summary: A deeply flavoured Mexican Mole sauce made from ancho chillies, dark chocolate,
    sesame, spices, and tomatoes — poured over tender braised chicken.
