de_steps:
- Hähnchen in Streifen schneiden. Paprika in Streifen, Knoblauch und Ingwer fein hacken.
- Kokosnussöl in einem Wok oder Topf bei hoher Hitze erhitzen. Hähnchen portionsweise
  4 Minuten anbraten. Herausnehmen.
- Currypaste, Knoblauch und Ingwer im gleichen Topf 1–2 Minuten kräftig rösten.
- Kokosmilch, Brühe, Fischsauce und Zucker einrühren. Paprika und Hähnchen hinzufügen.
- 15 Minuten bei mittlerer Hitze köcheln lassen, bis Paprika gar und die Sauce sämig
  ist. Mit Pfeffer abschmecken.
en_steps:
- Slice the chicken into strips. Cut the bell pepper into strips and finely chop the
  garlic and ginger.
- Heat the coconut oil in a wok or pot over high heat. Brown the chicken in batches
  for 4 minutes. Remove and set aside.
- Fry the curry paste, garlic, and ginger in the same pot for 1–2 minutes until fragrant.
- Stir in the coconut milk, broth, fish sauce, and sugar. Add the bell pepper and
  chicken.
- Simmer over medium heat for 15 minutes until the pepper is tender and the sauce
  has thickened. Season with pepper.
