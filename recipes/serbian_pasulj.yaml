de_steps:
- Speck in große Würfel schneiden, Wurst in dicke Scheiben. In einem großen Topf bei
  mittlerer Hitze Speck auslassen, bis Fett austritt. Wurst hinzufügen und 3 Minuten
  mitanbraten.
- Zwiebeln würfeln, Karotten in Scheiben schneiden, Paprika würfeln. Alles zum Fleisch
  geben und 8 Minuten weich dünsten.
- Knoblauch pressen, edelsüßes und scharfes Paprikapulver und Kümmel einrühren. 1
  Minute bei mittlerer Hitze rösten.
- Ajvar, Gemüsebrühe und abgetropfte Bohnen hinzufügen. Lorbeerblätter einlegen, pfeffern.
  Alles verrühren und zum Kochen bringen.
- Hitze reduzieren, zugedeckt 30 Minuten köcheln. Etwa ein Fünftel der Bohnen mit
  einem Löffel zerdrücken, um den Eintopf zu binden. Abschmecken.
- Mit frischem Brot oder Baguette servieren.
en_steps:
- Cut the bacon into large cubes and the sausage into thick slices. In a large pot
  over medium heat, render the bacon until fat is released. Add the sausage and fry
  for 3 minutes.
- Dice the onions, slice the carrots, and dice the bell peppers. Add everything to
  the meat and sweat for 8 minutes until soft.
- Press the garlic, then stir in the sweet and hot paprika and caraway. Toast over
  medium heat for 1 minute.
- Add the ajvar, vegetable broth, and drained beans. Add the bay leaves and season
  with pepper. Stir everything together and bring to a boil.
- Reduce the heat and simmer covered for 30 minutes. Mash about one-fifth of the beans
  with a spoon to thicken the stew. Adjust seasoning.
- Serve with fresh bread or baguette.
