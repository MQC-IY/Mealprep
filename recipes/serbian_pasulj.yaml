de:
  title: Serbisches Pasulj – Bohneneintopf mit Speck
  summary: Der deftige serbische Bohneneintopf mit geräuchertem Speck, Paprika und
    Ajvar – sättigend, rauchig und mit tiefem Balkan-Charakter.
en:
  title: Serbian Pasulj – Bean Stew with Bacon
  summary: The quintessential Serbian bean stew with smoked bacon, paprika, and ajvar
    — hearty, smoky, and full of Balkan character.
