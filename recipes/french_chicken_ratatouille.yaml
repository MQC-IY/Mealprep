de:
  title: Hähnchen-Ratatouille mit Kartoffeln
  summary: Französisch inspiriertes Ratatouille mit Hähnchen, Aubergine, Zucchini,
    Paprika, Tomate und Kräutern.
en:
  title: Chicken Ratatouille with Potatoes
  summary: French-inspired ratatouille with chicken, aubergine, courgette, peppers,
    tomatoes, and Provençal herbs.
