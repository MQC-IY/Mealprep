de:
  title: Hähnchen-Couscous mit Joghurt und Gemüse
  summary: Schnelle Couscous-Bowl mit Hähnchen, Paprika, Gurke und Joghurt.
en:
  title: Chicken Couscous with Yogurt and Vegetables
  summary: A quick couscous bowl with seared chicken, roasted bell pepper, cucumber,
    and a cool yogurt dressing — ready in under 25 minutes.
