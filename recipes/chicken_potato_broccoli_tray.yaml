id: chicken_potato_broccoli_tray
pool: lunch
healthy: false
quick: false
next_day: false
meals: 3
de:
  title: Ofen-Hähnchen mit Kartoffeln und Brokkoli
  summary: Einfaches Ofengericht mit Kartoffeln, Brokkoli und Hähnchenstücken.
en:
  title: Oven Chicken with Potatoes and Broccoli
  summary: A simple and satisfying traybake with seasoned chicken, crispy potato wedges,
    broccoli, and bell pepper — minimal washing up.
ingredients:
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 900
  unit: g
  category: Protein und Milchprodukte
- de_name: Kartoffeln
  en_name: potatoes
  qty: 1200
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Brokkoli
  en_name: broccoli
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Paprika
  en_name: bell pepper
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Paprika edelsüß
  en_name: sweet paprika
  qty: 2
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Kartoffeln in Spalten schneiden und vorgaren oder vorbacken.
- Brokkoli und Paprika schneiden, alles mit etwas Öl mischen.
- Hähnchen kräftig würzen und mit dem Gemüse im Ofen garen.
en_steps:
- Cut the potatoes into wedges and parboil or par-bake.
- Cut the broccoli and bell pepper, then toss everything with a little oil.
- Season the chicken generously and roast together with the vegetables in the oven.
