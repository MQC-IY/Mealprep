de:
  title: Äthiopische Rote Linsen – Misir Wot
  summary: Tiefwürzig-cremiges äthiopisches Linsengericht mit Berbere, Niter Kibbeh,
    karamellisierten Zwiebeln und schwarzem Kardamom – klassisch zu Injera.
en:
  title: Ethiopian Red Lentils – Misir Wot
  summary: A deeply spiced, creamy Ethiopian lentil dish with berbere, niter kibbeh,
    caramelised onions, and black cardamom — classically served with injera.
