de_steps:
- Rote Linsen in kaltem Wasser abspülen und abtropfen lassen.
- Niter Kibbeh in einem Topf bei mittlerer Hitze schmelzen. Fein gewürfelte Zwiebeln
  zugeben und 15–20 Minuten karamellisieren, bis sie dunkelbraun sind.
- Geriebenen Knoblauch und Ingwer zugeben, 2 Minuten mitrösten.
- Berbere-Gewürzmischung, Kreuzkümmel, gemahlenen Koriander und Kurkuma einrühren.
  2 Minuten unter Rühren trocken rösten bis es stark aromatisch duftet.
- Tomatenmark einrühren, 1 Minute mitrösten. Linsen zugeben, mit Brühe oder Wasser
  auffüllen.
- Aufkochen, Hitze reduzieren und 20–25 Minuten köcheln lassen, bis die Linsen vollständig
  weich sind und eine dicke Paste bilden.
- Mit Salz abschmecken. Mit Injera oder Fladenbrot und eingelegtem Gemüse servieren.
en_steps:
- Rinse the red lentils in cold water and drain.
- Melt the niter kibbeh in a pot over medium heat. Add the finely diced onions and
  caramelise for 15–20 minutes until dark brown.
- Add the grated garlic and ginger; stir-fry for 2 minutes.
- Stir in the berbere spice blend, cumin, ground coriander, and turmeric. Toast, stirring,
  for 2 minutes until intensely fragrant.
- Stir in the tomato paste and cook for 1 minute. Add the lentils and fill with the
  stock or water.
- Bring to a boil, reduce the heat, and simmer for 20–25 minutes until the lentils
  are completely soft and form a thick paste.
- Season with salt. Serve with injera or flatbread and pickled vegetables.
