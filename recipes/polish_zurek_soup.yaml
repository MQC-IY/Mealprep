de:
  title: Polnischer Żurek – Sauerteigsuppe mit Ei und Weißwurst
  summary: 'Polens ikonische Sauerteigsuppe: fermentierter Roggensauer mit hart gekochten
    Eiern, weißer Polnischer Wurst und Meerrettich.'
en:
  title: Polish Żurek – Sourdough Soup with Egg and White Sausage
  summary: 'Poland''s iconic sourdough soup: fermented rye sour with hard-boiled eggs,
    white Polish sausage and horseradish.'
