de_steps:
- Eier hart kochen (10 Minuten), abschrecken, schälen und beiseitestellen.
- Wurst in Scheiben schneiden. In einem großen Topf ohne Öl oder mit etwas Fett die
  Wurstscheiben von beiden Seiten anbraten, bis sie goldbraun sind. Herausnehmen.
- Zwiebeln und Karotten würfeln. Im gleichen Topf 5 Minuten anschwitzen. Knoblauch
  pressen, Paprikapulver, Majoran, Kümmel und Lorbeer einrühren.
- Gemüsebrühe aufgießen und 15 Minuten köcheln. Żur (Sauerteig-Ansatz) einrühren –
  er macht die Suppe charakteristisch säuerlich. Nochmals 10 Minuten köcheln.
- Sauerrahm mit 2–3 EL heißer Suppe glatt rühren, dann einrühren. Mit Salz und Pfeffer
  abschmecken. Meerrettich einrühren.
- Wurstscheiben und halbierte Eier in die Suppe geben. 5 Minuten erwärmen. Mit Schwarzbrot
  oder Roggenbrötchen servieren.
en_steps:
- Hard-boil the eggs for 10 minutes, refresh in cold water, peel and set aside.
- Slice the sausage. In a large pot with a little fat, fry the sausage slices on both
  sides until golden brown. Remove and set aside.
- Dice the onions and carrots. Sweat in the same pot for 5 minutes. Press in the garlic,
  then stir in the sweet paprika, marjoram, caraway and bay leaves.
- Pour in the stock and simmer for 15 minutes. Stir in the Żur (sourdough starter)
  – it gives the soup its characteristic sourness. Simmer for a further 10 minutes.
- Stir the sour cream together with 2–3 tbsp of hot soup until smooth, then stir into
  the pot. Season with salt and pepper. Stir in the horseradish.
- Add the sausage slices and halved eggs to the soup. Heat through for 5 minutes.
  Serve with rye bread or rye rolls.
