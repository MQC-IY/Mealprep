de_steps:
- Süßkartoffel schälen und in 1-cm-Würfel schneiden. Zwiebel würfeln, Knoblauch und
  Ingwer reiben.
- Kokosnussöl in einem Topf erhitzen, Zwiebel 2 Minuten anschwitzen. Knoblauch und
  Ingwer 1 Minute mitbraten.
- Currypaste und Kurkuma einrühren und 1 Minute rösten.
- Linsen, Süßkartoffelwürfel, Kokosmilch und Brühe hinzufügen. Aufkochen und 18 Minuten
  bei mittlerer Hitze köcheln lassen, bis Linsen zerfallen und Süßkartoffeln weich
  sind. Mit Salz abschmecken.
en_steps:
- Peel the sweet potato and cut into 1 cm cubes. Dice the onion and grate the garlic
  and ginger.
- Heat the coconut oil in a pot and sauté the onion for 2 minutes. Add the garlic
  and ginger and cook for 1 more minute.
- Stir in the curry paste and turmeric and toast for 1 minute.
- Add the lentils, sweet potato cubes, coconut milk, and broth. Bring to a boil and
  simmer over medium heat for 18 minutes until the lentils have broken down and the
  sweet potato is tender. Season with salt.
