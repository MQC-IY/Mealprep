id: quick_sweet_potato_lentil_dal
pool: lunch
healthy: true
quick: true
next_day: true
quick_minutes: 25
meals: 2
de:
  title: Schneller Süßkartoffel-Linsen-Dal
  summary: Aromatischer Dal mit roten Linsen und Süßkartoffelwürfeln in Kokosmilch
    und Curry-Paste.
en:
  title: Quick Sweet Potato Lentil Dal
  summary: An aromatic Dal with red lentils and sweet potato cubes in coconut milk
    and curry paste — warming and nourishing.
ingredients:
- de_name: Rote Linsen
  en_name: Red lentils
  qty: 200
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Süßkartoffel
  en_name: Sweet potato
  qty: 400
  unit: g
  category: Gemüse und Salat
- de_name: Kokosmilch
  en_name: Coconut milk
  qty: 400
  unit: ml
  category: Konserven und Vorrat
- de_name: Gemüsebrühe
  en_name: Vegetable broth
  qty: 500
  unit: ml
  category: Konserven und Vorrat
- de_name: Rote Thai-Currypaste
  en_name: Red Thai curry paste
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Kokosnussöl
  en_name: Coconut oil
  qty: 2
  unit: EL
  category: Konserven und Vorrat
- de_name: Zwiebel
  en_name: Onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Knoblauchzehen
  en_name: Garlic cloves
  qty: 3
  unit: Zehen
  category: Gemüse und Salat
- de_name: Ingwer, frisch
  en_name: Fresh ginger
  qty: 20
  unit: g
  category: Gemüse und Salat
- de_name: Kurkuma, gemahlen
  en_name: Turmeric, ground
  qty: 1
  unit: TL
  category: Gewürze
