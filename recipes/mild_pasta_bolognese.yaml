de_steps:
- Nudeln kochen.
- Zwiebel, Möhren und Zucchini fein schneiden und in Olivenöl anschwitzen.
- Linsen, gehackte Tomaten und passierte Tomaten zugeben und weich köcheln lassen.
en_steps:
- Cook the pasta.
- Finely chop the onion, carrots, and zucchini; sauté in olive oil until softened.
- Add the lentils, chopped tomatoes, and passata; simmer until the lentils are tender.
