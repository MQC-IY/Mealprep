de:
  title: Linsen-Bolognese mit Vollkornnudeln
  summary: Tomatige Linsen-Bolognese mit Möhren und Vollkornnudeln.
en:
  title: Lentil Bolognese with Wholegrain Pasta
  summary: A hearty tomato lentil Bolognese with carrots and wholegrain pasta.
