meals: 3
de:
  title: Brokkoli-Quinoa-Auflauf mit Käse
  summary: Auflauf mit Quinoa, Brokkoli, Möhren und leichtem Käse-Ei-Guss.
en:
  title: Broccoli, Quinoa and Cheese Bake
  summary: Baked dish with quinoa, broccoli, carrots, and a light cheese-egg topping.
ingredients:
- de_name: Quinoa
  en_name: quinoa
  qty: 260
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Brokkoli
  en_name: broccoli
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Eier
  en_name: eggs
  qty: 3
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 180
  unit: g
  category: Protein und Milchprodukte
- de_name: Gouda gerieben
  en_name: Gouda, grated
  qty: 80
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Quinoa vorgaren.
- Brokkoli und Möhren klein schneiden und kurz weich garen.
- Alles in eine Form geben, Eier mit Joghurt verrühren und darübergeben.
en_steps:
- Parboil quinoa.
- Cut broccoli and carrots into small pieces and cook until just tender.
- Transfer everything to a baking dish; whisk eggs with yogurt and pour over the top.
