de:
  title: Rumänisches Hähnchen mit Mămăligă (Polenta)
  summary: 'Rumänisches Soulfood: geschmortes Hähnchen in Tomatensauce mit Knoblauch
    und Thymian auf cremiger, goldener Polenta.'
en:
  title: Romanian Chicken with Mămăligă (Polenta)
  summary: 'Romanian soul food: braised chicken in a tomato sauce with garlic and
    thyme, served on creamy golden polenta.'
