de_steps:
- Hähnchenschenkel salzen, pfeffern und mit Paprikapulver einreiben. Öl in einem Schmortopf
  erhitzen und Hähnchen von allen Seiten kräftig anbraten. Herausnehmen.
- Zwiebeln würfeln und im Bratfett 6 Minuten anschwitzen. Knoblauch hacken und hinzufügen.
  Gehackte Tomaten, Hühnerbrühe, Thymianzweige, Lorbeerblätter und Chiliflocken hinzufügen.
- Hähnchen zurücklegen. Zugedeckt 40 Minuten bei mittlerer Hitze schmoren. Lorbeer
  und Thymian entfernen. Sauerrahm einrühren.
- 'Für die Mămăligă: 800 ml Salzwasser mit Butter zum Kochen bringen. Polenta unter
  ständigem Rühren einrieseln lassen. Hitze reduzieren und unter häufigem Rühren 10
  Minuten köcheln, bis die Polenta dick und cremig ist.'
- Polenta in tiefe Teller löffeln, Hähnchen und Sauce darüber anrichten. Sofort servieren.
en_steps:
- Season the chicken thighs with salt, pepper, and paprika. Heat the oil in a braising
  pot and brown the chicken on all sides. Remove.
- Dice the onions and sauté in the remaining fat for 6 minutes. Add the garlic. Add
  the chopped tomatoes, chicken broth, thyme sprigs, bay leaves, and chili flakes.
- Return the chicken. Cover and braise over medium heat for 40 minutes. Remove the
  bay leaves and thyme. Stir in the sour cream.
- 'For the Mămăligă: bring 800 ml salted water with butter to a boil. Gradually whisk
  in the polenta. Reduce the heat and stir frequently for 10 minutes until thick and
  creamy.'
- Spoon the polenta into deep plates and top with the chicken and sauce. Serve immediately.
