de:
  title: Arroz con Pollo – Hähnchen-Reis-Pfanne
  summary: Klassisches lateinamerikanisches Reisgericht mit Hähnchenstücken, Paprika,
    Tomaten, Erbsen und aromatischem Safran oder Kurkuma.
en:
  title: Arroz con Pollo – Chicken and Rice Pan
  summary: Classic Latin American rice dish with chicken pieces, bell peppers, tomatoes,
    peas, and fragrant saffron or turmeric.
