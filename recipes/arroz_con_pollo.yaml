de_steps:
- Hähnchenstücke salzen und pfeffern. Öl in einer tiefen Pfanne oder einem weiten
  Topf bei hoher Hitze erhitzen. Hähnchen portionsweise von allen Seiten 4–5 Minuten
  goldbraun anbraten, herausnehmen.
- Hitze reduzieren, Zwiebeln und Paprika in derselben Pfanne 5 Minuten weich garen.
  Knoblauch zugeben und 1 Minute mitrösten.
- Kreuzkümmel, Paprika edelsüß, Kurkuma, Oregano und Chiliflocken einrühren und 30
  Sekunden rösten.
- Reis zugeben und 2 Minuten unter Rühren anrösten.
- Gehackte Tomaten und Hühnerbrühe einrühren, aufkochen. Hähnchenstücke oben auf den
  Reis legen.
- Hitze auf niedrig reduzieren, Deckel drauf und 25–30 Minuten garen bis der Reis
  die Flüssigkeit aufgesogen hat und das Hähnchen gar ist.
- Erbsen unterrühren und 3 Minuten mitgaren. Mit Salz abschmecken und heiß servieren.
en_steps:
- Season chicken pieces with salt and pepper. Heat oil in a deep pan or wide pot over
  high heat. Brown chicken in batches on all sides for 4–5 minutes; remove.
- Reduce heat, cook onions and bell peppers in the same pan for 5 minutes until soft.
  Add garlic and toast for 1 minute.
- Stir in cumin, sweet paprika, turmeric, oregano, and chili flakes; toast for 30
  seconds.
- Add rice and stir-fry for 2 minutes.
- Stir in chopped tomatoes and chicken stock; bring to the boil. Place chicken pieces
  on top of the rice.
- Reduce heat to low, cover, and cook for 25–30 minutes until the rice has absorbed
  the liquid and the chicken is cooked through.
- Stir in peas and cook for a further 3 minutes. Season with salt and serve hot.
