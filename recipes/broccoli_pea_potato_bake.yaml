de_steps:
- Kartoffeln vorgaren und in Scheiben schneiden.
- Brokkoli und Erbsen kurz vorgaren.
- Alles in eine Form geben, Eier mit Joghurt verrühren und darübergeben.
en_steps:
- Parboil potatoes and slice them.
- Briefly parboil broccoli and peas.
- Transfer everything to a baking dish; whisk eggs with yogurt and pour over the top.
