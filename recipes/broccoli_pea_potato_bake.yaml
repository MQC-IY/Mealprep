meals: 3
de:
  title: Brokkoli-Erbsen-Kartoffel-Auflauf
  summary: Auflauf mit Kartoffeln, Brokkoli, Erbsen und Joghurt-Ei-Guss.
en:
  title: Broccoli, Pea and Potato Bake
  summary: Baked dish with potatoes, broccoli, peas, and a yogurt-egg topping.
ingredients:
- de_name: Kartoffeln
  en_name: potatoes
  qty: 900
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Brokkoli
  en_name: broccoli
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Erbsen, TK
  en_name: frozen peas
  qty: 200
  unit: g
  category: Gemüse und Salat
- de_name: Eier
  en_name: eggs
  qty: 3
  unit: Stk
  category: Protein und Milchprodukte
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 180
  unit: g
  category: Protein und Milchprodukte
- de_name: Gouda gerieben
  en_name: Gouda, grated
  qty: 70
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
