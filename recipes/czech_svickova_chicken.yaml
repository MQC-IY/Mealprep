de:
  title: Tschechisches Svíčková-inspiriertes Hähnchen mit Rahmgemüsesauce
  summary: 'Nach dem böhmischen Schmorfleischklassiker: Hähnchen schmort in einer
    süß-sauren Wurzelgemüse-Sahnein-Sauce mit Preiselbeeren und Zitrone.'
en:
  title: Czech Svíčková-Inspired Chicken with Creamy Root Vegetable Sauce
  summary: 'Inspired by the Bohemian pot-roast classic: chicken braised in a sweet-sour
    root vegetable cream sauce, served with lingonberries and lemon.'
