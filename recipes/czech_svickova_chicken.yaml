de_steps:
- Hähnchenstücke salzen und pfeffern. Butter in einem Bräter erhitzen, Hähnchen goldbraun
  anbraten. Herausnehmen.
- Karotten und Pastinaken in Würfel schneiden, Zwiebeln hacken. Im gleichen Fett 8
  Minuten anbraten. Knoblauch, Lorbeer, Piment, Pfefferkörner, Kümmel und Thymian
  hinzufügen.
- Mit Weißweinessig ablöschen, einkochen. Hühnerbrühe und Schlagsahne einrühren. Hähnchen
  zurücklegen. Zugedeckt 35 Minuten bei mittlerer Hitze schmoren.
- Hähnchen herausnehmen. Sauce durch ein Sieb passieren oder mit dem Stabmixer glatt
  pürieren. Sauerrahm einrühren, mit Zitronensaft, Salz und Pfeffer abschmecken.
- Hähnchen zurück in die Sauce legen und kurz erwärmen. Mit böhmischen Knödeln, Semmelknödeln
  oder Reis servieren. Preiselbeeren als Beilage reichen.
en_steps:
- Season the chicken pieces with salt and pepper. Heat the butter in a casserole dish
  and brown the chicken golden. Remove and set aside.
- Dice the carrots and parsnips, chop the onions. Fry in the same fat for 8 minutes.
  Add the garlic, bay leaves, allspice, peppercorns, caraway, and thyme.
- Deglaze with white wine vinegar and reduce. Stir in the chicken stock and double
  cream. Return the chicken. Cover and braise over medium heat for 35 minutes.
- Remove the chicken. Strain the sauce through a sieve or blend until smooth with
  a hand blender. Stir in the sour cream and season with lemon juice, salt, and pepper.
- Return the chicken to the sauce and warm briefly. Serve with Bohemian bread dumplings,
  bread rolls, or rice. Offer lingonberries on the side.
