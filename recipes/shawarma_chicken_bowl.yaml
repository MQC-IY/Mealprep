de_steps:
- Hähnchen in dünne Streifen schneiden. Joghurt, 2 EL Olivenöl, Kreuzkümmel, Kurkuma,
  Koriander, Zimt, Paprika, Piment, Chiliflocken, 2 zerdrückte Knoblauchzehen und
  Saft einer Zitrone vermengen. Hähnchen mind. 30 Minuten darin marinieren.
- 'Für den Hummus: Kichererbsen abgießen, dabei 4 EL Einweichwasser beiseite stellen.
  Kichererbsen mit Tahini, Saft einer Zitrone, 2 Knoblauchzehen, 2 EL Olivenöl und
  Salz im Mixer cremig pürieren. Falls zu dick, etwas Wasser zugeben.'
- 'Für das Taboulé: Petersilie sehr fein hacken. Tomaten und Gurke fein würfeln. Mit
  etwas Olivenöl, Zitronensaft, Salz und Pfeffer abschmecken.'
- Fladenbrote in Dreiecke schneiden, mit Öl bestreichen und im Ofen bei 200 °C 8 Minuten
  goldbraun backen.
- Hähnchen in einer sehr heißen Pfanne portionsweise scharf anbraten, bis es goldbraun
  und leicht knusprig ist, ca. 5–6 Minuten.
- 'Bowls anrichten: Hummus als Basis, Taboulé daneben, Hähnchen oben drauf, Fladenbrot-Chips
  zur Seite.'
en_steps:
- Cut the chicken into thin strips. Combine the yogurt, 2 tbsp olive oil, cumin, turmeric,
  coriander, cinnamon, paprika, allspice, chili flakes, 2 crushed garlic cloves, and
  the juice of one lemon. Marinate the chicken for at least 30 minutes.
- 'For the hummus: drain the chickpeas, reserving 4 tbsp of the liquid. Blend the
  chickpeas with tahini, juice of one lemon, 2 garlic cloves, 2 tbsp olive oil, and
  salt until creamy. Add a little water if too thick.'
- 'For the tabbouleh: finely chop the parsley. Finely dice the tomatoes and cucumber.
  Season with a little olive oil, lemon juice, salt, and pepper.'
- Cut the flatbreads into triangles, brush with oil, and bake in the oven at 200°C
  for 8 minutes until golden.
- Sear the chicken in batches in a very hot pan until golden brown and slightly crispy,
  about 5–6 minutes.
- 'Assemble the bowls: hummus as the base, tabbouleh alongside, chicken on top, and
  flatbread chips on the side.'
