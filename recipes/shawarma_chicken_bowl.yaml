de:
  title: Hähnchen-Shawarma-Bowl mit Hummus und Taboulé
  summary: Zartes Shawarma-Hähnchen mit Kurkuma, Kreuzkümmel und Zimt, dazu cremiger
    Hummus, frisches Taboulé und knusprige Fladenbrot-Chips.
en:
  title: Chicken Shawarma Bowl with Hummus and Tabbouleh
  summary: Tender shawarma-spiced chicken with turmeric, cumin, and cinnamon, served
    with creamy hummus, fresh tabbouleh, and crispy flatbread chips.
