de:
  title: Japanischer Chahan (Gebratener Reis mit Hähnchen und Ei)
  summary: Aromatischer japanisch gebratener Reis mit Hähnchen, Ei, Gemüse und dem
    Geheimnis guter Yakiniku-Würze.
en:
  title: Japanese Chahan (Fried Rice with Chicken and Egg)
  summary: Fragrant Japanese fried rice with chicken, egg, vegetables, and the secret
    of good yakiniku seasoning.
