de_steps:
- Hähnchenbrust in kleine Würfel (1 cm) schneiden, mit Sake, 1 EL Sojasoße und Pfeffer
  15 Minuten marinieren.
- Zwiebel fein würfeln, Knoblauch und Ingwer fein hacken, Frühlingszwiebeln in Ringe
  schneiden.
- Wok auf höchster Stufe stark erhitzen. 2 EL Pflanzenöl hineingeben, Hähnchen scharf
  4 Minuten anbraten. Herausnehmen.
- Restliches Öl in den Wok, Zwiebeln, Knoblauch und Ingwer 2 Minuten anbraten. Kalten
  Reis dazugeben und bei maximaler Hitze 3–4 Minuten unter ständigem Rühren braten.
- Reis an den Rand schieben, Eier in die Mitte schlagen, sofort rühren bis sie cremig
  gestockt sind, dann mit dem Reis vermischen.
- Hähnchen zurückgeben. Restliche Sojasoße, Austernsauce und Sesamöl einrühren. 1–2
  Minuten alles vermengen.
- Auf Teller geben, mit Frühlingszwiebeln, Sesamkörnern und Togarashi bestreuen.
en_steps:
- Cut chicken breast into small cubes (1 cm); marinate with sake, 1 tbsp soy sauce,
  and pepper for 15 minutes.
- Finely dice the onion; finely chop garlic and ginger; slice spring onions into rings.
- Heat a wok on the highest setting. Add 2 tbsp vegetable oil, sear chicken over high
  heat for 4 minutes. Remove.
- Add the remaining oil to the wok; fry onions, garlic, and ginger for 2 minutes.
  Add cold rice and stir-fry at maximum heat for 3–4 minutes, stirring constantly.
- Push rice to the sides, crack eggs into the centre, stir immediately until softly
  scrambled, then mix with the rice.
- Return chicken. Stir in the remaining soy sauce, oyster sauce, and sesame oil. Toss
  everything together for 1–2 minutes.
- Plate up and sprinkle with spring onions, sesame seeds, and togarashi.
