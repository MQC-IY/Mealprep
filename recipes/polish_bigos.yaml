de:
  title: Polnischer Bigos – Sauerkraut-Fleisch-Eintopf
  summary: 'Polens Nationalgericht: Sauerkraut und frischer Weißkohl schmoren stundenlang
    mit Schweinefleisch, Speck, Kielbasa und Pilzen – besser am nächsten Tag.'
en:
  title: Polish Bigos – Sauerkraut and Meat Stew
  summary: 'Poland''s national dish: sauerkraut and fresh white cabbage braised for
    hours with pork, bacon, kielbasa and mushrooms – even better the next day.'
