de_steps:
- Steinpilze in 250 ml warmem Wasser 30 Minuten einweichen. Herausnehmen, grob hacken.
  Einweichwasser durch ein feines Sieb gießen und aufbewahren.
- Speckwürfel in einem großen, schweren Topf ohne Öl bei mittlerer Hitze auslassen.
  Schweinebauch hinzufügen, von allen Seiten 8 Minuten anbraten.
- Zwiebeln würfeln und zum Fleisch geben, 5 Minuten mitbraten. Kielbasa in dicke Scheiben
  schneiden und mitbraten. Knoblauch pressen, Paprikapulver, Piment und Kümmel einrühren.
- Weißkohl in Streifen schneiden und einrühren. Sauerkraut (nicht abspülen) und eingeweichte
  Pilze mit ihrem Einweichwasser hinzufügen.
- Tomatenmark einrühren, mit Rotwein ablöschen. Lorbeerblätter einlegen, pfeffern.
  Alles gut umrühren.
- Zugedeckt bei niedriger Hitze 1,5 Stunden schmoren, dabei gelegentlich rühren. Am
  Ende salzen und abschmecken. Am nächsten Tag schmeckt Bigos noch besser.
en_steps:
- Soak the dried porcini in 250 ml warm water for 30 minutes. Remove, roughly chop.
  Strain the soaking liquid through a fine sieve and set aside.
- Render the bacon lardons in a large, heavy pot over medium heat without oil. Add
  the pork belly and brown on all sides for 8 minutes.
- Dice the onions, add to the meat and fry for 5 minutes. Cut the kielbasa into thick
  slices and add. Press in the garlic, then stir in the sweet paprika, allspice and
  caraway seeds.
- Shred the white cabbage and stir in. Add the sauerkraut (do not rinse) and the soaked
  mushrooms along with their soaking liquid.
- Stir in the tomato paste and deglaze with red wine. Add the bay leaves and season
  with pepper. Stir everything well.
- Cover and braise over low heat for 1.5 hours, stirring occasionally. Season with
  salt at the end. Bigos tastes even better the next day.
