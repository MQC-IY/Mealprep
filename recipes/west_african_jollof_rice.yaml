de:
  title: Jollof-Reis mit Hähnchen (West-Afrika)
  summary: 'Westafrikanischer Klassiker: aromatischer, leuchtend-roter Tomaten-Paprika-Reis,
    geschmort mit Hähnchenstücken, Palmöl und Scotch-Bonnet-Chili.'
en:
  title: Jollof Rice with Chicken (West African)
  summary: 'A West African classic: aromatic, vibrant red tomato-pepper rice braised
    with chicken pieces, palm oil, and Scotch bonnet chili.'
