de_steps:
- Hähnchen mit Paprika edelsüß, Kreuzkümmel, Salz und etwas Öl einreiben. In Öl bei
  hoher Hitze von allen Seiten goldbraun anbraten, herausnehmen.
- Paprika, Zwiebeln (1 Stück), Scotch-Bonnet und gehackte Tomaten zu einem glatten
  Püree mixen.
- Restliche Zwiebel fein würfeln. Ingwer und Knoblauch reiben. Im Bratfett 5 Minuten
  bei mittlerer Hitze anschwitzen.
- Tomatenmark zugeben, 3 Minuten unter ständigem Rühren mitrösten bis es dunkel wird.
  Tomatenpüree zugeben und 15 Minuten bei mittlerer Hitze einköcheln bis die Sauce
  sehr dick ist.
- Thymian, gemahlenen Koriander und Chiliflocken einrühren. Reis zugeben und 2 Minuten
  mitrösten.
- Hühnerbrühe angießen, aufkochen. Hähnchen auf den Reis legen, Deckel drauf, Hitze
  auf minimal reduzieren. 25–30 Minuten kochen bis Reis gar und Flüssigkeit aufgesogen
  ist.
- Mit Salz abschmecken. Hähnchen auf dem Reis anrichten und sofort servieren.
en_steps:
- Rub the chicken with sweet paprika, cumin, salt, and a little oil. Sear in oil over
  high heat until golden brown on all sides, then remove.
- Blend the bell peppers, 1 onion, Scotch bonnet, and chopped tomatoes into a smooth
  purée.
- Finely dice the remaining onion. Grate the ginger and garlic. Sauté in the cooking
  fat for 5 minutes over medium heat.
- Add the tomato paste and fry for 3 minutes, stirring constantly, until it darkens.
  Add the tomato purée and simmer over medium heat for 15 minutes until the sauce
  is very thick.
- Stir in the thyme, ground coriander, and chili flakes. Add the rice and toast for
  2 minutes.
- Pour in the chicken stock and bring to a boil. Place the chicken on top of the rice,
  cover, and reduce the heat to the lowest setting. Cook for 25–30 minutes until the
  rice is done and the liquid is absorbed.
- Season with salt. Arrange the chicken on the rice and serve immediately.
