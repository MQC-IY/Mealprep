de:
  title: Enchiladas Rojas mit Hähnchen
  summary: Maistortillas gefüllt mit würzigem Chipotle-Hähnchen, überbacken mit einer
    tiefen Ancho-Chili-Tomatensauce und Käse.
en:
  title: Enchiladas Rojas with Chicken
  summary: Corn tortillas filled with spiced chipotle chicken, baked under a deep
    ancho chili-tomato sauce and melted cheese.
