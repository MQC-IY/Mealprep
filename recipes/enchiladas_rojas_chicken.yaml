de_steps:
- Hähnchenbrust in Salzwasser oder Brühe 20 Minuten gar köcheln, dann abkühlen lassen
  und mit zwei Gabeln in grobe Fasern zupfen.
- Zwiebeln und Knoblauch fein würfeln. Öl in einem Topf erhitzen, Zwiebeln 5 Minuten
  goldbraun anbraten, Knoblauch 1 Minute mitrösten.
- Ancho-Chilipulver, Chipotle-Chilipulver, Kreuzkümmel, Oregano und Zimt einrühren
  und 30 Sekunden trocken rösten.
- Tomatenmark, gehackte Tomaten und Hühnerbrühe zugeben, aufkochen und 15 Minuten
  bei mittlerer Hitze einköcheln lassen. Mit Stabmixer glatt pürieren.
- Etwa ein Drittel der Sauce mit dem gezupften Hähnchen mischen. Mit Salz und Chipotle
  abschmecken.
- Ofen auf 200 °C Ober-/Unterhitze vorheizen. Eine Backform mit etwas Sauce ausstreichen.
- Tortillas kurz in einer trockenen Pfanne erwärmen damit sie biegsam werden. Je 2
  EL Hähnchenfüllung einwickeln und die Enchiladas dicht nebeneinander in die Form
  legen.
- Restliche Sauce gleichmäßig über die Enchiladas gießen, geriebenen Käse darüberstreuen.
- 20 Minuten backen, bis der Käse blubbert und leicht braun ist. Mit Sauerrahm und
  frischem Koriander servieren.
en_steps:
- Simmer the chicken breast in salted water or stock for 20 minutes until cooked through.
  Let it cool, then shred with two forks into rough strands.
- Finely dice the onions and garlic. Heat the oil in a pot, brown the onions for 5
  minutes, then fry the garlic for 1 minute.
- Stir in the ancho chili powder, chipotle chili powder, cumin, oregano, and cinnamon;
  toast dry for 30 seconds.
- Add the tomato paste, chopped tomatoes, and chicken stock. Bring to a boil and simmer
  over medium heat for 15 minutes. Blend smooth with a hand blender.
- Mix about one-third of the sauce with the shredded chicken. Season with salt and
  chipotle.
- Preheat the oven to 200 °C (fan 180 °C). Spread a little sauce over the base of
  a baking dish.
- Warm the tortillas briefly in a dry pan to make them pliable. Place 2 tbsp of chicken
  filling in each, roll up, and arrange the enchiladas tightly side by side in the
  dish.
- Pour the remaining sauce evenly over the enchiladas and scatter the grated cheese
  on top.
- Bake for 20 minutes until the cheese is bubbling and lightly browned. Serve with
  sour cream and fresh coriander.
