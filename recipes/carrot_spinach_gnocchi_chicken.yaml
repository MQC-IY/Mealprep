de:
  title: Hähnchen-Gnocchi mit Möhren und Spinat
  summary: Sehr schnelles Gnocchigericht mit Hähnchen, Möhren und Spinat.
en:
  title: Chicken Gnocchi with Carrots and Spinach
  summary: A very quick gnocchi dish with chicken, carrots, and spinach.
