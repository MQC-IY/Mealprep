de_steps:
- Hähnchenbrust in mundgerechte Würfel schneiden. Möhren schälen und in dünne Scheiben oder kleine Stücke schneiden, damit sie schnell garen.
- Einen Topf mit gesalzenem Wasser zum Kochen bringen. Gnocchi hineingeben und kochen, bis sie an die Oberfläche steigen (ca. 2–3 Minuten) — dann sofort abgießen und beiseitestellen.
- Olivenöl in einer großen Pfanne bei mittlerer bis hoher Hitze erhitzen. Hähnchenwürfel hineingeben und 5–6 Minuten rundum goldbraun anbraten, bis das Fleisch durchgegart ist. Hähnchen aus der Pfanne nehmen.
- Möhren in die gleiche Pfanne geben und 4–5 Minuten bei mittlerer Hitze anbraten, bis sie leicht gebräunt und gerade gar sind. Blattspinat dazugeben und 1–2 Minuten mitschwenken, bis er zusammenfällt.
- Gnocchi und Hähnchen zurück in die Pfanne geben. Frischkäse und Chiliflocken unterrühren und alles bei niedriger Hitze 1–2 Minuten erwärmen, bis eine cremige Sauce entsteht. Mit Salz abschmecken und in Portionsboxen füllen — hält sich 3 Tage im Kühlschrank.
en_steps:
- Cut the chicken breast into bite-sized cubes. Peel the carrots and slice them thinly or into small pieces so they cook quickly.
- Bring a pot of salted water to the boil. Add the gnocchi and cook until they float to the surface (about 2–3 minutes), then drain immediately and set aside.
- Heat the olive oil in a large frying pan over medium-high heat. Add the chicken cubes and fry for 5–6 minutes, turning, until golden all over and cooked through. Remove the chicken from the pan.
- Add the carrots to the same pan and cook over medium heat for 4–5 minutes until lightly browned and just tender. Add the baby spinach and toss for 1–2 minutes until wilted.
- Return the gnocchi and chicken to the pan. Stir in the cream cheese and chili flakes, then warm everything together over low heat for 1–2 minutes until a creamy sauce forms. Season with salt and divide into portion boxes — keeps for 3 days in the fridge.
