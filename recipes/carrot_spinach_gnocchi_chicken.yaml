de_steps:
- Gnocchi weich garen.
- Hähnchen scharf anbraten und Möhren weich garen.
- Spinat und Frischkäse unterheben.
en_steps:
- Cook the gnocchi until tender.
- Sear the chicken over high heat and cook the carrots until tender.
- Fold in the spinach and cream cheese.
