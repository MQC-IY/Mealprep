de:
  title: Knusprige Ente à l'Orange mit Rotkohl
  summary: Knusprig gebratene Entenbrust auf aromatischem Orangen-Jus, begleitet von
    geschmortem Rotkohl mit Gewürzen – Bistro-Klassiker für zu Hause.
en:
  title: Crispy Duck à l'Orange with Braised Red Cabbage
  summary: Crispy-skinned duck breast on a fragrant orange jus, accompanied by spiced
    braised red cabbage — a bistro classic made at home.
