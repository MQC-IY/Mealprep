de_steps:
- 'Rotkohl: Zwiebeln in Streifen schneiden, in einem Schmortopf mit etwas Butter bei
  mittlerer Hitze anschwitzen. Rotkohl zufügen, Rotwein, Rotweinessig und braunen
  Zucker einrühren. Nelken, Zimt, Wacholderbeeren und Lorbeerblätter dazugeben. Mit
  Salz abschmecken, Deckel auflegen und bei kleiner Hitze 35–40 Min. sanft schmoren,
  gelegentlich umrühren.'
- 'Entenbrüste: Die Haut rautenförmig einritzen (bis knapp ans Fleisch), nicht ins
  Fleisch schneiden. Kräftig mit Salz und schwarzem Pfeffer würzen.'
- Entenbrüste mit Hautseite nach unten in eine kalte, trockene Pfanne legen. Bei mittlerer
  Hitze beginnen und langsam hochschalten – das Fett soll sich 8–10 Min. herausbraten,
  bis die Haut goldbraun und knusprig ist. Wenden, Hitze erhöhen, Fleischseite 3–4
  Min. braten für medium. Entenbrüste herausnehmen, auf einem Gitter 8 Min. ruhen
  lassen.
- 'Orangensauce: Überschüssiges Entenfett abgießen (aufbewahren!). Knoblauch fein
  hacken, 30 Sek. in der Pfanne anschwitzen. Orangensaft und -schale (1 Orange) sowie
  Fond eingießen, kräftig aufkochen. Auf die Hälfte einreduzieren, durch ein Sieb
  passieren.'
- Sauce vom Herd nehmen, kalte Butter einmontieren. Mit Salz, Pfeffer und ggf. einem
  Spritzer Orangensaft abschmecken. Sauce soll glänzend und leicht sämig sein.
- Entenbrüste schräg in dünne Tranchen aufschneiden. Rotkohl und Entenscheiben auf
  vorgewärmten Tellern anrichten, Orangensauce um die Ente gießen. Sofort servieren.
en_steps:
- 'Red cabbage: slice the onions into strips and sweat in a casserole with a little
  butter over medium heat. Add the red cabbage, stir in the red wine, red wine vinegar,
  and brown sugar. Add the cloves, cinnamon, juniper berries, and bay leaves. Season
  with salt, cover, and braise over low heat for 35–40 minutes, stirring occasionally.'
- 'Duck breasts: score the skin in a crosshatch pattern down to (but not through)
  the flesh. Season generously with salt and black pepper.'
- Place the duck breasts skin-side down in a cold, dry pan. Start over medium heat
  and gradually increase — let the fat render for 8–10 minutes until the skin is golden
  and crispy. Turn, raise the heat, and cook the flesh side for 3–4 minutes for medium.
  Remove and rest on a rack for 8 minutes.
- 'Orange sauce: pour off the excess duck fat (save it). Finely chop the garlic and
  sweat for 30 seconds in the pan. Add the orange juice, zest of 1 orange, and the
  stock; bring to a vigorous boil. Reduce by half and strain through a sieve.'
- Remove the sauce from the heat and whisk in cold butter. Season with salt, pepper,
  and a squeeze of orange juice if needed. The sauce should be glossy and lightly
  syrupy.
- Carve the duck breasts diagonally into thin slices. Plate the red cabbage and duck
  slices on warmed plates, pour the orange sauce around the duck, and serve immediately.
