de_steps:
- Rindfleisch in kaltem Wasser 30 Minuten wässern, dann in einem Topf mit frischem
  Wasser aufsetzen, aufkochen und 5 Minuten blanchieren. Abgießen und abspülen.
- Rindfleisch in der Rindsbrühe mit 3 zerdrückten Knoblauchzehen 60 Minuten bei niedriger
  Hitze köcheln, bis es zart ist. Fleisch herausnehmen und in Fäden zerzupfen. Brühe
  aufbewahren.
- 'Restlichen Knoblauch fein hacken. Gochugaru-Paste: Sesamöl, Pflanzenöl, Gochugaru,
  Knoblauch, Knoblauchpulver in einem kleinen Topf bei niedriger Hitze 2 Minuten rösten.'
- Gochugaru-Paste in die Brühe einrühren. Fleischfäden dazugeben und aufkochen.
- Sojasprossen, Gosari und Frühlingszwiebeln (in 5 cm lange Stücke) dazugeben. 10
  Minuten köcheln. Mit Sojasoße und Pfeffer abschmecken.
- Eier verquirlen und fädenartig in die köchelnde Suppe gießen, sofort umrühren.
- Reis garen und separat servieren. Suppe in tiefe Schüsseln schöpfen.
en_steps:
- Soak the beef in cold water for 30 minutes, then place in a pot with fresh water,
  bring to a boil, and blanch for 5 minutes. Drain and rinse.
- Simmer the beef in the beef stock with 3 crushed garlic cloves over low heat for
  60 minutes until tender. Remove the meat and shred it into strands. Reserve the
  broth.
- 'Finely chop the remaining garlic. Make the gochugaru paste: gently toast sesame
  oil, vegetable oil, gochugaru, garlic, and garlic powder in a small pot over low
  heat for 2 minutes.'
- Stir the gochugaru paste into the broth. Add the shredded beef and bring to a boil.
- Add the soybean sprouts, gosari, and spring onions (cut into 5 cm lengths). Simmer
  for 10 minutes. Season with soy sauce and pepper.
- Beat the eggs and drizzle them in a thin stream into the gently simmering soup,
  stirring immediately.
- Cook the rice and serve separately. Ladle the soup into deep bowls.
