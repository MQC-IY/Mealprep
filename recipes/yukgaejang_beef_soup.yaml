de:
  title: Koreanisches Yukgaejang – Scharfe Rindfleischsuppe
  summary: Feuriger koreanischer Rindfleisch-Fadennudel-Eintopf mit Farnkraut, Sojasprossen
    und Ei in kräftiger Gochugaru-Brühe.
en:
  title: Yukgaejang – Korean Spicy Beef Soup
  summary: A fiery Korean beef and glass noodle stew with fernbrake, soybean sprouts,
    and egg in a bold gochugaru broth.
