de:
  title: Kenianisches Hähnchen mit Kochbananen und Kokosmilch
  summary: Ostafrikanischer Schmortopf mit Hähnchen, reifen Kochbananen, Kokosmilch,
    Tomaten und Pilipili-Chili – süßlich, würzig und cremig.
en:
  title: Kenyan Chicken with Plantain and Coconut Milk
  summary: East African braised pot with chicken, ripe plantains, coconut milk, tomatoes,
    and pilipili chili – sweet, spicy, and creamy.
