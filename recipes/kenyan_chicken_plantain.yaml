de_steps:
- Hähnchenstücke salzen, mit Kurkuma und Paprika edelsüß einreiben. In Öl bei hoher
  Hitze rundherum goldbraun anbraten, herausnehmen.
- Zwiebeln fein würfeln, Knoblauch und Ingwer hacken. Im Bratfett 5 Minuten weich
  garen.
- Kreuzkümmel, gemahlenen Koriander und Chiliflocken zugeben, 1 Minute rösten.
- Gehackte Tomaten, Kokosmilch und Hühnerbrühe zugeben, aufkochen.
- Hähnchenstücke zurücklegen, Deckel drauf und 25 Minuten bei mittlerer-niedriger
  Hitze schmoren.
- Kochbananen schälen und in 2 cm dicke Schräg-Scheiben schneiden. In die Sauce geben
  und weitere 15 Minuten mitköcheln bis die Bananen weich sind und die Sauce eingedickt
  hat.
- Mit Salz, Chiliflocken und frischem Koriander abschmecken. Mit Ugali (Maisbrei)
  oder Reis servieren.
en_steps:
- Season chicken pieces with salt; rub with turmeric and sweet paprika. Sear in oil
  over high heat all over until golden brown; remove.
- Finely dice onions; chop garlic and ginger. Cook in the frying fat for 5 minutes
  until soft.
- Add ground cumin, ground coriander, and chili flakes; toast for 1 minute.
- Add chopped tomatoes, coconut milk, and chicken stock; bring to a boil.
- Return chicken pieces, put the lid on, and braise over medium-low heat for 25 minutes.
- Peel plantains and cut into 2 cm diagonal slices. Add to the sauce and simmer for
  a further 15 minutes until the plantains are soft and the sauce has thickened.
- Season with salt, chili flakes, and fresh coriander. Serve with ugali (maize porridge)
  or rice.
