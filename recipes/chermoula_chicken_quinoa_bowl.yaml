de_steps:
- 'Chermoula herstellen: Koriander und Petersilie grob hacken, mit Knoblauch, 3 EL
  Olivenöl, Zitronensaft und -schale, Kreuzkümmel, Koriander gemahlen, Paprika, Chiliflocken
  und Kurkuma im Mixer zu einer Paste verarbeiten.'
- Hähnchen mit der Hälfte der Chermoula einreiben und mindestens 30 Minuten marinieren.
- Quinoa in Brühe nach Packungsanweisung garen. Mit Salz und etwas Zitronensaft abschmecken.
- Zucchini und Paprika in Stücke schneiden, mit 2 EL Olivenöl und Salz mischen, bei
  220 °C 20 Minuten rösten.
- Hähnchen in einer heißen Grillpfanne oder unter dem Grill von jeder Seite 6–7 Minuten
  garen.
- Bowls mit Quinoa füllen, Gemüse und Hähnchen anrichten. Restliche Chermoula als
  Sauce darübergeben.
en_steps:
- 'Make the Chermoula: coarsely chop the cilantro and parsley, then blend with the
  garlic, 3 tbsp olive oil, lemon juice and zest, ground cumin, ground coriander,
  paprika, chili flakes, and turmeric into a paste.'
- Rub the chicken with half the Chermoula and marinate for at least 30 minutes.
- Cook the quinoa in the stock according to the packet instructions. Season with salt
  and a little lemon juice.
- Cut the zucchini and bell peppers into chunks, toss with 2 tbsp olive oil and salt,
  and roast at 220 °C for 20 minutes.
- Cook the chicken in a hot griddle pan or under the grill for 6–7 minutes per side.
- Fill the bowls with quinoa, arrange the vegetables and chicken on top. Drizzle the
  remaining Chermoula over as a sauce.
