de:
  title: Hähnchen-Chermoula-Bowl mit Quinoa
  summary: Nordafrikanische Chermoula-Marinade aus Koriander, Petersilie, Kreuzkümmel
    und Zitrone verleiht dem Hähnchen intensive Frische auf Quinoa mit geröstetem
    Gemüse.
en:
  title: Chicken Chermoula Bowl with Quinoa
  summary: A North African Chermoula marinade of cilantro, parsley, cumin, and lemon
    gives the chicken vibrant freshness, served over quinoa with roasted vegetables.
