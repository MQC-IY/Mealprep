id: chicken_zucchini_polenta
pool: lunch
healthy: true
quick: true
next_day: false
quick_minutes: 20
meals: 3
de:
  title: Hähnchen-Zucchini mit cremiger Polenta
  summary: Schnelles Gericht mit Hähnchen, Zucchini und weicher Polenta.
en:
  title: Chicken and Zucchini with Creamy Polenta
  summary: A quick and comforting dish with seared chicken, tender zucchini and carrots,
    served on a bed of creamy soft polenta.
ingredients:
- de_name: Hähnchenbrust
  en_name: chicken breast
  qty: 750
  unit: g
  category: Protein und Milchprodukte
- de_name: Polenta
  en_name: polenta
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Zucchini
  en_name: zucchini
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Möhren
  en_name: carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Naturjoghurt
  en_name: plain yogurt
  qty: 100
  unit: g
  category: Protein und Milchprodukte
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Paprika edelsüß
  en_name: sweet paprika
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Polenta weich rühren.
- Hähnchen in wenig Öl scharf anbraten.
- Zucchini und Möhren klein schneiden und weich garen, etwas Joghurt unterrühren.
en_steps:
- Stir the polenta until soft and creamy.
- Sear the chicken in a little oil over high heat.
- Dice the zucchini and carrots, cook until tender, then stir in a spoonful of yogurt.
