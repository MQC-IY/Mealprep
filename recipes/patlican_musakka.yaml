de_steps:
- Auberginen längs in 1 cm dicke Scheiben schneiden. Mit Salz bestreuen und 20 Minuten
  Wasser ziehen lassen. Abspülen und trocken tupfen.
- Auberginenscheiben auf beiden Seiten mit Olivenöl (3 EL) bepinseln und in einer
  Grillpfanne oder im Ofen bei 220 °C auf einem Blech 15 Minuten grillen, bis sie
  goldbraun sind.
- Restliches Olivenöl erhitzen. Zwiebeln würfeln und 5 Minuten glasig dünsten. Rinderhack
  hinzufügen und krümelig braun anbraten. Knoblauch, Paprikapulver, Pul Biber, Pfeffer,
  Zimt einarbeiten.
- Tomatenmark unterrühren, 1 Minute rösten. Gehackte Tomaten und 50 ml Wasser hinzufügen.
  Mit Salz abschmecken, 10 Minuten einkochen lassen.
- 'Ofen auf 200 °C vorheizen. Eine Auflaufform fetten. Schichten aufbauen: Auberginenscheiben,
  dann Fleischsauce, nochmals Auberginen. Obenauf Tomatenscheiben und Paprikastreifen
  legen. Oregano darüber streuen.'
- Auflauf 30 Minuten backen, bis die Oberfläche leicht gebräunt ist. 10 Minuten ruhen
  lassen, dann servieren.
en_steps:
- Cut the aubergines lengthways into 1 cm thick slices. Sprinkle with salt and leave
  for 20 minutes to draw out moisture. Rinse and pat dry.
- Brush the aubergine slices on both sides with olive oil (3 tbsp) and grill in a
  grill pan or in the oven at 220 °C on a baking sheet for 15 minutes until golden
  brown.
- Heat the remaining olive oil. Dice the onions and sweat for 5 minutes until translucent.
  Add the minced beef and fry until crumbly and browned. Work in the garlic, sweet
  paprika, pul biber, black pepper and cinnamon.
- Stir in the tomato paste and toast for 1 minute. Add the chopped tomatoes and 50
  ml water. Season with salt and cook down for 10 minutes.
- 'Preheat the oven to 200 °C. Grease a baking dish. Build up the layers: aubergine
  slices, then meat sauce, then aubergine again. Top with tomato slices and pepper
  strips. Sprinkle with oregano.'
- Bake the moussaka for 30 minutes until the surface is lightly browned. Leave to
  rest for 10 minutes before serving.
