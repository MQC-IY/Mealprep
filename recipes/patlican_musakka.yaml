de:
  title: Patlıcan Musakka – Türkische Auberginen-Moussaka
  summary: Saftige Auberginenschichten mit würzigem Rinderhackfleisch und Tomatensauce,
    überbacken – der türkische Klassiker ohne Béchamel.
en:
  title: Patlıcan Musakka – Turkish Aubergine Moussaka
  summary: Juicy layers of aubergine with spiced minced beef and tomato sauce, baked
    together – the Turkish classic without béchamel.
