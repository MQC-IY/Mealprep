de_steps:
- Hähnchen mit Paprika edelsüß, Salz und Chiliflocken würzen. In Öl bei hoher Hitze
  rundherum goldbraun anbraten, herausnehmen.
- Zwiebeln fein würfeln. Knoblauch, Ingwer und Scotch-Bonnet fein hacken oder reiben.
  Im Bratfett 5 Minuten weich garen.
- Tomatenmark einrühren und 2 Minuten dunkel rösten. Gehackte Tomaten zugeben, 5 Minuten
  einköcheln.
- Erdnussbutter und Hühnerbrühe einrühren, glatt rühren. Kreuzkümmel und gemahlenen
  Koriander einrühren.
- Hähnchen zurücklegen, aufkochen, Hitze reduzieren. Zugedeckt 30 Minuten bei niedriger
  Hitze schmoren, gelegentlich rühren.
- Spinat in den letzten 5 Minuten unterrühren, bis er zusammenfällt. Mit Salz und
  Chili abschmecken.
- Reis kochen und separat servieren.
en_steps:
- Season the chicken with sweet paprika, salt, and chilli flakes. Sear in oil over
  high heat until golden brown all over, then remove.
- Finely dice the onions. Finely chop or grate the garlic, ginger, and Scotch bonnet.
  Cook in the remaining fat for 5 minutes until softened.
- Stir in the tomato purée and fry for 2 minutes until darkened. Add the chopped tomatoes
  and simmer for 5 minutes.
- Stir in the peanut butter and chicken stock until smooth. Add the cumin and ground
  coriander.
- Return the chicken, bring to a boil, then reduce the heat. Cover and braise over
  low heat for 30 minutes, stirring occasionally.
- Stir in the spinach during the last 5 minutes until wilted. Season with salt and
  chilli.
- Cook the rice and serve separately.
