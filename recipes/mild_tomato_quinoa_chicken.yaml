de:
  title: Tomaten-Quinoa mit Hähnchen
  summary: Milder Quinoatopf mit Hähnchen, Tomate und Erbsen.
en:
  title: Tomato Quinoa with Chicken
  summary: A mild quinoa pot with chicken, tomato, and peas.
ingredients:
- de_name: Hähnchenbrust
  en_name: Chicken breast
  qty: 750
  unit: g
  category: Protein und Milchprodukte
- de_name: Quinoa
  en_name: Quinoa
  qty: 260
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Passierte Tomaten
  en_name: Strained tomatoes (passata)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Erbsen, TK
  en_name: Frozen peas
  qty: 220
  unit: g
  category: Gemüse und Salat
- de_name: Möhren
  en_name: Carrots
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
