de:
  title: Hähnchen-Risoni mit Brokkoli
  summary: Schnelle Risoni-Pfanne mit Hähnchen, Brokkoli und Frischkäse.
en:
  title: Chicken Risoni with Broccoli
  summary: A quick risoni pan with chicken, broccoli, and cream cheese.
