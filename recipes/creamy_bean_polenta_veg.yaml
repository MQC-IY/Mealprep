de:
  title: Cremige Polenta mit Bohnen und Gemüse
  summary: Sehr schnelles Komfortgericht mit Polenta, weißen Bohnen und mildem Gemüse.
en:
  title: Creamy Polenta with Beans and Vegetables
  summary: A very quick comfort dish of creamy polenta, white beans, and mild vegetables.
ingredients:
- de_name: Polenta
  en_name: polenta
  qty: 250
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Weiße Bohnen
  en_name: white beans
  qty: 2
