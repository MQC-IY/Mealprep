de_steps:
- Polenta weich rühren.
- Gemüse in Olivenöl anschwitzen, Bohnen und Tomaten zugeben.
- Kurz weich köcheln lassen.
en_steps:
- Cook the polenta until creamy and smooth.
- Sauté the vegetables in olive oil, then add the beans and passata.
- Simmer briefly until tender.
