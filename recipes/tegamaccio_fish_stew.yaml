de_steps:
- Fischfilets in ca. 4 cm große Stücke schneiden. Tintenfischringe auftauen, trocken
  tupfen. Zwiebel fein würfeln, Knoblauch in Scheiben schneiden.
- Olivenöl in einem schweren Topf bei mittlerer Hitze erwärmen. Salbeiblätter einlegen
  und 1 Minute knusprig frittieren. Salbei herausnehmen und beiseitestellen.
- Zwiebel im Salbeiöl 5 Minuten anschwitzen. Knoblauch und Peperoncino dazugeben,
  1 Minute weiterbraten.
- Tintenfischringe einlegen und 3–4 Minuten mitbraten. Mit Weißwein ablöschen, 2 Minuten
  stark einkochen.
- Tomaten (zerdrückt) und Brühe dazugeben. 15 Minuten bei mittlerer Hitze köcheln.
- Fischstücke vorsichtig einlegen. Zugedeckt bei niedriger Hitze 8–10 Minuten sanft
  garen.
- Mit Salz und Pfeffer abschmecken. Mit gehackter Petersilie und dem frittiertem Salbei
  bestreuen.
- In tiefen Tellern über geröstetem Brot anrichten.
en_steps:
- Cut fish fillets into approx. 4 cm pieces. Thaw squid rings and pat dry. Finely
  dice onion; slice garlic.
- Warm olive oil in a heavy pot over medium heat. Add sage leaves and fry for 1 minute
  until crispy. Remove sage and set aside.
- Sauté onion in the sage oil for 5 minutes. Add garlic and peperoncino; cook for
  1 more minute.
- Add squid rings and fry for 3–4 minutes. Deglaze with white wine and reduce for
  2 minutes over high heat.
- Add crushed tomatoes and stock. Simmer over medium heat for 15 minutes.
- Gently place fish pieces in the pot. Cover and cook over low heat for 8–10 minutes.
- Season with salt and pepper. Scatter with chopped parsley and the fried sage.
- Serve in deep bowls over toasted bread.
