de:
  title: Tegamaccio – Umbrischer Fischeintopf
  summary: Traditioneller umbrischer Fischeintopf aus dem Trasimenischen See mit mehreren
    Fischarten, Weißwein, Tomaten, Salbei und Knoblauch.
en:
  title: Tegamaccio – Umbrian Fish Stew
  summary: A traditional Umbrian fish stew from Lake Trasimeno with several types
    of fish, white wine, tomatoes, sage and garlic.
