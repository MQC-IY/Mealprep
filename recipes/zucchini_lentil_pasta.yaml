de:
  title: Zucchini-Linsen-Pasta mit Frischkäse
  summary: Milde Pasta mit roten Linsen, Zucchini und einer cremigen Tomaten-Frischkäse-Sauce.
en:
  title: Zucchini and Lentil Pasta with Cream Cheese
  summary: A mild pasta with red lentils, zucchini, and a creamy tomato-cream cheese
    sauce.
ingredients:
- de_name: Vollkornnudeln
  en_name: Whole-wheat pasta
  qty: 350
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Rote Linsen
  en_name: Red lentils
  qty: 180
  unit: g
  category: Konserven und Vorrat
- de_name: Zucchini
  en_name: Zucchini
  qty: 2
  unit: Stk
  category: Gemüse und Salat
- de_name: Passierte Tomaten
  en_name: Passata (tomato purée)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Frischkäse natur
  en_name: Plain cream cheese
  qty: 120
  unit: g
  category: Protein und Milchprodukte
- de_name: Zwiebel
  en_name: Onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: Olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Oregano
  en_name: Oregano
  qty: 1
  unit: TL
  category: Gewürze
