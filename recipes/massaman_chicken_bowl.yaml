de_steps:
- Hähnchen in große Würfel schneiden. Kartoffeln schälen und würfeln.
- Öl im Topf erhitzen. Massaman-Currypaste 2 Minuten kräftig anrösten. Knoblauch und
  Zwiebel zugeben.
- Hähnchen zugeben und von außen anbraten. Kokosmilch und Brühe zugießen.
- Kartoffeln, Fischsauce, Kardamom, Zimt, Lorbeerblätter und Chiliflocken zugeben.
  Alles 25 Minuten bei mittlerer Hitze köcheln lassen bis Kartoffeln weich sind.
- Erdnüsse grob hacken. Reis kochen.
- Mit Limettensaft abschmecken. Lorbeerblätter entfernen. Mit Erdnüssen und Limettenschnitzen
  servieren.
en_steps:
- Cut the chicken into large cubes. Peel and dice the potatoes.
- Heat the oil in a pot. Toast the Massaman curry paste for 2 minutes, then add the
  garlic and onion.
- Add the chicken and sear on the outside. Pour in the coconut milk and broth.
- Add the potatoes, fish sauce, cardamom, cinnamon, bay leaves, and chili flakes.
  Simmer over medium heat for 25 minutes until the potatoes are tender.
- Roughly chop the peanuts. Cook the rice.
- Adjust seasoning with lime juice. Remove the bay leaves. Serve with peanuts and
  lime wedges.
