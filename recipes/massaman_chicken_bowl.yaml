de:
  title: Hähnchen-Massaman-Curry mit Erdnüssen
  summary: Reichhaltiges thailändisch-persisches Massaman-Curry mit Hähnchen, Kartoffeln,
    gerösteten Erdnüssen und Kokos – warm gewürzt mit Kardamom, Sternanis und Zimt.
en:
  title: Chicken Massaman Curry with Peanuts
  summary: A rich Thai-Persian Massaman curry with chicken, potatoes, roasted peanuts,
    and coconut milk — warmly spiced with cardamom, star anise, and cinnamon.
