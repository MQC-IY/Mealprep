id: potato_bean_tomato_stew
pool: lunch
healthy: true
quick: true
next_day: true
quick_minutes: 30
meals: 3
de:
  title: Kartoffel-Bohnen-Tomatentopf
  summary: Milder Eintopf mit Kartoffeln, weißen Bohnen, Möhren und Tomaten.
en:
  title: Potato, Bean and Tomato Stew
  summary: Mild stew with potatoes, white beans, carrots and tomatoes.
ingredients:
- de_name: Kartoffeln
  en_name: potatoes
  qty: 900
  unit: g
  category: Kohlenhydrate und Sattmacher
- de_name: Weiße Bohnen
  en_name: white beans
  qty: 2
  unit: Dosen
  category: Konserven und Vorrat
- de_name: Möhren
  en_name: carrots
  qty: 3
  unit: Stk
  category: Gemüse und Salat
- de_name: Passierte Tomaten
  en_name: passata (sieved tomatoes)
  qty: 1
  unit: Glas
  category: Konserven und Vorrat
- de_name: Zwiebel
  en_name: onion
  qty: 1
  unit: Stk
  category: Gemüse und Salat
- de_name: Olivenöl
  en_name: olive oil
  qty: 1
  unit: EL
  category: Konserven und Vorrat
- de_name: Oregano
  en_name: oregano
  qty: 1
  unit: TL
  category: Gewürze
- de_name: Chiliflocken
  en_name: chili flakes
  qty: 0.5
  unit: TL
  category: Gewürze
de_steps:
- Zwiebel und Möhren in Olivenöl anschwitzen.
- Kartoffeln würfeln und mit Bohnen und Tomaten zugeben.
- Mit Wasser weich köcheln lassen.
en_steps:
- Sweat the onion and carrots in olive oil.
- Dice the potatoes and add along with the beans and tomatoes.
- Simmer with water until everything is tender.
