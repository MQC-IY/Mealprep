de_steps:
- Orzo weich garen.
- Hähnchen mit Zwiebel scharf anbraten.
- Zucchini und Erbsen weich garen und etwas Joghurt unterrühren.
en_steps:
- Cook the orzo until tender.
- Sear the chicken with the onion over high heat.
- Cook the zucchini and peas until tender, then stir in a little yogurt.
