de:
  title: Hähnchen-Orzo mit Zucchini und Erbsen
  summary: Schnelle Pfanne mit Hähnchen, Orzo, Zucchini und Erbsen.
en:
  title: Chicken Orzo with Zucchini and Peas
  summary: A quick one-pan dish with chicken, orzo, zucchini, and peas.
