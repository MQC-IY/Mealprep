de_steps:
- Ingwer in dicke Scheiben schneiden. In einem Topf ohne Fett trocken rösten, bis
  er leicht bräunt. Brühe zugießen.
- Sternanis, Zimtstange und Nelken zur Brühe geben. Fischsauce einrühren. 15 Minuten
  leise köcheln lassen.
- Hähnchen in die siedende Brühe geben und 12–15 Minuten pochieren bis es gar ist.
  Herausnehmen, in Streifen zupfen.
- Reisnudeln nach Packungsanweisung garen und abgießen.
- Gewürze aus der Brühe entfernen. Brühe mit Limettensaft und ggf. mehr Fischsauce
  abschmecken.
- Nudeln in tiefe Schüsseln geben, Hähnchen darauf, heiße Brühe angießen. Sojasprossen,
  Frühlingszwiebeln, Koriander, Chili und Limettenviertel dazu reichen.
en_steps:
- Slice the ginger into thick rounds. Dry-toast in a pot over medium heat until lightly
  browned. Pour in the broth.
- Add the star anise, cinnamon stick, and cloves. Stir in the fish sauce and simmer
  gently for 15 minutes.
- Add the chicken to the simmering broth and poach for 12–15 minutes until cooked
  through. Remove and shred into strips.
- Cook the rice noodles according to package instructions and drain.
- Remove the spices from the broth. Season with lime juice and additional fish sauce
  if needed.
- Divide the noodles into deep bowls, top with the chicken, and ladle over the hot
  broth. Serve with bean sprouts, spring onions, cilantro, sliced chili, and lime
  wedges.
