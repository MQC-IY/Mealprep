de:
  title: Hähnchen-Pho-Bowl (schnell mit Fertigbrühe)
  summary: 'Würzige vietnamesische Pho in unter 30 Minuten: Hühnerbrühe mit Sternanis,
    Zimtstange und Ingwer, zartes Hähnchen, Reisnudeln und frischem Beiwerk.'
en:
  title: Chicken Pho Bowl (Quick with Ready-Made Broth)
  summary: 'A fragrant Vietnamese Pho in under 30 minutes: chicken broth infused with
    star anise, cinnamon, and ginger, with tender chicken, rice noodles, and fresh
    toppings.'
