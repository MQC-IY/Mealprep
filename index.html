<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    user-select: none;
  }
  .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .pt-safe { padding-top: env(safe-area-inset-top); }
  .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

  .no-scroll::-webkit-scrollbar { display: none; }
  .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }

  .check-custom {
    appearance: none;
    width: 24px; height: 24px;
    border-radius: 8px;
    border: 2px solid #8d7168;
    background-color: transparent;
    display: grid; place-content: center;
    transition: all .2s ease-in-out;
    cursor: pointer; flex-shrink: 0;
  }
  .check-custom::before {
    content: "";
    width: 12px; height: 12px;
    clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    transform: scale(0);
    transition: 120ms transform ease-in-out;
    background-color: #ffffff;
  }
  .check-custom:checked { background-color: #ca4b17; border-color: #ca4b17; }
  .check-custom:checked::before { transform: scale(1); }
  .item-checked { text-decoration: line-through; opacity: .45; }

  #sheet-backdrop {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(28,28,26,.45);
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease;
  }
  #sheet-panel {
    position: fixed; bottom: 0; left: 50%; z-index: 61;
    width: 100%; max-width: 28rem;
    transform: translate(-50%, 100%);
    transition: transform .35s cubic-bezier(.32,.72,0,1);
    background: #fcf9f5;
    border-radius: 24px 24px 0 0;
    max-height: 88dvh;
    display: flex; flex-direction: column;
  }
  #sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  #sheet-panel.open    { transform: translate(-50%, 0); }

  .view { display: none; }
  .view.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 1s linear infinite; }

  body { min-height: 100dvh; }

  .sidebar-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 10px 14px; border-radius: 12px;
    font-size: 14px; font-weight: 600; letter-spacing: .01em;
    color: #59413a; transition: all .15s;
    cursor: pointer;
  }
  .sidebar-btn:hover  { background: #f0edea; }
  .sidebar-btn.active { background: #ffdbcf; color: #a63500; }
  .sidebar-btn.active .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    color: #a63500;
  }

  /* ── Image skeleton ── */
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .img-skeleton {
    background: linear-gradient(90deg, #ebe8e4 25%, #f0edea 50%, #ebe8e4 75%);
    background-size: 800px 100%;
    animation: shimmer 1.4s infinite linear;
  }

  /* ── Desktop day-detail fade ── */
  #day-detail { transition: opacity .18s ease; }
  #day-detail.switching { opacity: 0; }

  @media (min-width: 1024px) {
    #sheet-panel {
      max-width: 44rem;
      border-radius: 24px;
      top: 50%; bottom: auto;
      max-height: 85dvh;
      transform: translate(-50%, -50%) scale(0.94);
      opacity: 0;
      pointer-events: none;
      transition: transform .25s cubic-bezier(.32,.72,0,1), opacity .2s ease;
    }
    #sheet-panel.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }
  }
</style>
</head>

<body class="bg-surface-dim font-body text-on-surface antialiased">

<div id="app" class="bg-background min-h-screen relative flex flex-col pt-safe">

  <!-- Loading -->
  <div id="screen-loading" class="flex-1 flex flex-col items-center justify-center gap-4 text-on-surface-variant">
    <span class="material-symbols-outlined text-5xl text-primary spinner">restaurant</span>
    <p class="font-label-md text-label-md" data-i18n="loading">Wird geladen…</p>
  </div>

  <!-- Error -->
  <div id="screen-error" class="hidden flex-1 flex flex-col items-center justify-center gap-4 px-margin-safe text-center">
    <span class="material-symbols-outlined text-5xl text-error">error</span>
    <p class="font-headline-md-mobile text-headline-md-mobile text-on-surface" data-i18n="error_title">Fehler beim Laden</p>
    <p id="error-msg" class="font-body-sm text-body-sm text-on-surface-variant"></p>
    <button onclick="init()" class="mt-2 bg-primary text-on-primary font-label-md text-label-md px-6 py-3 rounded-full active:scale-95 transition-transform" data-i18n="error_retry">
      Erneut versuchen
    </button>
  </div>

  <!-- Main app -->
  <div id="screen-main" class="hidden flex-1 flex flex-col min-h-0">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-surface shadow-[0px_2px_16px_rgba(28,28,26,0.08)] h-16 w-full shrink-0">
      <div class="max-w-screen-2xl mx-auto h-full flex justify-between items-center px-4 lg:px-8">
        <button data-i18n-aria="menu_aria" aria-label="Menü" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low active:scale-95 transition-all text-on-surface-variant">
          <span class="material-symbols-outlined">restaurant</span>
        </button>
        <h1 class="font-display text-headline-lg-mobile text-primary tracking-tight">Mahlzeit</h1>
        <button onclick="toggleLang()" aria-label="Sprache wechseln"
          class="h-9 px-3 flex items-center gap-1 rounded-full hover:bg-surface-container-low active:scale-95 transition-all font-label-md text-label-md">
          <span id="lang-de" class="font-bold text-primary">DE</span>
          <span class="text-on-surface-variant opacity-40">|</span>
          <span id="lang-en" class="text-on-surface-variant">EN</span>
        </button>
      </div>
    </header>

    <!-- Body: sidebar + content -->
    <div class="flex flex-1 min-h-0 max-w-screen-2xl mx-auto w-full">

      <!-- Desktop sidebar -->
      <aside class="hidden lg:flex flex-col w-60 shrink-0 sticky top-16 h-[calc(100dvh-4rem)] border-r border-surface-variant/60 bg-surface overflow-y-auto py-6">
        <nav class="flex flex-col gap-1 px-3 mb-6">
          <button onclick="switchView('wochenplan')" id="sidebar-btn-wochenplan" class="sidebar-btn">
            <span id="sidebar-icon-wochenplan" class="material-symbols-outlined text-[22px]">calendar_today</span>
            <span data-i18n="nav_wochenplan">Wochenplan</span>
          </button>
          <button onclick="switchView('rezepte')" id="sidebar-btn-rezepte" class="sidebar-btn">
            <span id="sidebar-icon-rezepte" class="material-symbols-outlined text-[22px]">menu_book</span>
            <span data-i18n="nav_rezepte">Rezepte</span>
          </button>
          <button onclick="switchView('einkauf')" id="sidebar-btn-einkauf" class="sidebar-btn">
            <span id="sidebar-icon-einkauf" class="material-symbols-outlined text-[22px]">shopping_cart</span>
            <span data-i18n="nav_einkauf">Einkauf</span>
            <span id="sidebar-shopping-badge" class="hidden ml-auto bg-primary text-on-primary text-[10px] font-bold min-w-[20px] h-5 flex items-center justify-center rounded-full px-1"></span>
          </button>
        </nav>

        <div class="border-t border-surface-variant/60 mx-3 mb-6"></div>

        <div class="px-3">
          <p class="font-label-sm text-label-sm text-on-surface-variant mb-3 px-2 uppercase tracking-wider" data-i18n="variant_label">Variante</p>
          <div class="flex flex-col gap-1">
            <button id="sidebar-tab-standard" onclick="switchVariant('standard')" class="sidebar-btn"><span data-i18n="variant_standard">Standard</span></button>
            <button id="sidebar-tab-gesund"   onclick="switchVariant('gesund')"   class="sidebar-btn"><span data-i18n="variant_gesund">Gesund</span></button>
            <button id="sidebar-tab-schnell"  onclick="switchVariant('schnell')"  class="sidebar-btn"><span data-i18n="variant_schnell">Schnell</span></button>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <div class="flex-1 flex flex-col min-h-0 min-w-0">

        <!-- Variant tabs (mobile only) -->
        <div class="lg:hidden mx-margin-safe mt-4 bg-surface-container rounded-full p-1 flex relative shrink-0">
          <button id="tab-standard" onclick="switchVariant('standard')"
            class="flex-1 py-2.5 font-label-md text-label-md rounded-full transition-all active:scale-[0.98]"><span data-i18n="variant_standard">Standard</span></button>
          <button id="tab-gesund" onclick="switchVariant('gesund')"
            class="flex-1 py-2.5 font-label-md text-label-md rounded-full transition-all active:scale-[0.98]"><span data-i18n="variant_gesund">Gesund</span></button>
          <button id="tab-schnell" onclick="switchVariant('schnell')"
            class="flex-1 py-2.5 font-label-md text-label-md rounded-full transition-all active:scale-[0.98]"><span data-i18n="variant_schnell">Schnell</span></button>
        </div>

        <!-- View: Wochenplan -->
        <div id="view-wochenplan" class="view active overflow-y-auto no-scroll pb-28 lg:overflow-hidden lg:pb-0">

          <!-- Sticky week nav -->
          <div class="week-nav-bar sticky top-0 z-10 bg-surface/95 backdrop-blur-sm border-b border-surface-variant/60 flex justify-between items-center px-4 lg:px-8 py-3 shrink-0">
            <button class="week-prev-btn w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container active:scale-95 transition-all text-on-surface disabled:opacity-30 disabled:pointer-events-none" onclick="navigateWeek(-1)" aria-label="Vorherige Woche">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <div class="flex flex-col items-center gap-1">
              <span class="week-nav-badge bg-primary text-on-primary font-label-sm text-label-sm px-3 py-1 rounded-full hidden">Diese Woche</span>
              <span class="week-nav-label font-label-md text-label-md text-on-surface"></span>
            </div>
            <button class="week-next-btn w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container active:scale-95 transition-all text-on-surface disabled:opacity-30 disabled:pointer-events-none" onclick="navigateWeek(1)" aria-label="Nächste Woche">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>

          <!-- Mobile: card grid -->
          <div id="day-cards" class="lg:hidden mx-auto max-w-5xl px-4 grid grid-cols-1 md:grid-cols-2 gap-stack-lg pb-4 mt-6"></div>

          <!-- Desktop: master-detail split -->
          <div class="hidden lg:flex flex-1 min-h-0">

            <!-- Master: day list -->
            <div id="day-list" class="w-72 xl:w-80 shrink-0 overflow-y-auto no-scroll border-r border-surface-variant/60 py-3 px-3"></div>

            <!-- Detail: selected day -->
            <div id="day-detail" class="flex-1 overflow-y-auto no-scroll"></div>

          </div>
        </div>

        <!-- View: Rezepte -->
        <div id="view-rezepte" class="view overflow-y-auto no-scroll pb-28 lg:pb-10">

          <!-- Sticky week nav -->
          <div class="week-nav-bar sticky top-0 z-10 bg-surface/95 backdrop-blur-sm border-b border-surface-variant/60 flex justify-between items-center px-4 lg:px-8 py-3 shrink-0">
            <button class="week-prev-btn w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container active:scale-95 transition-all text-on-surface disabled:opacity-30 disabled:pointer-events-none" onclick="navigateWeek(-1)" aria-label="Vorherige Woche">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <div class="flex flex-col items-center gap-1">
              <span class="week-nav-badge bg-primary text-on-primary font-label-sm text-label-sm px-3 py-1 rounded-full hidden">Diese Woche</span>
              <span class="week-nav-label font-label-md text-label-md text-on-surface"></span>
            </div>
            <button class="week-next-btn w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container active:scale-95 transition-all text-on-surface disabled:opacity-30 disabled:pointer-events-none" onclick="navigateWeek(1)" aria-label="Nächste Woche">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>

          <div class="mx-auto max-w-5xl px-4 lg:px-8 mt-6 mb-4 shrink-0">
            <!-- Search bar -->
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
              <input id="recipe-search" type="search" placeholder="Rezept suchen…" data-i18n-placeholder="search_placeholder"

                class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-surface-container border border-surface-container-high font-body-sm text-body-sm text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary/40 transition-all"/>
            </div>
          </div>
          <div id="recipe-cards" class="mx-auto max-w-5xl px-4 lg:px-8 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 pb-8"></div>
          <p id="recipe-no-results" class="hidden mx-auto max-w-5xl px-4 lg:px-8 font-body-sm text-body-sm text-on-surface-variant py-8 text-center" data-i18n="no_results">Kein Rezept gefunden.</p>
        </div>

        <!-- View: Einkauf -->
        <div id="view-einkauf" class="view overflow-y-auto no-scroll pb-28 lg:pb-10">

          <!-- Sticky week nav -->
          <div class="week-nav-bar sticky top-0 z-10 bg-surface/95 backdrop-blur-sm border-b border-surface-variant/60 flex justify-between items-center px-4 lg:px-8 py-3 shrink-0">
            <button class="week-prev-btn w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container active:scale-95 transition-all text-on-surface disabled:opacity-30 disabled:pointer-events-none" onclick="navigateWeek(-1)" aria-label="Vorherige Woche">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <div class="flex flex-col items-center gap-1">
              <span class="week-nav-badge bg-primary text-on-primary font-label-sm text-label-sm px-3 py-1 rounded-full hidden">Diese Woche</span>
              <span class="week-nav-label font-label-md text-label-md text-on-surface"></span>
            </div>
            <button class="week-next-btn w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container active:scale-95 transition-all text-on-surface disabled:opacity-30 disabled:pointer-events-none" onclick="navigateWeek(1)" aria-label="Nächste Woche">

            </button>
          </div>

          <div class="mx-auto max-w-5xl px-4 lg:px-8 pt-stack-lg">

            <!-- Mode toggle: left-aligned, fixed width -->
            <div class="flex bg-surface-container rounded-xl p-1 gap-1 mb-stack-lg shadow-sm w-64">
              <button id="shop-tab-standard" onclick="switchShoppingMode('standard')"
                class="flex-1 text-center py-2 rounded-lg font-label-md text-label-md transition-all">
                <span data-i18n="shop_mode_week">Wochenplan</span>
              </button>

                class="flex-1 text-center py-2 rounded-lg font-label-md text-label-md transition-all">
                <span data-i18n="shop_mode_recipe">Nach Rezept</span>

                <button onclick="copyShoppingList()" data-i18n-aria="copy_aria" aria-label="Einkaufsliste kopieren"

                  title="Als Text kopieren">
                  <span class="material-symbols-outlined text-[20px]">content_copy</span>
                </button>
              </div>
              <span id="shopping-progress-label" class="font-label-md text-label-md text-on-surface-variant block mb-stack-sm"></span>
              <div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
                <div id="shopping-progress-bar" class="h-full bg-secondary rounded-full transition-all duration-500" style="width:0%"></div>
              </div>
            </div>

            <!-- Recipe picker (rezept mode) -->
            <div id="recipe-picker-wrap" class="hidden mb-stack-lg">
              <p class="font-label-sm text-label-sm text-on-surface-variant mb-stack-md" data-i18n="choose_recipe">Rezept wählen:</p>
              <div id="recipe-picker" class="flex flex-wrap gap-2"></div>
            </div>

            <div id="shopping-list" class="grid grid-cols-1 md:grid-cols-2 gap-stack-md"></div>
          </div>
        </div>

      </div><!-- /main content -->

    <!-- Bottom nav (mobile only) -->

        <span id="nav-label-rezepte" class="font-label-sm text-[10px] text-on-surface-variant" data-i18n="nav_rezepte">Rezepte</span>
        <div id="nav-dot-rezepte" class="w-1.5 h-1.5 rounded-full bg-transparent mt-0.5"></div>

        <div class="relative">
          <span id="nav-icon-einkauf" class="material-symbols-outlined">shopping_cart</span>
          <span id="shopping-badge" class="hidden absolute -top-1 -right-2 bg-primary text-on-primary text-[9px] font-bold w-4 h-4 flex items-center justify-center rounded-full border border-surface"></span>
        </div>
        <span id="nav-label-einkauf" class="font-label-sm text-[10px] text-on-surface-variant" data-i18n="nav_einkauf">Einkauf</span>

      </button>
    </nav>

  </div><!-- /screen-main -->
</div><!-- /app -->

<!-- Bottom sheet -->
<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="sheet-panel" role="dialog" aria-modal="true" data-i18n-aria="sheet_aria" aria-label="Rezeptdetails">
  <!-- Hero image -->

       class="absolute bottom-2 right-2 text-white/70 text-[10px] font-medium bg-black/30 px-1.5 py-0.5 rounded backdrop-blur-sm hover:text-white transition-colors">
      Foto: Unsplash
    </a>
  </div>
  <!-- Handle -->
  <div class="flex justify-center pt-3 pb-1 shrink-0">
    <div class="w-10 h-1 rounded-full bg-surface-container-high"></div>
  </div>
  <!-- Sheet header -->
  <div class="flex items-start justify-between px-6 pt-2 pb-4 shrink-0">
    <div class="flex-1 pr-4">
      <p id="sheet-meals" class="font-label-sm text-label-sm text-on-surface-variant mb-1"></p>
      <h2 id="sheet-title" class="font-display text-headline-md-mobile text-on-surface leading-tight"></h2>
    </div>
    <button onclick="closeSheet()" class="w-9 h-9 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors shrink-0">
      <span class="material-symbols-outlined text-on-surface-variant">close</span>
    </button>
  </div>
  <!-- Child note (hidden, kept for data compatibility) -->
  <div id="sheet-child-row" class="mx-6 mb-4 shrink-0 hidden">
    <span class="inline-flex items-center gap-1.5 bg-secondary-container text-on-secondary-container font-label-sm text-label-sm px-3 py-1.5 rounded-full">
      <span class="material-symbols-outlined text-[14px]">child_care</span>
      <span id="sheet-child-text"></span>
    </span>
  </div>
  <!-- Scrollable body -->
  <div class="flex-1 overflow-y-auto no-scroll px-6 pb-8">
    <p id="sheet-summary" class="font-body-sm text-body-sm text-on-surface-variant mb-stack-lg leading-relaxed"></p>
    <h3 class="font-display text-label-md text-label-md text-on-surface mb-stack-md uppercase tracking-wider" data-i18n="ingredients">Zutaten</h3>
    <ul id="sheet-ingredients" class="flex flex-col gap-2 mb-stack-lg"></ul>
    <h3 class="font-display text-label-md text-label-md text-on-surface mb-stack-md uppercase tracking-wider" data-i18n="instructions">Zubereitung</h3>
    <ol id="sheet-steps" class="flex flex-col gap-stack-md"></ol>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────
const DAYS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];

const CATEGORY_ICONS = {
  'Protein und Milchprodukte':    '🥩',
  'Gemüse und Salat':             '🥦',
  'Kohlenhydrate und Sattmacher': '🌾',
  'Konserven und Vorrat':         '🥫',
  'Obst':                         '🍎',
  'Gewürze':                      '🧂',
  'Sonstiges':                    '🛒',
};

// German key → English display label (key is NEVER translated, only the display)
const CATEGORY_NAMES_EN = {
  'Protein und Milchprodukte':    'Protein & Dairy',
  'Gemüse und Salat':             'Vegetables & Salad',
  'Kohlenhydrate und Sattmacher': 'Carbs & Filling',
  'Konserven und Vorrat':         'Canned & Pantry',
  'Obst':                         'Fruit',
  'Gewürze':                      'Spices',
  'Sonstiges':                    'Other',
};

const UI_STRINGS = {
  loading:            { de: 'Wird geladen…',          en: 'Loading…' },
  error_title:        { de: 'Fehler beim Laden',      en: 'Error loading' },
  error_retry:        { de: 'Erneut versuchen',       en: 'Try again' },
  nav_wochenplan:     { de: 'Wochenplan',             en: 'Weekly Plan' },
  nav_rezepte:        { de: 'Rezepte',                en: 'Recipes' },
  nav_einkauf:        { de: 'Einkauf',                en: 'Shopping' },
  variant_label:      { de: 'Variante',               en: 'Variant' },
  variant_standard:   { de: 'Standard',               en: 'Standard' },
  variant_gesund:     { de: 'Gesund',                 en: 'Healthy' },
  variant_schnell:    { de: 'Schnell',                en: 'Quick' },
  this_week:          { de: 'Diese Woche',            en: 'This Week' },
  prev_week_aria:     { de: 'Vorherige Woche',        en: 'Previous Week' },
  next_week_aria:     { de: 'Nächste Woche',          en: 'Next Week' },
  today:              { de: 'Heute',                  en: 'Today' },
  breakfast:          { de: 'FRÜHSTÜCK',              en: 'BREAKFAST' },
  lunch:              { de: 'MITTAGESSEN',            en: 'LUNCH' },
  snack:              { de: 'SNACK',                  en: 'SNACK' },
  breakfast_long:     { de: 'Frühstück',              en: 'Breakfast' },
  lunch_long:         { de: 'Mittagessen',            en: 'Lunch' },
  snack_long:         { de: 'Snack',                  en: 'Snack' },
  dessert_of_week:    { de: 'Dessert der Woche',      en: 'Dessert of the Week' },
  dessert:            { de: 'Dessert',                en: 'Dessert' },
  week_badge:         { de: 'Woche',                  en: 'Week' },
  times_this_week:    { de: '× diese Woche',          en: '× this week' },
  fullscreen:         { de: 'Vollbild',               en: 'Full screen' },
  ingredients:        { de: 'Zutaten',                en: 'Ingredients' },
  instructions:       { de: 'Zubereitung',            en: 'Instructions' },
  search_placeholder: { de: 'Rezept suchen…',         en: 'Search recipe…' },
  no_results:         { de: 'Kein Rezept gefunden.',  en: 'No recipe found.' },
  view_recipe:        { de: 'Rezept ansehen',         en: 'View recipe' },
  in_plan:            { de: 'Im Plan',                en: 'In plan' },
  shop_mode_week:     { de: 'Wochenplan',             en: 'Weekly Plan' },
  shop_mode_recipe:   { de: 'Nach Rezept',            en: 'By Recipe' },
  your_shopping:      { de: 'Dein Einkauf',           en: 'Your Shopping' },
  copy_aria:          { de: 'Einkaufsliste kopieren', en: 'Copy shopping list' },
  progress_of:        { de: 'von',                    en: 'of' },
  progress_done:      { de: 'erledigt',               en: 'done' },
  choose_recipe:      { de: 'Rezept wählen:',         en: 'Choose recipe:' },
  sheet_aria:         { de: 'Rezeptdetails',          en: 'Recipe details' },
  menu_aria:          { de: 'Menü',                   en: 'Menu' },
};

const RECIPE_GRADIENTS = [
  'linear-gradient(135deg,#fde8d8,#f9c4a0)',
  'linear-gradient(135deg,#e8f0fe,#c5d5f9)',
  'linear-gradient(135deg,#fce8e8,#f9c4c4)',
  'linear-gradient(135deg,#e8f4e8,#b8dbb8)',
  'linear-gradient(135deg,#fff8e1,#ffe082)',
  'linear-gradient(135deg,#f3e8fb,#ddb8f9)',
  'linear-gradient(135deg,#e8f4e8,#a5d6a7)',
];
const RECIPE_EMOJIS = ['🍛','🥘','🥗','🍲','🍝','🥙','🫕','🍜','🥧','🫔'];

// ── State ─────────────────────────────────────────────────
let lang         = localStorage.getItem('mahlzeit_lang') || 'de';
let weeks        = [];
let weekIndex    = 0;
let currentVariant   = 'standard';
let currentView      = 'wochenplan';
let checkedItems     = new Set();
let recipeImages     = {};
let recipeTimes      = {};
let lunchCounts      = {};
let shoppingMode     = 'standard';
let selectedRecipeId = null;
let recipeRegistry   = {};
let selectedDayIndex = null;   // desktop master-detail: which day is shown

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

// ── i18n helpers ──────────────────────────────────────────
function t(key) {
  const entry = UI_STRINGS[key];
  if (!entry) return key;
  return lang === 'en' ? entry.en : entry.de;
}

// Display label for a shopping category — key is always the German string
function tCat(deKey) {
  return lang === 'en' ? (CATEGORY_NAMES_EN[deKey] || deKey) : deKey;
}

// Translated field from a recipe object (title, summary)
function rField(r, key) {
  if (lang === 'en') {
    const v = r[key + '_en'];
    if (v) return v;
  }
  return r[key] || '';
}

// Steps array from a recipe object
function rSteps(r) {
  if (lang === 'en' && r.steps_en?.length) return r.steps_en;
  return r.steps || [];
}

// Translated field from a day object (day, breakfast, lunch, snack)
function dField(day, key) {
  if (lang === 'en') {
    const v = day[key + '_en'];
    if (v) return v;
  }
  return day[key] || '';
}

// Translated ingredient name
function iName(ing) {
  if (lang === 'en' && ing.name_en) return ing.name_en;
  return ing.name;
}

function toggleLang() {
  lang = lang === 'de' ? 'en' : 'de';
  localStorage.setItem('mahlzeit_lang', lang);
  applyTranslations();
  render();
}

function applyTranslations() {
  document.documentElement.lang = lang;

  // Static text via data-i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });

  // Input placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });

  // aria-label attributes
  document.querySelectorAll('[data-i18n-aria]').forEach(el => {
    el.setAttribute('aria-label', t(el.dataset.i18nAria));
  });

  // Week nav buttons (multiple instances in each view)
  document.querySelectorAll('.week-prev-btn').forEach(el => el.setAttribute('aria-label', t('prev_week_aria')));
  document.querySelectorAll('.week-next-btn').forEach(el => el.setAttribute('aria-label', t('next_week_aria')));

  // Lang toggle pill
  const dEl = document.getElementById('lang-de');
  const eEl = document.getElementById('lang-en');
  if (dEl) dEl.className = lang === 'de' ? 'font-bold text-primary' : 'text-on-surface-variant';
  if (eEl) eEl.className = lang === 'en' ? 'font-bold text-primary' : 'text-on-surface-variant';
}

// ── Helpers ───────────────────────────────────────────────
function recipeStyle(id, idx) {
  let h = 0;
  for (const c of (id || '')) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return {
    gradient: RECIPE_GRADIENTS[Math.abs(h) % RECIPE_GRADIENTS.length],
    emoji:    RECIPE_EMOJIS[(idx ?? Math.abs(h)) % RECIPE_EMOJIS.length],
  };
}

function checkKey(weekKey, variant, category, name) {
  return `${weekKey}|${variant}|${category}|${name}`;
}

function loadChecked() {
  try {
    const raw = localStorage.getItem('mahlzeit_shopping');
    checkedItems = new Set(raw ? JSON.parse(raw) : []);
  } catch { checkedItems = new Set(); }
}

function saveChecked() {
  localStorage.setItem('mahlzeit_shopping', JSON.stringify([...checkedItems]));
}

function formatWeekDates(week) {
  const mon    = new Date(week.monday + 'T00:00:00');
  const sun    = new Date(week.sunday + 'T00:00:00');
  const locale = lang === 'en' ? 'en-US' : 'de-DE';
  const opts   = { day:'numeric', month:'short' };
  return `${mon.toLocaleDateString(locale, opts)} – ${sun.toLocaleDateString(locale, opts)}`;
}

function isCurrentWeek(week) {
  const mon = new Date(week.monday + 'T00:00:00');
  const sun = new Date(week.sunday + 'T23:59:59');
  return TODAY >= mon && TODAY <= sun;
}

function getDayDate(weekMonday, dayName) {
  const d = new Date(weekMonday + 'T00:00:00');
  d.setDate(d.getDate() + DAYS.indexOf(dayName));
  return d;
}

function isToday(date) {
  return date.toDateString() === TODAY.toDateString();
}

function shoppingStats(week, variant) {
  const varData = week.variants[variant];
  let total = 0, done = 0;
  for (const cat of varData.shopping) {
    for (const item of cat.items) {
      total++;
      if (checkedItems.has(checkKey(week.week_key, variant, cat.category, item.name))) done++;
    }
  }
  return { total, done };
}

function fmtTime(id) {
  const mins = recipeTimes[id];
  if (!mins) return null;
  if (mins < 60) return `${mins} Min`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h} Std ${m} Min` : `${h} Std`;
}

function imgSrc(raw, w, h, q = 80) {
  return `${raw}&w=${w}&h=${h}&fit=crop&q=${q}&auto=format`;
}

function recipeImg(id, w, h, q) {
  const entry = recipeImages[id];
  return entry?.raw ? imgSrc(entry.raw, w, h, q) : null;
}

function escId(key)   { return 'cb_' + btoa(encodeURIComponent(key)).replace(/[^a-zA-Z0-9]/g,''); }
function escAttr(str) { return str.replace(/'/g,"\\'"); }

// ── Init ──────────────────────────────────────────────────
async function init() {
  show('screen-loading');
  try {
    const [weeksRes, imagesRes, timesRes] = await Promise.allSettled([
      fetch('./weeks.json'),
      fetch('./recipe_images.json'),
      fetch('./recipe_times.json'),
    ]);

    if (weeksRes.status !== 'fulfilled' || !weeksRes.value.ok)
      throw new Error(`weeks.json: HTTP ${weeksRes.value?.status ?? 'Netzwerkfehler'}`);
    const data = await weeksRes.value.json();
    weeks = data.weeks;

    if (imagesRes.status === 'fulfilled' && imagesRes.value.ok)
      recipeImages = await imagesRes.value.json();

    if (timesRes.status === 'fulfilled' && timesRes.value.ok)
      recipeTimes = await timesRes.value.json();

    const idx = weeks.findIndex(w => isCurrentWeek(w));
    weekIndex = idx >= 0 ? idx : 0;

    loadChecked();
    applyTranslations();
    show('screen-main');
    render();
  } catch (e) {
    document.getElementById('error-msg').textContent = e.message;
    show('screen-error');
  }
}

function show(id) {
  ['screen-loading','screen-error','screen-main'].forEach(s =>
    document.getElementById(s).classList.toggle('hidden', s !== id)
  );
}

// ── Week nav (all views) ──────────────────────────────────
function updateWeekNavBars() {
  if (!weeks.length) return;
  const isCurrent = isCurrentWeek(weeks[weekIndex]);
  const label     = formatWeekDates(weeks[weekIndex]);
  const atFirst   = weekIndex === 0;
  const atLast    = weekIndex === weeks.length - 1;
  document.querySelectorAll('.week-nav-badge').forEach(el => { el.classList.toggle('hidden', !isCurrent); el.textContent = t('this_week'); });
  document.querySelectorAll('.week-nav-label').forEach(el => { el.textContent = label; });
  document.querySelectorAll('.week-prev-btn').forEach(el => { el.disabled = atFirst; });
  document.querySelectorAll('.week-next-btn').forEach(el => { el.disabled = atLast; });
}

// ── Render ────────────────────────────────────────────────
function render() {
  renderVariantTabs();
  renderBottomNav();
  if      (currentView === 'wochenplan') renderWochenplan();
  else if (currentView === 'rezepte')    renderRezepte();
  else                                   renderEinkauf();
}

// ── Variant tabs ──────────────────────────────────────────
function renderVariantTabs() {
  ['standard','gesund','schnell'].forEach(v => {
    const btn = document.getElementById('tab-' + v);
    if (btn) {
      btn.className = v === currentVariant
        ? 'flex-1 py-2.5 font-label-md text-label-md rounded-full bg-surface-container-lowest shadow-sm text-primary transition-all active:scale-[0.98]'
        : 'flex-1 py-2.5 font-label-md text-label-md rounded-full text-on-surface-variant hover:text-on-surface transition-all active:scale-[0.98]';
    }
    const sideBtn = document.getElementById('sidebar-tab-' + v);
    if (sideBtn) sideBtn.classList.toggle('active', v === currentVariant);
  });
}

// ── Bottom / sidebar nav ──────────────────────────────────
function renderBottomNav() {
  ['wochenplan','rezepte','einkauf'].forEach(v => {
    const active = v === currentView;
    const label = document.getElementById('nav-label-' + v);
    if (label) label.className = `font-label-sm text-[10px] ${active ? 'text-primary font-bold' : 'text-on-surface-variant'}`;
    const dot  = document.getElementById('nav-dot-' + v);
    if (dot)   dot.className = `w-1.5 h-1.5 rounded-full mt-0.5 ${active ? 'bg-primary' : 'bg-transparent'}`;
    const icon = document.getElementById('nav-icon-' + v);
    if (icon)  icon.className = `material-symbols-outlined ${active ? 'icon-fill text-primary' : 'text-on-surface-variant'}`;
    const sideBtn = document.getElementById('sidebar-btn-' + v);
    if (sideBtn) sideBtn.classList.toggle('active', active);
    const sideIcon = document.getElementById('sidebar-icon-' + v);
    if (sideIcon) sideIcon.style.fontVariationSettings =
      active ? "'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24" : "'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24";
  });

  if (weeks.length) {
    const { total, done } = shoppingStats(weeks[weekIndex], currentVariant);
    const remaining = total - done;
    const show      = remaining > 0 && currentView !== 'einkauf';
    const label     = remaining > 99 ? '99+' : String(remaining);
    const badge = document.getElementById('shopping-badge');
    if (badge) { badge.textContent = label; badge.classList.toggle('hidden', !show); }
    const sBadge = document.getElementById('sidebar-shopping-badge');
    if (sBadge) { sBadge.textContent = label; sBadge.classList.toggle('hidden', !show); }
  }
}

// ── Wochenplan ────────────────────────────────────────────
function renderWochenplan() {
  if (!weeks.length) return;
  const week    = weeks[weekIndex];
  const varData = week.variants[currentVariant];

  [...varData.lunches, varData.dessert].forEach(r => { recipeRegistry[r.id] = r; });

  lunchCounts = {};
  varData.days.forEach(day => {
    if (day.lunch_id) lunchCounts[day.lunch_id] = (lunchCounts[day.lunch_id] || 0) + 1;
  });

  // Auto-select today, or first day
  if (selectedDayIndex === null || selectedDayIndex >= varData.days.length) {
    const todayIdx = varData.days.findIndex(d => isToday(getDayDate(week.monday, d.day)));
    selectedDayIndex = todayIdx >= 0 ? todayIdx : 0;
  }

  updateWeekNavBars();

  renderMobileDayCards(week, varData);
  renderDesktopDayList(week, varData);
  renderDesktopDayDetail(week, varData);
}

function renderMobileDayCards(week, varData) {
  const dayCards = varData.days.map(day => {
    const dayDate = getDayDate(week.monday, day.day);
    const today   = isToday(dayDate);
    const borderClass = today ? 'border-l-4 border-primary' : 'border border-surface-container-low/50';
    const glowHtml = today
      ? `<div class="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-primary-fixed-dim/20 to-transparent opacity-50 pointer-events-none"></div>` : '';
    const lunchRecipe = varData.lunches.find(l => l.id === day.lunch_id)
                     || (varData.dessert?.id === day.lunch_id ? varData.dessert : null);
    return `
      <div class="bg-surface-container-lowest rounded-2xl p-6 shadow-[0px_4px_24px_rgba(28,28,26,0.06)] ${borderClass} relative overflow-hidden active:scale-[0.98] transition-transform cursor-pointer"
           ${lunchRecipe ? `onclick="openById('${lunchRecipe.id}')"` : ''}>
        ${glowHtml}
        <div class="flex justify-between items-center mb-5">
          <h3 class="font-display text-headline-md-mobile text-on-surface">${dField(day, 'day')}</h3>
          ${today ? `<span class="bg-primary text-on-primary font-label-sm text-label-sm px-3 py-1.5 rounded-full shadow-sm">${t('today')}</span>` : ''}
        </div>
        <div class="flex flex-col gap-4">
          ${mealRow('🌅', t('breakfast'), dField(day, 'breakfast'))}
          <div class="h-px w-full bg-surface-container-high/50 ml-10"></div>
          ${mealRowAccent('🍲', t('lunch'), dField(day, 'lunch'), day.lunch_note)}
          <div class="h-px w-full bg-surface-container-high/50 ml-10"></div>
          ${mealRow('🍎', t('snack'), dField(day, 'snack'))}
        </div>
      </div>`;
  }).join('');

  // Dessert der Woche — spans full grid width
  const d = varData.dessert;
  const dessertImg = recipeImg(d.id, 1200, 400, 80);
  const { gradient } = recipeStyle(d.id, 7);
  const dessertBanner = dessertImg
    ? `<div class="relative h-40 overflow-hidden img-skeleton">
         <img src="${dessertImg}" class="w-full h-full object-cover opacity-0 transition-opacity duration-300"
           loading="lazy"
           onload="this.classList.remove('opacity-0');this.parentElement.classList.remove('img-skeleton')"
           onerror="this.style.display='none'">
         <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
         <div class="absolute bottom-3 left-4 text-white">
           <p class="font-label-sm text-label-sm opacity-80 uppercase tracking-wider mb-0.5">🍰 ${t('dessert_of_week')}</p>
           <p class="font-display text-lg font-bold">${rField(d, 'title')}</p>
         </div>
       </div>`
    : `<div class="h-40 flex flex-col items-center justify-center" style="background:${gradient}">
         <span class="text-4xl mb-2">🍰</span>
         <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">${t('dessert_of_week')}</p>
         <p class="font-display text-lg font-bold text-on-surface">${rField(d, 'title')}</p>
       </div>`;

  const dessertCard = `
    <div class="md:col-span-2 xl:col-span-3 bg-surface-container-lowest rounded-2xl shadow-[0px_4px_24px_rgba(28,28,26,0.06)] overflow-hidden cursor-pointer active:scale-[0.99] transition-transform"
         onclick="openById('${d.id}')">
      ${dessertBanner}
      <div class="px-5 py-4 flex items-center justify-between">
        <p class="font-body-sm text-body-sm text-on-surface-variant line-clamp-1">${rField(d, 'summary')}</p>
        <span class="material-symbols-outlined text-primary ml-4 shrink-0">arrow_forward</span>
      </div>
    </div>`;

  document.getElementById('day-cards').innerHTML = dayCards + dessertCard;
}

const DESSERT_DAY_INDEX = 7; // sentinel for the dessert entry in the desktop list

function renderDesktopDayList(week, varData) {
  const listEl = document.getElementById('day-list');
  if (!listEl) return;

// ── Rezepte ───────────────────────────────────────────────
// All unique recipes across all weeks for current variant (populated in renderRezepte)
let _variantPool = [];

function buildVariantPool() {
  const seen = new Set();
  const pool = [];
  weeks.forEach(week => {
    const varData = week.variants[currentVariant];
    if (!varData) return;
    [...varData.lunches, varData.dessert].forEach(r => {
      if (r && !seen.has(r.id)) { seen.add(r.id); pool.push(r); recipeRegistry[r.id] = r; }
    });
  });
  return pool;
}

function recipeCardHTML(recipe, mealLabel, idx) {
  const { gradient, emoji } = recipeStyle(recipe.id, idx);
  const cardImg = recipeImg(recipe.id, 800, 400, 80);
  const banner  = cardImg
    ? `<div class="relative h-48 overflow-hidden bg-surface-container-high img-skeleton">
         <img src="${cardImg}" alt="${recipe.title.replace(/"/g,'&quot;')}" loading="lazy"
           class="w-full h-full object-cover opacity-0 transition-opacity duration-300"
           onload="this.classList.remove('opacity-0');this.parentElement.classList.remove('img-skeleton')"
           onerror="this.closest('.relative').innerHTML='<div class=\\'h-48 flex items-center justify-center text-6xl\\' style=\\'background:${gradient}\\'>${emoji}</div>'">
       </div>`
    : `<div class="h-48 flex items-center justify-center text-6xl" style="background:${gradient}">${emoji}</div>`;
  return `
    <article onclick="openById('${recipe.id}')"
      class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_24px_rgba(28,28,26,0.06)] overflow-hidden flex flex-col group cursor-pointer active:scale-[0.98] transition-transform duration-300">
      ${banner}
      <div class="p-stack-lg flex flex-col gap-stack-sm">
        <h3 class="font-display text-headline-md text-on-surface group-hover:text-primary transition-colors">${rField(recipe, 'title')}</h3>
        <p class="font-body-sm text-body-sm text-on-surface-variant line-clamp-2">${rField(recipe, 'summary')}</p>
        <div class="flex flex-wrap gap-2 mt-stack-sm">
          <span class="bg-primary-container text-on-primary-container px-3 py-1.5 rounded-full font-label-sm text-label-sm inline-flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[14px]">restaurant_menu</span>${mealLabel}
          </span>
          ${fmtTime(recipe.id) ? `
          <span class="bg-surface-container-high text-on-surface-variant px-3 py-1.5 rounded-full font-label-sm text-label-sm inline-flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[14px]">schedule</span>${fmtTime(recipe.id)}
          </span>` : ''}
        </div>
        <div class="mt-stack-md self-end flex items-center gap-1 font-label-md text-label-md text-primary group-hover:translate-x-1 transition-transform">
          ${t('view_recipe')} <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </div>
      </div>
    </article>`;
}

function renderRezepte() {
  if (!weeks.length) return;
  const week    = weeks[weekIndex];
  const varData = week.variants[currentVariant];
  updateWeekNavBars();

  lunchCounts = {};
  varData.days.forEach(day => {
    if (day.lunch_id) lunchCounts[day.lunch_id] = (lunchCounts[day.lunch_id] || 0) + 1;
  });

  // Build cross-week pool for search
  _variantPool = buildVariantPool();

  // Render current week's recipes
  const weekRecipes = [...varData.lunches, varData.dessert];
  document.getElementById('recipe-cards').innerHTML = weekRecipes.map((recipe, i) => {
    const isDessert = i === varData.lunches.length;
    const mealLabel = isDessert ? t('dessert_of_week') : `${lunchCounts[recipe.id] || 1}${t('times_this_week')}`;
    return recipeCardHTML(recipe, mealLabel, i);
  }).join('');

  // Re-apply active search if any
  const q = document.getElementById('recipe-search')?.value || '';
  if (q.trim()) filterRecipes(q);
}

function copyShoppingList() {
  if (!weeks.length) return;
  const varData = weeks[weekIndex].variants[currentVariant];
  const lines = [`${t('your_shopping')} – ${formatWeekDates(weeks[weekIndex])} (${currentVariant})`, ''];
  varData.shopping.forEach(cat => {
    lines.push(`${CATEGORY_ICONS[cat.category] || ''} ${tCat(cat.category)}`);
    cat.items.forEach(item => lines.push(`  • ${item.name}  ${item.qty_display}`));
    lines.push('');
  });
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('[onclick="copyShoppingList()"] .material-symbols-outlined');
    if (btn) { btn.textContent = 'check'; setTimeout(() => { btn.textContent = 'content_copy'; }, 2000); }
  }).catch(() => {
    // Fallback for browsers without clipboard API
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
}

function filterRecipes(query) {
  const q = query.trim().toLowerCase();
  const noResults = document.getElementById('recipe-no-results');

  if (!q) {
    // Empty search → restore current week's recipes
    renderRezepte();
    if (noResults) noResults.classList.add('hidden');
    return;
  }

  // Search across ALL weeks in the current variant pool
  const matches = _variantPool.filter(r =>
    rField(r, 'title').toLowerCase().includes(q) ||
    rField(r, 'summary').toLowerCase().includes(q)
  );

  document.getElementById('recipe-cards').innerHTML = matches.map((recipe, i) => {
    // Find which week this recipe appears in and how many times
    let weekLabel = t('in_plan');
    weeks.forEach(week => {
      const varData = week.variants[currentVariant];
      const count = varData?.days.filter(d => d.lunch_id === recipe.id).length || 0;
      if (count > 0) weekLabel = `${formatWeekDates(week)}`;
    });
    return recipeCardHTML(recipe, weekLabel, i);
  }).join('');

  if (noResults) noResults.classList.toggle('hidden', matches.length > 0);
}

// ── Einkauf ───────────────────────────────────────────────
function switchShoppingMode(mode) {
  shoppingMode = mode;
  if (mode === 'rezept' && !selectedRecipeId && weeks.length) {
    selectedRecipeId = weeks[weekIndex].variants[currentVariant].lunches[0]?.id || null;
  }
  renderEinkauf();
}

function renderEinkauf() {
  if (!weeks.length) return;
  const week    = weeks[weekIndex];
  const varData = week.variants[currentVariant];
  updateWeekNavBars();


  document.getElementById('shop-tab-standard').className =
    `flex-1 text-center py-2 rounded-lg font-label-md text-label-md transition-all ${
      shoppingMode === 'standard'
        ? 'bg-primary text-on-primary shadow-sm'
        : 'text-on-surface-variant hover:text-on-surface'}`;
  document.getElementById('shop-tab-rezept').className =
    `flex-1 text-center py-2 rounded-lg font-label-md text-label-md transition-all ${
      shoppingMode === 'rezept'
        ? 'bg-primary text-on-primary shadow-sm'
        : 'text-on-surface-variant hover:text-on-surface'}`;

  document.getElementById('shopping-progress-wrap').classList.toggle('hidden', shoppingMode !== 'standard');
  document.getElementById('recipe-picker-wrap').classList.toggle('hidden', shoppingMode !== 'rezept');

  if (shoppingMode === 'standard') {
    const { total, done } = shoppingStats(week, currentVariant);
    document.getElementById('shopping-progress-label').textContent = `${done} ${t('progress_of')} ${total} ${t('progress_done')}`;
    document.getElementById('shopping-progress-bar').style.width = total ? `${(done/total)*100}%` : '0%';
    renderShoppingList(week, varData);
  } else {
    renderRecipePicker(week, varData);
    renderRezeptEinkauf(week, varData);
  }
  renderBottomNav();
}

            <span class="text-on-surface-variant text-sm shrink-0 ml-2">${item.qty_display}</span>

    }).join('');
    return `
      <div class="bg-surface-container-lowest rounded-[20px] shadow-[0px_4px_24px_rgba(28,28,26,0.06)] p-6">
        <h3 class="font-label-md text-label-md text-tertiary mb-stack-md flex items-center gap-2">
          <span class="text-xl">${catIcon}</span> ${tCat(cat.category)}
        </h3>
        <ul class="flex flex-col gap-stack-sm">${items}</ul>
      </div>`;
  }).join('');
}

function renderRecipePicker(week, varData) {
  const recipes = [...varData.lunches, varData.dessert];
  document.getElementById('recipe-picker').innerHTML = recipes.map(r => {
    const active = r.id === selectedRecipeId;
    return `<button onclick="selectRecipe('${r.id}')"
      class="px-3 py-1.5 rounded-full font-label-sm text-label-sm transition-all active:scale-95 ${
        active
          ? 'bg-primary text-on-primary'
          : 'bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest'
      }">${rField(r, 'title')}</button>`;
  }).join('');
}

function selectRecipe(id) {
  selectedRecipeId = id;
  if (!weeks.length) return;
  const week    = weeks[weekIndex];
  const varData = week.variants[currentVariant];
  renderRecipePicker(week, varData);
  renderRezeptEinkauf(week, varData);
}

function renderRezeptEinkauf(week, varData) {
  const recipes = [...varData.lunches, varData.dessert];
  const recipe  = recipes.find(r => r.id === selectedRecipeId) || recipes[0];
  if (!recipe) { document.getElementById('shopping-list').innerHTML = ''; return; }

  const groups = {};
  (recipe.ingredients || []).forEach(ing => {
    const cat = ing.category || 'Sonstiges';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(ing);
  });

  const CATEGORY_ORDER = [
    'Protein und Milchprodukte','Gemüse und Salat',
    'Kohlenhydrate und Sattmacher','Konserven und Vorrat','Obst','Gewürze',
  ];
  const orderedCats = [
    ...CATEGORY_ORDER.filter(c => groups[c]),
    ...Object.keys(groups).filter(c => !CATEGORY_ORDER.includes(c)),
  ];

  document.getElementById('shopping-list').innerHTML = orderedCats.map(cat => {
    const catIcon = CATEGORY_ICONS[cat] || '🛒';
    const items = groups[cat].map(ing => {
      const key  = `rezept|${week.week_key}|${currentVariant}|${recipe.id}|${cat}|${ing.name}`;
      const done = checkedItems.has(key);
      return `
        <li class="flex items-center gap-3 py-2 cursor-pointer">
          <input type="checkbox" class="check-custom" id="${escId(key)}"
            ${done ? 'checked' : ''}
            onchange="toggleCheck('${escAttr(key)}', this)"/>
          <label for="${escId(key)}" class="flex-1 flex justify-between items-center cursor-pointer font-body-md text-body-md text-on-surface ${done ? 'item-checked' : ''} transition-all">
            <span>${iName(ing)}</span>
            <span class="text-on-surface-variant text-sm shrink-0 ml-2">${ing.qty_display ?? ''}</span>
          </label>
        </li>`;
    }).join('');
    return `
      <div class="bg-surface-container-lowest rounded-[20px] shadow-[0px_4px_24px_rgba(28,28,26,0.06)] p-6">
        <h3 class="font-label-md text-label-md text-tertiary mb-stack-md flex items-center gap-2">
          <span class="text-xl">${catIcon}</span> ${tCat(cat)}
        </h3>
        <ul class="flex flex-col gap-stack-sm">${items}</ul>
      </div>`;
  }).join('');
}

function toggleCheck(key, el) {
  if (el.checked) checkedItems.add(key);
  else            checkedItems.delete(key);
  saveChecked();
  const label = el.nextElementSibling;
  if (label) label.classList.toggle('item-checked', el.checked);
  if (weeks.length) {
    if (shoppingMode === 'standard') {
      const { total, done } = shoppingStats(weeks[weekIndex], currentVariant);
      document.getElementById('shopping-progress-label').textContent = `${done} ${t('progress_of')} ${total} ${t('progress_done')}`;
      document.getElementById('shopping-progress-bar').style.width = total ? `${(done/total)*100}%` : '0%';
    }
    renderBottomNav();
  }
}

// ── Bottom sheet ──────────────────────────────────────────
function openById(id) {
  const recipe = recipeRegistry[id];
  if (recipe) openSheet(recipe);
}

function openSheet(recipe) {
  const imgWrap   = document.getElementById('sheet-image-wrap');
  const imgEl     = document.getElementById('sheet-image');
  const imgCredit = document.getElementById('sheet-image-credit');
  const entry     = recipeImages[recipe.id];
  if (entry?.raw) {
    imgEl.src             = imgSrc(entry.raw, 1200, 520, 85);
    imgEl.alt             = rField(recipe, 'title');
    imgCredit.href        = entry.credit_url || '#';
    imgCredit.textContent = `Foto: ${entry.credit} / Unsplash`;
    imgEl.onerror         = () => imgWrap.classList.add('hidden');
    imgWrap.classList.remove('hidden');
  } else {
    imgWrap.classList.add('hidden');
  }

  const dayCount = lunchCounts[recipe.id] || 1;
  const timeStr  = fmtTime(recipe.id);
  document.getElementById('sheet-meals').textContent =
    [timeStr ? `⏱ ${timeStr}` : null, `${dayCount}${t('times_this_week')}`].filter(Boolean).join('  ·  ');
  document.getElementById('sheet-title').textContent   = rField(recipe, 'title');
  document.getElementById('sheet-summary').textContent = rField(recipe, 'summary');

  const childRow = document.getElementById('sheet-child-row');
  if (recipe.child_note) {
    document.getElementById('sheet-child-text').textContent = recipe.child_note;
    childRow.classList.remove('hidden');
  } else {
    childRow.classList.add('hidden');
  }

  document.getElementById('sheet-ingredients').innerHTML =
    (recipe.ingredients || []).map(ing =>
      `<li class="flex justify-between items-baseline gap-4 py-2 border-b border-surface-container-high/60 last:border-0">
        <span class="font-body-sm text-body-sm text-on-surface">${iName(ing)}</span>
        <span class="font-label-sm text-label-sm text-on-surface-variant shrink-0">${ing.qty_display ?? ''}</span>
       </li>`
    ).join('');

  document.getElementById('sheet-steps').innerHTML =
    rSteps(recipe).map((step, i) =>
      `<li class="flex gap-3">
        <span class="font-display text-label-md text-primary shrink-0 mt-0.5">${i+1}</span>
        <span class="font-body-sm text-body-sm text-on-surface leading-relaxed">${step}</span>
       </li>`
    ).join('');

  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet-panel').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('sheet-panel').addEventListener('touchstart', e => {
  window._sheetTouchY = e.touches[0].clientY;
});
document.getElementById('sheet-panel').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - (window._sheetTouchY || 0) > 80) closeSheet();
});

// ── Navigation ────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  ['wochenplan','rezepte','einkauf'].forEach(name => {
    const el = document.getElementById('view-' + name);
    el.classList.toggle('active', name === v);
    if (name === v) el.scrollTop = 0;
  });
  render();
}

function switchVariant(v) {
  currentVariant   = v;
  shoppingMode     = 'standard';
  selectedRecipeId = null;
  selectedDayIndex = null;
  const s = document.getElementById('recipe-search');
  if (s) s.value = '';
  render();
}

function navigateWeek(delta) {
  const next = weekIndex + delta;
  if (next < 0 || next >= weeks.length) return;
  weekIndex        = next;
  shoppingMode     = 'standard';
  selectedRecipeId = null;
  selectedDayIndex = null;
  render();
}

// ── Start ─────────────────────────────────────────────────
init();

// ── Service Worker ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Mealprep/sw.js', { scope: '/Mealprep/' })
      .catch(() => {}); // silently fail on localhost
  });
}
</script>
</body>
